name: Publish to npm

# Triggers:
#   - Push a semver tag (e.g. git tag v0.1.0 && git push --tags)
#   - Manual dispatch from the Actions tab (supports dry-run)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and check versions but do not publish"
        type: boolean
        default: false

jobs:
  # ─── Gate: full CI must pass before any package is published ──────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ─── Publish ──────────────────────────────────────────────────────────────
  publish:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance attestations

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Parse publish.config.yaml into a newline-delimited list ───────────
      - name: Read approved packages
        id: config
        run: |
          PACKAGES=$(node -e "
            const fs = require('fs')
            const lines = fs.readFileSync('publish.config.yaml', 'utf8').split('\n')
            const pkgs = lines
              .filter(l => /^\s+-\s+/.test(l))
              .map(l => l.replace(/^\s+-\s+[\"']?/, '').replace(/[\"']?\s*$/, ''))
              .filter(Boolean)
            console.log(pkgs.join('\n'))
          ")
          echo "Approved packages:"
          echo "$PACKAGES"
          {
            echo "packages<<EOF"
            echo "$PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Build approved packages (Turborepo resolves dependency order) ──────
      - name: Build approved packages
        run: |
          FILTERS=$(echo "${{ steps.config.outputs.packages }}" \
            | sed 's/^/--filter=/' \
            | tr '\n' ' ')
          pnpm turbo build $FILTERS

      # ── Publish — skip packages whose current version is already on npm ───
      - name: Publish approved packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          EXIT_CODE=0

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue

            echo ""
            echo "┌─ $pkg"

            # Resolve the package directory via pnpm workspace
            PKG_DIR=$(pnpm --filter "$pkg" exec node \
              -e "process.stdout.write(process.cwd())" 2>/dev/null)

            if [ -z "$PKG_DIR" ]; then
              echo "│  ERROR: could not locate package directory"
              EXIT_CODE=1
              continue
            fi

            PKG_VERSION=$(node -p "require('$PKG_DIR/package.json').version")

            # Check whether this exact version is already published
            if npm view "${pkg}@${PKG_VERSION}" version > /dev/null 2>&1; then
              echo "│  ⏭  ${pkg}@${PKG_VERSION} is already on npm — skipping"
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "│  🔍 DRY RUN — would publish ${pkg}@${PKG_VERSION}"
            else
              pnpm --filter "$pkg" publish --no-git-checks --access public
              echo "└─ ✓  Published ${pkg}@${PKG_VERSION}"
            fi

          done <<< "${{ steps.config.outputs.packages }}"

          exit $EXIT_CODE
