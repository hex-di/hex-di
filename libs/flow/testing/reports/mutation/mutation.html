HaveContext(partial: Partial<"+"TContext>): void {\n      expect(runner.context()).toMatchObject(partial as Record<"+"string, unknown>);\n    },\n    toHaveNoActivities(): void {\n      expect(runner.snapshot().activities).toHaveLength(0);\n    },\n    toHaveActivityCount(count: number): void {\n      expect(runner.snapshot().activities).toHaveLength(count);\n    },\n  };\n}\n\n// =============================================================================\n// expectEvents / expectEventTypes\n// =============================================================================\n\n/**\n * Asserts that an event sequence matches expected partial matchers.\n *\n * @example\n * ```typescript\n * expectEvents(recorder.events, [\n *   { type: 'FETCH' },\n *   { type: 'SUCCESS', payload: expect.any(Object) },\n * ]);\n * ```\n */\nexport function expectEvents(\n  events: ReadonlyArray<"+"{ readonly type: string }>,\n  expected: ReadonlyArray<"+"Record<"+"string, unknown>>\n): void {\n  expect(events).toHaveLength(expected.length);\n  expected.forEach((exp, i) => {\n    expect(events[i]).toMatchObject(exp);\n  });\n}\n\n/**\n * Asserts that the event type sequence matches expected types.\n *\n * @example\n * ```typescript\n * expectEventTypes(recorder.events, ['FETCH', 'SUCCESS']);\n * ```\n */\nexport function expectEventTypes(\n  events: ReadonlyArray<"+"{ readonly type: string }>,\n  types: ReadonlyArray<"+"string>\n): void {\n  const eventTypes = events.map(e => e.type);\n  expect(eventTypes).toEqual(types);\n}\n\n// =============================================================================\n// expectSnapshot\n// =============================================================================\n\n/** Fluent assertion API for machine snapshots */\nexport interface SnapshotAssertions<"+"TState extends string, TContext> {\n  /** Assert snapshot state name */\n  toBeInState(name: TState): void;\n  /** Assert snapshot context matches partial */\n  toHaveContext(partial: Partial<"+ ) {\n      resolve(options.resultFn(input) as TOutput);\n      return;\n    }\n    resolve(options?.result as TOutput);\n  }\n\n  const activity = {\n    execute(input: TInput, _sink: unknown, signal: AbortSignal): Promise<"+"TOutput> {\n      _started = true;\n      _startCount++;\n      _lastInput = input;\n\n      return new Promise<"+"TOutput>((resolve, reject) => {\n        if (signal.aborted) {\n          _stopped = true;\n          reject(new Error(\"Activity aborted\"));\n          return;\n        }\n\n        const onAbort = (): void => {\n          _stopped = true;\n          reject(new Error(\"Activity aborted\"));\n        };\n\n        if (options?.delay !== undefined && options.delay > 0) {\n          const timer = globalThis.setTimeout(() => {\n            resolveResult(input, resolve, reject);\n          }, options.delay);\n\n          signal.addEventListener(\"abort\", () => {\n            globalThis.clearTimeout(timer);\n            onAbort();\n          });\n        } else {\n          signal.addEventListener(\"abort\", onAbort);\n          resolveResult(input, resolve, reject);\n        }\n      });\n    },\n  };\n\n  return {\n    activity,\n    get started(): boolean {\n      return _started;\n    },\n    get stopped(): boolean {\n      return _stopped;\n    },\n    get startCount(): number {\n      return _startCount;\n    },\n    get lastInput(): TInput | undefined {\n      return _lastInput;\n    },\n    reset(): void {\n      _started = false;\n      _stopped = false;\n      _startCount = 0;\n      _lastInput = undefined;\n    },\n  };\n}\n"},"src/mock-effect-executor.ts":{"language":"typescript","mutants":[{"id":"73","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'executor')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["10"],"coveredBy":["10","11","12","13","14","124","125","126","127","167","168","169","170","185","186","187","219"],"location":{"end":{"co ly ok: boolean;\n  /** The error if execution failed */\n  readonly error: unknown;\n  /** For Invoke effects: the return value of the invoked method */\n  readonly returnValue: unknown;\n  /** For Invoke effects: whether the mock was called */\n  readonly called: boolean;\n  /** For Invoke effects: the arguments the mock was called with */\n  readonly calledWith: readonly unknown[] | undefined;\n  /** True when the effect tag was not recognized */\n  readonly unhandled?: boolean;\n}\n\n// =============================================================================\n// Factory\n// =============================================================================\n\n/**\n * Tests a single effect descriptor with mock implementations.\n *\n * Supports testing:\n * - **Invoke effects**: Resolves the port from mocks and calls the method\n * - **Delay effects**: Returns immediately (no actual delay)\n * - **None effects**: No-op\n * - **Emit effects**: No-op (event is captured in result)\n * - **Sequence effects**: Executes sub-effects in order\n * - **Parallel effects**: Executes sub-effects (sequentially in test)\n *\n * @param effect - The effect descriptor to test\n * @param options - Mock implementations and configuration\n * @returns A promise resolving to the test result\n *\n * @example Testing an Invoke effect\n * ```typescript\n * const effect = Effect.invoke(MyPort, 'fetchData', ['id-123']);\n * const result = await testEffect(effect, {\n *   mocks: {\n *     MyPort: {\n *       fetchData: (id) => ({ id, name: 'Test' }),\n *     },\n *   },\n * });\n * expect(result.ok).toBe(true);\n * expect(result.called).toBe(true);\n * expect(result.returnValue).toEqual({ id: 'id-123', name: 'Test' });\n * ```\n *\n * @example Testing a Delay effect\n * ```typescript\n * const effect = Effect.delay(1000);\n * const result = await testEffect(effect);\n * expect(result.ok).toBe(true);\n * ```\n *\n * @example Testing an effect that fails\n * ```typescript\n * const effect = Effect.invoke(MyPort, 'badMethod', []);\n * const result = await testEffect(effect, {\n *   mocks: {\n *     MyPort: {\n *       badMethod: () => { throw new Error('fail'); },\n *     },\n *   },\n * });\n * expect(result.ok).toBe(false);\n * expect(result.error).toBeInstanceOf(Error);\n * ```\n */\nexport async function testEffect(\n  effect: EffectAny,\n  options?: TestEffectOptions,\n): Promise<"+"TestEffectResult> {\n  const mocks = options?.mocks ?? {};\n\n  try {\n    return await executeEffect(effect, mocks);\n  } catch (error: unknown) {\n    return {\n      ok: false,\n      error,\n      returnValue: undefined,\n      called: false,\n      calledWith: undefined,\n    };\n  }\n}\n\n// =============================================================================\n// Internal Helpers\n// =============================================================================\n\n/** Reads a property from an effect record. */\nfunction readProp(obj: Record<"+"string, unknown>, key: string): unknown {\n  return obj[key];\n}\n\nconst OK_NO_OP: TestEffectResult = { ok: true, error: undefined, returnValue: undefined, called: false, calledWith: undefined };\n\n/**\n * Executes a single effect against mocks.\n * @internal\n */\nasync function executeEffect(\n  effect: EffectAny,\n  mocks: EffectMocks,\n): Promise<"+"TestEffectResult> {\n  const record = effect as Record<"+"string, unknown>;\n\n  switch (effect._tag) {\n    case \"Invoke\":\n      return executeInvoke(record, mocks);\n\n    case \"Delay\":\n    case \"None\":\n    case \"Log\":\n    case \"Choose\":\n      return OK_NO_OP;\n\n    case \"Emit\":\n      return { ok: true, error: undefined, returnValue: readProp(record, \"event\") ?? undefined, called: true, calledWith: undefined };\n\n    case \"Spawn\":\n    case \"Stop\":\n      return { ok: true, error: undefined, returnValue: readProp(record, \"activityId\") ?? undefined, called: true, calledWith: undefined };\n\n    case \"Sequence\":\n    case \"Parallel\":\n      return executeComposite(record, mocks);\n\n    default:\n      return { ok: true, error: undefined, returnValue: undefined, called: false, calledWith: undefined, unhandled: true };\n  }\n}\n\n/**\n * Executes an Invoke effect against mocks.\n * @internal\n */\nasync function executeInvoke(\n  record: Record<"+"string, unknown>,\n  mocks: EffectMocks,\n): Promise<"+"TestEffectResult> {\n  const port = record[\"port\"];\n  const method = record[\"method\"];\n  const args = record[\"args\"];\n\n  if (typeof method !== \"string\") {\n    return {\n      ok: false,\n      error: new Error(\"Invoke effect missing method property\"),\n      returnValue: undefined,\n      called: false,\n      calledWith: undefined,\n    };\n  }\n\n  const portName = (typeof port === \"object\" && port !== null)\n    ? (port as Record<"+"string, unknown>)[\"__portName\"]\n    : undefined;\n  if (typeof portName !== \"string\") {\n    return {\n      ok: false,\n      error: new Error(\"Invoke effect port missing __portName property\"),\n      returnValue: undefined,\n      called: false,\n      calledWith: undefined,\n    };\n  }\n\n  const mockService = mocks[portName];\n  if (mockService === undefined) {\n    return {\n      ok: false,\n      error: new Error(`No mock provided for port \"${portName}\"`),\n      returnValue: undefined,\n      called: false,\n      calledWith: undefined,\n    };\n  }\n\n  const mockMethod = mockService[method];\n  if (typeof mockMethod !== \"function\") {\n    return {\n      ok: false,\n      error: new Error(`Mock for port \"${portName}\" has no method \"${method}\"`),\n      returnValue: undefined,\n      called: false,\n      calledWith: undefined,\n    };\n  }\n\n  const callArgs = Array.isArray(args) ? args : [];\n\n  try {\n    const returnValue = await mockMethod(...callArgs);\n    return {\n      ok: true,\n      error: undefined,\n      returnValue,\n      called: true,\n      calledWith: callArgs,\n    };\n  } catch (error: unknown) {\n    return {\n      ok: false,\n      error,\n      returnValue: undefined,\n      called: true,\n      calledWith: callArgs,\n    };\n  }\n}\n\n/**\n * Executes sub-effects of a Sequence or Parallel effect.\n * In test mode, both are executed sequentially with short-circuit on error.\n * @internal\n */\nasync function executeComposite(\n  record: Record<"+"string, unknown>,\n  mocks: EffectMocks,\n): Promise<"+"TestEffectResult> {\n  const effects = record[\"effects\"];\n  if (!Array.isArray(effects)) {\n    return OK_NO_OP;\n  }\n\n  for (const subEffect of effects) {\n    const subResult = await executeEffect(subEffect as EffectAny, mocks);\n    if (!subResult.ok) {\n      return subResult;\n    }\n  }\n\n  return OK_NO_OP;\n}\n"},"src/test-flow-in-container.ts":{"language":"typescript","mutants":[{"id":"226","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected [] to have a length of 1 but got +0","status":"Killed","static":false,"testsCompleted":1,"killedBy":["82"],"coveredBy":["82","83","84","85","86","149","150","152","174","175","192","193","194","195","196","197","198","199","200","223"],"location":{"end":{"column":2,"line":124},"start":{"column":108,"line":103}}},{"id":"227","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected [] to have a length of 1 but got +0","status":"Killed","static":false,"testsCompleted":1,"killedBy":["82"],"coveredBy":["82","83","84","85","86","149","150","152","174","175","192","193","194","195","196","197","198","199","200","223"],"location":{"end":{"column":29,"line":104},"start":{"column":23,"line":104}}},{"id":"228","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected [] to have a length of 1 but got +0","status":"Killed","static":false,"testsCompleted":1,"killedBy":["82"],"coveredBy":["82","83","84","85","86","149","150","152","174","175","192","193","194","195","196","197","198","199","200","223"],"location":{"end":{"column":33,"line":105},"start":{"column":25,"line context override */\n  readonly context?: unknown;\n}\n\n/**\n * Result from creating a flow integration test.\n *\n * Provides a real MachineRunner backed by a mock effect executor\n * that resolves ports from the provided mocks.\n */\nexport interface TestFlowInContainerResult {\n  /** The machine runner */\n  readonly runner: MachineRunner<"+"string, { readonly type: string }, unknown>;\n  /** Get the current snapshot */\n  snapshot(): MachineSnapshot<"+"string, unknown>;\n  /** Send an event and execute all effects */\n  send(event: { readonly type: string }): Promise<"+"void>;\n  /** Get the current state name */\n  state(): string;\n  /** Get the current context */\n  context(): unknown;\n  /** All effects that were executed */\n  readonly effects: ReadonlyArray<"+"EffectAny>;\n  /** All invoke calls that were made, with details */\n  readonly invocations: ReadonlyArray<"+"InvocationRecord>;\n  /** Dispose the runner and clean up */\n  dispose(): Promise<"+"void>;\n}\n\n/**\n * Record of a single invoke effect execution.\n */\nexport interface InvocationRecord {\n  /** The port name that was invoked */\n  readonly portName: string;\n  /** The method name that was called */\n  readonly method: string;\n  /** The arguments passed to the method */\n  readonly args: readonly unknown[];\n  /** The return value from the mock */\n  readonly returnValue: unknown;\n  /** Whether the invocation threw */\n  readonly threw: boolean;\n  /** The error if the invocation threw */\n  readonly error: unknown;\n}\n\n// =============================================================================\n// Internal Helpers\n// =============================================================================\n\n/**\n * Extracts a callable mock function from mocks, given an Invoke effect record.\n * Returns undefined if the effect structure is invalid or no matching mock exists.\n * @internal\n */\nfunction findContainerMock(\n  record: Record<"+"string, unknown>,\n  mocks: ContainerMocks,\n): { fn: (...a: unknown[]) => unknown; portName: string; method: string; callArgs: unknown[] } | undefined {\n  const port = record[\"port\"];\n  const method = record[\"method\"];\n  if (typeof port !== \"object\" || port === null || typeof method !== \"string\") return undefined;\n\n  const portName = (port as Record<"+"string, unknown>)[\"__portName\"];\n  if (typeof portName !== \"string\") return undefined;\n\n  const service = mocks[portName];\n  if (typeof service !== \"object\" || service === null) return undefined;\n\n  const fn = (service as Record<"+"string, unknown>)[method];\n  if (typeof fn !== \"function\") return undefined;\n\n  const args = record[\"args\"];\n  return {\n    fn: fn as (...a: unknown[]) => unknown,\n    portName,\n    method,\n    callArgs: Array.isArray(args) ? args : [],\n  };\n}\n\n/**\n * Creates a mock effect executor that resolves Invoke effects from mocks.\n * Records all effects and invocations for test assertions.\n * @internal\n */\nfunction createContainerExecutor(\n  mocks: ContainerMocks,\n  recordedEffects: EffectAny[],\n  invocations: InvocationRecord[],\n): EffectExecutor {\n  return {\n    execute(effect: EffectAny): ResultAsync<"+"void, EffectExecutionError> {\n      recordedEffects.push(effect);\n\n      const match = effect._tag === \"Invoke\"\n        ? findContainerMock(effect as Record<"+"string, unknown>, mocks)\n        : undefined;\n      if (match === undefined) {\n        return ResultAsync.ok(undefined);\n      }\n\n      const { fn, portName, method, callArgs } = match;\n      return ResultAsync.fromPromise(\n        Promise.resolve().then(() => {\n          const returnValue = fn(...callArgs);\n          invocations.push({ portName, method, args: callArgs, returnValue, threw: false, error: undefined });\n          return returnValue;\n        }).then(() => undefined),\n        (cause) => {\n          invocations.push({ portName, method, args: callArgs, returnValue: undefined, threw: true, error: cause });\n          return InvokeError({ portName, method, cause });\n        },\n      );\n    },\n  };\n}\n\n// =============================================================================\n// Factory\n// =============================================================================\n\n/**\n * Creates a real machine runner with mock port implementations for\n * integration testing.\n *\n * Unlike `createFlowTestHarness` which provides a high-level test API,\n * this function creates a runner that simulates a DI container environment.\n * Invoke effects resolve ports from the provided mocks, making it possible\n * to verify that the machine correctly orchestrates port method calls.\n *\n * @param config - Machine, mocks, and optional context override\n * @returns An integration test result with runner and tracking\n *\n * @example Basic integration test\n * ```typescript\n * const test = testFlowInContainer({\n *   machine: fetcherMachine,\n *   mocks: {\n *     ApiService: {\n *       fetchData: async (id: string) => ({ id, name: 'Test' }),\n *     },\n *   },\n * });\n *\n * await test.send({ type: 'FETCH', payload: { id: '123' } });\n * expect(test.state()).toBe('loading');\n * expect(test.invocations).toHaveLength(1);\n * expect(test.invocations[0].portName).toBe('ApiService');\n *\n * await test.dispose();\n * ```\n *\n * @example Testing error paths\n * ```typescript\n * const test = testFlowInContainer({\n *   machine: fetcherMachine,\n *   mocks: {\n *     ApiService: {\n *       fetchData: () => { throw new Error('Network error'); },\n *     },\n *   },\n * });\n *\n * await test.send({ type: 'FETCH' });\n * expect(test.invocations[0].threw).toBe(true);\n *\n * await test.dispose();\n * ```\n */\nexport function testFlowInContainer(\n  config: TestFlowInContainerConfig,\n): TestFlowInContainerResult {\n  const mocks = config.mocks ?? {};\n  const recordedEffects: EffectAny[] = [];\n  const invocations: InvocationRecord[] = [];\n\n  const executor = createContainerExecutor(mocks, recordedEffects, invocations);\n  const activityManager = createActivityManager();\n\n  // Apply context override if provided\n  const machine = config.context !== undefined\n    ? { ...config.machine, context: config.context }\n    : config.machine;\n\n  const runner = createMachineRunner(machine, { executor, activityManager });\n\n  return {\n    runner,\n    snapshot(): MachineSnapshot<"+"string, unknown> {\n      return runner.snapshot();\n    },\n    async send(event: { readonly type: string }): Promise<"+"void> {\n      await runner.sendAndExecute(event);\n    },\n    state(): string {\n      return runner.state();\n    },\n    context(): unknown {\n      return runner.context();\n    },\n    get effects(): ReadonlyArray<"+"EffectAny> {\n      return recordedEffects;\n    },\n    get invocations(): ReadonlyArray<"+"InvocationRecord> {\n      return invocations;\n    },\n    async dispose(): Promise<"+"void> {\n      await runner.dispose();\n    },\n  };\n}\n"},"src/test-guard.ts":{"language":"typescript","mutants":[{"id":"297","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'passed')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["33"],"coveredBy":["33","34","35","36","37","38","39"],"location":{"end":{"column":2,"line":103},"start":{"column":20,"line":96}}},{"id":"298","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'passed')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["33"],"coveredBy":["33","34","35","36","37","38","39"],"location":{"end":{"column":4,"line":100},"start":{"column":7,"line":97}}},{"id":"299","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"expected undefined to be true // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["33"],"coveredBy":["33","34","36","37","38","39"],"location":{"end":{"column":54,"line":99},"s ontext type the guard expects\n * @typeParam TEvent - The event type the guard expects\n */\nexport interface TestGuardInput<"+"TContext, TEvent> {\n  /** The context to pass to the guard */\n  readonly context: TContext;\n  /** The event to pass to the guard */\n  readonly event: TEvent;\n}\n\n/**\n * Result of testing a guard predicate.\n */\nexport interface TestGuardResult {\n  /** Whether the guard returned true */\n  readonly passed: boolean;\n  /** If the guard threw, the error that was thrown */\n  readonly error: unknown;\n  /** Whether the guard threw an exception */\n  readonly threw: boolean;\n}\n\n// =============================================================================\n// Factory\n// =============================================================================\n\n/**\n * Tests a guard predicate in isolation.\n *\n * Invokes the guard with the provided context and event, catching any\n * thrown errors. Returns a result object indicating whether the guard\n * passed, failed, or threw.\n *\n * @param guardFn - The guard predicate function to test\n * @param input - The context and event to pass to the guard\n * @returns A result indicating the guard outcome\n *\n * @example Basic guard testing\n * ```typescript\n * const canRetry = (ctx: { retryCount: number }) => ctx.retryCount <"+" 3;\n *\n * const result = testGuard(canRetry, {\n *   context: { retryCount: 2 },\n *   event: { type: 'RETRY' },\n * });\n * expect(result.passed).toBe(true);\n * expect(result.threw).toBe(false);\n * ```\n *\n * @example Testing named guards\n * ```typescript\n * import { guard, and } from '@hex-di/flow';\n *\n * const isAdmin = guard('isAdmin', (ctx) => ctx.role === 'admin');\n * const hasPermission = guard('hasPermission', (ctx) => ctx.permissions.includes('write'));\n * const canEdit = and(isAdmin, hasPermission);\n *\n * const result = testGuard(canEdit, {\n *   context: { role: 'admin', permissions: ['read', 'write'] },\n *   event: { type: 'EDIT' },\n * });\n vent, TContext>;\n  /** Get the current snapshot */\n  snapshot(): MachineSnapshot<"+"TState, TContext>;\n  /** Send an event and execute all effects */\n  send(event: TEvent): Promise<"+"void>;\n  /** Wait for the machine to enter a specific state */\n  waitForState(stateName: TState, timeout?: number): Promise<"+"void>;\n  /** Wait for a specific event type to be sent through the harness */\n  waitForEvent(eventType: string, timeout?: number): Promise<"+"{ readonly type: string }>;\n  /** Cleanup the harness */\n  cleanup(): Promise<"+"void>;\n  /** All recorded effects */\n  readonly effects: ReadonlyArray<"+"EffectAny>;\n}\n\n// =============================================================================\n// Mock Effect Executor\n// =============================================================================\n\n/**\n * Extracts a callable mock function from mocks, given an Invoke effect record.\n * Returns undefined if the effect structure is invalid or no matching mock exists.\n * @internal\n */\nfunction findMockFn(\n  record: Record<"+"string, unknown>,\n  mocks: Record<"+"string, unknown>,\n): { fn: (...a: unknown[]) => unknown; callArgs: unknown[] } | undefined {\n  const port = record[\"port\"];\n  const method = record[\"method\"];\n  if (typeof port !== \"object\" || port === null || typeof method !== \"string\") return undefined;\n\n  const portName = (port as Record<"+"string, unknown>)[\"__portName\"];\n  if (typeof portName !== \"string\") return undefined;\n\n  const service = mocks[portName];\n  if (typeof service !== \"object\" || service === null) return undefined;\n\n  const fn = (service as Record<"+"string, unknown>)[method];\n  if (typeof fn !== \"function\") return undefined;\n\n  const args = record[\"args\"];\n  return { fn: fn as (...a: unknown[]) => unknown, callArgs: Array.isArray(args) ? args : [] };\n}\n\n/**\n * Creates a mock executor that resolves Invoke effects against mock services.\n * All other effects are recorded but not executed.\n * @internal\n */\nfunction createMockExecutor(\n  mocks: Record<"+"string, unknown>,\n  recordedEffects: EffectAny[]\n): EffectExecutor {\n  return {\n    execute(effect: EffectAny): ResultAsync<"+"void, EffectExecutionError> {\n      recordedEffects.push(effect);\n      const match = effect._tag === \"Invoke\"\n        ? findMockFn(effect as Record<"+"string, unknown>, mocks)\n        : undefined;\n      if (match === undefined) {\n        return ResultAsync.ok(undefined);\n      }\n      return ResultAsync.fromPromise(\n        Promise.resolve().then(() => match.fn(...match.callArgs)).then(() => undefined),\n        (cause) => InvokeError({ portName: \"unknown\", method: \"unknown\", cause }),\n      );\n    },\n  };\n}\n\n// =============================================================================\n// Factory\n// =============================================================================\n\ndeclare function setTimeout(callback: () => void, ms: number): unknown;\ndeclare function clearTimeout(id: unknown): void;\n\n/**\n * Creates a test machine harness for unit testing state machines.\n *\n * @example\n * ```typescript\n * const harness = createFlowTestHarness(machine);\n * await harness.send({ type: 'FETCH' });\n * expect(harness.snapshot().state).toBe('loading');\n * await harness.cleanup();\n * ```\n */\nexport function createFlowTestHarness<"+"\n  TState extends string,\n  TEvent extends { readonly type: string },\n  TContext,\n>(\n  machine: {\n    readonly id: string;\n    readonly initial: TState;\n    readonly states: Record<"+"TState, unknown>;\n    readonly context: TContext;\n  },\n  options?: TestMachineOptions\n): TestMachineHarness<"+"TState, TEvent, TContext> {\n  const mocks = options?.mocks ?? {};\n  const recordedEffects: EffectAny[] = [];\n\n  const executor = createMockExecutor(mocks, recordedEffects);\n  const activityManager = createActivityManager();\n\n  // Apply context override if provided\n  const effectiveMachine =\n    options?.context !== undefined ? { ...machine, context: options.context as TContext } : machine;\n\n  const runner = createMachineRunner<"+"TState, string, TContext>(\n    effectiveMachine as MachineAny as Parameters<"+"\n      typeof createMachineRunner<"+"TState, string, TContext>\n    >[0],\n    { executor, activityManager }\n  );\n\n  // Track pending event waiters for waitForEvent()\n  interface EventWaiter {\n    readonly eventType: string;\n    readonly resolve: (event: { readonly type: string }) => void;\n    readonly reject: (error: Error) => void;\n    readonly timerId: ReturnType<"+"typeof setTimeout> | undefined;\n  }\n  let eventWaiters: EventWaiter[] = [];\n\n  return {\n    runner: runner as unknown as MachineRunner<"+"TState, TEvent, TContext>,\n    snapshot(): MachineSnapshot<"+"TState, TContext> {\n      return runner.snapshot();\n    },\n    async send(event: TEvent): Promise<"+"void> {\n      const eventAsRecord: { readonly type: string } = event;\n      await runner.sendAndExecute(eventAsRecord);\n\n      // Resolve any matching event waiters\n      const matching: EventWaiter[] = [];\n      const remaining: EventWaiter[] = [];\n      for (const waiter of eventWaiters) {\n        if (waiter.eventType === eventAsRecord.type) {\n          matching.push(waiter);\n        } else {\n          remaining.push(waiter);\n        }\n      }\n      eventWaiters = remaining;\n      for (const waiter of matching) {\n        if (waiter.timerId !== undefined) {\n          clearTimeout(waiter.timerId);\n        }\n        waiter.resolve(eventAsRecord);\n      }\n    },\n    waitForState(stateName: TState, timeout = 5000): Promise<"+"void> {\n      return new Promise((resolve, reject) => {\n        if (runner.state() === stateName) {\n          resolve();\n          return;\n        }\n\n        // Use an object to hold the mutable timeout reference\n        const timer = { id: undefined as ReturnType<"+"typeof setTimeout> | undefined };\n        const unsub = runner.subscribe(snap => {\n          if (snap.state === stateName) {\n            if (timer.id !== undefined) {\n              clearTimeout(timer.id);\n            }\n            unsub();\n            resolve();\n          }\n        });\n\n        timer.id = setTimeout(() => {\n          unsub();\n          reject(\n            new Error(`Timed out waiting for state \"${stateName}\" (current: \"${runner.state()}\")`)\n          );\n        }, timeout);\n      });\n    },\n    waitForEvent(eventType: string, timeout = 5000): Promise<"+"{ readonly type: string }> {\n      return new Promise((resolve, reject) => {\n        const timerId = setTimeout(() => {\n          eventWaiters = eventWaiters.filter(w => w !== waiter);\n          reject(new Error(`Timed out waiting for event \"${eventType}\"`));\n        }, timeout);\n\n        const waiter: EventWaiter = { eventType, resolve, reject, timerId };\n        eventWaiters.push(waiter);\n      });\n    },\n    async cleanup(): Promise<"+"void> {\n      // Reject any pending event waiters\n      for (const waiter of eventWaiters) {\n        if (waiter.timerId !== undefined) {\n          clearTimeout(waiter.timerId);\n        }\n        waiter.reject(new Error(\"Harness cleanup while waiting for event\"));\n      }\n      eventWaiters = [];\n      await runner.dispose();\n    },\n    get effects(): ReadonlyArray<"+"EffectAny> {\n      return recordedEffects;\n    },\n  };\n}\n"},"src/test-transition.ts":{"language":"typescript","mutants":[{"id":"421","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'ok')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["40"],"coveredBy":["40","41","42","43","44","45","46","47","48","129"],"location":{"end":{"column":2,"line":142},"start":{"column":25,"line":114}}},{"id":"422","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"Cannot read properties of undefined (reading 'context')","statu =======\n// Test Machine Setup\n// =============================================================================\n\ninterface CounterContext {\n  readonly count: number;\n}\n\nconst counterMachine = defineMachine({\n  id: \"counter\",\n  initial: \"idle\" as \"idle\" | \"counting\" | \"done\",\n  context: { count: 0 } as CounterContext,\n  states: {\n    idle: {\n      on: {\n        START: {\n          target: \"counting\" as const,\n        },\n      },\n    },\n    counting: {\n      on: {\n        INCREMENT: {\n          target: \"counting\" as const,\n          actions: [(ctx: { count: number }) => ({ count: ctx.count + 1 })],\n        },\n        DONE: {\n          target: \"done\" as const,\n        },\n      },\n    },\n    done: {\n      on: {},\n    },\n  },\n});\n\nconst guardedMachine = defineMachine({\n  id: \"guarded\",\n  initial: \"idle\" as \"idle\" | \"active\" | \"blocked\",\n  context: { allowed: true },\n  states: {\n    idle: {\n      on: {\n        ACTIVATE: [\n          {\n            target: \"active\" as const,\n            guard: (ctx: { allowed: boolean }) => ctx.allowed,\n          },\n          {\n            target: \"blocked\" as const,\n          },\n        ],\n      },\n    },\n    active: { on: {} },\n    blocked: { on: {} },\n  },\n});\n\n// =============================================================================\n// createFlowTestHarness\n// =============================================================================\n\ndescribe(\"createFlowTestHarness\", () => {\n  let cleanup: (() => Promise<"+"void>) | undefined;\n\n  afterEach(async () => {\n    if (cleanup) {\n      await cleanup();\n      cleanup = undefined;\n    }\n  });\n\n  it(\"creates a harness with initial state\", () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    expect(harness.snapshot().state).toBe(\"idle\");\n    expect(harness.snapshot().context).toEqual({ count: 0 });\n  });\n\n  it(\"sends events and transitions state\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    await harness.send({ type: \"START\" });\n    expect(harness.snapshot().state).toBe(\"counting\");\n  });\n\n  it(\"applies context updates from actions\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    await harness.send({ type: \"START\" });\n    await harness.send({ type: \"INCREMENT\" });\n    await harness.send({ type: \"INCREMENT\" });\n\n    expect(harness.snapshot().context).toEqual({ count: 2 });\n  });\n\n  it(\"overrides initial context\", () => {\n    const harness = createFlowTestHarness(counterMachine, {\n      context: { count: 10 },\n    });\n    cleanup = () => harness.cleanup();\n\n    expect(harness.snapshot().context).toEqual({ count: 10 });\n  });\n\n  it(\"records executed effects\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    await harness.send({ type: \"START\" });\n    // No effects on this machine, but effects array should be accessible\n    expect(harness.effects).toBeDefined();\n  });\n\n  it(\"handles guard-based transitions\", async () => {\n    const harness = createFlowTestHarness(guardedMachine);\n    cleanup = () => harness.cleanup();\n\n    await harness.send({ type: \"ACTIVATE\" });\n    expect(harness.snapshot().state).toBe(\"active\");\n  });\n\n  it(\"handles guard-based transitions (blocked path)\", async () => {\n    const harness = createFlowTestHarness(guardedMachine, {\n      context: { allowed: false },\n    });\n    cleanup = () => harness.cleanup();\n\n    await harness.send({ type: \"ACTIVATE\" });\n    expect(harness.snapshot().state).toBe(\"blocked\");\n  });\n\n  it(\"waitForState resolves immediately if already in state\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    await harness.waitForState(\"idle\");\n    // Should resolve without issue\n    expect(harness.snapshot().state).toBe(\"idle\");\n  });\n\n  it(\"waitForState resolves after transition\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    cleanup = () => harness.cleanup();\n\n    const waitPromise = harness.waitForState(\"counting\");\n    await harness.send({ type: \"START\" });\n    await waitPromise;\n\n    expect(harness.snapshot().state).toBe(\"counting\");\n  });\n\n  it(\"cleans up runner on cleanup\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    await harness.cleanup();\n    cleanup = undefined;\n\n    expect(harness.runner.isDisposed).toBe(true);\n  });\n});\n\n// =============================================================================\n// createMockEffectExecutor\n// =============================================================================\n\ndescribe(\"createMockEffectExecutor\", () => {\n  it(\"records executed effects\", async () => {\n    const mock = createMockEffectExecutor();\n\n    await mock.executor.execute({ _tag: \"Delay\", milliseconds: 100 } as never);\n    await mock.executor.execute({ _tag: \"None\" } as never);\n\n    expect(mock.callCount).toBe(2);\n    expect(mock.effects).toHaveLength(2);\n  });\n\n  it(\"filters effects by tag\", async () => {\n    const mock = createMockEffectExecutor();\n\n    await mock.executor.execute({ _tag: \"Delay\", milliseconds: 100 } as never);\n    await mock.executor.execute({ _tag: \"None\" } as never);\n    await mock.executor.execute({ _tag: \"Delay\", milliseconds: 200 } as never);\n\n    const delays = mock.getByTag(\"Delay\");\n    expect(delays).toHaveLength(2);\n    expect(mock.getByTag(\"None\")).toHaveLength(1);\n  });\n\n  it(\"resets recorded effects\", async () => {\n    const mock = createMockEffectExecutor();\n\n    await mock.executor.execute({ _tag: \"None\" } as never);\n    expect(mock.callCount).toBe(1);\n\n    mock.reset();\n    expect(mock.callCount).toBe(0);\n    expect(mock.effects).toHaveLength(0);\n  });\n\n  it(\"calls handler for matching effects\", async () => {\n    let handlerCalled = false;\n\n    const mock = createMockEffectExecutor([\n      {\n        tag: \"Delay\",\n        handler: () => {\n          handlerCalled = true;\n        },\n      },\n    ]);\n\n    await mock.executor.execute({ _tag: \"Delay\", milliseconds: 100 } as never);\n    expect(handlerCalled).toBe(true);\n  });\n\n  it(\"returns error for matching effects with error config\", async () => {\n    const mock = createMockEffectExecutor([\n      {\n        tag: \"Invoke\",\n        error: new Error(\"mock invoke error\"),\n      },\n    ]);\n\n    const result = await mock.executor.execute({ _tag: \"Invoke\" } as never);\n    expect(result._tag).toBe(\"Err\");\n    if (result._tag === \"Err\") {\n      expect(result.error._tag).toBe(\"InvokeError\");\n    }\n  });\n});\n\n// =============================================================================\n// createFlowEventRecorder\n// =============================================================================\n\ndescribe(\"createFlowEventRecorder\", () => {\n  it(\"records transitions\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const recorder = createFlowEventRecorder(harness.runner);\n\n    await harness.send({ type: \"START\" });\n\n    expect(recorder.transitionCount).toBe(1);\n    expect(recorder.transitions[0].prevState).toBe(\"idle\");\n    expect(recorder.transitions[0].nextState).toBe(\"counting\");\n\n    recorder.dispose();\n    await harness.cleanup();\n  });\n\n  it(\"tracks state history\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const recorder = createFlowEventRecorder(harness.runner);\n\n    await harness.send({ type: \"START\" });\n    await harness.send({ type: \"INCREMENT\" });\n    await harness.send({ type: \"DONE\" });\n\n    expect(recorder.stateHistory).toEqual([\"idle\", \"counting\", \"counting\", \"done\"]);\n\n    recorder.dispose();\n    await harness.cleanup();\n  });\n\n  it(\"resets recorded data\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const recorder = createFlowEventRecorder(harness.runner);\n\n    await harness.send({ type: \"START\" });\n    expect(recorder.transitionCount).toBe(1);\n\n    recorder.reset();\n    expect(recorder.transitionCount).toBe(0);\n    expect(recorder.stateHistory).toEqual([\"counting\"]);\n\n    recorder.dispose();\n    await harness.cleanup();\n  });\n\n  it(\"stops recording after dispose\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const recorder = createFlowEventRecorder(harness.runner);\n\n    recorder.dispose();\n\n    await harness.send({ type: \"START\" });\n    expect(recorder.transitionCount).toBe(0);\n\n    await harness.cleanup();\n  });\n});\n\n// =============================================================================\n// createMockActivity\n// =============================================================================\n\ndescribe(\"createMockActivity\", () => {\n  it(\"tracks start calls\", async () => {\n    const mock = createMockActivity<"+"string, string>({ result: \"done\" });\n    const controller = new AbortController();\n\n    await mock.activity.execute(\"input\", null, controller.signal);\n\n    expect(mock.started).toBe(true);\n    expect(mock.startCount).toBe(1);\n    expect(mock.lastInput).toBe(\"input\");\n  });\n\n  it(\"returns static result\", async () => {\n    const mock = createMockActivity<"+"void, string>({ result: \"hello\" });\n    const controller = new AbortController();\n\n    const result = await mock.activity.execute(undefined as void, null, controller.signal);\n    expect(result).toBe(\"hello\");\n  });\n\n  it(\"returns dynamic result\", async () => {\n    const mock = createMockActivity<"+"number, string>({\n      resultFn: n => `value-${n}`,\n    });\n    const controller = new AbortController();\n\n    const result = await mock.activity.execute(42, null, controller.signal);\n    expect(result).toBe(\"value-42\");\n  });\n\n  it(\"throws configured error\", async () => {\n    const mock = createMockActivity<"+"void, void>({\n      error: new Error(\"test error\"),\n    });\n    const controller = new AbortController();\n\n    await expect(mock.activity.execute(undefined as void, null, controller.signal)).rejects.toThrow(\n      \"test error\"\n    );\n  });\n\n  it(\"tracks stop on abort\", async () => {\n    const mock = createMockActivity<"+"void, void>({ delay: 10000 });\n    const controller = new AbortController();\n\n    const promise = mock.activity.execute(undefined as void, null, controller.signal);\n    controller.abort();\n\n    await expect(promise).rejects.toThrow();\n    expect(mock.stopped).toBe(true);\n  });\n\n  it(\"resets tracking state\", async () => {\n    const mock = createMockActivity<"+"string, string>({ result: \"done\" });\n    const controller = new AbortController();\n\n    await mock.activity.execute(\"input\", null, controller.signal);\n    expect(mock.startCount).toBe(1);\n\n    mock.reset();\n    expect(mock.started).toBe(false);\n    expect(mock.startCount).toBe(0);\n    expect(mock.lastInput).toBeUndefined();\n  });\n});\n\n// =============================================================================\n// Assertions\n// =============================================================================\n\ndescribe(\"expectFlowState\", () => {\n  it(\"asserts current state\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    expectFlowState(harness.runner).toBeInState(\"idle\");\n\n    await harness.send({ type: \"START\" });\n    expectFlowState(harness.runner).toBeInState(\"counting\");\n\n    await harness.cleanup();\n  });\n\n  it(\"asserts context match\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    await harness.send({ type: \"START\" });\n    await harness.send({ type: \"INCREMENT\" });\n\n    expectFlowState(harness.runner).toHaveContext({ count: 1 });\n\n    await harness.cleanup();\n  });\n\n  it(\"asserts no activities\", () => {\n    const harness = createFlowTestHarness(counterMachine);\n    expectFlowState(harness.runner).toHaveNoActivities();\n  });\n});\n\ndescribe(\"expectEvents\", () => {\n  it(\"verifies event sequence with partial matchers\", () => {\n    const events = [{ type: \"START\" }, { type: \"INCREMENT\" }, { type: \"DONE\" }];\n\n    expectEvents(events, [{ type: \"START\" }, { type: \"INCREMENT\" }, { type: \"DONE\" }]);\n  });\n});\n\ndescribe(\"expectEventTypes\", () => {\n  it(\"verifies event type sequence\", () => {\n    const events = [{ type: \"START\" }, { type: \"INCREMENT\" }, { type: \"DONE\" }];\n\n    expectEventTypes(events, [\"START\", \"INCREMENT\", \"DONE\"]);\n  });\n});\n\ndescribe(\"expectSnapshot\", () => {\n  it(\"asserts snapshot state\", () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const snapshot = harness.snapshot();\n\n    expectSnapshot(snapshot).toBeInState(\"idle\");\n    expectSnapshot(snapshot).toHaveContext({ count: 0 });\n  });\n});\n\n// =============================================================================\n// Snapshot Utilities\n// =============================================================================\n\ndescribe(\"serializeSnapshot\", () => {\n  it(\"produces deterministic output\", () => {\n    const harness = createFlowTestHarness(counterMachine);\n    const serialized = serializeSnapshot(harness.snapshot());\n\n    expect(serialized).toEqual({\n      state: \"idle\",\n      context: { count: 0 },\n      activities: [],\n    });\n  });\n});\n\ndescribe(\"snapshotMachine\", () => {\n  it(\"captures snapshots for event sequence\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    const snapshots = await snapshotMachine(harness, [\n      { type: \"START\" },\n      { type: \"INCREMENT\" },\n      { type: \"DONE\" },\n    ]);\n\n    expect(snapshots).toHaveLength(4); // initial + 3 events\n    expect(snapshots[0].state).toBe(\"idle\");\n    expect(snapshots[1].state).toBe(\"counting\");\n    expect(snapshots[2].state).toBe(\"counting\");\n    expect(snapshots[2].context).toEqual({ count: 1 });\n    expect(snapshots[3].state).toBe(\"done\");\n\n    await harness.cleanup();\n  });\n});\n\n// =============================================================================\n// testGuard\n// =============================================================================\n\ndescribe(\"testGuard\", () => {\n  it(\"returns passed=true when guard returns true\", () => {\n    const canRetry = (ctx: { retryCount: number }) => ctx.retryCount <"+" 3;\n    const result = testGuard(canRetry, {\n      context: { retryCount: 2 },\n      event: { type: \"RETRY\" },\n    });\n    expect(result.passed).toBe(true);\n    expect(result.threw).toBe(false);\n    expect(result.error).toBeUndefined();\n  });\n\n  it(\"returns passed=false when guard returns false\", () => {\n    const canRetry = (ctx: { retryCount: number }) => ctx.retryCount <"+" 3;\n    const result = testGuard(canRetry, {\n      context: { retryCount: 5 },\n      event: { type: \"RETRY\" },\n    });\n    expect(result.passed).toBe(false);\n    expect(result.threw).toBe(false);\n  });\n\n  it(\"captures thrown errors\", () => {\n    const badGuard = (): boolean => {\n      throw new Error(\"guard boom\");\n    };\n    const result = testGuard(badGuard, {\n      context: {},\n      event: { type: \"TEST\" },\n    });\n    expect(result.passed).toBe(false);\n    expect(result.threw).toBe(true);\n    expect(result.error).toBeInstanceOf(Error);\n  });\n\n  it(\"works with named guards\", () => {\n    const isAdmin = guard(\"isAdmin\", (ctx: { role: string }) => ctx.role === \"admin\");\n    const result = testGuard(isAdmin, {\n      context: { role: \"admin\" },\n      event: { type: \"TEST\" },\n    });\n    expect(result.passed).toBe(true);\n  });\n\n  it(\"works with guard combinators\", () => {\n    const isAdmin = guard(\"isAdmin\", (ctx: { role: string; active: boolean }) => ctx.role === \"admin\");\n    const isActive = guard(\"isActive\", (ctx: { role: string; active: boolean }) => ctx.active);\n    const canEdit = and(isAdmin, isActive);\n\n    expect(\n      testGuard(canEdit, {\n        context: { role: \"admin\", active: true },\n        event: { type: \"EDIT\" },\n      }).passed\n    ).toBe(true);\n\n    expect(\n      testGuard(canEdit, {\n        context: { role: \"admin\", active: false },\n        event: { type: \"EDIT\" },\n      }).passed\n    ).toBe(false);\n  });\n\n  it(\"works with not() combinator\", () => {\n    const isLoading = guard(\"isLoading\", (ctx: { loading: boolean }) => ctx.loading);\n    const isNotLoading = not(isLoading);\n\n    expect(\n      testGuard(isNotLoading, {\n        context: { loading: false },\n        event: { type: \"TEST\" },\n      }).passed\n    ).toBe(true);\n\n    expect(\n      testGuard(isNotLoading, {\n        context: { loading: true },\n        event: { type: \"TEST\" },\n      }).passed\n    ).toBe(false);\n  });\n\n  it(\"passes event to guard function\", () => {\n    const isCorrectType = (\n      _ctx: unknown,\n      evt: { type: string; payload?: { key: string } }\n    ) => evt.payload?.key === \"secret\";\n\n    expect(\n      testGuard(isCorrectType, {\n        context: {},\n        event: { type: \"CHECK\", payload: { key: \"secret\" } },\n      }).passed\n    ).toBe(true);\n\n    expect(\n      testGuard(isCorrectType, {\n        context: {},\n        event: { type: \"CHECK\", payload: { key: \"wrong\" } },\n      }).passed\n    ).toBe(false);\n  });\n});\n\n// =============================================================================\n// testTransition\n// =============================================================================\n\ndescribe(\"testTransition\", () => {\n  it(\"computes a valid transition\", () => {\n    const result = testTransition(counterMachine, \"idle\", { type: \"START\" });\n    expect(result.ok).toBe(true);\n    expect(result.transitioned).toBe(true);\n    expect(result.target).toBe(\"counting\");\n  });\n\n  it(\"returns transitioned=false for unhandled event\", () => {\n    const result = testTransition(counterMachine, \"idle\", { type: \"INCREMENT\" });\n    expect(result.ok).toBe(true);\n    expect(result.transitioned).toBe(false);\n    expect(result.target).toBeUndefined();\n  });\n\n  it(\"computes context changes from actions\", () => {\n    const result = testTransition(counterMachine, \"counting\", { type: \"INCREMENT\" });\n    expect(result.ok).toBe(true);\n    expect(result.transitioned).toBe(true);\n    expect(result.target).toBe(\"counting\");\n    expect(result.newContext).toEqual({ count: 1 });\n  });\n\n  it(\"uses context override\", () => {\n    const result = testTransition(\n      counterMachine,\n      \"counting\",\n      { type: \"INCREMENT\" },\n      { context: { count: 10 } }\n    );\n    expect(result.ok).toBe(true);\n    expect(result.newContext).toEqual({ count: 11 });\n  });\n\n  it(\"evaluates guards correctly\", () => {\n    const resultAllowed = testTransition(guardedMachine, \"idle\", { type: \"ACTIVATE\" });\n    expect(resultAllowed.ok).toBe(true);\n    expect(resultAllowed.target).toBe(\"active\");\n\n    const resultBlocked = testTransition(\n      guardedMachine,\n      \"idle\",\n      { type: \"ACTIVATE\" },\n      { context: { allowed: false } }\n    );\n    expect(resultBlocked.ok).toBe(true);\n    expect(resultBlocked.target).toBe(\"blocked\");\n  });\n\n  it(\"catches guard errors\", () => {\n    const errorMachine = defineMachine({\n      id: \"error-guard\",\n      initial: \"idle\" as \"idle\" | \"done\",\n      context: {},\n      states: {\n        idle: {\n          on: {\n            GO: {\n              target: \"done\" as const,\n              guard: (): boolean => {\n                throw new Error(\"guard exploded\");\n              },\n            },\n          },\n        },\n        done: { on: {} },\n      },\n    });\n\n    const result = testTransition(errorMachine, \"idle\", { type: \"GO\" });\n    expect(result.ok).toBe(false);\n    expect(result.error?._tag).toBe(\"GuardThrew\");\n  });\n\n  it(\"catches action errors\", () => {\n    const errorMachine = defineMachine({\n      id: \"error-action\",\n      initial: \"idle\" as \"idle\" | \"done\",\n      context: {},\n      states: {\n        idle: {\n          on: {\n            GO: {\n              target: \"done\" as const,\n              actions: [\n                (): never => {\n                  throw new Error(\"action exploded\");\n                },\n              ],\n            },\n          },\n        },\n        done: { on: {} },\n      },\n    });\n\n    const result = testTransition(errorMachine, \"idle\", { type: \"GO\" });\n    expect(result.ok).toBe(false);\n    expect(result.error?._tag).toBe(\"ActionThrew\");\n  });\n\n  it(\"collects effects from transitions\", () => {\n    const port = { __portName: \"TestPort\" };\n    const effectMachine = defineMachine({\n      id: \"effect-machine\",\n      initial: \"idle\" as \"idle\" | \"active\",\n      context: {},\n      states: {\n        idle: {\n          on: {\n            GO: {\n              target: \"active\" as const,\n              effects: [Effect.invoke(port as never, \"doSomething\" as never, [] as never)],\n            },\n          },\n        },\n        active: { on: {} },\n      },\n    });\n\n    const result = testTransition(effectMachine, \"idle\", { type: \"GO\" });\n    expect(result.ok).toBe(true);\n    expect(result.effects).toHaveLength(1);\n    expect(result.effects[0]._tag).toBe(\"Invoke\");\n  });\n\n  it(\"returns empty effects array on error\", () => {\n    const errorMachine = defineMachine({\n      id: \"err\",\n      initial: \"idle\" as \"idle\" | \"done\",\n      context: {},\n      states: {\n        idle: {\n          on: {\n            GO: {\n              target: \"done\" as const,\n              guard: (): boolean => {\n                throw new Error(\"boom\");\n              },\n            },\n          },\n        },\n        done: { on: {} },\n      },\n    });\n\n    const result = testTransition(errorMachine, \"idle\", { type: \"GO\" });\n    expect(result.effects).toEqual([]);\n  });\n});\n\n// =============================================================================\n// testEffect\n// =============================================================================\n\ndescribe(\"testEffect\", () => {\n  it(\"handles Delay effects (no-op)\", async () => {\n    const effect = Effect.delay(1000);\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(false);\n  });\n\n  it(\"handles None effects\", async () => {\n    const effect = Effect.none();\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"executes Invoke effects against mocks\", async () => {\n    const port = { __portName: \"ApiService\" };\n    const effect = Effect.invoke(port as never, \"fetchData\" as never, [\"id-123\"] as never);\n\n    const result = await testEffect(effect, {\n      mocks: {\n        ApiService: {\n          fetchData: (id: unknown) => ({ id, name: \"Test\" }),\n        },\n      },\n    });\n\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(true);\n    expect(result.calledWith).toEqual([\"id-123\"]);\n    expect(result.returnValue).toEqual({ id: \"id-123\", name: \"Test\" });\n  });\n\n  it(\"reports error when mock port is missing\", async () => {\n    const port = { __portName: \"MissingPort\" };\n    const effect = Effect.invoke(port as never, \"method\" as never, [] as never);\n\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(false);\n    expect(result.error).toBeInstanceOf(Error);\n  });\n\n  it(\"reports error when mock method is missing\", async () => {\n    const port = { __portName: \"ApiService\" };\n    const effect = Effect.invoke(port as never, \"nonExistentMethod\" as never, [] as never);\n\n    const result = await testEffect(effect, {\n      mocks: {\n        ApiService: {\n          fetchData: () => \"ok\",\n        },\n      },\n    });\n\n    expect(result.ok).toBe(false);\n    expect(result.error).toBeInstanceOf(Error);\n  });\n\n  it(\"captures errors from mock methods\", async () => {\n    const port = { __portName: \"ApiService\" };\n    const effect = Effect.invoke(port as never, \"badMethod\" as never, [] as never);\n\n    const result = await testEffect(effect, {\n      mocks: {\n        ApiService: {\n          badMethod: () => {\n            throw new Error(\"mock failure\");\n          },\n        },\n      },\n    });\n\n    expect(result.ok).toBe(false);\n    expect(result.called).toBe(true);\n    expect(result.error).toBeInstanceOf(Error);\n  });\n\n  it(\"handles async mock methods\", async () => {\n    const port = { __portName: \"ApiService\" };\n    const effect = Effect.invoke(port as never, \"asyncMethod\" as never, [\"arg1\"] as never);\n\n    const result = await testEffect(effect, {\n      mocks: {\n        ApiService: {\n          asyncMethod: async (arg: unknown) => `result-${arg}`,\n        },\n      },\n    });\n\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(true);\n    expect(result.returnValue).toBe(\"result-arg1\");\n  });\n});\n\n// =============================================================================\n// testFlowInContainer\n// =============================================================================\n\ndescribe(\"testFlowInContainer\", () => {\n  it(\"creates a runner with initial state\", () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n    expect(test.state()).toBe(\"idle\");\n    expect(test.context()).toEqual({ count: 0 });\n  });\n\n  it(\"sends events and transitions\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n\n    await test.send({ type: \"START\" });\n    expect(test.state()).toBe(\"counting\");\n\n    await test.send({ type: \"INCREMENT\" });\n    expect(test.context()).toEqual({ count: 1 });\n\n    await test.dispose();\n  });\n\n  it(\"overrides initial context\", () => {\n    const test = testFlowInContainer({\n      machine: counterMachine,\n      context: { count: 42 },\n    });\n\n    expect(test.context()).toEqual({ count: 42 });\n  });\n\n  it(\"records executed effects\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n\n    await test.send({ type: \"START\" });\n    expect(test.effects).toBeDefined();\n    expect(Array.isArray([...test.effects])).toBe(true);\n\n    await test.dispose();\n  });\n\n  it(\"provides snapshot access\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n\n    const snapshot = test.snapshot();\n    expect(snapshot.state).toBe(\"idle\");\n    expect(snapshot.context).toEqual({ count: 0 });\n\n    await test.dispose();\n  });\n\n  it(\"disposes the runner\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n    await test.dispose();\n\n    expect(test.runner.isDisposed).toBe(true);\n  });\n\n  it(\"handles guard-based transitions\", async () => {\n    const test = testFlowInContainer({ machine: guardedMachine });\n\n    await test.send({ type: \"ACTIVATE\" });\n    expect(test.state()).toBe(\"active\");\n\n    await test.dispose();\n  });\n\n  it(\"handles guard-based transitions with context override\", async () => {\n    const test = testFlowInContainer({\n      machine: guardedMachine,\n      context: { allowed: false },\n    });\n\n    await test.send({ type: \"ACTIVATE\" });\n    expect(test.state()).toBe(\"blocked\");\n\n    await test.dispose();\n  });\n});\n\n// =============================================================================\n// DoD 10.5: waitForState(name, timeout) rejects on timeout\n// =============================================================================\n\ndescribe(\"waitForState timeout\", () => {\n  it(\"rejects when timeout expires before entering state\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    // Wait for a state we never transition to, with a short timeout\n    await expect(harness.waitForState(\"done\", 50)).rejects.toThrow(\n      /Timed out waiting for state \"done\"/\n    );\n\n    await harness.cleanup();\n  });\n});\n\n// =============================================================================\n// DoD 10.6: waitForEvent(type) resolves with event payload\n// =============================================================================\n\ndescribe(\"waitForEvent\", () => {\n  it(\"resolves with event when matching event is sent\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    // Set up the wait before sending the event\n    const waitPromise = harness.waitForEvent(\"START\");\n    await harness.send({ type: \"START\" });\n\n    const event = await waitPromise;\n    expect(event.type).toBe(\"START\");\n\n    await harness.cleanup();\n  });\n\n  it(\"resolves only for matching event type\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    const waitPromise = harness.waitForEvent(\"INCREMENT\");\n\n    // Send non-matching event first\n    await harness.send({ type: \"START\" });\n\n    // Now send matching event\n    await harness.send({ type: \"INCREMENT\" });\n\n    const event = await waitPromise;\n    expect(event.type).toBe(\"INCREMENT\");\n\n    await harness.cleanup();\n  });\n\n  it(\"rejects on timeout\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    await expect(harness.waitForEvent(\"NEVER_SENT\", 50)).rejects.toThrow(\n      /Timed out waiting for event \"NEVER_SENT\"/\n    );\n\n    await harness.cleanup();\n  });\n});\n\n// =============================================================================\n// DoD 10.17: testEffect(SpawnEffect) captures spawn info\n// =============================================================================\n\ndescribe(\"testEffect Spawn\", () => {\n  it(\"records spawn activityId\", async () => {\n    const effect = Effect.spawn(\"myWorker\", { data: 42 });\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(true);\n    expect(result.returnValue).toBe(\"myWorker\");\n  });\n});\n\n// =============================================================================\n// DoD 10.18: testEffect(EmitEffect) returns emitted event in Ok\n// =============================================================================\n\ndescribe(\"testEffect Emit\", () => {\n  it(\"returns emitted event data\", async () => {\n    const effect = Effect.emit({ type: \"DATA_LOADED\", payload: { items: [1, 2, 3] } });\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(true);\n    expect(result.returnValue).toEqual({ type: \"DATA_LOADED\", payload: { items: [1, 2, 3] } });\n  });\n\n  it(\"returns event with type only\", async () => {\n    const effect = Effect.emit({ type: \"DONE\" });\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n    expect(result.returnValue).toEqual({ type: \"DONE\" });\n  });\n});\n\n// =============================================================================\n// DoD 10.28-30: Virtual Clock\n// =============================================================================\n\n// =============================================================================\n// Additional testFlowInContainer edge cases\n// =============================================================================\n\ndescribe(\"testFlowInContainer edge cases\", () => {\n  it(\"multiple rapid sends do not corrupt state\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n\n    await test.send({ type: \"START\" });\n    await test.send({ type: \"INCREMENT\" });\n    await test.send({ type: \"INCREMENT\" });\n    await test.send({ type: \"INCREMENT\" });\n\n    expect(test.context()).toEqual({ count: 3 });\n    expect(test.state()).toBe(\"counting\");\n\n    await test.dispose();\n  });\n\n  it(\"snapshot reflects final state after multiple transitions\", async () => {\n    const test = testFlowInContainer({ machine: counterMachine });\n\n    await test.send({ type: \"START\" });\n    await test.send({ type: \"INCREMENT\" });\n    await test.send({ type: \"DONE\" });\n\n    const snap = test.snapshot();\n    expect(snap.state).toBe(\"done\");\n    expect(snap.context).toEqual({ count: 1 });\n\n    await test.dispose();\n  });\n});\n\n// =============================================================================\n// Additional testEffect edge cases\n// =============================================================================\n\ndescribe(\"testEffect additional cases\", () => {\n  it(\"handles Log effects\", async () => {\n    const effect = Effect.log(\"test message\");\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"handles Choose effects with empty branches\", async () => {\n    const effect = Effect.choose([]);\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"handles Stop effects\", async () => {\n    const effect = Effect.stop(\"some-activity\");\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n    expect(result.called).toBe(true);\n    expect(result.returnValue).toBe(\"some-activity\");\n  });\n});\n\n// =============================================================================\n// DoD 10.28-30: Virtual Clock\n// =============================================================================\n\ndescribe(\"createVirtualClock\", () => {\n  afterEach(() => {\n    // Ensure real timers are restored even if a test fails\n    vi.useRealTimers();\n  });\n\n  it(\"advance(ms) advances time\", async () => {\n    const clock = createVirtualClock();\n    clock.install();\n\n    let resolved = false;\n    const promise = new Promise<"+"void>(resolve => {\n      setTimeout(() => {\n        resolved = true;\n        resolve();\n      }, 1000);\n    });\n\n    expect(resolved).toBe(false);\n    await clock.advance(1000);\n    await promise;\n    expect(resolved).toBe(true);\n\n    clock.uninstall();\n  });\n\n  it(\"install() replaces timer functions\", () => {\n    const clock = createVirtualClock();\n    const realNow = Date.now();\n\n    clock.install();\n    // After install, Date.now() should be controlled\n    const virtualNow = clock.now();\n    expect(typeof virtualNow).toBe(\"number\");\n\n    clock.uninstall();\n    // After uninstall, Date.now() should resume normal behavior\n    const afterNow = Date.now();\n    expect(afterNow).toBeGreaterThanOrEqual(realNow);\n  });\n\n  it(\"uninstall() restores original timers\", async () => {\n    const clock = createVirtualClock();\n    clock.install();\n    clock.uninstall();\n\n    // After uninstall, real setTimeout should work\n    let called = false;\n    await new Promise<"+"void>(resolve => {\n      setTimeout(() => {\n        called = true;\n        resolve();\n      }, 10);\n    });\n    expect(called).toBe(true);\n  });\n\n  it(\"throws when advance is called without install\", async () => {\n    const clock = createVirtualClock();\n    await expect(clock.advance(100)).rejects.toThrow(/not installed/);\n  });\n\n  it(\"uninstall without install is a no-op\", () => {\n    const clock = createVirtualClock();\n    // Should not throw\n    clock.uninstall();\n  });\n\n  it(\"advance throws after uninstall\", async () => {\n    const clock = createVirtualClock();\n    clock.install();\n    clock.uninstall();\n    await expect(clock.advance(100)).rejects.toThrow(/not installed/);\n  });\n});\n\n// =============================================================================\n// Mutation-killing tests: testFlowInContainer with Invoke effects\n// =============================================================================\n\ndescribe(\"testFlowInContainer with Invoke effects\", () => {\n  const invokePort = { __portName: \"TestService\" };\n\n  const invokeMachine = defineMachine({\n    id: \"invoker\",\n    initial: \"idle\" as \"idle\" | \"loading\" | \"done\" | \"error\",\n    context: {} as Record<"+"string, unknown>,\n    states: {\n      idle: {\n        on: {\n          FETCH: {\n            target: \"loading\" as const,\n            effects: [Effect.invoke(invokePort as never, \"getData\" as never, [\"arg1\"] as never)],\n          },\n        },\n      },\n      loading: {\n        on: {\n          DONE: { target: \"done\" as const },\n          ERROR: { target: \"error\" as const },\n        },\n      },\n      done: { on: {} },\n      error: { on: {} },\n    },\n  });\n\n  it(\"executes Invoke effects against mocks and records invocations\", async () => {\n    const test = testFlowInContainer({\n      machine: invokeMachine,\n      mocks: {\n        TestService: {\n          getData: (arg: unknown) => ({ data: arg }),\n        },\n      },\n    });\n\n    await test.send({ type: \"FETCH\" });\n    expect(test.state()).toBe(\"loading\");\n\n    // Verify effect was recorded\n    expect(test.effects.length).toBeGreaterThan(0);\n    expect(test.effects[0]._tag).toBe(\"Invoke\");\n\n    // Verify invocation record\n    expect(test.invocations).toHaveLength(1);\n    expect(test.invocations[0].portName).toBe(\"TestService\");\n    expect(test.invocations[0].method).toBe(\"getData\");\n    expect(test.invocations[0].args).toEqual([\"arg1\"]);\n    expect(test.invocations[0].returnValue).toEqual({ data: \"arg1\" });\n    expect(test.invocations[0].threw).toBe(false);\n    expect(test.invocations[0].error).toBeUndefined();\n\n    await test.dispose();\n  });\n\n  it(\"records invocation errors when mock throws\", async () => {\n    const test = testFlowInContainer({\n      machine: invokeMachine,\n      mocks: {\n        TestService: {\n          getData: () => {\n            throw new Error(\"service failure\");\n          },\n        },\n      },\n    });\n\n    await test.send({ type: \"FETCH\" });\n\n    // Invocation should record the error\n    expect(test.invocations).toHaveLength(1);\n    expect(test.invocations[0].portName).toBe(\"TestService\");\n    expect(test.invocations[0].method).toBe(\"getData\");\n    expect(test.invocations[0].threw).toBe(true);\n    expect(test.invocations[0].error).toBeInstanceOf(Error);\n    expect(test.invocations[0].returnValue).toBeUndefined();\n\n    await test.dispose();\n  });\n\n  it(\"handles Invoke with no matching mock gracefully\", async () => {\n    const test = testFlowInContainer({\n      machine: invokeMachine,\n      mocks: {},\n    });\n\n    // Should not throw even with missing mock\n    await test.send({ type: \"FETCH\" });\n    expect(test.state()).toBe(\"loading\");\n    expect(test.invocations).toHaveLength(0);\n\n    await test.dispose();\n  });\n\n  it(\"handles Invoke with mock that has no matching method\", async () => {\n    const test = testFlowInContainer({\n      machine: invokeMachine,\n      mocks: {\n        TestService: {\n          otherMethod: () => \"nope\",\n        },\n      },\n    });\n\n    await test.send({ type: \"FETCH\" });\n    expect(test.state()).toBe(\"loading\");\n    // No invocations recorded since method was not found\n    expect(test.invocations).toHaveLength(0);\n\n    await test.dispose();\n  });\n\n  it(\"defaults mocks to empty object when not provided\", async () => {\n    const test = testFlowInContainer({\n      machine: invokeMachine,\n    });\n\n    await test.send({ type: \"FETCH\" });\n    expect(test.state()).toBe(\"loading\");\n    expect(test.invocations).toHaveLength(0);\n\n    await test.dispose();\n  });\n});\n\n// =============================================================================\n// Mutation-killing tests: createFlowTestHarness with Invoke effects\n// =============================================================================\n\ndescribe(\"createFlowTestHarness with Invoke effects\", () => {\n  const invokePort = { __portName: \"MockPort\" };\n\n  const invokeMachine = defineMachine({\n    id: \"harness-invoker\",\n    initial: \"idle\" as \"idle\" | \"loading\" | \"done\",\n    context: {},\n    states: {\n      idle: {\n        on: {\n          FETCH: {\n            target: \"loading\" as const,\n            effects: [Effect.invoke(invokePort as never, \"doWork\" as never, [\"x\"] as never)],\n          },\n        },\n      },\n      loading: { on: { DONE: { target: \"done\" as const } } },\n      done: { on: {} },\n    },\n  });\n\n  it(\"executes Invoke effects against mocks via harness\", async () => {\n    let calledWith: unknown[] = [];\n    const harness = createFlowTestHarness(invokeMachine, {\n      mocks: {\n        MockPort: {\n          doWork: (...args: unknown[]) => {\n            calledWith = args;\n          },\n        },\n      },\n    });\n\n    await harness.send({ type: \"FETCH\" });\n    expect(harness.snapshot().state).toBe(\"loading\");\n    expect(calledWith).toEqual([\"x\"]);\n    expect(harness.effects.length).toBeGreaterThan(0);\n\n    await harness.cleanup();\n  });\n\n  it(\"cleanup rejects pending event waiters\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    const waitPromise = harness.waitForEvent(\"NEVER_HAPPENS\");\n\n    // Cleanup while waiting\n    await harness.cleanup();\n\n    await expect(waitPromise).rejects.toThrow(\"Harness cleanup while waiting for event\");\n  });\n\n  it(\"waitForState resolves when transition happens before timeout fires\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    // Start waiting, then quickly transition\n    const waitPromise = harness.waitForState(\"counting\", 5000);\n    await harness.send({ type: \"START\" });\n    await waitPromise;\n\n    expect(harness.snapshot().state).toBe(\"counting\");\n    await harness.cleanup();\n  });\n});\n\n// =============================================================================\n// Mutation-killing tests: testEffect - Sequence and Parallel\n// =============================================================================\n\ndescribe(\"testEffect Sequence and Parallel\", () => {\n  it(\"executes Sequence effects in order\", async () => {\n    const effect = Effect.sequence([Effect.delay(100), Effect.none()]);\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"executes Parallel effects\", async () => {\n    const effect = Effect.parallel([Effect.delay(100), Effect.none()]);\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(true);\n  });\n\n  it(\"propagates errors from Sequence sub-effects\", async () => {\n    const port = { __portName: \"SeqPort\" };\n    const effect = Effect.sequence([\n      Effect.delay(10),\n      Effect.invoke(port as never, \"method\" as never, [] as never),\n    ]);\n\n    // No mocks provided, so the Invoke should fail\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(false);\n    expect(result.error).toBeInstanceOf(Error);\n  });\n\n  it(\"propagates errors from Parallel sub-effects\", async () => {\n    const port = { __portName: \"ParPort\" };\n    const effect = Effect.parallel([\n      Effect.delay(10),\n      Effect.invoke(port as never, \"method\" as never, [] as never),\n    ]);\n\n    // No mocks provided, so the Invoke should fail\n    const result = await testEffect(effect);\n    expect(result.ok).toBe(false);\n    expect(result.error).to  match\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    // Create a waiter, resolve it, then check that cleanup doesn't error\n    const waitPromise = harness.waitForEvent(\"START\", 5000);\n    await harness.send({ type: \"START\" });\n    await waitPromise;\n\n    // Cleanup should not try to reject the already-resolved waiter\n    await harness.cleanup();\n  });\n\n  it(\"timeout of one waiter does not remove other waiters\", async () => {\n    const harness = createFlowTestHarness(counterMachine);\n\n    // Create two waiters: one will timeout, other should still work\n    const timeoutWaiter = harness.waitForEvent(\"NEVER\", 30);\n    const keepWaiter = harness.waitForEvent(\"START\", 5000);\n\n    // First waiter times out\n    await expect(timeoutWaiter).rejects.toThrow(/Timed out/);\n\n    // Second waiter should still work after first one timed out\n    await harness.send({ type: \"START\" });\n    const event = await keepWaiter;\n    expect(event.type).toBe(\"START\");\n\n    await harness.cleanup();\n  });\n});\n"}},"projectRoot":"/Users/u1070457/Projects/Perso/hex-di/libs/flow/testing","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","packageManager":"pnpm","reporters":["html","clear-text","progress"],"plugins":["@stryker-mutator/vitest-runner"],"testRunner":"vitest","coverageAnalysis":"perTest","vitest":{"related":false},"mutate":["src/**/*.ts","!src/**/*.test.ts","!src/**/*.test-d.ts","!src/**/index.ts"],"ignorePatterns":["dist","node_modules","docs"],"thresholds":{"high":70,"low":50,"break":40},"concurrency":4,"timeoutMS":10000,"disableTypeChecks":"**/*.ts","allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":
