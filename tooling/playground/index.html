<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HexDI Playground</title>
    <meta
      name="description"
      content="Interactive browser-based playground for experimenting with HexDI dependency injection patterns"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--hex-bg-primary, #ffffff);
        color: var(--hex-text-primary, #1e293b);
      }

      @keyframes hex-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/dev/main.tsx"></script>
  </body>
</html>
