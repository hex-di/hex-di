task_groups:
  # Phase 1: Foundation Layer
  - name: "Task Group 1: Core Types and Interfaces"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Foundational types - discriminated unions, strict inference, zero casts"

  - name: "Task Group 2: Inspector Extensions"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Type-safe API extension - getGraphData() with full inference"

  # Phase 2: Runtime Core
  - name: "Task Group 3: Ring Buffer and Event Aggregation"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Generic RingBuffer<T> like Rust Vec<T> with proper bounds"

  - name: "Task Group 4: Container Lifecycle FSM"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Type-level FSM using @hex-di/flow - states as discriminated unions"

  # Phase 3: Runtime Integration
  - name: "Task Group 5: DevToolsRuntime Extensions"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Immutable snapshots, typed commands, state management"

  - name: "Task Group 6: PluginProps Enhancement"
    claude_code_subagent: typescript-type-system-architect
    rationale: "Strict encapsulation - plugins receive typed props only"

  # Phase 4: React Integration and Migration
  - name: "Task Group 7: React Bindings"
    claude_code_subagent: react-ports-integrator
    rationale: "useSyncExternalStore pattern with type-safe hooks"

  - name: "Task Group 8: Migration and Deprecation"
    claude_code_subagent: implementer
    rationale: "Deprecation warnings, internal adapter, documentation"

  # Phase 5: FlowPlugin Package
  - name: "Task Group 9: FlowPlugin Package Setup"
    claude_code_subagent: implementer
    rationale: "Package scaffolding, peer dependencies, exports"

  # Testing
  - name: "Task Group 10: Test Review and Gap Analysis"
    claude_code_subagent: composition-test-architect
    rationale: "Integration test composition, coverage analysis"
