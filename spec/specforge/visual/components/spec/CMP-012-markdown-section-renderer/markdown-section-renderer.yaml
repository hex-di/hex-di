entity: component
id: CMP-012-markdown-section-renderer
name: "Markdown Section Renderer"
docs: ./markdown-section-renderer.md
tests: ./markdown-section-renderer.feature

props:
  - name: "content"
    type: string
    required: true
    description: "Raw markdown content to render"
  - name: "changedSections"
    type: array
    itemType: string
    required: true
    description: "Array of section heading IDs that have changed"
  - name: "showChangesOnly"
    type: boolean
    required: true
    description: "When true, only sections in changedSections are visible"
  - name: "searchQuery"
    type: string
    required: true
    description: "Text to highlight within rendered markdown"

children:
  - $ref: ELM-046-markdown-section
  - $ref: ELM-047-section-change-indicator
  - $ref: ELM-048-section-heading

stores:
  - $ref: STR-006-spec-content-store
    binds:
      - selector: "content"
        to: "content"
      - selector: "changedSections"
        to: "changedSections"
  - $ref: STR-001-filter-store
    binds:
      - selector: "spec.showChangesOnly"
        to: "showChangesOnly"
      - selector: "spec.search"
        to: "searchQuery"

layout:
  display: flex
  flex-direction: column
  width: 100%
  gap: 0
  padding: "0 24px"

section-parsing:
  delimiter: "heading level 2 (##)"
  description: "Content is split into sections at each H2 heading. Each section includes the heading and all content up to the next H2."

change-indicator:
  position: left
  style:
    border-left: "3px solid var(--sf-accent)"
    padding-left: 16px

typography:
  headings:
    font-family: "var(--sf-font-display)"
    h2-size: 20px
    h3-size: 16px
    h4-size: 14px
    color: "var(--sf-text)"
  body:
    font-family: "var(--sf-font-body)"
    font-size: 14px
    line-height: 1.6
    color: "var(--sf-text)"
  code-blocks:
    font-family: "var(--sf-font-mono)"
    font-size: 13px
    background: "var(--sf-surface-alt)"
    border-radius: 4px
    padding: "12px 16px"

search-highlight:
  background: "rgba(0, 240, 255, 0.2)"
  border-radius: 2px

accessibility:
  role: "article"
  label: "Spec content"
