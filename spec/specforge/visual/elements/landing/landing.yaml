entity: element
id: ELM-072-hero-headline
name: "Hero Headline"
docs: ./landing.md
tests: ./landing.feature

type: text

layout:
  font-family: "var(--sf-font-display)"
  font-size: 48px
  font-weight: 800
  line-height: 1.1
  text-align: center
  max-width: 720px

states:
  default:
    background: "linear-gradient(135deg, var(--sf-accent), #7C3AED)"
    -webkit-background-clip: text
    -webkit-text-fill-color: transparent
    background-clip: text

notes: |
  Large display headline with accent gradient text effect.
  Gradient goes from accent (cyan) to purple (#7C3AED).
  Uses -webkit-background-clip: text for the gradient text effect.

accessibility:
  role: "heading"
  aria-level: 1
  label: "SpecForge headline"

