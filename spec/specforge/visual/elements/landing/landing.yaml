---
entity: element
id: ELM-074-hero-cta-primary
name: "Hero CTA Primary"
docs: ./landing.md
tests: ./landing.feature

type: button

layout:
  display: inline-flex
  align-items: center
  justify-content: center
  padding: "12px 28px"
  border-radius: 8px
  font-size: 16px
  font-weight: 600
  cursor: pointer
  transition: "all 200ms ease"

states:
  default:
    color: "var(--sf-bg)"
    background: "var(--sf-accent)"
  hover:
    background: "var(--sf-accent)"
    opacity: 0.9
    transform: "translateY(-1px)"
    box-shadow: "0 4px 16px rgba(0, 240, 255, 0.3)"
  active:
    transform: "translateY(0)"
    box-shadow: "none"

actions:
  - trigger: click
    action: { $ref: ACT-028-landing-cta }

notes: |
  Primary call-to-action button. Dark text on accent background.
  Label: "Get Started" or "Try SpecForge".
  Hover lifts the button slightly and adds a glow shadow.

accessibility:
  role: "button"
  label: "Get Started with SpecForge"

