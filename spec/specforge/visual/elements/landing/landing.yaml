    color: "var(--sf-text)"
  - name: "price-period"
    font-size: 13px
    color: "var(--sf-text-muted)"
  - name: "feature-list"
    display: flex
    flex-direction: column
    gap: 8px
  - name: "cta-button"
    padding: "10px 20px"
    border-radius: 8px
    font-size: 14px
    font-weight: 600
    text-align: center
    cursor: pointer

notes: |
  Pricing tier card. The "popular" tier gets an accent border and subtle glow.
  Contains tier name, price, period, feature list, and a CTA button.

accessibility:
  role: "article"
  label: "Pricing tier: {tierName}"

