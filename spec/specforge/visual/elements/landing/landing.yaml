entity: element
id: ELM-082-pricing-tier-card
name: "Pricing Tier Card"
docs: ./landing.md
tests: ./landing.feature

type: container

layout:
  display: flex
  flex-direction: column
  gap: 16px
  padding: 28px
  border-radius: 12px
  background: "var(--sf-surface)"
  border: "1px solid var(--sf-border)"
  min-width: 260px

states:
  default:
    border-color: "var(--sf-border)"
