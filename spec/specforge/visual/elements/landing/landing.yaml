entity: element
id: ELM-078-how-it-works-step
name: "How It Works Step"
docs: ./landing.md
tests: ./landing.feature

type: container

layout:
  display: flex
  align-items: flex-start
  gap: 16px

content:
  - name: "step-number"
    display: flex
    align-items: center
    justify-content: center
    width: 36px
    height: 36px
    border-radius: "50%"
    background: "var(--sf-accent-dim)"
    color: "var(--sf-accent)"
    font-family: "var(--sf-font-display)"
    font-size: 16px
    font-weight: 700
    flex-shrink: 0
  - name: "step-content"
    display: flex
    flex-direction: column
    gap: 4px
    children:
      - name: "title"
        font-size: 16px
        font-weight: 600
        color: "var(--sf-text)"
      - name: "description"
        font-size: 13px
        color: "var(--sf-text-muted)"
        line-height: 1.5

states:
  default:
    opacity: 1

accessibility:
  role: "listitem"
  label: "Step {number}: {title}"

