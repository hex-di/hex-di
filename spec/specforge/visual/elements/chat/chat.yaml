entity: element
id: ELM-029-token-budget-progress
name: "Token Budget Progress"
docs: ./chat.md
tests: ./chat.feature

type: container

layout:
  width: 100%
  height: 4px
  border-radius: 2px
  overflow: hidden

children:
  fill:
    height: 100%
    border-radius: 2px
    transition: "width 0.3s ease"

states:
  safe:
    fill-background: "var(--sf-accent)"
  warning:
    fill-background: "#FF8C00"
  critical:
    fill-background: "#FF3B3B"
  exhausted:
    fill-background: "#FF3B3B"
    fill-animation: "pulse 1.5s ease-in-out infinite"

state-thresholds:
  safe: "usage < 70%"
  warning: "usage >= 70% && usage < 90%"
  critical: "usage >= 90% && usage < 100%"
  exhausted: "usage >= 100%"

bindings:
  - store: { $ref: STR-004-chat-store }
    field: tokenBudget
    mapping: "(tokenBudget.used / tokenBudget.total) * 100"

accessibility:
  role: "progressbar"
  label: "Token budget: {used} of {total} tokens used"

