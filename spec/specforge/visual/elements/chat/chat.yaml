entity: element
id: ELM-043-chat-error-banner
name: "Chat Error Banner"
docs: ./chat.md
tests: ./chat.feature

type: container

layout:
  width: 100%
  padding: 10px 14px
  border-radius: 6px
  display: flex
  align-items: center
  justify-content: space-between
  font-size: 12px
  font-family: "var(--sf-font-body)"

children:
  message:
    color: "#FF3B3B"
  dismiss-button:
    cursor: pointer
    color: "#FF3B3B"
    opacity: 0.7

states:
  default:
    background: "rgba(255, 59, 59, 0.08)"
    border: "1px solid rgba(255, 59, 59, 0.2)"
  hover-dismiss:
    dismiss-opacity: 1

bindings:
  - store: { $ref: STR-004-chat-store }
    field: error
    visible-when: "error !== null"

accessibility:
  role: "alert"
  label: "Error: {message}"
