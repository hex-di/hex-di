entity: element
id: ELM-031-discovery-status-indicator
name: "Discovery Status Indicator"
docs: ./chat.md
tests: ./chat.feature

type: text

layout:
  font-size: 11px
  font-family: "var(--sf-font-body)"
  padding: 2px 8px
  border-radius: 10px
  display: inline-block

states:
  not-started:
    color: "var(--sf-text-muted)"
    background: "rgba(255, 255, 255, 0.05)"
