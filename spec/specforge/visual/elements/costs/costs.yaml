---
entity: element
id: ELM-067-cost-view-mode-toggle
name: "Cost View Mode Toggle"
docs: ./costs.md
tests: ./costs.feature

type: button

layout:
  display: inline-flex
  align-items: center
  gap: 0
  border-radius: 6px
  overflow: hidden
  background: "var(--sf-surface)"

states:
  default:
    color: "var(--sf-text-muted)"
    background: "var(--sf-surface)"
    padding: "6px 10px"
  hover:
    color: "var(--sf-text)"
    background: "rgba(0, 240, 255, 0.05)"
  active:
    color: "var(--sf-accent)"
    background: "var(--sf-accent-dim)"

actions:
  - trigger: click
    action: { $ref: ACT-016-set-filter }
    payload:
      view: costs
      key: viewMode
      value: "by-phase | by-agent"

notes: |
  Segmented control toggling between "by-phase" and "by-agent" table views.
  Active mode is highlighted with accent.
  Clicking triggers ACT-016-set-filter with the selected viewMode value.

accessibility:
  role: "radiogroup"
  label: "Cost breakdown view mode"
