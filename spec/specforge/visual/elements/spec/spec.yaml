entity: element
id: ELM-046-markdown-section
name: "Markdown Section"
docs: ./spec.md
tests: ./spec.feature

type: container

layout:
  padding: 16px 0
  font-size: 14px
  font-family: "var(--sf-font-body)"
  line-height: 1.7

states:
  default:
    color: "var(--sf-text)"
    border-left: "3px solid transparent"
    padding-left: 16px
  changed:
    border-left: "3px solid var(--sf-accent)"
    padding-left: 16px
    background: "rgba(0, 240, 255, 0.02)"

changed-when: "section.id is in changedSections array"

accessibility:
  role: "region"
  label: "Section: {sectionTitle}"

---
entity: element
id: ELM-047-section-change-indicator
name: "Section Change Indicator"
docs: ./spec.md
tests: ./spec.feature

type: container

layout:
  width: 3px
  height: 100%
  position: absolute
  left: 0
  top: 0

states:
  default:
    background: "transparent"
  changed:
    background: "var(--sf-accent)"

notes: |
  Left border highlight on changed sections. Implemented as the left border
  on ELM-046-markdown-section when in the "changed" state. The 3px accent bar
  visually indicates that this section has been modified relative to the
  previous version or baseline.

accessibility:
  role: "presentation"

---
entity: element
id: ELM-048-section-heading
name: "Section Heading"
docs: ./spec.md
tests: ./spec.feature

type: text

layout:
  font-family: "var(--sf-font-display)"
  font-weight: 600
  line-height: 1.3
  margin-bottom: 8px

states:
  default:
    color: "var(--sf-text)"

size-by-depth:
  h1:
    font-size: 24px
    margin-top: 32px
  h2:
    font-size: 20px
    margin-top: 24px
  h3:
    font-size: 16px
    margin-top: 16px

accessibility:
  role: "heading"
  level: "{depth}"
  label: "{headingText}"
