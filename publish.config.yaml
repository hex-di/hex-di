# Packages approved for public npm release.
#
# Only packages listed here are built and published by the release workflow
# (.github/workflows/publish.yml). Everything else in the monorepo is ignored
# by the publisher, regardless of its version.
#
# To approve a new package:
#   1. Verify it passes all tests and typechecks locally
#   2. Set its initial version in package.json
#   3. Add its npm name to this list
#   4. Open a PR — the CI gate will validate before merge

