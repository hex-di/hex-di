n * Unified createAdapter API.\n *\n * This module contains the unified `createAdapter()` function that accepts\n * both factory functions and class constructors through a single API.\n *\n * @packageDocumentation\n */\n\nimport type { Port, InferService } from \"../ports/types.js\";\nimport type { Adapter, Lifetime, ResolvedDeps } from \"./types.js\";\nimport type { TupleToUnion } from \"../utils/type-utilities.js\";\nimport type { IsAsyncFactory, EnforceAsyncLifetime } from \"./unified-types.js\";\nimport {\n  SYNC,\n  ASYNC,\n  SINGLETON,\n  FALSE,\n  EMPTY_REQUIRES,\n  type Sync,\n  type Async,\n  type Singleton,\n  type False,\n  type EmptyRequires,\n} from \"./constants.js\";\n\n// Re-export types for use by consumers\nexport type {\n  BothFactoryAndClassError,\n  NeitherFactoryNorClassError,\n  AsyncLifetimeError,\n  BaseUnifiedConfig,\n  FactoryConfig,\n  ClassConfig,\n} from \"./unified-types.js\";\n\n// =============================================================================\n// Type Utilities\n// =============================================================================\n\n/**\n * Maps a tuple of ports to a tuple of their service types.\n *\n * This helper is used to type constructor parameters for class-based adapters.\n * The order of service types matches the order of ports in the requires array.\n *\n * @typeParam T - Tuple of Port types\n *\n * @example\n * ```typescript\n * type Ports = [typeof LoggerPort, typeof DatabasePort];\n * type Services = PortsToServices<"+"Ports>;\n * // [Logger, Database]\n * ```\n *\n * @internal\n */\nexport type PortsToServices<"+"T extends readonly Port<"+"unknown, string>[]> = {\n  [K in keyof T]: T[K] extends Port<"+"infer S, string> ? S : never;\n};\n\n// IsAsyncFactory is imported from unified-types.ts\n\n// =============================================================================\n// Runtime Helpers\n// =============================================================================\n\n/**\n * Extracts service instances from dependency object in port array order.\n *\n * This helper maps the requires tuple to an array of service instances\n * in the same order as the ports appear in the tuple. Used for class\n * constructor injection where parameters must match requires array order.\n *\n * @param deps - Object with port names as keys, service instances as values\n * @param requires - Tuple of required ports\n * @returns Array of service instances in requires array order\n *\n * @internal\n */\nfunction extractServicesInOrder(\n  deps: Record<"+"string, unknown>,\n  requires: readonly Port<"+"unknown, string>[]\n): unknown[] {\n  return requires.map(port => deps[port.__portName]);\n}\n\n// =============================================================================\n// Runtime Validation\n// =============================================================================\n\n/**\n * Valid lifetime values for runtime validation.\n * @internal\n */\nconst VALID_LIFETIMES = new Set([\"singleton\", \"scoped\", \"transient\"]);\n\n/**\n * Type representing a port-like object with a __portName property.\n * @internal\n */\ninterface PortLike {\n  readonly __portName: string;\n}\n\n/**\n * Type guard to check if a value is a port-like object.\n *\n * @param value - The value to check\n * @returns True if value is a port-like object with string __portName\n *\n * @internal\n */\nfunction isPortLike(value: unknown): value is PortLike {\n  if (typeof value !== \"object\" || value === null) {\n    return false;\n  }\n  if (!(\"__portName\" in value)) {\n    return false;\n  }\n  return typeof value.__portName === \"string\";\n}\n\n/**\n * Validates adapter configuration at runtime.\n *\n * @param config - The adapter configuration to validate\n * @param isAsync - Whether this is an async adapter (affects lifetime validation)\n * @throws {TypeError} If any configuration field is invalid\n *\n * @internal\n */\nfunction assertValidAdapterConfig(\n  config: {\n    provides?: unknown;\n    requires?: unknown;\n    lifetime?: unknown;\n    factory?: unknown;\n    finalizer?: unknown;\n  },\n  isAsync: boolean\n): void {\n  // Validate 'provides' - must be a Port object\n  if (config.provides === null || config.provides === undefined) {\n    throw new TypeError(\n      \"ERROR[HEX010]: Invalid adapter config: 'provides' is required. \" +\n        \"Expected a Port created with createPort().\"\n    );\n  }\n\n  if (!isPortLike(config.provides)) {\n    throw new TypeError(\n      \"ERROR[HEX011]: Invalid adapter config: 'provides' must be a Port object with __portName. \" +\n        `Got: ${typeof config.provides}. ` +\n        \"Create ports using createPort() from @hex-di/core.\"\n    );\n  }\n\n  const providesPort = config.provides;\n\n  // Validate 'requires' - must be an array of Port objects\n  if (!Array.isArray(config.requires)) {\n    throw new TypeError(\n      \"ERROR[HEX012]: Invalid adapter config: 'requires' must be an array. \" +\n        `Got: ${typeof config.requires}. ` +\n        \"Use [] for no dependencies or [PortA, PortB] for dependencies.\"\n    );\n  }\n\n  const requires: PortLike[] = [];\n  for (let i = 0; i <"+" config.requires.length; i++) {\n    const req: unknown = config.requires[i];\n    if (!isPortLike(req)) {\n      throw new TypeError(\n        `ERROR[HEX013]: Invalid adapter config: 'requires[${i}]' must be a Port object with __portName. ` +\n          `Got: ${req === null ? \"null\" : typeof req}. ` +\n          \"All elements in requires must be Ports created with createPort().\"\n      );\n    }\n    requires.push(req);\n  }\n\n  // Validate 'lifetime' - must be valid lifetime string (sync adapters only)\n  if (!isAsync) {\n    if (typeof config.lifetime !== \"string\") {\n      throw new TypeError(\n        \"ERROR[HEX014]: Invalid adapter config: 'lifetime' must be a string. \" +\n          `Got: ${typeof config.lifetime}. ` +\n          'Valid values: \"singleton\", \"scoped\", \"transient\", \"request\".'\n      );\n    }\n\n    if (!VALID_LIFETIMES.has(config.lifetime)) {\n      throw new TypeError(\n        `ERROR[HEX015]: Invalid adapter config: 'lifetime' must be \"singleton\", \"scoped\", \"transient\", or \"request\". ` +\n          `Got: \"${config.lifetime}\".`\n      );\n    }\n  }\n\n  // Validate 'factory' - must be a function\n  if (typeof config.factory !== \"function\") {\n    throw new TypeError(\n      \"ERROR[HEX016]: Invalid adapter config: 'factory' must be a function. \" +\n        `Got: ${typeof config.factory}. ` +\n        \"The factory function receives resolved dependencies and returns the service instance.\"\n    );\n  }\n\n  // Validate no duplicate ports in requires\n  const requiresNames = new Set<"+"string>();\n  for (const port of requires) {\n    if (requiresNames.has(port.__portName)) {\n      throw new TypeError(\n        `ERROR[HEX017]: Invalid adapter config: Duplicate port '${port.__portName}' in requires array. ` +\n          \"Each dependency should appear only once.\"\n      );\n    }\n    requiresNames.add(port.__portName);\n  }\n\n  // Self-dependency check\n  if (requires.some(p => p.__portName === providesPort.__portName)) {\n    throw new TypeError(\n      `ERROR[HEX006]: Invalid adapter config: Adapter cannot require its own port '${providesPort.__portName}'. ` +\n        \"This would create a circular dependency.\"\n    );\n  }\n\n  // Validate 'finalizer' - must be a function if provided\n  if (config.finalizer !== undefined && typeof config.finalizer !== \"function\") {\n    throw new TypeError(\n      \"ERROR[HEX018]: Invalid adapter config: 'finalizer' must be a function. \" +\n        `Got: ${typeof config.finalizer}. ` +\n        \"The finalizer function is called with the service instance when the container is disposed.\"\n    );\n  }\n}\n\n// =============================================================================\n// Factory-based createAdapter overloads\n// =============================================================================\n\n/**\n * Creates an adapter with a factory function, all defaults applied.\n *\n * @overload\n * Factory with no requires, no lifetime, no clonable - all defaults applied.\n * Defaults: `requires: []`, `lifetime: \"singleton\"`, `clonable: false`\n *\n * For async factories (returning Promise), automatically uses:\n * - `factoryKind: \"async\"`\n * - `lifetime: \"singleton\"` (enforced)\n *\n * @typeParam TProvides - The port being implemented\n * @typeParam TFactory - The factory function type\n */\nexport function createAdapter<"+"\n  TProvides extends Port<"+"unknown, string>,\n  TFactory extends (\n    deps: ResolvedDeps<"+"never>\n  ) => InferService<"+"TProvides> | Promise<"+"InferService<"+"TProvides>>,\n>(config: {\n  readonly provides: TProvides;\n  readonly factory: TFactory;\n  readonly finalizer?: (instance: InferService<"+"TProvides>) => void | Promise<"+"void>;\n  requires?: undefined;\n  lifetime?: undefined;\n  clonable?: undefined;\n}): Adapter<"+"\n  TProvides,\n  never,\n  Singleton,\n  IsAsyncFactory<"+"TFactory> extends true ? Async : Sync,\n  False,\n  EmptyRequires\n>;\n\n/**\n * Creates an adapter with a factory function and explicit requires.\n *\n * @overload\n * Factory with explicit requires (no lifetime, no clonable).\n * Defaults: `lifetime: \"singleton\"`, `clonable: false`\n *\n * @typeParam TProvides - The port being implemented\n * @typeParam TRequires - Tuple of required port dependencies\n * @typeParam TFactory - The factory function type\n */\nexport function createAdapter<"+"\n  TProvides extends Port<"+"unknown, string>,\n  const TRequires extends readonly Port<"+"unknown, string>[],\n  TFactory extends (\n    deps: ResolvedDeps<"+"TupleToUnion<"+"TRequires>>\n  ) => InferService<"+"TProvides> | Promise<"+"InferService<"+"TProvides>>,\n>(config: {\n  readonly provides: TProvides;\n  readonly requires: TRequires;\n  readonly factory: TFactory;\n  readonly finalizer?: (instance: InferService<"+"T etime {\n  return value === \"singleton\" || value === \"scoped\" || value === \"transient\";\n}\n\n/**\n * Checks if a value is a valid FactoryKind value.\n *\n * @param value - The value to check\n * @returns `true` if the value is \"sync\" or \"async\"\n *\n * @example\n * ```typescript\n * if (isFactoryKind(adapter.factoryKind)) {\n *   // Narrowed to \"sync\" | \"async\"\n * }\n * ```\n */\nexport function isFactoryKind(value: unknown): value is FactoryKind {\n  return value === \"sync\" || value === \"async\";\n}\n\n// =============================================================================\n// Complex Type Guards\n// =============================================================================\n\n/**\n * Checks if a value is a Port object.\n * @internal\n */\nfunction isPort(value: unknown): value is { __portName: string } {\n  if (value === null || typeof value !== \"object\") return false;\n  return \"__portName\" in value && typeof value.__portName === \"string\";\n}\n\n/**\n * Checks if a value conforms to the AdapterConstraint structure.\n *\n * This guard verifies that an object has all the required properties\n * of an Adapter with appropriate types.\n *\n * ## Checked Properties\n *\n * - `provides`: Must be a Port object (has `__portName`)\n * - `requires`: Must be an array of Port objects\n * - `lifetime`: Must be a valid Lifetime value\n * - `factoryKind`: Must be a valid FactoryKind value\n * - `factory`: Must be a function\n * - `clonable`: Must be a boolean\n *\n * @param value - The value to check\n * @returns `true` if the value conforms to AdapterConstraint\n *\n * @example\n * ```typescript\n * function registerAdapter(maybeAdapter: unknown) {\n *   if (!isAdapter(maybeAdapter)) {\n *     throw new Error('Invalid adapter structure');\n *   }\n *   // maybeAdapter is narrowed to AdapterConstraint\n *   builder.provide(maybeAdapter);\n * }\n * ```\n */\nexport function isAdapter(value: unknown): value is AdapterConstraint {\n  if (value === null || typeof value !== \"object\") return false;\n\n  // Check provides property\n  if (!(\"provides\" in value) || !isPort(value.provides)) return false;\n\n  // Check requires property\n  if (!(\"requires\" in value) || !Array.isArray(value.requires)) return false;\n  for (const req of value.requires) {\n    if (!isPort(req)) return false;\n  }\n\n  // Check lifetime property\n  if (!(\"lifetime\" in value) || !isLifetime(value.lifetime)) return false;\n\n  // Check factoryKind property\n  if (!(\"factoryKind\" in value) || !isFactoryKind(value.factoryKind)) return false;\n\n  // Check factory property\n  if (!(\"factory\" in value) || typeof value.factory !== \"function\") return false;\n\n  // Check clonable property\n  if (!(\"clonable\" in value) || typeof value.clonable !== \"boolean\") return false;\n\n  return true;\n}\n"},"src/adapters/lazy.ts":{"language":"typescript","mutants":[{"id":"115","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading '__portName')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["494"],"coveredBy":["494","495","496","497","500","501"],"location":{"end":{"column":2,"line":155},"start":{"column":11,"line":153}}},{"id":"116","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading '__portName')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["494"],"coveredBy":["494","495","496","497","500","501"],"location":{"end":{"column":2,"line":195},"start":{"column":20,"line":184}}},{"id":"117","mutatorName":"StringLiteral","replacement":"``","statusReason":"expected '' to be 'LazyUserService' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["494"],"coveredBy":["494","495","496","497","500","501"],"location":{"end":{"column":57,"line":186},"start":{"column":40,"line":186}}},{"id":"118","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"expected     const user = userService.getUser(userId);\n *       console.log(`Sending \"${message}\" to ${user.name}`);\n *     },\n *   }),\n * });\n * ```\n *\n * @packageDocumentation\n */\n\nimport type { Port, InferService, InferPortName } from \"../ports/types.js\";\n\n// =============================================================================\n// Type Brands\n// =============================================================================\n\n/**\n * Brand symbol for lazy ports. Used for type discrimination.\n * @internal\n */\ndeclare const __lazyPortBrand: unique symbol;\n\n/**\n * Symbol key for storing the original port reference.\n * @internal\n */\ndeclare const __originalPort: unique symbol;\n\n// =============================================================================\n// LazyPort Type\n// =============================================================================\n\n/**\n * A lazy wrapper port that provides a thunk `() => T` instead of `T`.\n *\n * Lazy ports break circular dependencies by deferring resolution.\n * When an adapter requires `LazyPort<"+"SomePort>`, its factory receives\n * `{ LazySomeName: () => SomeService }` instead of `{ SomeName: SomeService }`.\n *\n * @typeParam TPort - The original port being wrapped\n *\n * @example\n * ```typescript\n * const LazyUserService = lazyPort(UserServicePort);\n * // type: LazyPort<"+"typeof UserServicePort>\n * // provides: () => UserService (a thunk)\n * // name: \"LazyUserService\"\n * ```\n */\nexport type LazyPort<"+"TPort extends Port<"+"unknown, string>> = Port<"+"\n  () => InferService<"+"TPort>,\n  `Lazy${InferPortName<"+"TPort>}`\n> & {\n  readonly [__lazyPortBrand]: true;\n  readonly [__originalPort]: TPort;\n};\n\n// =============================================================================\n// Type Predicates\n// =============================================================================\n\n/**\n * Checks if a type is a LazyPort.\n *\n * @typeParam TPort - The type to check\n * @returns `true` if TPort is a LazyPort, `false` otherwise\n *\n * @example\n * ```typescript\n * type A = IsLazyPort<"+"LazyPort<"+"UserServicePort>>; // true\n * type B = IsLazyPort<"+"UserServicePort>;            // false\n * ```\n */\nexport type IsLazyPort<"+"TPort> = TPort extends { readonly [__lazyPortBrand]: true } ? true : false;\n\n/**\n * Extracts the original port from a LazyPort.\n *\n * @typeParam TPort - A LazyPort type\n * @returns The original port type, or `never` if not a LazyPort\n *\n * @example\n * ```typescript\n * type Original = UnwrapLazyPort<"+"LazyPort<"+"UserServicePort>>;\n * // UserServicePort\n * ```\n */\nexport type UnwrapLazyPort<"+"TPort> = TPort extends { readonly [__originalPort]: infer TOriginal }\n  ? TOriginal\n  : never;\n\n// =============================================================================\n// Runtime Functions\n// =============================================================================\n\n/**\n * Symbol for the lazy port brand (runtime).\n * @internal\n */\nconst LAZY_PORT_BRAND = Symbol.for(\"@hex-di/core/LazyPort\");\n\n/**\n * Symbol for storing the original port (runtime).\n * @internal\n */\nconst ORIGINAL_PORT = Symbol.for(\"@hex-di/core/OriginalPort\");\n\n/**\n * Runtime representation of a LazyPort.\n * @internal\n */\ninterface LazyPortRuntime<"+"TName extends string, TPort extends Port<"+"unknown, string>> {\n  readonly __portName: `Lazy${TName}`;\n  readonly [LAZY_PORT_BRAND]: true;\n  readonly [ORIGINAL_PORT]: TPort;\n}\n\n/**\n * Internal helper to create a LazyPort with proper typing.\n * @internal\n */\nfunction createLazyPortImpl<"+"TName extends string, TPort extends Port<"+"unknown, TName>>(\n  runtime: LazyPortRuntime<"+"TName, TPort>\n): LazyPort<"+"TPort>;\nfunction createLazyPortImpl<"+"TName extends string, TPort extends Port<"+"unknown, TName>>(\n  runtime: LazyPortRuntime<"+"TName, TPort>\n): object {\n  return runtime;\n}\n\n/**\n * Creates a lazy port token for use in adapter requires.\n *\n * The graph will auto-generate the lazy adapter; you only provide the original adapter.\n * The factory receives a thunk `() => T` that resolves the dependency when called.\n *\n * @param port - The port to wrap lazily\n * @returns A lazy port that provides `() => T` instead of `T`\n *\n * @example\n * ```typescript\n * const LazyUserService = lazyPort(UserServicePort);\n *\n * const NotificationAdapter = createAdapter({\n *   provides: NotificationPort,\n *   requires: [LazyUserService] as const,\n *   factory: ({ LazyUserService }) => ({\n *     notify: (userId) => {\n *       const users = LazyUserService(); // Deferred resolution\n *       return users.getUser(userId);\n *     },\n *   }),\n * });\n * ```\n */\nexport function lazyPort<"+"TName extends string, TPort extends Port<"+"unknown, TName>>(\n  port: TPort\n): LazyPort<"+"TPort> {\n  const portName: TName = port.__portName;\n  const lazyPortName: `Lazy${TName}` = `Lazy${portName}`;\n\n  const runtime: LazyPortRuntime<"+"TName, TPort> = Object.freeze({\n    __portName: lazyPortName,\n    [LAZY_PORT_BRAND]: true as const,\n    [ORIGINAL_PORT]: port,\n  });\n\n  return createLazyPortImpl(runtime);\n}\n\n/**\n * Type guard that checks if an object has the lazy port brand symbol.\n * @internal\n */\nfunction hasLazyBrand(obj: object): obj is { readonly [LAZY_PORT_BRAND]: true } {\n  return LAZY_PORT_BRAND in obj;\n}\n\n/**\n * Type guard that checks if an object has the original port symbol.\n * @internal\n */\nfunction hasOriginalPort<"+"TPort extends Port<"+"unknown, string>>(\n  obj: object\n): obj is { readonly [ORIGINAL_PORT]: TPort } {\n  return ORIGINAL_PORT in obj;\n}\n\n/**\n * Extracts the original port from a lazy port at runtime.\n *\n * @param lazy - The lazy port\n * @returns The original port\n */\nexport function getOriginalPort<"+"TPort extends Port<"+"unknown, string>>(lazy: LazyPort<"+"TPort>): TPort {\n  if (hasOriginalPort<"+"TPort>(lazy)) {\n    return lazy[ORIGINAL_PORT];\n  }\n  throw new Error(\"ERROR[HEX019]: Invalid lazy port: missing original port reference\");\n}\n\n/**\n * Runtime check if a port is a lazy port.\n *\n * @param port - The port to check\n * @returns `true` if the port is a lazy port\n *\n * @example\n * ```typescript\n * const lazy = lazyPort(UserServicePort);\n * isLazyPort(lazy); // true\n * isLazyPort(UserServicePort); // false\n * ```\n */\nexport function isLazyPort(port: Port<"+"unknown, string>): port is LazyPort<"+"Port<"+"unknown, string>> {\n  return hasLazyBrand(port) && port[LAZY_PORT_BRAND] === true;\n}\n"},"src/context/helpers.ts":{"language":"typescript","mutants":[{"id":"305","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'variable')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["484"],"coveredBy":["484","485","486","493"],"location":{"end":{"column":2,"line":39},"start":{"column":47,"line":37}}},{"id":"306","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"expected undefined to be { id: Symbol(userId), …(1) } // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["484"],"coveredBy":["484","485","486","493"],"location":{"end":{"column":29,"line":38},"start":{"column":10,"line":38}}},{"id":"307","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected undefined to be 'user-123' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["487"],"coveredBy":["487","488","489","490","491","492","493"],"location":{"end":{"column":2,"line":78},"start":{"column":18,"line":72}}},{"id":"308","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"expected undefined to be 3 // Object.is equality","status":"Killed","static":false,"testsCompleted":3,"killedBy":["489"],"coveredBy":["487","488","489","490","491","492","493"],"location":{"end":{"column":26,"line":74},"start":{"column":7,"line":74}}},{"id":"309","mutatorNa erId.id, withContext(userId, 'user-123').value],\n *   [timeout.id, withContext(timeout, 5000).value],\n * ]);\n * ```\n */\nexport function withContext<"+"T>(\n  variable: ContextVariable<"+"T>,\n  value: T\n): { variable: ContextVariable<"+"T>; value: T } {\n  return { variable, value };\n}\n\n/**\n * Retrieves a value from a context map using a context variable.\n *\n * If the variable is not present in the context and has a default value,\n * the default is returned. If neither exists, returns undefined.\n *\n * @typeParam T - The type of value stored in the context variable\n * @param context - The context map containing variable values\n * @param variable - The context variable to look up\n * @returns The value from context, the default value, or undefined\n *\n * @example\n * ```typescript\n * const userId = createContextVariable<"+"string>('userId');\n * const context = new Map([[userId.id, 'user-123']]);\n *\n * const id = getContext(context, userId); // 'user-123'\n * ```\n *\n * @example\n * With default values:\n * ```typescript\n * const retryCount = createContextVariable('retryCount', 3);\n * const emptyContext = new Map();\n *\n * const retries = getContext(emptyContext, retryCount) ?? retryCount.defaultValue; // 3\n * ```\n */\nexport function getContext<"+"T>(\n  context: Map<"+"symbol, unknown>,\n  variable: ContextVariable<"+"T>\n): T | undefined {\n  const value = context.get(variable.id);\n  if (value !== undefined) {\n    return value as T;\n  }\n  return variable.defaultValue;\n}\n"},"src/context/variables.ts":{"language":"typescript","mutants":[{"id":"312","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading 'id')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["479"],"coveredBy":["479","480","481","482","483","484","485","486","487","488","489","490","491","492","493"],"location":{"end":{"column":2,"line":58},"start":{"column":94,"line":53}}},{"id":"313","mutatorName" ?: T): ContextVariable<"+"T> {\n  return {\n    id: Symbol(name),\n    defaultValue,\n  };\n}\n"},"src/errors/base.ts":{"language":"typescript","mutants":[{"id":"314","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected 'Factory for port \\'Config\\' threw: [o…' to be 'Factory for port \\'Config\\' threw: cu…' // Object.is equality","status":"Killed","static":false,"testsCompleted":2,"killedBy":["158"],"coveredBy":["157","158","159","180","369","370","371","372","373","374","375","376","377","378","380","381","382","383","384","385"],"location":{"end":{"column":2,"line":27},"start":{"column":82,"line":20}}},{"id":"315","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"expected 'Factory for port \\'Logger\\' threw: un…' to be 'Factory for port \\'Logger\\' threw: st…' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["157"],"coveredBy":["157","158","159","180","369","370","371","372","373","374","375","376","377","378","380","381","382","383","384","385"],"location":{"end":{"column":64,"line":25},"start":{"column":5,"line":22}}},{"id":"316","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"expected 'Factory for port \\'Config\\' threw: [o…' to be 'Factory for port \\'Config\\' threw: cu…' // Object.is equality","status":"Killed","static":false,"testsCompleted":2,"killedBy":["158"],"coveredBy":["157","158","159","180","369","370","371","372","373","374","375","376","377","378","380","381","382","383","384","385"],"location":{"end":{"column":64,"line":25},"start":{"column":5,"line":22}}},{"id":"319","mutatorName":"LogicalOperator","replacement":"typeof value === \"object\" && value !== null || \"message\" in value","statusReason":"Cannot use 'in' operator to search for 'message' in string error","status":"Killed","static":false,"testsCompleted":1,"killedBy":["157"],"coveredBy":["157","158","159","180","369","370","371","372","373","374","375","376","377","378", "],"location":{"end":{"column":4,"line":122},"start":{"column":31,"line":120}}},{"id":"343","mutatorName":"BlockStatement","replacement":"{}","status":"Survived","static":false,"testsCompleted":74,"coveredBy":["147","148","149","150","151","152","153","154","155","156","157","158","159","160","161","162","163","164","165","166","167","168","169","170","171","172","173","174","175","176","177","178","179","180","181","182","183","184","185","186","187","188","189","190","191","192","193","194","195","196","197","198","199","200","387","388","389","390","391","392","393","394","395","396","397","457","458","459","460","461","462","463","471","472"],"location":{"end":{"column":6,"line":113},"start":{"column":67,"line":111}}}],"source":"/**\n * Base error class for all HexDI errors.\n *\n * @packageDocumentation\n */\n\n// V8-specific Error.captureStackTrace type\ntype V8ErrorConstructor = typeof Error & {\n  captureStackTrace?(targetObject: object, constructorOpt?: unknown): void;\n};\n\n// =============================================================================\n// Error Message Extraction\n// =============================================================================\n\n/**\n * Checks if a value is an object with a string `message` property.\n * Used to detect error-like objects that don't extend Error.\n */\nexport function hasMessageProperty(value: unknown): value is { message: string } {\n  return (\n    typeof value === \"object\" &&\n    value !== null &&\n    \"message\" in value &&\n    typeof (value as { message: unknown }).message === \"string\"\n  );\n}\n\n/**\n * Extracts a human-readable error message from an unknown thrown value.\n *\n * Handles:\n * 1. Standard Error instances → uses error.message\n * 2. Objects with `message` property → uses the message property\n * 3. Other values → converts to string\n *\n * This properly handles custom error objects that have a `message` property\n * but don't extend Error (e.g., from external libraries or serialized errors).\n */\nexport function extractErrorMessage(cause: unknown): string {\n  if (cause instanceof Error) {\n    return cause.message;\n  }\n  if (hasMessageProperty(cause)) {\n    return cause.message;\n  }\n  return String(cause);\n}\n\n// =============================================================================\n// ContainerError Abstract Base Class\n// =============================================================================\n\n/**\n * Abstract base class for all container-related errors.\n *\n * Provides a consistent structure for error handling with:\n * - `code`: A stable string constant for programmatic error identification\n * - `isProgrammingError`: Indicates whether this error represents a programming\n *   mistake (true) or a runtime condition (false)\n *\n * @remarks\n * - All concrete error classes must extend this base class\n * - The `name` getter returns the concrete class name for stack traces\n * - Uses `Error.captureStackTrace` when available for cleaner stack traces\n *\n * @example\n * ```typescript\n * try {\n *   container.resolve(SomePort);\n * } catch (error) {\n *   if (error instanceof ContainerError) {\n *     console.log(`Error code: ${error.code}`);\n *     if (error.isProgrammingError) {\n *       // This is a bug in the application code\n *     }\n *   }\n * }\n * ```\n */\nexport abstract class ContainerError extends Error {\n  /**\n   * A stable string constant identifying the error type.\n   * Suitable for programmatic error handling and logging.\n   */\n  abstract readonly code: string;\n\n  /**\n   * Indicates whether this error represents a programming mistake.\n   *\n   * - `true`: The error is caused by incorrect usage (e.g., circular dependency,\n   *   resolving from disposed scope, missing scope). These should be fixed in code.\n   * - `false`: The error is caused by runtime conditions (e.g., factory threw).\n   *   These may be recoverable or require operational handling.\n   */\n  abstract readonly isProgrammingError: boolean;\n\n  /**\n   * Creates a new ContainerError instance.\n   *\n   * @param message - The error message describing what went wrong\n   */\n  constructor(message: string) {\n    super(message);\n\n    // Ensure proper prototype chain for instanceof checks\n    Object.setPrototypeOf(this, new.target.prototype);\n\n    // Capture stack trace excluding this constructor for cleaner traces\n    const ErrorWithCapture: V8ErrorConstructor = Error;\n    if (typeof ErrorWithCapture.captureStackTrace === \"function\") {\n      ErrorWithCapture.captureStackTrace(this, new.target);\n    }\n  }\n\n  /**\n   * Returns the concrete class name for this error.\n   * Used in stack traces and error logging.\n   */\n  override get name(): string {\n    return this.constructor.name;\n  }\n}\n"},"src/errors/classes.ts":{"language":"typescript","mutants":[{"id":"345","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected '' to be 'CircularDependency' // Object.is equality","status":"Killed","static":false,"testsCompleted":3,"killedBy":["149"],"coveredBy":["147","148","149","150","151","152","153","154","155","457","471"],"location":{"end":{"column":39,"line":38},"start":{"column":19,"line":38}}},{"id":"346","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected 'Circular dependency detected: ABA' to be 'Circular dependency detected: A -> B …' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["147"],"coveredBy":["147","148","149","150","151","152","153","154","155","457","471"],"location":{"end":{"column":55,"line":54},"start":{"column":49,"line":54}}},{"id":"347","mutatorName":"StringLiteral","replacement":"``","statusReason":"expected '' to be 'Circular dependency detected: A -> B …' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["147"],"coveredBy":["147","148","149","150","151","152","153","154","155","457","471"],"location":{"end":{"column":60,"li ","199","200","463"],"location":{"end":{"column":103,"line":373},"start":{"column":9,"line":373}}}],"source":"/**\n * Concrete error classes for HexDI.\n *\n * @packageDocumentation\n */\n\nimport { ContainerError, extractErrorMessage } from \"./base.js\";\n\n// =============================================================================\n// CircularDependencyError\n// =============================================================================\n\n/**\n * Error thrown when a circular dependency is detected during resolution.\n *\n * Circular dependencies occur when Service A depends on Service B,\n * and Service B (directly or indirectly) depends back on Service A.\n *\n * @remarks\n * - This is always a programming error - the dependency graph must be acyclic\n * - The `dependencyChain` property shows the full cycle for debugging\n * - Detection occurs lazily at resolution time, not at container creation\n *\n * @example\n * ```typescript\n * // If UserService -> AuthService -> UserService exists:\n * try {\n *   container.resolve(UserServicePort);\n * } catch (error) {\n *   if (error instanceof CircularDependencyError) {\n *     console.log(error.dependencyChain);\n *     // ['UserService', 'AuthService', 'UserService']\n *   }\n * }\n * ```\n */\nexport class CircularDependencyError extends ContainerError {\n  readonly _tag = \"CircularDependency\";\n  readonly code = \"CIRCULAR_DEPENDENCY\" as const;\n  readonly isProgrammingError = true as const;\n\n  /**\n   * The chain of dependencies that form the cycle.\n   * The first and last elements are the same, showing where the cycle closes.\n   */\n  readonly dependencyChain: readonly string[];\n\n  /**\n   * Creates a new CircularDependencyError.\n   *\n   * @param dependencyChain - Array of port names forming the cycle.\n   */\n  constructor(dependencyChain: readonly string[]) {\n    const formattedChain = dependencyChain.join(\" -> \");\n    super(`Circular dependency detected: ${formattedChain}`);\n    this.dependencyChain = Object.freeze([...dependencyChain]);\n  }\n}\n\n// =============================================================================\n// FactoryError\n// =============================================================================\n\n/**\n * Error thrown when an adapter's factory function throws during instance creation.\n *\n * This error wraps the original exception thrown by the factory, providing\n * context about which port's factory failed.\n *\n * @remarks\n * - This is NOT a programming error - factory failures are runtime conditions\n * - The `cause` property contains the original exception for investigation\n *\n * @example\n * ```typescript\n * try {\n *   container.resolve(DatabasePort);\n * } catch (error) {\n *   if (error instanceof FactoryError) {\n *     console.log(`Factory for ${error.portName} failed`);\n *     console.log('Original error:', error.cause);\n *   }\n * }\n * ```\n */\nexport class FactoryError extends ContainerError {\n  readonly _tag = \"FactoryFailed\";\n  readonly code = \"FACTORY_FAILED\" as const;\n  readonly isProgrammingError = false as const;\n\n  /**\n   * The name of the port whose factory failed.\n   */\n  readonly portName: string;\n\n  /**\n   * The original exception thrown by the factory function.\n   */\n  readonly cause: unknown;\n\n  /**\n   * Creates a new FactoryError.\n   *\n   * @param portName - The name of the port whose factory threw\n   * @param cause - The original exception thrown by the factory\n   */\n  constructor(portName: string, cause: unknown) {\n    const causeMessage = extractErrorMessage(cause);\n    super(`Factory for port '${portName}' threw: ${causeMessage}`);\n    this.portName = portName;\n    this.cause = cause;\n  }\n}\n\n// =============================================================================\n// DisposedScopeError\n// =============================================================================\n\n/**\n * Error thrown when attempting to resolve a service from a disposed scope or container.\n *\n * Once a scope or container is disposed, it cannot be used to resolve services.\n *\n * @remarks\n * - This is a programming error - code should not use disposed containers\n *\n * @example\n * ```typescript\n * const scope = container.createScope();\n * await scope.dispose();\n *\n * // This will throw DisposedScopeError:\n * scope.resolve(UserServicePort);\n * ```\n */\nexport class DisposedScopeError extends ContainerError {\n  readonly _tag = \"DisposedScope\";\n  readonly code = \"DISPOSED_SCOPE\" as const;\n  readonly isProgrammingError = true as const;\n\n  /**\n   * The name of the port that was attempted to be resolved.\n   */\n  readonly portName: string;\n\n  /**\n   * Creates a new DisposedScopeError.\n   *\n   * @param portName - The name of the port that was attempted to be resolved\n   */\n  constructor(portName: string) {\n    super(\n      `Cannot resolve port '${portName}' from a disposed scope. ` +\n        `The scope has already been disposed and cannot be used for resolution.`\n    );\n    this.portName = portName;\n  }\n}\n\n// =============================================================================\n// ScopeRequiredError\n// =============================================================================\n\n/**\n * Error thrown when attempting to resolve a scoped port from the root container.\n *\n * Scoped ports have a lifetime tied to a specific scope. They cannot be resolved\n * from the root container because there is no scope to own their lifetime.\n *\n * @remarks\n * - This is a programming error - use createScope() for scoped dependencies\n *\n * @example\n * ```typescript\n * // UserContextPort is configured with 'scoped' lifetime\n *\n * // This will throw ScopeRequiredError:\n * container.resolve(UserContextPort);\n *\n * // Correct usage:\n * const scope = container.createScope();\n * const userContext = scope.resolve(UserContextPort);\n * ```\n */\nexport class ScopeRequiredError extends ContainerError {\n  readonly _tag = \"ScopeRequired\";\n  readonly code = \"SCOPE_REQUIRED\" as const;\n  readonly isProgrammingError = true as const;\n\n  /**\n   * The name of the scoped port that was attempted to be resolved.\n   */\n  readonly portName: string;\n\n  /**\n   * Creates a new ScopeRequiredError.\n   *\n   * @param portName - The name of the scoped port that was attempted to be resolved\n   */\n  constructor(portName: string) {\n    super(\n      `Cannot resolve scoped port '${portName}' from the root container. ` +\n        `Scoped ports must be resolved from a scope created via createScope().`\n    );\n    this.portName = portName;\n  }\n}\n\n// =============================================================================\n// AsyncFactoryError\n// =============================================================================\n\n/**\n * Error thrown when an async adapter's factory function throws during instance creation.\n *\n * This error wraps the original exception thrown by the async factory, providing\n * context about which port's factory failed.\n *\n * @remarks\n * - This is NOT a programming error - async factory failures are runtime conditions\n * - The `cause` property contains the original exception for investigation\n *\n * @example\n * ```typescript\n * try {\n *   await container.resolveAsync(DatabasePort);\n * } catch (error) {\n *   if (error instanceof AsyncFactoryError) {\n *     console.log(`Async factory for ${error.portName} failed`);\n *     console.log('Original error:', error.cause);\n *   }\n * }\n * ```\n */\nexport class AsyncFactoryError extends ContainerError {\n  readonly _tag = \"AsyncFactoryFailed\";\n  readonly code = \"ASYNC_FACTORY_FAILED\" as const;\n  readonly isProgrammingError = false as const;\n\n  /**\n   * The name of the port whose async factory failed.\n   */\n  readonly portName: string;\n\n  /**\n   * The original exception thrown by the async factory function.\n   */\n  readonly cause: unknown;\n\n  /**\n   * ype-level format\n  const captiveMatch = message.match(\n    /ERROR\\[HEX003\\]: Captive dependency: (?<"+"dependentLifetime>\\w+) '(?<"+"dependentName>[^']+)' cannot depend on (?<"+"captiveLifetime>\\w+) '(?<"+"captiveName>[^']+)'/\n  );\n  if (captiveMatch?.groups) {\n    return {\n      code: ErrorCode.CAPTIVE_DEPENDENCY,\n      message,\n      details: {\n        dependentLifetime: captiveMatch.groups.dependentLifetime,\n        dependentName: captiveMatch.groups.dependentName,\n        captiveLifetime: captiveMatch.groups.captiveLifetime,\n        captiveName: captiveMatch.groups.captiveName,\n      },\n    };\n  }\n\n  // Captive dependency (HEX003) - runtime format\n  const captiveRuntimeMatch = message.match(\n    /ERROR\\[HEX003\\]: Captive dependency detected at runtime: (?<"+"dependentLifetime>\\w+) '(?<"+"dependentName>[^']+)' cannot depend on (?<"+"captiveLifetime>\\w+) '(?<"+"captiveName>[^']+)'/\n  );\n  if (captiveRuntimeMatch?.groups) {\n    return {\n      code: ErrorCode.CAPTIVE_DEPENDENCY,\n      message,\n      details: {\n        dependentLifetime: captiveRuntimeMatch.groups.dependentLifetime,\n        dependentName: captiveRuntimeMatch.groups.dependentName,\n        captiveLifetime: captiveRuntimeMatch.groups.captiveLifetime,\n        captiveName: captiveRuntimeMatch.groups.captiveName,\n      },\n    };\n  }\n\n  // Captive dependency (HEX003) - simple runtime format\n  if (message.match(/ERROR\\[HEX003\\]: Captive dependency detected at runtime/)) {\n    return {\n      code: ErrorCode.CAPTIVE_DEPENDENCY,\n      message,\n      details: {},\n    };\n  }\n\n  // Reverse captive dependency (HEX004)\n  const reverseCaptiveMatch = message.match(\n    /ERROR\\[HEX004\\]: Reverse captive dependency: Existing (?<"+"existingLifetime>\\w+) '(?<"+"existingName>[^']+)' would capture new (?<"+"newLifetime>\\w+) '(?<"+"newName>[^']+)'/\n  );\n  if (reverseCaptiveMatch?.groups) {\n    return {\n      code: ErrorCode.REVERSE_CAPTIVE_DEPENDENCY,\n      message,\n      details: {\n        existingLifetime: reverseCaptiveMatch.groups.existingLifetime,\n        existingName: reverseCaptiveMatch.groups.existingName,\n        newLifetime: reverseCaptiveMatch.groups.newLifetime,\n        newName: reverseCaptiveMatch.groups.newName,\n      },\n    };\n  }\n\n  // Lifetime inconsistency (HEX005)\n  const lifetimeMatch = message.match(\n    /ERROR\\[HEX005\\]: Lifetime inconsistency for '(?<"+"portName>[^']+)': Graph A provides (?<"+"lifetimeA>\\w+), Graph B provides (?<"+"lifetimeB>\\w+)/\n  );\n  if (lifetimeMatch?.groups) {\n    return {\n      code: ErrorCode.LIFETIME_INCONSISTENCY,\n      message,\n      details: {\n        portName: lifetimeMatch.groups.portName,\n        lifetimeA: lifetimeMatch.groups.lifetimeA,\n        lifetimeB: lifetimeMatch.groups.lifetimeB,\n      },\n    };\n  }\n\n  // Self-dependency (HEX006)\n  const selfDepMatch = message.match(\n    /ERROR\\[HEX006\\]: Self-dependency detected\\. Adapter for '(?<"+"portName>[^']+)'/\n  );\n  if (selfDepMatch?.groups) {\n    return {\n      code: ErrorCode.SELF_DEPENDENCY,\n      message,\n      details: { portName: selfDepMatch.groups.portName },\n    };\n  }\n\n  // Depth limit warning (HEX007)\n  const depthLimitMatch = message.match(\n    /WARNING\\[HEX007\\]: Type-level depth limit \\((?<"+"maxDepth>\\d+)\\) exceeded/\n  );\n  if (depthLimitMatch?.groups) {\n    const startPortMatch = message.match(/exceeded for port '(?<"+"startPort>[^']+)'/);\n    const lastPortMatch = message.match(/Last port visited: '(?<"+"lastPort>[^']+)'/);\n\n    const details: DepthLimitExceededDetails = {\n      maxDepth: depthLimitMatch.groups.maxDepth,\n      ...(startPortMatch?.groups?.startPort && { startPort: startPortMatch.groups.startPort }),\n      ...(lastPortMatch?.groups?.lastPort && { lastPort: lastPortMatch.groups.lastPort }),\n    };\n\n    return {\n      code: ErrorCode.DEPTH_LIMIT_EXCEEDED,\n      message,\n      details,\n    };\n  }\n\n  // Missing dependenc l registered library snapshots.\n *\n * Provides a single, frozen, queryable view of the entire application\n * state across all libraries.\n */\nexport interface UnifiedSnapshot {\n  /** Snapshot timestamp */\n  readonly timestamp: number;\n  /** Container state snapshot */\n  readonly container: ContainerSnapshot;\n  /** Library snapshots keyed by library name */\n  readonly libraries: Readonly<"+"Record<"+"string, Readonly<"+"Record<"+"string, unknown>>>>;\n  /** Names of registered libraries at snapshot time, sorted alphabetically */\n  readonly registeredLibraries: readonly string[];\n}\n\n// =============================================================================\n// Type Guard\n// =============================================================================\n\n/**\n * Runtime type guard for the LibraryInspector protocol.\n *\n * Checks structural conformance:\n * 1. Value is a non-null object\n * 2. Has `name` property of type string with length > 0\n * 3. Has `getSnapshot` property of type function\n * 4. If `subscribe` is present, it must be a function\n * 5. If `dispose` is present, it must be a function\n */\nexport function isLibraryInspector(value: unknown): value is LibraryInspector {\n  if (typeof value !== \"object\" || value === null) {\n    return false;\n  }\n\n  if (!(\"name\" in value) || typeof value.name !== \"string\" || value.name.length === 0) {\n    return false;\n  }\n\n  if (!(\"getSnapshot\" in value) || typeof value.getSnapshot !== \"function\") {\n    return false;\n  }\n\n  if (\"subscribe\" in value && typeof value.subscribe !== \"function\") {\n    return false;\n  }\n\n  if (\"dispose\" in value && typeof value.dispose !== \"function\") {\n    return false;\n  }\n\n  return true;\n}\n\n// =============================================================================\n// Convenience Factory\n// =============================================================================\n\n/**\n * Creates a port typed as `LibraryInspector` with the `\"library-inspector\"` category.\n *\n * This is a convenience factory for libraries implementing the Library Inspector Protocol.\n * The returned port carries `\"library-inspector\"` at the type level, enabling compile-time\n * category queries via `PortsByCategory` and `HasCategory`.\n *\n * @param config - Port configuration (name, optional description and tags)\n * @returns A `DirectedPort<"+"LibraryInspector, TName, \"outbound\", \"library-inspector\">`\n *\n * @example\n * ```typescript\n * const FlowInspectorPort = createLibraryInspectorPort({\n *   name: \"FlowInspector\",\n *   description: \"Flow library inspection\",\n * });\n * // Type: DirectedPort<"+"LibraryInspector, \"FlowInspector\", \"outbound\", \"library-inspector\">\n * ```\n */\nexport function createLibraryInspectorPort<"+"const TName extends string>(\n  config: { readonly name: TName; readonly description?: string; readonly tags?: readonly string[] }\n): DirectedPort<"+"LibraryInspector, TName, \"outbound\", \"library-inspector\"> {\n  return createPort<"+"TName, LibraryInspector, \"outbound\", \"library-inspector\">({\n    ...config,\n    category: \"library-inspector\",\n    direction: \"outbound\",\n  });\n}\n"},"src/inspection/tracing-types.ts":{"language":"typescript","mutants":[{"id":"693","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected undefined to be true // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["507"],"coveredBy":["507","508","509","510","511","512","513","514"],"location":{"end":{"column":2,"line":192},"start":{"column":98,"line":186}}},{"id":"694","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"expected true to be false // Object.is equality","status":"Killed","static":false,"testsCompleted":2,"killedBy":["508"],"coveredBy":["507","508","509","510","511","512","513","514"],"location":{"end":{"column":53,"line":190},"start":{"column":5,"line":188}}},{"id":"695","mutatorName":"C ========================================\n// Trace Types (Canonical - Single Source of Truth)\n// =============================================================================\n\n/**\n * Represents a single resolution trace entry.\n *\n * Each TraceEntry captures comprehensive data about one service resolution,\n * including timing information, cache status, and dependency hierarchy.\n * Entries form a tree structure through parentId/childIds relationships.\n *\n * @example\n * ```typescript\n * const entry: TraceEntry = {\n *   id: \"trace-1\",\n *   portName: \"UserService\",\n *   lifetime: \"scoped\",\n *   startTime: 1234.567,\n *   duration: 25.3,\n *   isCacheHit: false,\n *   parentId: null,\n *   childIds: [\"trace-2\", \"trace-3\"],\n *   scopeId: \"scope-1\",\n *   order: 1,\n *   isPinned: false,\n * };\n * ```\n */\nexport interface TraceEntry {\n  /** Unique identifier for this trace entry */\n  readonly id: string;\n  /** Name of the port being resolved */\n  readonly portName: string;\n  /** Service lifetime of the resolved adapter */\n  readonly lifetime: Lifetime;\n  /** High-resolution timestamp when resolution started */\n  readonly startTime: number;\n  /** Duration of the resolution in milliseconds */\n  readonly duration: number;\n  /** Whether this resolution was served from cache */\n  readonly isCacheHit: boolean;\n  /** ID of the parent trace entry, or null for root resolutions */\n  readonly parentId: string | null;\n  /** IDs of child trace entries */\n  readonly childIds: readonly string[];\n  /** ID of the scope where resolution occurred, or null for container-level */\n  readonly scopeId: string | null;\n  /** Global resolution order counter */\n  readonly order: number;\n  /** Whether this trace is pinned (protected from FIFO eviction) */\n  readonly isPinned: boolean;\n}\n\n/**\n * Aggregate statistics computed from trace entries.\n *\n * Provides high-level metrics for performance analysis and monitoring.\n *\n * @example\n * ```typescript\n * const stats: TraceStats = {\n *   totalResolutions: 150,\n *   averageDuration: 25.5,\n *   cacheHitRate: 0.65,    // 65% cache hit rate\n *   slowCount: 12,\n *   sessionStart: 1702500000000,\n *   totalDuration: 3825.0,\n * };\n * ```\n */\nexport interface TraceStats {\n  /** Total number of resolution traces recorded */\n  readonly totalResolutions: number;\n  /** Average resolution duration in milliseconds */\n  readonly averageDuration: number;\n  /** Ratio of cache hits to total resolutions (0 to 1) */\n  readonly cacheHitRate: number;\n  /** Number of resolutions that exceeded slowThresholdMs */\n  readonly slowCount: number;\n  /** Timestamp when the tracing session started */\n  readonly sessionStart: number;\n  /** Total cumulative duration of all resolutions in milliseconds */\n  readonly totalDuration: number;\n}\n\n/**\n * Filter criteria for querying trace entries.\n *\n * All properties are optional; multiple criteria are ANDed together.\n *\n * @example\n * ```typescript\n * const filter: TraceFilter = {\n *   lifetime: \"scoped\",\n *   minDuration: 50,\n * };\n * ```\n */\nexport interface TraceFilter {\n  /** Filter by port name (partial match, case-insensitive) */\n  readonly portName?: string;\n  /** Filter by service lifetime */\n  readonly lifetime?: Lifetime;\n  /** Filter by cache hit status */\n  readonly isCacheHit?: boolean;\n  /** Minimum duration in milliseconds (inclusive) */\n  readonly minDuration?: number;\n  /** Maximum duration in milliseconds (inclusive) */\n  readonly maxDuration?: number;\n  /** Filter by scope ID */\n  readonly scopeId?: string | null;\n  /** Filter by pinned status */\n  readonly isPinned?: boolean;\n}\n\n/**\n * Configuration for trace buffer retention and eviction policy.\n */\nexport interface TraceRetentionPolicy {\n  /** Maximum number of traces to retain in the buffer. @default 1000 */\n  readonly maxTraces: number;\n  /** Maximum number of pinned (slow) traces to retain. @default 100 */\n  readonly maxPinnedTraces: number;\n  /** Duration threshold in milliseconds for auto-pinning slow traces. @default 100 */\n  readonly slowThresholdMs: number;\n  /** Time in milliseconds after which non-pinned traces expire. @default 300000 */\n  readonly expiryMs: number;\n}\n\n/**\n * Default trace retention policy values.\n */\nexport const DEFAULT_RETENTION_POLICY: TraceRetentionPolicy = {\n  maxTraces: 1000,\n  maxPinnedTraces: 100,\n  slowThresholdMs: 100,\n  expiryMs: 300000,\n} as const;\n\n/**\n * Configuration options for tracing-enabled containers.\n */\nexport interface TracingOptions {\n  /** Custom retention policy configuration */\n  readonly retentionPolicy?: Partial<"+"TraceRetentionPolicy>;\n}\n\n/**\n * API exposed via TRACING_ACCESS Symbol on tracing-enabled containers.\n */\nexport interface TracingAPI {\n  /** Retrieves trace entries, optionally filtered */\n  getTraces(filter?: TraceFilter): readonly TraceEntry[];\n  /** Computes and returns aggregate trace statistics */\n  getStats(): TraceStats;\n  /** Pauses trace recording */\n  pause(): void;\n  /** Resumes trace recording after pause() */\n  resume(): void;\n  /** Clears all traces from the buffer */\n  clear(): void;\n  /** Subscribes to new trace entries in real-time */\n  subscribe(callback: (entry: TraceEntry) => void): () => void;\n  /** Returns whether tracing is currently paused */\n  isPaused(): boolean;\n  /** Manually pins a trace to protect it from FIFO eviction */\n  pin(traceId: string): void;\n  /** Unpins a trace, making it eligible for FIFO eviction */\n  unpin(traceId: string): void;\n}\n\n/**\n * Type guard to check if an object has tracing capabilities.\n */\nexport function hasTracingAccess(container: unknown): container is { [key: symbol]: TracingAPI } {\n  return (\n    typeof container === \"object\" &&\n    container !== null &&\n    Symbol.for(\"hex-di/tracing-access\") in container\n  );\n}\n"},"src/ports/directed.ts":{"language":"typescript","mutants":[{"id": re consistent identity across module boundaries.\n */\nexport const METADATA_KEY = Symbol.for(\"@hex-di/core/PortMetadata\");\n\n// =============================================================================\n// Runtime Interfaces\n// =============================================================================\n\n/**\n * Runtime representation of a DirectedPort.\n *\n * At runtime, DirectedPort objects contain:\n * - `__portName`: The port identifier\n * - `[DIRECTION_BRAND]`: The direction ('inbound' or 'outbound')\n * - `[METADATA_KEY]`: Metadata object\n */\nexport interface DirectedPortRuntime<"+"TName extends string> {\n  readonly __portName: TName;\n  readonly [DIRECTION_BRAND]: PortDirection;\n  readonly [METADATA_KEY]: PortMetadata;\n}\n\n// =============================================================================\n// Options Interface\n// =============================================================================\n\n/**\n * Options for creating a directed port.\n *\n * @typeParam TName - The literal string type for the port name\n */\nexport interface CreateDirectedPortOptions<"+"TName extends string> {\n  /** The unique name for this port */\n  readonly name: TName;\n  /** Human-readable description of the port's purpose */\n  readonly description?: string;\n  /** Categorical grouping for organization */\n  readonly category?: string;\n  /** Searchable tags for filtering and discovery */\n  readonly tags?: readonly string[];\n}\n\n// =============================================================================\n// Internal Factory Helper\n// =============================================================================\n\n/**\n * Creates a DirectedPort value with phantom type parameters.\n *\n * ## SAFETY DOCUMENTATION\n *\n * The DirectedPort type has branded properties that exist at the type level\n * for nominal typing. This helper bridges the gap between the runtime\n * representation and the phantom-branded type.\n *\n * This is safe because:\ eral-typed constant for boolean false.\n */\nexport const FALSE = literal(false);\n\n// =============================================================================\n// Empty Array Constant\n// =============================================================================\n\n/**\n * Frozen empty requires array for adapters with no dependencies.\n */\nexport const EMPTY_REQUIRES = Object.freeze(literal([]));\n\n// =============================================================================\n// Type Aliases (for cleaner overload signatures)\n// =============================================================================\n\n/** Literal type for sync factory kind */\nexport type Sync = typeof SYNC;\n\n/** Literal type for async factory kind */\nexport type Async = typeof ASYNC;\n\n/** Literal type for singleton lifetime */\nexport type Singleton = typeof SINGLETON;\n\n/** Literal type for scoped lifetime */\nexport type Scoped = typeof SCOPED;\n\n/** Literal type for transient lifetime */\nexport type Transient = typeof TRANSIENT;\n\n/** Literal type for boolean false */\nexport type False = typeof FALSE;\n\n/** Literal type for boolean true */\nexport type True = typeof TRUE;\n\n/** Type for empty requires tuple */\nexport type EmptyRequires = typeof EMPTY_REQUIRES;\n"},"src/ports/factory.ts":{"language":"typescript","mutants":[{"id":"744","mutatorName":"BlockStatement","replacement":"{}","statusReason":"ERROR[HEX010]: Invalid adapter config: 'provides' is required. Expected a Port created with createPort().","status":"Killed","static":true,"testsCompleted":1,"killedBy":["398"],"coveredBy":["201","202","203","204","205","206","207","208","209","210","211","212","213","214","215","216","217","218","219","220","221","222","223","224","225","226","227","228","229","230","231","232","233","234","242","243","244","245","246","247","248","249","250","251","252","253","254","255","256","257","258","259","260","261","262","263","264","265","266","267","268","269","270","271" 286","287","288","289","290","291","292","293","294","295","297","298","315","316","317","318","319","320","332","334","335","336","337","355","356","368","503","504","505","506"],"location":{"end":{"column":28,"line":119},"start":{"column":11,"line":119}}},{"id":"747","mutatorName":"ArrayDeclaration","replacement":"[\"Stryker was here\"]","statusReason":"expected [ 'Stryker was here' ] to deeply equal []","status":"Killed","static":true,"testsCompleted":22,"killedBy":["205"],"coveredBy":["201","202","203","205","206","207","208","209","210","212","213","214","215","216","218","219","221","222","223","224","225","226","227","228","229","230","231","232","233","234","242","243","244","245","246","247","248","249","250","251","252","253","254","255","256","257","258","259","261","262","263","264","265","266","267","268","269","271","272","273","274","275","276","277","278","279","280","281","282","283","284","285","286","287","289","290","291","292","293","294","295","298","315","316","317","318","320","332","335","336","337","355","356","368","503","504","506"],"location":{"end":{"column":28,"line":119},"start":{"column":26,"line":119}}},{"id":"748","mutatorName":"ObjectLiteral","replacement":"{}","statusReason":"expected undefined to be 'inbound' // Object.is equality","status":"Killed","static":true,"testsCompleted":1,"killedBy":["201"],"coveredBy":["201","202","203","204","205","206","207","208","209","210","211","212","213","214","215","216","217","218","219","220","221","222","223","224","225","226","227","228","229","230","231","232","233","234","242","243","244","245","246","247","248","249","250","251","252","253","254","255","256","257","258","259","260","261","262","263","264","265","266","267","268","269","270","271","272","273","274","275","276","277","278","279","280","281","282","283","284","285","286","287","288","289","290","291","292","293","294","295","297","298","315","316","317","318","319","320","332","334","335","336","337","355","356","368","503","504","505","506"],"location":{"end":{"column":4,"line":126},"start":{"column":61,"line":122}}},{"id":"749","mutatorName":"BlockStatement","replacement":"{}","statusReason":"(0 , __vite_ssr_import_1__.port)(...) is not a function","status":"Killed","static":true,"testsCompleted":12,"killedBy":["332"],"coveredBy":["201","202","203","204","205","206","207","208","209","210","211","212","213","214","215","216","217","218","219","220","221","222","223","224","225","226","227","228","229","230","231","232","233","234","242","243","244","245","246","247","248","249","250","252","257","258","259","260","263","264","265","266","267","268","269","270","271","272","273","274","275","276","277","278","279","280","281","282","283","284","285","286","287","288","289","290","291","297","298","332","334","335","336","337","355","356","368","503","504"],"location":{"end":{"column":2,"line":176},"start":{"column":3,"line":167}}},{"id":"750","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot use 'in' operator to search for 'Symbol(@hex-di/core/PortDirection)' in undefined","status":"Killed","static":true,"testsCompleted":1,"killedBy":["201"],"coveredBy":["201","202","203","204","205","206","207","208","209","210","211","212","213","214","215","216","217","218","219","220","221","222","223","224","225","226","227","228","229","230","231","232","233","234","242","243","244","245","246","247","248","249","250","252","257","258","259","260","263","264","265","266","267","268","269","270","271","272","273","274","275","276","277","278","279","280","281","282","283","284","285","286","287","288","289","290","291","297","298","332","334","335","336","337","355","356","368","503","504"],"location":{"end":{"column":4,"line":175},"start":{"column":65,"line":168}}}],"source":"/**\n * Port Factory Module\n *\n * Provides the unified createPort factory function for creating typed port\n * tokens with direction and metadata support.\n *\n * @packageDocumentation\n */\n\nimport type { PortDirection, PortMetadata, DirectedPort, SuggestedCategory } from \"./types.js\";\nimport { DIRECTION_BRAND, METADATA_KEY, createDirectedPortImpl } from \"./directed.js\";\nimport type { DirectedPortRuntime } from \"./directed.js\";\n\n// =============================================================================\n// Config Types\n// =============================================================================\n\n/**\n * Configuration for createPort.\n * @internal\n */\ninterface PortConfig {\n  readonly name: string;\n  readonly direction?: PortDirection;\n  readonly description?: string;\n  readonly category?: SuggestedCategory;\n  readonly tags?: readonly string[];\n}\n\n// =============================================================================\n// createPort - Unified Port Factory\n// =============================================================================\n\n/**\n * Creates a typed port token with direction and optional metadata.\n *\n * This is the unified API for creating ports in hexagonal architecture.\n * Direction defaults to `'outbound'` if not specified, as most ports represent\n * infrastructure dependencies (driven adapters).\n *\n * ## Type Inference Patterns\n *\n * **Full inference (service type is unknown):**\n * ```typescript\n * const LoggerPort = createPort({ name: 'Logger' });\n * // Type: DirectedPort<"+"unknown, 'Logger', 'outbound'>\n * ```\n *\n * **Service and name explicit (preserves literal name):**\n * ```typescript\n * const LoggerPort = createPort<"+"'Logger', Logger>({ name: 'Logger' });\n * // Type: DirectedPort<"+"Logger, 'Logger', 'outbound'>\n * ```\n *\n * **Using port() builder (recommended - preserves literal name):**\n * ```typescript\n * const LoggerPort = port<"+"Logger>()({ name: 'Logger' });\n * // Type: DirectedPort<"+"Logger, 'Logger', 'outbound'>\n * ```\n *\n * @typeParam TService - The service interface type (defaults to unknown)\n * @typeParam TName - The literal string type for the port name (inferred from config.name)\n * @typeParam TDirection - The direction type (defaults to 'outbound')\n *\n * @param config - Configuration object with name, optional direction, and metadata\n * @returns A frozen DirectedPort with the specified type parameters\n *\n * @remarks\n * - Direction defaults to 'outbound' at both runtime and type level\n * - `tags` returns `[]` when not specified (not undefined)\n * - `description` and `category` return `undefined` when not specified\n */\n\n// Overload 1: All four explicit including direction and category\n// createPort<"+"'Logger', Logger, 'inbound', 'domain'>({ name: 'Logger', direction: 'inbound', category: 'domain' })\nexport function createPort<"+"\n  const TName extends string,\n  TService,\n  const TDirection extends PortDirection,\n  const TCategory extends string = string,\n>(\n  config: PortConfig & { name: TName; direction: TDirection; category?: TCategory }\n): DirectedPort<"+"TService, TName, TDirection, TCategory>;\n\n// Overload 2: Name and service explicit, direction defaults to outbound\n// createPort<"+"'Logger', Logger>({ name: 'Logger' })\nexport function createPort<"+"\n  const TName extends string,\n  TService,\n  const TCategory extends string = string,\n>(\n  config: PortConfig & { name: TName; category?: TCategory }\n): DirectedPort<"+"TService, TName, \"outbound\", TCategory>;\n\n// Overload 3: Full inference - TService is unknown, TName inferred from config\n// createPort({ name: 'Logger' })\nexport function createPort<"+"const TConfig extends PortConfig>(\n  config: TConfig\n): DirectedPort<"+"\n  unknown,\n  TConfig[\"name\"],\n  TConfig extends { direction: infer D extends PortDirection } ? D : \"outbound\",\n  TConfig extends { category: infer C extends string } ? C : string\n>;\n\n// Implementation\nexport function createPort<"+"\n  const TName extends string,\n  TService,\n  TDirection extends PortDirection,\n  TCategory extends string,\n>(\n  config: PortConfig & { name: TName }\n): DirectedPort<"+"TService, TName, TDirection, TCategory> {\n  const direction = (config.direction ?? \"outbound\") as TDirection;\n  const metadata: PortMetadata = Object.freeze({\n    description: config.description,\n    category: config.category,\n    tags: config.tags ?? [], // Return empty array when not specified\n  });\n\n  const runtime: DirectedPortRuntime<"+"TName> = Object.freeze({\n    __portName: config.name,\n    [DIRECTION_BRAND]: direction,\n    [METADATA_KEY]: metadata,\n  });\n\n  return createDirectedPortImpl<"+"TService, TName, TDirection, TCategory>(runtime);\n}\n\n// =============================================================================\n// port - Builder for Service-Typed Ports with Full Name Inference\n// =============================================================================\n\n/**\n * Builder function for creating ports with a specified service type\n * while preserving literal name inference from the config object.\n *\n * Use this when you need to specify the service type and want TypeScript\n * to infer the port name as a literal type from the config.\n *\n * @example\n * ```typescript\n * interface Logger {\n *   log(message: string): void;\n * }\n *\n * // Name \"Logger\" is inferred as literal type\n * const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n * // Type: DirectedPort<"+"Logger, \"Logger\", \"outbound\">\n *\n * // With direction\n * const RequestPort = port<"+"Request>()({ name: \"Request\", direction: \"inbound\" });\n * // Type: DirectedPort<"+"Request, \"Request\", \"inbound\">\n * ```\n *\n * @typeParam TService - The service interface type\n * @returns A function that accepts a config and returns a DirectedPort\n */\nexport function port<"+"TService>(): <"+"const TConfig extends PortConfig>(\n  config: TConfig\n) => DirectedPort<"+"\n  TService,\n  TConfig[\"name\"],\n  TConfig extends { direction: infer D extends PortDirection } ? D : \"outbound\",\n  TConfig extends { category: infer C extends string } ? C : string\n> {\n  return <"+"const TConfig extends PortConfig>(config: TConfig) => {\n    return createPort(config) as DirectedPort<"+"\n      TService,\n      TConfig[\"name\"],\n      TConfig extends { direction: infer D extends PortDirection } ? D : \"outbound\",\n      TConfig extends { category: infer C extends string } ? C : string\n    >;\n  };\n}\n"}},"schemaVersion":"1.0","thresholds":{"high":95,"low":90,"break":90},"testFiles":{"tests/async-lifetime-enforcement.test-d.ts":{"tests":[{"id":"0","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-01: async factory with scoped lifetime produces error type in lifetime position"},{"id":"1","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-01: async factory with scoped lifetime error message includes 'scoped' in the message"},{"id":"2","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-01: async factory with scoped lifetime works with requires array"},{"id":"3","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-02: async factory with transient lifetime produces error type in lifetime position"},{"id":"4","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-02: async factory with transient lifetime error message includes 'transient' in the message"},{"id":"5","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-02: async factory with transient lifetime works with all explicit parameters"},{"id":"6","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-03: async factory with singleton lifetime compiles successfully with singleton lifetime"},{"id":"7","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-03: async factory with singleton lifetime works with requires and all explicit parameters"},{"id":"8","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-04: async factory with lifetime omitted compiles with default singleton lifetime"},{"id":"9","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-04: async factory with lifetime omitted works with requires but no lifetime"},{"id":"10","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-05: error message is actionable error type template includes the problematic lifetime"},{"id":"11","name":"tests/async-lifetime-enforcement.test-d.ts ASYNC-05: error message is actionable error message provides actionable hint"},{"id":"12","name":"tests/async-lifetime-enforcement.test-d.ts sync factories unaffected by async lifetime enforcement sync factory with scoped works"},{"id":"13","name":"tests/async-lifetime-enforcement.test-d.ts sync factories unaffected by async lifetime enforcement sync factory with transient works"},{"id":"14","name":"tests/async-lifetime-enforcement.test-d.ts sync factories unaffected by async lifetime enforcement sync factory with singleton works"},{"id":"15","name":"tests/async-lifetime-enforcement.test-d.ts sync factories unaffected by async lifetime enforcement sync factory with omitted lifetime defaults to singleton"},{"id":"16","name":"tests/async-lifetime-enforcement.test-d.ts class-based adapters unaffected class with scoped lifetime works"},{"id":"17","name":"tests/async-lifetime-enforcement.test-d.ts class-based adapters unaffected class with transient lifetime works"}],"source":"/**\n * Type tests for async lifetime enforcement.\n *\n * Verifies that async factories with non-singleton lifetimes produce\n * compile-time errors with helpful messages.\n *\n * Requirements tested:\n * - ASYNC-01: Async factory with `lifetime: 'scoped'` produces compile error\n * - ASYNC-02: Async factory with `lifetime: 'transient'` produces compile error\n * - ASYNC-03: Async factory with `lifetime: 'singleton'` compiles successfully\n * - ASYNC-04: Async factory with lifetime omitted compiles (defaults to singleton)\n * - ASYNC-05: Error type includes helpful message and hint\n */\n\nimport { describe, it, expectTypeOf } from \"vitest\";\nimport { port, createAdapter, createPort, type AsyncLifetimeError } from \"../src/index.js\";\n\n// =============================================================================\n// Test Fixtures\n// =============================================================================\n\ninterface TestService {\n  doWork(): void;\n}\n\ninterface DepService {\n  getValue(): number;\n}\n\nconst TestPort = port<"+"TestService>()({ name: \"Test\" });\nconst DepPort = port<"+"DepService>()({ name: \"Dep\" });\n\n// =============================================================================\n// ASYNC-01: Async + scoped = Error\n// =============================================================================\n\ndescribe(\"ASYNC-01: async factory with scoped lifetime\", () => {\n  it(\"produces error type in lifetime position\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"scoped\",\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    // Lifetime should be the error type, not \"scoped\"\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"AsyncLifetimeError<"+"\"scoped\">>();\n  });\n\n  it(\"error message includes 'scoped' in the message\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"scoped\",\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(\n      adapter.lifetime\n    ).toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'scoped'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n  });\n\n  it(\"works with requires array\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      requires: [DepPort],\n      lifetime: \"scoped\",\n      factory: async deps => {\n        void deps.Dep.getValue();\n        return { doWork: () => {} };\n      },\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"AsyncLifetimeError<"+"\"scoped\">>();\n  });\n});\n\n// =============================================================================\n// ASYNC-02: Async + transient = Error\n// =============================================================================\n\ndescribe(\"ASYNC-02: async factory with transient lifetime\", () => {\n  it(\"produces error type in lifetime position\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"transient\",\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"AsyncLifetimeError<"+"\"transient\">>();\n  });\n\n  it(\"error message includes 'transient' in the message\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"transient\",\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(\n      adapter.lifetime\n    ).toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'transient'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n  });\n\n  it(\"works with all explicit parameters\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      requires: [],\n      lifetime: \"transient\",\n      clonable: false,\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"AsyncLifetimeError<"+"\"transient\">>();\n  });\n});\n\n// =============================================================================\n// ASYNC-03: Async + singleton = OK\n// =============================================================================\n\ndescribe(\"ASYNC-03: async factory with singleton lifetime\", () => {\n  it(\"compiles successfully with singleton lifetime\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"singleton\",\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    // Should be the actual \"singleton\" type, not error\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n\n  it(\"works with requires and all explicit parameters\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      requires: [DepPort],\n      lifetime: \"singleton\",\n      clonable: true,\n      factory: async deps => {\n        void deps.Dep.getValue();\n        return { doWork: () => {} };\n      },\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n  });\n});\n\n// =============================================================================\n// ASYNC-04: Async + omitted lifetime = OK (defaults to singleton)\n// =============================================================================\n\ndescribe(\"ASYNC-04: async factory with lifetime omitted\", () => {\n  it(\"compiles with default singleton lifetime\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      factory: async () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n\n  it(\"works with requires but no lifetime\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      requires: [DepPort],\n      factory: async deps => {\n        void deps.Dep.getValue();\n        return { doWork: () => {} };\n      },\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n});\n\n// =============================================================================\n// ASYNC-05: Error message is actionable\n// =============================================================================\n\ndescribe(\"ASYNC-05: error message is actionable\", () => {\n  it(\"error type template includes the problematic lifetime\", () => {\n    // Type-level assertion that error includes the specified lifetime\n    type ScopedError = AsyncLifetimeError<"+"\"scoped\">;\n    expectTypeOf<"+"ScopedError>().toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'scoped'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n\n    type TransientError = AsyncLifetimeError<"+"\"transient\">;\n    expectTypeOf<"+"TransientError>().toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'transient'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n  });\n\n  it(\"error message provides actionable hint\", () => {\n    // The hint suggests two solutions:\n    // 1. Remove the lifetime property (use default singleton)\n    // 2. Make the factory synchronous\n    type Error = AsyncLifetimeError<"+"\"scoped\">;\n\n    // Verify hint content via string matching\n    const errorContainsHint: Error extends `${string}Hint:${string}` ? true : false = true;\n    expectTypeOf(errorContainsHint).toEqualTypeOf<"+"true>();\n\n    const errorMentionsDefault: Error extends `${string}default${string}` ? true : false = true;\n    expectTypeOf(errorMentionsDefault).toEqualTypeOf<"+"true>();\n\n    const errorMentionsSynchronous: Error extends `${string}synchronous${string}` ? true : false =\n      true;\n    expectTypeOf(errorMentionsSynchronous).toEqualTypeOf<"+"true>();\n  });\n});\n\n// =============================================================================\n// Sync factories are not affected\n// =============================================================================\n\ndescribe(\"sync factories unaffected by async lifetime enforcement\", () => {\n  it(\"sync factory with scoped works\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"scoped\",\n      factory: () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    expect
