 *\n * These tests exercise:\n * - DIRECTION_BRAND symbol identity (Symbol.for(\"@hex-di/core/PortDirection\"))\n * - METADATA_KEY symbol identity (Symbol.for(\"@hex-di/core/PortMetadata\"))\n * - hasDirectionBrand() negative cases (non-directed ports)\n * - hasMetadataKey() negative cases (ports without metadata)\n * - isDirectedPort() with objects lacking direction brand\n * - getPortDirection() / getPortMetadata() with non-directed ports\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  port,\n  isDirectedPort,\n  isInboundPort,\n  isOutboundPort,\n  getPortDirection,\n  getPortMetadata,\n} from \"../src/index.js\";\nimport { DIRECTION_BRAND, METADATA_KEY } from \"../src/ports/directed.js\";\n\n// =============================================================================\n// Symbol identity tests\n// =============================================================================\n\ndescribe(\"DIRECTION_BRAND symbol\", () => {\n  it(\"is the Symbol.for('@hex-di/core/PortDirection')\", () => {\n    expect(DIRECTION_BRAND).toBe(Symbol.for(\"@hex-di/core/PortDirection\"));\n  });\n\n  it(\"has correct description\", () => {\n    expect(DIRECTION_BRAND.description).toBe(\"@hex-di/core/PortDirection\");\n  });\n\n  it(\"is not an empty symbol\", () => {\n    expect(DIRECTION_BRAND).not.toBe(Symbol.for(\"\"));\n  });\n});\n\ndescribe(\"METADATA_KEY symbol\", () => {\n  it(\"is the Symbol.for('@hex-di/core/PortMetadata')\", () => {\n    expect(METADATA_KEY).toBe(Symbol.for(\"@hex-di/core/PortMetadata\"));\n  });\n\n  it(\"has correct description\", () => {\n    expect(METADATA_KEY.description).toBe(\"@hex-di/core/PortMetadata\");\n  });\n\n  it(\"is not an empty symbol\", () => {\n    expect(METADATA_KEY).not.toBe(Symbol.for(\"\"));\n  });\n});\n\n// =============================================================================\n// isDirectedPort() with non-directed ports (negative cases)\n// =============================================================================\n\ndescribe(\"isDirectedPort() - negative cases\", () => {\n  it(\"returns false for a plain object with __portName but no direction brand\", () => {\n    const fakePort = { __portName: \"FakePort\" };\n    expect(isDirectedPort(fakePort as any)).toBe(false);\n  });\n\n  it(\"returns false for a port object with wrong direction value\", () => {\n    const fakePort = {\n      __portName: \"FakePort\",\n      [DIRECTION_BRAND]: \"neither\" as any,\n    };\n    expect(isDirectedPort(fakePort as any)).toBe(false);\n  });\n});\n\n// =============================================================================\n// isInboundPort() with non-directed ports\n// =============================================================================\n\ndescribe(\"isInboundPort() - negative cases\", () => {\n  it(\"returns false for a plain object with __portName but no direction brand\", () => {\n    const fakePort = { __portName: \"FakePort\" };\n    expect(isInboundPort(fakePort as any)).toBe(false);\n  });\n});\n\n// =============================================================================\n// isOutboundPort() with non-directed ports\n// =============================================================================\n\ndescribe(\"isOutboundPort() - negative cases\", () => {\n  it(\"returns false for a plain object with __portName but no direction brand\", () => {\n    const fakePort = { __portName: \"FakePort\" };\n    expect(isOutboundPort(fakePort as any)).toBe(false);\n  });\n});\n\n// =============================================================================\n// getPortDirection() with non-directed ports\n// =============================================================================\n\ndescribe(\"getPortDirection() - non-directed ports\", () => {\n  it(\"returns undefined for a plain port without direction brand\", () => {\n    const fakePort = { __portName: \"FakePort\" };\n    expect(getPortDirection(fakePort as any)).toBeUndefined();\n  });\n\n  it(\"returns direction value from branded port\", () => {\n    const directedPort = port<"+"unknown>()({ name: \"TestPort\", direction: \"inbound\" });\n    const direction = getPortDirection(directedPort);\n    expect(direction).toBe(\"inbound\");\n  });\n});\n\n// =============================================================================\n// getPortMetadata() with non-metadata ports\n// =============================================================================\n\ndescribe(\"getPortMetadata() - ports without metadata key\", () => {\n  it(\"returns undefined for a plain port without metadata key\", () => {\n    const fakePort = { __portName: \"FakePort\" };\n    expect(getPortMetadata(fakePort as any)).toBeUndefined();\n  });\n\n  it(\"returns metadata from a port with metadata key\", () => {\n    const directedPort = port<"+"unknown>()({\n      name: \"TestPort\",\n      description: \"Test description\",\n      category: \"test\",\n      tags: [\"a\", \"b\"],\n    });\n    const metadata = getPortMetadata(directedPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBe(\"Test description\");\n    expect(metadata?.category).toBe(\"test\");\n    expect(metadata?.tags).toEqual([\"a\", \"b\"]);\n  });\n});\n\n// =============================================================================\n// Verify direction values are exactly 'inbound' or 'outbound'\n// =============================================================================\n\ndescribe(\"Direction value precision\", () => {\n  it(\"inbound direction is exactly the string 'inbound'\", () => {\n    const inboundPort = port<"+"unknown>()({ name: \"In\", direction: \"inbound\" });\n    const direction = getPortDirection(inboundPort);\n    expect(direction).toBe(\"inbound\");\n    expect(direction).not.toBe(\"\");\n    expect(direction).not.toBe(\"in\");\n  });\n\n  it(\"outbound direction is exactly the string 'outbound'\", () => {\n    const outboundPort = port<"+"unknown>()({ name: \"Out\", direction: \"outbound\" });\n    const direction = getPortDirection(outboundPort);\n    expect(direction).toBe(\"outbound\");\n    expect(direction).not.toBe(\"\");\n    expect(direction).not.toBe(\"out\");\n  });\n\n  it(\"default direction is exactly 'outbound'\", () => {\n    const defaultPort = port<"+"unknown>()({ name: \"Default\" });\n    const direction = getPortDirection(defaultPort);\n    expect(direction).toBe(\"outbound\");\n  });\n});\n"},"tests/unified-adapter-validation.test.ts":{"tests":[{"id":"338","name":"createAdapter validation - missing provides throws HEX010 when provides is null"},{"id":"339","name":"createAdapter validation - missing provides throws HEX010 when provides is undefined"},{"id":"340","name":"createAdapter validation - invalid provides throws HEX011 when provides is a string (not a Port)"},{"id":"341","name":"createAdapter validation - invalid provides throws HEX011 when provides is a number"},{"id":"342","name":"createAdapter validation - invalid provides throws HEX011 when provides is an object without __portName"},{"id":"343","name":"createAdapter validation - invalid requires type throws HEX012 when requires is not an array (object)"},{"id":"344","name":"createAdapter validation - invalid requires type throws HEX012 when requires is a string"},{"id":"345","name":"createAdapter validation - invalid requires element throws HEX013 when requires contains a non-port object"},{"id":"346","name":"createAdapter validation - invalid requires element throws HEX013 when requires contains null"},{"id":"347","name":"createAdapter validation - invalid requires element throws HEX013 with correct index for invalid element"},{"id":"348","name":"createAdapter validation - invalid lifetime type throws HEX014 when lifetime is a number"},{"id":"349","name":"createAdapter validation - invalid lifetime type throws HEX014 when lifetime is a boolean"},{"id":"350","name":"createAdapter validation - invalid lifetime value throws HEX015 when lifetime is an invalid string"},{"id":"351","name":"createAdapter validation - invalid lifetime value throws HEX015 when lifetime is an empty string"},{"id":"352","name":"createAdapter validation - invalid factory throws HEX016 when factory is a string"},{"id":"353","name":"createAdapter validation - invalid factory throws HEX016 when factory is a number"},{"id":"354","name":"createAdapter validation - invalid factory throws when factory is null (validation catches it)"},{"id":"355","name":"createAdapter validation - duplicate requires throws HEX017 when requires has duplicate ports"},{"id":"356","name":"createAdapter validation - duplicate requires error message includes duplicated port name"},{"id":"357","name":"createAdapter validation - self-dependency throws HEX006 when adapter requires its own port"},{"id":"358","name":"createAdapter validation - invalid finalizer throws when finalizer is a string"},{"id":"359","name":"createAdapter validation - invalid finalizer throws when finalizer is a number"},{"id":"360","name":"createAdapter - mutual exclusion throws HEX020 when both factory and class are provided"},{"id":"361","name":"createAdapter - mutual exclusion throws HEX019 when neither factory nor class is provided"},{"id":"362","name":"createAdapter - async factory detection detects async factory and sets factoryKind to 'async'"},{"id":"363","name":"createAdapter - async factory detection enforces singleton lifetime for async factories"},{"id":"364","name":"createAdapter - async factory detection sync factory returns 'sync' factoryKind"},{"id":"365","name":"createAdapter - adapter object adapter is frozen (Object.isFrozen)"},{"id":"366","name":"createAdapter - adapter object adapter with finalizer is frozen"},{"id":"367","name":"createAdapter - adapter object adapter without finalizer does not have finalizer property"},{"id":"368","name":"createAdapter - class variant constructor injection extracts services in port order for constructor injection"}],"source":"/**\n * Tests for unified adapter validation, edge cases, and async detection.\n *\n * Covers assertValidAdapterConfig() error paths, async factory detection,\n * class-based adapter injection, and all validation error codes.\n */\n\nimport { describe, it, expect, vi } from \"vitest\";\nimport { port, createAdapter } from \"../src/index.js\";\n\n// =============================================================================\n// Test Ports\n// =============================================================================\n\ninterface Logger {\n  log(msg: string): void;\n}\n\ninterface Database {\n  query(sql: string): unknown[];\n}\n\nconst LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\nconst DatabasePort = port<"+"Database>()({ name: \"Database\" });\n\n// =============================================================================\n// Validation Error: Missing provides (HEX010)\n// =============================================================================\n\ndescribe(\"createAdapter validation - missing provides\", () => {\n  it(\"throws HEX010 when provides is null\", () => {\n    expect(() => {\n      createAdapter({\n        provides: null as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX010/);\n  });\n\n  it(\"throws HEX010 when provides is undefined\", () => {\n    expect(() => {\n      createAdapter({\n        provides: undefined as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX010/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid provides (HEX011)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid provides\", () => {\n  it(\"throws HEX011 when provides is a string (not a Port)\", () => {\n    expect(() => {\n      createAdapter({\n        provides: \"Logger\" as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX011/);\n  });\n\n  it(\"throws HEX011 when provides is a number\", () => {\n    expect(() => {\n      createAdapter({\n        provides: 42 as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX011/);\n  });\n\n  it(\"throws HEX011 when provides is an object without __portName\", () => {\n    expect(() => {\n      createAdapter({\n        provides: { name: \"Logger\" } as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX011/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid requires type (HEX012)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid requires type\", () => {\n  it(\"throws HEX012 when requires is not an array (object)\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: {} as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX012/);\n  });\n\n  it(\"throws HEX012 when requires is a string\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: \"Logger\" as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX012/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid requires element (HEX013)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid requires element\", () => {\n  it(\"throws HEX013 when requires contains a non-port object\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [{ notAPort: true }] as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX013/);\n  });\n\n  it(\"throws HEX013 when requires contains null\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [null] as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX013/);\n  });\n\n  it(\"throws HEX013 with correct index for invalid element\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [DatabasePort, \"invalid\"] as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/requires\\[1\\]/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid lifetime type (HEX014)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid lifetime type\", () => {\n  it(\"throws HEX014 when lifetime is a number\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: 42 as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX014/);\n  });\n\n  it(\"throws HEX014 when lifetime is a boolean\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: true as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX014/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid lifetime value (HEX015)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid lifetime value\", () => {\n  it(\"throws HEX015 when lifetime is an invalid string\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"request\" as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX015/);\n  });\n\n  it(\"throws HEX015 when lifetime is an empty string\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"\" as any,\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX015/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid factory (HEX016)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid factory\", () => {\n  it(\"throws HEX016 when factory is a string\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: \"not a function\" as any,\n      });\n    }).toThrow(/HEX016/);\n  });\n\n  it(\"throws HEX016 when factory is a number\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: 42 as any,\n      });\n    }).toThrow(/HEX016/);\n  });\n\n  it(\"throws when factory is null (validation catches it)\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: null as any,\n      });\n    }).toThrow();\n  });\n});\n\n// =============================================================================\n// Validation Error: Duplicate requires (HEX017)\n// =============================================================================\n\ndescribe(\"createAdapter validation - duplicate requires\", () => {\n  it(\"throws HEX017 when requires has duplicate ports\", () => {\n    expect(() => {\n      createAdapter({\n        provides: port<"+"Logger>()({ name: \"Service\" }),\n        requires: [LoggerPort, LoggerPort] as any,\n        lifetime: \"singleton\",\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX017/);\n  });\n\n  it(\"error message includes duplicated port name\", () => {\n    expect(() => {\n      createAdapter({\n        provides: port<"+"Logger>()({ name: \"Service\" }),\n        requires: [LoggerPort, LoggerPort] as any,\n        lifetime: \"singleton\",\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/Logger/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Self-dependency (HEX006)\n// =============================================================================\n\ndescribe(\"createAdapter validation - self-dependency\", () => {\n  it(\"throws HEX006 when adapter requires its own port\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        requires: [LoggerPort] as any,\n        lifetime: \"singleton\",\n        factory: () => ({ log: vi.fn() }),\n      });\n    }).toThrow(/HEX006/);\n  });\n});\n\n// =============================================================================\n// Validation Error: Invalid finalizer (HEX018)\n// =============================================================================\n\ndescribe(\"createAdapter validation - invalid finalizer\", () => {\n  it(\"throws when finalizer is a string\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: () => ({ log: vi.fn() }),\n        finalizer: \"not a function\" as any,\n      });\n    }).toThrow(/HEX018/);\n  });\n\n  it(\"throws when finalizer is a number\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: () => ({ log: vi.fn() }),\n        finalizer: 42 as any,\n      });\n    }).toThrow(/HEX018/);\n  });\n});\n\n// =============================================================================\n// Mutual Exclusion: factory + class (HEX020)\n// =============================================================================\n\ndescribe(\"createAdapter - mutual exclusion\", () => {\n  it(\"throws HEX020 when both factory and class are provided\", () => {\n    class ConsoleLogger implements Logger {\n      log() {}\n    }\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: () => ({ log: vi.fn() }),\n        class: ConsoleLogger,\n      } as any);\n    }).toThrow(/HEX020/);\n  });\n\n  it(\"throws HEX019 when neither factory nor class is provided\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n      } as any);\n    }).toThrow(/HEX019/);\n  });\n});\n\n// =============================================================================\n// Async factory detection\n// =============================================================================\n\ndescribe(\"createAdapter - async factory detection\", () => {\n  it(\"detects async factory and sets factoryKind to 'async'\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: async () => ({ log: vi.fn() }),\n    });\n    expect(adapter.factoryKind).toBe(\"async\");\n  });\n\n  it(\"enforces singleton lifetime for async factories\", () => {\n    // Even though we pass \"transient\", async forces singleton\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"transient\" as any,\n      factory: async () => ({ log: vi.fn() }),\n    });\n    expect(adapter.lifetime).toBe(\"singleton\");\n  });\n\n  it(\"sync factory returns 'sync' factoryKind\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n    });\n    expect(adapter.factoryKind).toBe(\"sync\");\n  });\n});\n\n// =============================================================================\n// Adapter object immutability\n// =============================================================================\n\ndescribe(\"createAdapter - adapter object\", () => {\n  it(\"adapter is frozen (Object.isFrozen)\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n    });\n    expect(Object.isFrozen(adapter)).toBe(true);\n  });\n\n  it(\"adapter with finalizer is frozen\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n      finalizer: vi.fn(),\n    });\n    expect(Object.isFrozen(adapter)).toBe(true);\n  });\n\n  it(\"adapter without finalizer does not have finalizer property\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n    });\n    expect(\"finalizer\" in adapter).toBe(false);\n  });\n});\n\n// =============================================================================\n// Class-based adapter: constructor injection order\n// =============================================================================\n\ndescribe(\"createAdapter - class variant constructor injection\", () => {\n  it(\"extracts services in port order for constructor injection\", () => {\n    interface ServiceA {\n      a(): string;\n    }\n    interface ServiceB {\n      b(): string;\n    }\n    const PortA = port<"+"ServiceA>()({ name: \"A\" });\n    const PortB = port<"+"ServiceB>()({ name: \"B\" });\n    const OutputPort = port<"+"{ result(): string }>()({ name: \"Output\" });\n\n    class OutputImpl {\n      constructor(\n        public svcA: ServiceA,\n        public svcB: ServiceB\n      ) {}\n      result() {\n        return `${this.svcA.a()}-${this.svcB.b()}`;\n      }\n    }\n\n    const adapter = createAdapter({\n      provides: OutputPort,\n      requires: [PortA, PortB],\n      lifetime: \"transient\",\n      class: OutputImpl,\n    });\n\n    const mockA = { a: () => \"hello\" };\n    const mockB = { b: () => \"world\" };\n    const instance = adapter.factory({ A: mockA, B: mockB }) as OutputImpl;\n\n    expect(instance.svcA).toBe(mockA);\n    expect(instance.svcB).toBe(mockB);\n    expect(instance.result()).toBe(\"hello-world\");\n  });\n});\n"},"tests/error-base.test.ts":{"tests":[{"id":"369","name":"hasMessageProperty() returns true for object with string message property"},{"id":"370","name":"hasMessageProperty() returns true for Error instances"},{"id":"371","name":"hasMessageProperty() returns false for null"},{"id":"372","name":"hasMessageProperty() returns false for undefined"},{"id":"373","name":"hasMessageProperty() returns false for string"},{"id":"374","name":"hasMessageProperty() returns false for number"},{"id":"375","name":"hasMessageProperty() returns false for object without message property"},{"id":"376","name":"hasMessageProperty() returns false for object with non-string message property"},{"id":"377","name":"hasMessageProperty() returns false for object with null message property"},{"id":"378","name":"hasMessageProperty() returns false for empty object"},{"id":"379","name":"extractErrorMessage() extracts message from Error instances"},{"id":"380","name":"extractErrorMessage() extracts message from objects with message property"},{"id":"381","name":"extractErrorMessage() converts string to string"},{"id":"382","name":"extractErrorMessage() converts number to string"},{"id":"383","name":"extractErrorMessage() converts null to string"},{"id":"384","name":"extractErrorMessage() converts undefined to string"},{"id":"385","name":"extractErrorMessage() converts boolean to string"},{"id":"386","name":"extractErrorMessage() prefers Error.message over generic message property"},{"id":"387","name":"extractErrorMessage() handles ContainerError subclass"},{"id":"388","name":"ContainerError has correct message"},{"id":"389","name":"ContainerError has correct code on programming error subclass"},{"id":"390","name":"ContainerError has correct isProgrammingError on programming error subclass"},{"id":"391","name":"ContainerError has correct isProgrammingError on runtime error subclass"},{"id":"392","name":"ContainerError is instanceof Error"},{"id":"393","name":"ContainerError is instanceof ContainerError"},{"id":"394","name":"ContainerError is instanceof its own class"},{"id":"395","name":"ContainerError name getter returns concrete class name"},{"id":"396","name":"ContainerError name getter returns different name for different subclass"},{"id":"397","name":"ContainerError has a stack trace"}],"source":"/**\n * Tests for base error classes: ContainerError, hasMessageProperty, extractErrorMessage.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  ContainerError,\n  extractErrorMessage,\n  hasMessageProperty,\n} from \"../src/index.js\";\n\n// =============================================================================\n// Concrete test subclass for testing abstract ContainerError\n// =============================================================================\n\nclass TestContainerError extends ContainerError {\n  readonly code = \"TEST_ERROR\" as const;\n  readonly isProgrammingError = true as const;\n\n  constructor(message: string) {\n    super(message);\n  }\n}\n\nclass TestRuntimeError extends ContainerError {\n  readonly code = \"RUNTIME_ERROR\" as const;\n  readonly isProgrammingError = false as const;\n\n  constructor(message: string) {\n    super(message);\n  }\n}\n\n// =============================================================================\n// hasMessageProperty()\n// =============================================================================\n\ndescribe(\"hasMessageProperty()\", () => {\n  it(\"returns true for object with string message property\", () => {\n    expect(hasMessageProperty({ message: \"hello\" })).toBe(true);\n  });\n\n  it(\"returns true for Error instances\", () => {\n    expect(hasMessageProperty(new Error(\"test\"))).toBe(true);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(hasMessageProperty(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(hasMessageProperty(undefined)).toBe(false);\n  });\n\n  it(\"returns false for string\", () => {\n    expect(hasMessageProperty(\"hello\")).toBe(false);\n  });\n\n  it(\"returns false for number\", () => {\n    expect(hasMessageProperty(42)).toBe(false);\n  });\n\n  it(\"returns false for object without message property\", () => {\n    expect(hasMessageProperty({ code: \"ERR\" })).toBe(false);\n  });\n\n  it(\"returns false for object with non-string message property\", () => {\n    expect(hasMessageProperty({ message: 42 })).toBe(false);\n  });\n\n  it(\"returns false for object with null message property\", () => {\n    expect(hasMessageProperty({ message: null })).toBe(false);\n  });\n\n  it(\"returns false for empty object\", () => {\n    expect(hasMessageProperty({})).toBe(false);\n  });\n});\n\n// =============================================================================\n// extractErrorMessage()\n// =============================================================================\n\ndescribe(\"extractErrorMessage()\", () => {\n  it(\"extracts message from Error instances\", () => {\n    expect(extractErrorMessage(new Error(\"test error\"))).toBe(\"test error\");\n  });\n\n  it(\"extracts message from objects with message property\", () => {\n    expect(extractErrorMessage({ message: \"custom error\" })).toBe(\"custom error\");\n  });\n\n  it(\"converts string to string\", () => {\n    expect(extractErrorMessage(\"string error\")).toBe(\"string error\");\n  });\n\n  it(\"converts number to string\", () => {\n    expect(extractErrorMessage(42)).toBe(\"42\");\n  });\n\n  it(\"converts null to string\", () => {\n    expect(extractErrorMessage(null)).toBe(\"null\");\n  });\n\n  it(\"converts undefined to string\", () => {\n    expect(extractErrorMessage(undefined)).toBe(\"undefined\");\n  });\n\n  it(\"converts boolean to string\", () => {\n    expect(extractErrorMessage(false)).toBe(\"false\");\n  });\n\n  it(\"prefers Error.message over generic message property\", () => {\n    const err = new Error(\"error message\");\n    expect(extractErrorMessage(err)).toBe(\"error message\");\n  });\n\n  it(\"handles ContainerError subclass\", () => {\n    const err = new TestContainerError(\"container error\");\n    expect(extractErrorMessage(err)).toBe(\"container error\");\n  });\n});\n\n// =============================================================================\n// ContainerError\n// =============================================================================\n\ndescribe(\"ContainerError\", () => {\n  it(\"has correct message\", () => {\n    const err = new TestContainerError(\"test message\");\n    expect(err.message).toBe(\"test message\");\n  });\n\n  it(\"has correct code on programming error subclass\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err.code).toBe(\"TEST_ERROR\");\n  });\n\n  it(\"has correct isProgrammingError on programming error subclass\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"has correct isProgrammingError on runtime error subclass\", () => {\n    const err = new TestRuntimeError(\"test\");\n    expect(err.isProgrammingError).toBe(false);\n  });\n\n  it(\"is instanceof Error\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err).toBeInstanceOf(Error);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"is instanceof its own class\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err).toBeInstanceOf(TestContainerError);\n  });\n\n  it(\"name getter returns concrete class name\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err.name).toBe(\"TestContainerError\");\n  });\n\n  it(\"name getter returns different name for different subclass\", () => {\n    const err = new TestRuntimeError(\"test\");\n    expect(err.name).toBe(\"TestRuntimeError\");\n  });\n\n  it(\"has a stack trace\", () => {\n    const err = new TestContainerError(\"test\");\n    expect(err.stack).toBeDefined();\n    expect(typeof err.stack).toBe(\"string\");\n  });\n});\n"},"tests/unified-adapter.test.ts":{"tests":[{"id":"398","name":"createAdapter - factory variant creates adapter with factory function"},{"id":"399","name":"createAdapter - factory variant applies default values when omitted"},{"id":"400","name":"createAdapter - factory variant preserves finalizer on adapter"},{"id":"401","name":"createAdapter - factory variant factory receives resolved dependencies"},{"id":"402","name":"createAdapter - factory variant creates adapter with explicit lifetime"},{"id":"403","name":"createAdapter - factory variant creates adapter with explicit clonable flag"},{"id":"404","name":"createAdapter - factory variant creates adapter with all properties explicit"},{"id":"405","name":"createAdapter - class variant creates adapter with class constructor"},{"id":"406","name":"createAdapter - class variant injects dependencies in requires order"},{"id":"407","name":"createAdapter - class variant applies default values for class variant"},{"id":"408","name":"createAdapter - class variant preserves finalizer on class adapter"},{"id":"409","name":"createAdapter - class variant creates class adapter with explicit lifetime"},{"id":"410","name":"createAdapter - class variant creates class adapter with explicit clonable flag"},{"id":"411","name":"createAdapter - class variant creates class adapter with all properties explicit"},{"id":"412","name":"createAdapter - error handling throws when both factory and class provided"},{"id":"413","name":"createAdapter - error handling throws when neither factory nor class provided"},{"id":"414","name":"createAdapter - error handling includes helpful hint in mutual exclusion error"},{"id":"415","name":"createAdapter - error handling includes helpful hint in missing implementation error"}],"source":"/**\n * Runtime tests for unified createAdapter API.\n *\n * These tests verify:\n * 1. Factory variant - adapter object structure, defaults, finalizer\n * 2. Class variant - adapter object structure, dependency injection order\n * 3. Error handling - mutual exclusion violations\n * 4. Default value application at runtime\n */\n\nimport { describe, expect, it, vi } from \"vitest\";\nimport { port, createAdapter } from \"../src/index.js\";\n\n// =============================================================================\n// Test Interfaces\n// =============================================================================\n\ninterface Logger {\n  log(msg: string): void;\n}\n\ninterface Database {\n  query(sql: string): unknown[];\n}\n\ninterface UserService {\n  getUser(id: string): { id: string; name: string };\n}\n\n// =============================================================================\n// Test Ports\n// =============================================================================\n\nconst LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\nconst DatabasePort = port<"+"Database>()({ name: \"Database\" });\nconst UserServicePort = port<"+"UserService>()({ name: \"UserService\" });\n\n// =============================================================================\n// Test Classes\n// =============================================================================\n\nclass ConsoleLogger implements Logger {\n  log(_msg: string) {\n    // Mock implementation\n  }\n}\n\nclass UserServiceImpl implements UserService {\n  constructor(\n    public logger: Logger,\n    public database: Database\n  ) {}\n\n  getUser(id: string) {\n    this.logger.log(`Getting user ${id}`);\n    const result = this.database.query(`SELECT * FROM users WHERE id = '${id}'`);\n    return result[0] as { id: string; name: string };\n  }\n}\n\n// =============================================================================\n// Factory Variant Tests\n// =============================================================================\n\ndescribe(\"createAdapter - factory variant\", () => {\n  it(\"creates adapter with factory function\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      requires: [],\n      lifetime: \"singleton\",\n      factory: () => ({ log: vi.fn() }),\n    });\n\n    expect(adapter.provides).toBe(LoggerPort);\n    expect(adapter.requires).toEqual([]);\n    expect(adapter.lifetime).toBe(\"singleton\");\n    expect(adapter.factoryKind).toBe(\"sync\");\n    expect(adapter.clonable).toBe(false);\n  });\n\n  it(\"applies default values when omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n    });\n\n    expect(adapter.requires).toEqual([]);\n    expect(adapter.lifetime).toBe(\"singleton\");\n    expect(adapter.clonable).toBe(false);\n  });\n\n  it(\"preserves finalizer on adapter\", () => {\n    const finalizer = vi.fn();\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: vi.fn() }),\n      finalizer,\n    });\n\n    expect(adapter.finalizer).toBe(finalizer);\n  });\n\n  it(\"factory receives resolved dependencies\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort, DatabasePort],\n      lifetime: \"scoped\",\n      factory: deps => {\n        // Verify deps shape at runtime\n        expect(deps).toHaveProperty(\"Logger\");\n        expect(deps).toHaveProperty(\"Database\");\n        return { getUser: vi.fn() };\n      },\n    });\n\n    // Call factory with mock deps to verify\n    const mockDeps = { Logger: { log: vi.fn() }, Database: { query: vi.fn() } };\n    adapter.factory(mockDeps);\n  });\n\n  it(\"creates adapter with explicit lifetime\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort],\n      lifetime: \"transient\",\n      factory: deps => ({\n        getUser: () => {\n          deps.Logger.log(\"Getting user\");\n          return { id: \"1\", name: \"Alice\" };\n        },\n      }),\n    });\n\n    expect(adapter.lifetime).toBe(\"transient\");\n    expect(adapter.requires).toEqual([LoggerPort]);\n  });\n\n  it(\"creates adapter with explicit clonable flag\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      clonable: true,\n      factory: () => ({ log: vi.fn() }),\n    });\n\n    expect(adapter.clonable).toBe(true);\n    expect(adapter.lifetime).toBe(\"singleton\"); // default\n    expect(adapter.requires).toEqual([]); // default\n  });\n\n  it(\"creates adapter with all properties explicit\", () => {\n    const finalizer = vi.fn();\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort, DatabasePort],\n      lifetime: \"scoped\",\n      clonable: true,\n      factory: deps => ({\n        getUser: () => {\n          deps.Logger.log(\"Getting user\");\n          return { id: \"1\", name: \"Alice\" };\n        },\n      }),\n      finalizer,\n    });\n\n    expect(adapter.provides).toBe(UserServicePort);\n    expect(adapter.requires).toEqual([LoggerPort, DatabasePort]);\n    expect(adapter.lifetime).toBe(\"scoped\");\n    expect(adapter.clonable).toBe(true);\n    expect(adapter.finalizer).toBe(finalizer);\n  });\n});\n\n// =============================================================================\n// Class Variant Tests\n// =============================================================================\n\ndescribe(\"createAdapter - class variant\", () => {\n  it(\"creates adapter with class constructor\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      requires: [],\n      lifetime: \"singleton\",\n      class: ConsoleLogger,\n    });\n\n    expect(adapter.provides).toBe(LoggerPort);\n    expect(adapter.factoryKind).toBe(\"sync\");\n\n    // Factory should instantiate class\n    const instance = adapter.factory({});\n    expect(instance).toBeInstanceOf(ConsoleLogger);\n  });\n\n  it(\"injects dependencies in requires order\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort, DatabasePort],\n      lifetime: \"scoped\",\n      class: UserServiceImpl,\n    });\n\n    const mockLogger = { log: vi.fn() };\n    const mockDatabase = { query: vi.fn(() => [{ id: \"1\", name: \"Alice\" }]) };\n    const deps = { Logger: mockLogger, Database: mockDatabase };\n\n    const instance = adapter.factory(deps) as UserServiceImpl;\n    expect(instance).toBeInstanceOf(UserServiceImpl);\n    expect(instance.logger).toBe(mockLogger);\n    expect(instance.database).toBe(mockDatabase);\n  });\n\n  it(\"applies default values for class variant\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n    });\n\n    expect(adapter.requires).toEqual([]);\n    expect(adapter.lifetime).toBe(\"singleton\");\n    expect(adapter.clonable).toBe(false);\n  });\n\n  it(\"preserves finalizer on class adapter\", () => {\n    const finalizer = vi.fn();\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n      finalizer,\n    });\n\n    expect(adapter.finalizer).toBe(finalizer);\n  });\n\n  it(\"creates class adapter with explicit lifetime\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort, DatabasePort],\n      lifetime: \"transient\",\n      class: UserServiceImpl,\n    });\n\n    expect(adapter.lifetime).toBe(\"transient\");\n    expect(adapter.requires).toEqual([LoggerPort, DatabasePort]);\n  });\n\n  it(\"creates class adapter with explicit clonable flag\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      clonable: true,\n      class: ConsoleLogger,\n    });\n\n    expect(adapter.clonable).toBe(true);\n    expect(adapter.lifetime).toBe(\"singleton\"); // default\n    expect(adapter.requires).toEqual([]); // default\n  });\n\n  it(\"creates class adapter with all properties explicit\", () => {\n    const finalizer = vi.fn();\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort, DatabasePort],\n      lifetime: \"scoped\",\n      clonable: false,\n      class: UserServiceImpl,\n      finalizer,\n    });\n\n    expect(adapter.provides).toBe(UserServicePort);\n    expect(adapter.requires).toEqual([LoggerPort, DatabasePort]);\n    expect(adapter.lifetime).toBe(\"scoped\");\n    expect(adapter.clonable).toBe(false);\n    expect(adapter.finalizer).toBe(finalizer);\n  });\n});\n\n// =============================================================================\n// Error Handling Tests\n// =============================================================================\n\ndescribe(\"createAdapter - error handling\", () => {\n  it(\"throws when both factory and class provided\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: () => ({ log: vi.fn() }),\n        class: ConsoleLogger,\n      } as never);\n    }).toThrow(/HEX020.*factory.*class/i);\n  });\n\n  it(\"throws when neither factory nor class provided\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n      } as never);\n    }).toThrow(/HEX019.*factory.*class/i);\n  });\n\n  it(\"includes helpful hint in mutual exclusion error\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n        factory: () => ({ log: vi.fn() }),\n        class: ConsoleLogger,\n      } as never);\n    }).toThrow(/custom instantiation logic|constructor injection/i);\n  });\n\n  it(\"includes helpful hint in missing implementation error\", () => {\n    expect(() => {\n      createAdapter({\n        provides: LoggerPort,\n      } as never);\n    }).toThrow(/factory function|class constructor/i);\n  });\n});\n"},"tests/adapter-guards.test.ts":{"tests":[{"id":"416","name":"isLifetime() returns true for 'singleton'"},{"id":"417","name":"isLifetime() returns true for 'scoped'"},{"id":"418","name":"isLifetime() returns true for 'transient'"},{"id":"419","name":"isLifetime() returns false for invalid string"},{"id":"420","name":"isLifetime() returns false for empty string"},{"id":"421","name":"isLifetime() returns false for number"},{"id":"422","name":"isLifetime() returns false for null"},{"id":"423","name":"isLifetime() returns false for undefined"},{"id":"424","name":"isLifetime() returns false for boolean"},{"id":"425","name":"isLifetime() returns false for object"},{"id":"426","name":"isFactoryKind() returns true for 'sync'"},{"id":"427","name":"isFactoryKind() returns true for 'async'"},{"id":"428","name":"isFactoryKind() returns false for invalid string"},{"id":"429","name":"isFactoryKind() returns false for empty string"},{"id":"430","name":"isFactoryKind() returns false for number"},{"id":"431","name":"isFactoryKind() returns false for null"},{"id":"432","name":"isFactoryKind() returns false for undefined"},{"id":"433","name":"isFactoryKind() returns false for boolean"},{"id":"434","name":"isFactoryKind() returns false for object"},{"id":"435","name":"isAdapter() returns true for a valid adapter created by createAdapter"},{"id":"436","name":"isAdapter() returns true for a valid adapter with all fields explicit"},{"id":"437","name":"isAdapter() returns false for null"},{"id":"438","name":"isAdapter() returns false for undefined"},{"id":"439","name":"isAdapter() returns false for a string"},{"id":"440","name":"isAdapter() returns false for a number"},{"id":"441","name":"isAdapter() returns false for an empty object"},{"id":"442","name":"isAdapter() returns false when 'provides' is missing"},{"id":"443","name":"isAdapter() returns false when 'provides' is not a port (no __portName)"},{"id":"444","name":"isAdapter() returns false when 'provides' is null"},{"id":"445","name":"isAdapter() returns false when 'requires' is not an array"},{"id":"446","name":"isAdapter() returns false when 'requires' contains non-port element"},{"id":"447","name":"isAdapter() returns false when 'lifetime' is invalid"},{"id":"448","name":"isAdapter() returns false when 'lifetime' is missing"},{"id":"449","name":"isAdapter() returns false when 'factoryKind' is invalid"},{"id":"450","name":"isAdapter() returns false when 'factoryKind' is missing"},{"id":"451","name":"isAdapter() returns false when 'factory' is not a function"},{"id":"452","name":"isAdapter() returns false when 'factory' is missing"},{"id":"453","name":"isAdapter() returns false when 'clonable' is not a boolean"},{"id":"454","name":"isAdapter() returns false when 'clonable' is missing"},{"id":"455","name":"isAdapter() returns true when 'requires' has valid port elements"},{"id":"456","name":"isAdapter() returns false when provides __portName is not a string"}],"source":"/**\n * Comprehensive tests for adapter type guards.\n *\n * Tests isLifetime(), isFactoryKind(), and isAdapter() with valid/invalid inputs.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { isAdapter, isLifetime, isFactoryKind, port, createAdapter } from \"../src/index.js\";\n\n// =============================================================================\n// isLifetime()\n// =============================================================================\n\ndescribe(\"isLifetime()\", () => {\n  it(\"returns true for 'singleton'\", () => {\n    expect(isLifetime(\"singleton\")).toBe(true);\n  });\n\n  it(\"returns true for 'scoped'\", () => {\n    expect(isLifetime(\"scoped\")).toBe(true);\n  });\n\n  it(\"returns true for 'transient'\", () => {\n    expect(isLifetime(\"transient\")).toBe(true);\n  });\n\n  it(\"returns false for invalid string\", () => {\n    expect(isLifetime(\"request\")).toBe(false);\n  });\n\n  it(\"returns false for empty string\", () => {\n    expect(isLifetime(\"\")).toBe(false);\n  });\n\n  it(\"returns false for number\", () => {\n    expect(isLifetime(42)).toBe(false);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(isLifetime(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(isLifetime(undefined)).toBe(false);\n  });\n\n  it(\"returns false for boolean\", () => {\n    expect(isLifetime(true)).toBe(false);\n  });\n\n  it(\"returns false for object\", () => {\n    expect(isLifetime({})).toBe(false);\n  });\n});\n\n// =============================================================================\n// isFactoryKind()\n// =============================================================================\n\ndescribe(\"isFactoryKind()\", () => {\n  it(\"returns true for 'sync'\", () => {\n    expect(isFactoryKind(\"sync\")).toBe(true);\n  });\n\n  it(\"returns true for 'async'\", () => {\n    expect(isFactoryKind(\"async\")).toBe(true);\n  });\n\n  it(\"returns false for invalid string\", () => {\n    expect(isFactoryKind(\"promise\")).toBe(false);\n  });\n\n  it(\"returns false for empty string\", () => {\n    expect(isFactoryKind(\"\")).toBe(false);\n  });\n\n  it(\"returns false for number\", () => {\n    expect(isFactoryKind(42)).toBe(false);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(isFactoryKind(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(isFactoryKind(undefined)).toBe(false);\n  });\n\n  it(\"returns false for boolean\", () => {\n    expect(isFactoryKind(true)).toBe(false);\n  });\n\n  it(\"returns false for object\", () => {\n    expect(isFactoryKind({})).toBe(false);\n  });\n});\n\n// =============================================================================\n// isAdapter()\n// =============================================================================\n\ndescribe(\"isAdapter()\", () => {\n  const LoggerPort = port<"+"{ log(msg: string): void }>()({ name: \"Logger\" });\n  const DatabasePort = port<"+"{ query(): void }>()({ name: \"Database\" });\n\n  it(\"returns true for a valid adapter created by createAdapter\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n    expect(isAdapter(adapter)).toBe(true);\n  });\n\n  it(\"returns true for a valid adapter with all fields explicit\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      requires: [DatabasePort],\n      lifetime: \"scoped\",\n      clonable: true,\n      factory: () => ({ log: () => {} }),\n    });\n    expect(isAdapter(adapter)).toBe(true);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(isAdapter(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(isAdapter(undefined)).toBe(false);\n  });\n\n  it(\"returns false for a string\", () => {\n    expect(isAdapter(\"adapter\")).toBe(false);\n  });\n\n  it(\"returns false for a number\", () => {\n    expect(isAdapter(42)).toBe(false);\n  });\n\n  it(\"returns false for an empty object\", () => {\n    expect(isAdapter({})).toBe(false);\n  });\n\n  it(\"returns false when 'provides' is missing\", () => {\n    expect(\n      isAdapter({\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'provides' is not a port (no __portName)\", () => {\n    expect(\n      isAdapter({\n        provides: { name: \"Logger\" }, // missing __portName\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'provides' is null\", () => {\n    expect(\n      isAdapter({\n        provides: null,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'requires' is not an array\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: \"not-an-array\",\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'requires' contains non-port element\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [{ notAPort: true }],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'lifetime' is invalid\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"request\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'lifetime' is missing\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'factoryKind' is invalid\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"promise\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'factoryKind' is missing\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'factory' is not a function\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: \"not a function\",\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'factory' is missing\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'clonable' is not a boolean\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: \"yes\",\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when 'clonable' is missing\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns true when 'requires' has valid port elements\", () => {\n    expect(\n      isAdapter({\n        provides: LoggerPort,\n        requires: [DatabasePort],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(true);\n  });\n\n  it(\"returns false when provides __portName is not a string\", () => {\n    expect(\n      isAdapter({\n        provides: { __portName: 42 },\n        requires: [],\n        lifetime: \"singleton\",\n        factoryKind: \"sync\",\n        factory: () => {},\n        clonable: false,\n      })\n    ).toBe(false);\n  });\n});\n"},"tests/resolution-error.test.ts":{"tests":[{"id":"457","name":"isResolutionError() returns true for CircularDependencyError"},{"id":"458","name":"isResolutionError() returns true for FactoryError"},{"id":"459","name":"isResolutionError() returns true for DisposedScopeError"},{"id":"460","name":"isResolutionError() returns true for ScopeRequiredError"},{"id":"461","name":"isResolutionError() returns true for AsyncFactoryError"},{"id":"462","name":"isResolutionError() returns true for AsyncInitializationRequiredError"},{"id":"463","name":"isResolutionError() returns true for NonClonableForkedError"},{"id":"464","name":"isResolutionError() returns false for a regular Error"},{"id":"465","name":"isResolutionError() returns false for a TypeError"},{"id":"466","name":"isResolutionError() returns false for a string"},{"id":"467","name":"isResolutionError() returns false for null"},{"id":"468","name":"isResolutionError() returns false for undefined"},{"id":"469","name":"isResolutionError() returns false for a plain object"},{"id":"470","name":"isResolutionError() returns false for a number"},{"id":"471","name":"toResolutionError() returns the error for CircularDependencyError"},{"id":"472","name":"toResolutionError() returns the error for FactoryError"},{"id":"473","name":"toResolutionError() returns null for a regular Error"},{"id":"474","name":"toResolutionError() returns null for a string"},{"id":"475","name":"toResolutionError() returns null for null"},{"id":"476","name":"toResolutionError() returns null for undefined"},{"id":"477","name":"toResolutionError() returns null for a plain object"},{"id":"478","name":"toResolutionError() returns null for a number"}],"source":"/**\n * Tests for resolution error type guards: isResolutionError() and toResolutionError().\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  isResolutionError,\n  toResolutionError,\n  CircularDependencyError,\n  FactoryError,\n  DisposedScopeError,\n  ScopeRequiredError,\n  AsyncFactoryError,\n  AsyncInitializationRequiredError,\n  NonClonableForkedError,\n} from \"../src/index.js\";\n\n// =============================================================================\n// isResolutionError()\n// =============================================================================\n\ndescribe(\"isResolutionError()\", () => {\n  it(\"returns true for CircularDependencyError\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for FactoryError\", () => {\n    const err = new FactoryError(\"X\", new Error(\"failed\"));\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for DisposedScopeError\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for ScopeRequiredError\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for AsyncFactoryError\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"failed\"));\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for AsyncInitializationRequiredError\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns true for NonClonableForkedError\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(isResolutionError(err)).toBe(true);\n  });\n\n  it(\"returns false for a regular Error\", () => {\n    expect(isResolutionError(new Error(\"test\"))).toBe(false);\n  });\n\n  it(\"returns false for a TypeError\", () => {\n    expect(isResolutionError(new TypeError(\"test\"))).toBe(false);\n  });\n\n  it(\"returns false for a string\", () => {\n    expect(isResolutionError(\"error\")).toBe(false);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(isResolutionError(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(isResolutionError(undefined)).toBe(false);\n  });\n\n  it(\"returns false for a plain object\", () => {\n    expect(isResolutionError({ code: \"CIRCULAR_DEPENDENCY\" })).toBe(false);\n  });\n\n  it(\"returns false for a number\", () => {\n    expect(isResolutionError(42)).toBe(false);\n  });\n});\n\n// =============================================================================\n// toResolutionError()\n// =============================================================================\n\ndescribe(\"toResolutionError()\", () => {\n  it(\"returns the error for CircularDependencyError\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    const result = toResolutionError(err);\n    expect(result).toBe(err);\n  });\n\n  it(\"returns the error for FactoryError\", () => {\n    const err = new FactoryError(\"X\", new Error(\"failed\"));\n    const result = toResolutionError(err);\n    expect(result).toBe(err);\n  });\n\n  it(\"returns null for a regular Error\", () => {\n    expect(toResolutionError(new Error(\"test\"))).toBeNull();\n  });\n\n  it(\"returns null for a string\", () => {\n    expect(toResolutionError(\"error\")).toBeNull();\n  });\n\n  it(\"returns null for null\", () => {\n    expect(toResolutionError(null)).toBeNull();\n  });\n\n  it(\"returns null for undefined\", () => {\n    expect(toResolutionError(undefined)).toBeNull();\n  });\n\n  it(\"returns null for a plain object\", () => {\n    expect(toResolutionError({ code: \"TEST\" })).toBeNull();\n  });\n\n  it(\"returns null for a number\", () => {\n    expect(toResolutionError(42)).toBeNull();\n  });\n});\n"},"tests/context/variables.test.ts":{"tests":[{"id":"479","name":"Context Variables createContextVariable creates a context variable with unique symbol ID"},{"id":"480","name":"Context Variables createContextVariable creates context variable without default value"},{"id":"481","name":"Context Variables createContextVariable creates context variable with default value"},{"id":"482","name":"Context Variables createContextVariable preserves default value type"},{"id":"483","name":"Context Variables createContextVariable symbol description includes variable name"},{"id":"484","name":"Context Variables withContext returns object with variable and value"},{"id":"485","name":"Context Variables withContext preserves value type"},{"id":"486","name":"Context Variables withContext works with complex types"},{"id":"487","name":"Context Variables getContext retrieves value from context map"},{"id":"488","name":"Context Variables getContext returns undefined when variable not in context"},{"id":"489","name":"Context Variables getContext returns default value when variable not in context"},{"id":"490","name":"Context Variables getContext prefers context value over default value"},{"id":"491","name":"Context Variables getContext works with multiple variables in same context"},{"id":"492","name":"Context Variables getContext handles falsy values correctly"},{"id":"493","name":"Context Variables Type inference infers correct types without explicit annotations"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { createContextVariable, withContext, getContext } from \"../../src/context/index.js\";\n\ndescribe(\"Context Variables\", () => {\n  describe(\"createContextVariable\", () => {\n    it(\"creates a context variable with unique symbol ID\", () => {\n      const var1 = createContextVariable<"+"string>(\"userId\");\n      const var2 = createContextVariable<"+"string>(\"userId\");\n\n      // Same name, but different symbols\n      expect(var1.id).not.toBe(var2.id);\n      expect(typeof var1.id).toBe(\"symbol\");\n      expect(typeof var2.id).toBe(\"symbol\");\n    });\n\n    it(\"creates context variable without default value\", () => {\n      const variable = createContextVariable<"+"number>(\"count\");\n\n      expect(variable.defaultValue).toBeUndefined();\n      expect(typeof variable.id).toBe(\"symbol\");\n    });\n\n    it(\"creates context variable with default value\", () => {\n      const variable = createContextVariable(\"retryCount\", 3);\n\n      expect(variable.defaultValue).toBe(3);\n      expect(typeof variable.id).toBe(\"symbol\");\n    });\n\n    it(\"preserves default value type\", () => {\n      const stringVar = createContextVariable(\"name\", \"default\");\n      const numberVar = createContextVariable(\"count\", 0);\n      const objectVar = createContextVariable(\"config\", { enabled: true });\n\n      expect(stringVar.defaultValue).toBe(\"default\");\n      expect(numberVar.defaultValue).toBe(0);\n      expect(objectVar.defaultValue).toEqual({ enabled: true });\n    });\n\n    it(\"symbol description includes variable name\", () => {\n      const variable = createContextVariable(\"requestId\");\n\n      // Symbol description is accessible for debugging\n      expect(variable.id.description).toBe(\"requestId\");\n    });\n  });\n\n  describe(\"withContext\", () => {\n    it(\"returns object with variable and value\", () => {\n      const userId = createContextVariable<"+"string>(\"userId\");\n      const entry = withContext(userId, \"user-123\");\n\n      expect(entry.variable).toBe(userId);\n      expect(entry.value).toBe(\"user-123\");\n    });\n\n    it(\"preserves value type\", () => {\n      const timeout = createContextVariable<"+"number>(\"timeout\");\n      const entry = withContext(timeout, 5000);\n\n      expect(entry.value).toBe(5000);\n      expect(typeof entry.value).toBe(\"number\");\n    });\n\n    it(\"works with complex types\", () => {\n      interface Config {\n        retries: number;\n        timeout: number;\n      }\n\n      const config = createContextVariable<"+"Config>(\"config\");\n      const value = { retries: 3, timeout: 5000 };\n      const entry = withContext(config, value);\n\n      expect(entry.value).toEqual(value);\n      expect(entry.variable).toBe(config);\n    });\n  });\n\n  describe(\"getContext\", () => {\n    it(\"retrieves value from context map\", () => {\n      const userId = createContextVariable<"+"string>(\"userId\");\n      const context = new Map<"+"symbol, unknown>([[userId.id, \"user-123\"]]);\n\n      const value = getContext(context, userId);\n\n      expect(value).toBe(\"user-123\");\n    });\n\n    it(\"returns undefined when variable not in context\", () => {\n      const userId = createContextVariable<"+"string>(\"userId\");\n      const context = new Map<"+"symbol, unknown>();\n\n      const value = getContext(context, userId);\n\n      expect(value).toBeUndefined();\n    });\n\n    it(\"returns default value when variable not in context\", () => {\n      const retryCount = createContextVariable(\"retryCount\", 3);\n      const context = new Map<"+"symbol, unknown>();\n\n      const value = getContext(context, retryCount);\n\n      expect(value).toBe(3);\n    });\n\n    it(\"prefers context value over default value\", () => {\n      const retryCount = createContextVariable(\"retryCount\", 3);\n      const context = new Map<"+"symbol, unknown>([[retryCount.id, 10]]);\n\n      const value = getContext(context, retryCount);\n\n      expect(value).toBe(10);\n    });\n\n    it(\"works with multiple variables in same context\", () => {\n      const userId = createContextVariable<"+"string>(\"userId\");\n      const requestId = createContextVariable<"+"string>(\"requestId\");\n      const timeout = createContextVariable<"+"number>(\"timeout\");\n\n      const context = new Map<"+"symbol, unknown>([\n        [userId.id, \"user-123\"],\n        [requestId.id, \"req-456\"],\n        [timeout.id, 5000],\n      ]);\n\n      expect(getContext(context, userId)).toBe(\"user-123\");\n      expect(getContext(context, requestId)).toBe(\"req-456\");\n      expect(getContext(context, timeout)).toBe(5000);\n    });\n\n    it(\"handles falsy values correctly\", () => {\n      const enabled = createContextVariable<"+"boolean>(\"enabled\");\n      const count = createContextVariable<"+"number>(\"count\");\n      const name = createContextVariable<"+"string>(\"name\");\n\n      const context = new Map<"+"symbol, unknown>([\n        [enabled.id, false],\n        [count.id, 0],\n        [name.id, \"\"],\n      ]);\n\n      expect(getContext(context, enabled)).toBe(false);\n      expect(getContext(context, count)).toBe(0);\n      expect(getContext(context, name)).toBe(\"\");\n    });\n  });\n\n  describe(\"Type inference\", () => {\n    it(\"infers correct types without explicit annotations\", () => {\n      // Type inference test - no explicit type annotations needed\n      const userId = createContextVariable(\"userId\", \"default-id\");\n      const timeout = createContextVariable(\"timeout\", 1000);\n\n      // These should compile without errors due to proper type inference\n      const _userEntry = withContext(userId, \"new-id\");\n      const _timeoutEntry = withContext(timeout, 5000);\n\n      const context = new Map<"+"symbol, unknown>([\n        [userId.id, \"user-123\"],\n        [timeout.id, 3000],\n      ]);\n\n      const user = getContext(context, userId);\n      const time = getContext(context, timeout);\n\n      // Runtime verification of inferred types\n      expect(typeof user).toBe(\"string\");\n      expect(typeof time).toBe(\"number\");\n    });\n  });\n});\n"},"tests/lazy-port.test.ts":{"tests":[{"id":"494","name":"lazyPort() creates a lazy port with 'Lazy' prefix in name"},{"id":"495","name":"lazyPort() creates a frozen lazy port object"},{"id":"496","name":"lazyPort() creates different lazy ports for different source ports"},{"id":"497","name":"isLazyPort() returns true for a lazy port"},{"id":"498","name":"isLazyPort() returns false for a regular port"},{"id":"499","name":"isLazyPort() returns false for another regular port"},{"id":"500","name":"getOriginalPort() extracts the original port from a lazy port"},{"id":"501","name":"getOriginalPort() extracts correct original port for different lazy ports"},{"id":"502","name":"getOriginalPort() throws HEX019 for an object without original port symbol"}],"source":"/**\n * Tests for lazy port functionality.\n *\n * Tests lazyPort(), isLazyPort(), and getOriginalPort().\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { port, lazyPort, isLazyPort, getOriginalPort } from \"../src/index.js\";\n\n// =============================================================================\n// Test Ports\n// =============================================================================\n\ninterface UserService {\n  getUser(id: string): { id: string; name: string };\n}\n\ninterface NotificationService {\n  send(userId: string, message: string): void;\n}\n\nconst UserServicePort = port<"+"UserService>()({ name: \"UserService\" });\nconst NotificationServicePort = port<"+"NotificationService>()({ name: \"NotificationService\" });\n\n// =============================================================================\n// lazyPort()\n// =============================================================================\n\ndescribe(\"lazyPort()\", () => {\n  it(\"creates a lazy port with 'Lazy' prefix in name\", () => {\n    const lazy = lazyPort(UserServicePort);\n    expect(lazy.__portName).toBe(\"LazyUserService\");\n  });\n\n  it(\"creates a frozen lazy port object\", () => {\n    const lazy = lazyPort(UserServicePort);\n    expect(Object.isFrozen(lazy)).toBe(true);\n  });\n\n  it(\"creates different lazy ports for different source ports\", () => {\n    const lazy1 = lazyPort(UserServicePort);\n    const lazy2 = lazyPort(NotificationServicePort);\n    expect(lazy1.__portName).toBe(\"LazyUserService\");\n    expect(lazy2.__portName).toBe(\"LazyNotificationService\");\n  });\n});\n\n// =============================================================================\n// isLazyPort()\n// =============================================================================\n\ndescribe(\"isLazyPort()\", () => {\n  it(\"returns true for a lazy port\", () => {\n    const lazy = lazyPort(UserServicePort);\n    expect(isLazyPort(lazy)).toBe(true);\n  });\n\n  it(\"returns false for a regular port\", () => {\n    expect(isLazyPort(UserServicePort)).toBe(false);\n  });\n\n  it(\"returns false for another regular port\", () => {\n    expect(isLazyPort(NotificationServicePort)).toBe(false);\n  });\n});\n\n// =============================================================================\n// getOriginalPort()\n// =============================================================================\n\ndescribe(\"getOriginalPort()\", () => {\n  it(\"extracts the original port from a lazy port\", () => {\n    const lazy = lazyPort(UserServicePort);\n    const original = getOriginalPort(lazy);\n    expect(original).toBe(UserServicePort);\n  });\n\n  it(\"extracts correct original port for different lazy ports\", () => {\n    const lazy1 = lazyPort(UserServicePort);\n    const lazy2 = lazyPort(NotificationServicePort);\n    expect(getOriginalPort(lazy1)).toBe(UserServicePort);\n    expect(getOriginalPort(lazy2)).toBe(NotificationServicePort);\n  });\n\n  it(\"throws HEX019 for an object without original port symbol\", () => {\n    // Create a fake \"lazy port\" missing the original port symbol\n    const fake = Object.freeze({\n      __portName: \"LazyFake\",\n      [Symbol.for(\"@hex-di/core/LazyPort\")]: true,\n    });\n\n    expect(() => {\n      getOriginalPort(fake as any);\n    }).toThrow(/HEX019/);\n  });\n});\n"},"tests/port-category.test.ts":{"tests":[{"id":"503","name":"port() with category preserves runtime metadata stores category in metadata"},{"id":"504","name":"port() with category preserves runtime metadata stores undefined category when not specified"},{"id":"505","name":"createLibraryInspectorPort sets correct runtime metadata"},{"id":"506","name":"createLibraryInspectorPort port name is correct"}],"source":"/**\n * Runtime Tests for Port Category Tracking\n *\n * Verifies that category metadata flows through the port factory\n * and is accessible via getPortMetadata at runtime.\n *\n * @packageDocumentation\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { port, getPortMetadata } from \"../src/index.js\";\nimport { createLibraryInspectorPort } from \"../src/inspection/library-inspector-types.js\";\n\n// =============================================================================\n// Test Interfaces\n// =============================================================================\n\ninterface Logger {\n  log(msg: string): void;\n}\n\n// =============================================================================\n// Runtime metadata\n// =============================================================================\n\ndescribe(\"port() with category preserves runtime metadata\", () => {\n  it(\"stores category in metadata\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\", category: \"domain\" });\n    const meta = getPortMetadata(LoggerPort);\n    expect(meta).toBeDefined();\n    expect(meta?.category).toBe(\"domain\");\n  });\n\n  it(\"stores undefined category when not specified\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n    const meta = getPortMetadata(LoggerPort);\n    expect(meta).toBeDefined();\n    expect(meta?.category).toBeUndefined();\n  });\n});\n\ndescribe(\"createLibraryInspectorPort\", () => {\n  it(\"sets correct runtime metadata\", () => {\n    const FlowPort = createLibraryInspectorPort({\n      name: \"FlowInspector\",\n      description: \"Flow library inspection\",\n      tags: [\"flow\"],\n    });\n\n    const meta = getPortMetadata(FlowPort);\n    expect(meta).toBeDefined();\n    expect(meta?.category).toBe(\"library-inspector\");\n    expect(meta?.description).toBe(\"Flow library inspection\");\n    expect(meta?.tags).toEqual([\"flow\"]);\n  });\n\n  it(\"port name is correct\", () => {\n    const FlowPort = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    expect(FlowPort.__portName).toBe(\"FlowInspector\");\n  });\n});\n"},"tests/tracing-types.test.ts":{"tests":[{"id":"507","name":"hasTracingAccess() returns true for an object with the tracing access symbol"},{"id":"508","name":"hasTracingAccess() returns false for null"},{"id":"509","name":"hasTracingAccess() returns false for undefined"},{"id":"510","name":"hasTracingAccess() returns false for a string"},{"id":"511","name":"hasTracingAccess() returns false for a number"},{"id":"512","name":"hasTracingAccess() returns false for an empty object (missing tracing symbol)"},{"id":"513","name":"hasTracingAccess() returns false for an object with a different symbol"},{"id":"514","name":"hasTracingAccess() returns true when tracing symbol is present even with other properties"},{"id":"515","name":"DEFAULT_RETENTION_POLICY has maxTraces set to 1000"},{"id":"516","name":"DEFAULT_RETENTION_POLICY has maxPinnedTraces set to 100"},{"id":"517","name":"DEFAULT_RETENTION_POLICY has slowThresholdMs set to 100"},{"id":"518","name":"DEFAULT_RETENTION_POLICY has expiryMs set to 300000"}],"source":"/**\n * Tests for tracing types: hasTracingAccess() and DEFAULT_RETENTION_POLICY.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { hasTracingAccess, DEFAULT_RETENTION_POLICY } from \"../src/index.js\";\n\n// =============================================================================\n// hasTracingAccess()\n// =============================================================================\n\ndescribe(\"hasTracingAccess()\", () => {\n  const TRACING_SYMBOL = Symbol.for(\"hex-di/tracing-access\");\n\n  it(\"returns true for an object with the tracing access symbol\", () => {\n    const container = {\n      [TRACING_SYMBOL]: {\n        getTraces: () => [],\n        getStats: () => ({}),\n        pause: () => {},\n        resume: () => {},\n        clear: () => {},\n        subscribe: () => () => {},\n        isPaused: () => false,\n        pin: () => {},\n        unpin: () => {},\n      },\n    };\n    expect(hasTracingAccess(container)).toBe(true);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(hasTracingAccess(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(hasTracingAccess(undefined)).toBe(false);\n  });\n\n  it(\"returns false for a string\", () => {\n    expect(hasTracingAccess(\"container\")).toBe(false);\n  });\n\n  it(\"returns false for a number\", () => {\n    expect(hasTracingAccess(42)).toBe(false);\n  });\n\n  it(\"returns false for an empty object (missing tracing symbol)\", () => {\n    expect(hasTracingAccess({})).toBe(false);\n  });\n\n  it(\"returns false for an object with a different symbol\", () => {\n    const container = {\n      [Symbol.for(\"other-symbol\")]: {},\n    };\n    expect(hasTracingAccess(container)).toBe(false);\n  });\n\n  it(\"returns true when tracing symbol is present even with other properties\", () => {\n    const container = {\n      [TRACING_SYMBOL]: {},\n      resolve: () => {},\n      createScope: () => {},\n    };\n    expect(hasTracingAccess(container)).toBe(true);\n  });\n});\n\n// =============================================================================\n// DEFAULT_RETENTION_POLICY\n// =============================================================================\n\ndescribe(\"DEFAULT_RETENTION_POLICY\", () => {\n  it(\"has maxTraces set to 1000\", () => {\n    expect(DEFAULT_RETENTION_POLICY.maxTraces).toBe(1000);\n  });\n\n  it(\"has maxPinnedTraces set to 100\", () => {\n    expect(DEFAULT_RETENTION_POLICY.maxPinnedTraces).toBe(100);\n  });\n\n  it(\"has slowThresholdMs set to 100\", () => {\n    expect(DEFAULT_RETENTION_POLICY.slowThresholdMs).toBe(100);\n  });\n\n  it(\"has expiryMs set to 300000\", () => {\n    expect(DEFAULT_RETENTION_POLICY.expiryMs).toBe(300000);\n  });\n});\n"},"tests/correlation.test.ts":{"tests":[{"id":"519","name":"generateCorrelationId() returns a string"},{"id":"520","name":"generateCorrelationId() returns a non-empty string"},{"id":"521","name":"generateCorrelationId() returns unique IDs on successive calls"},{"id":"522","name":"generateCorrelationId() returns an alphanumeric string"},{"id":"523","name":"generateCorrelationId() returns a string with reasonable length"}],"source":"/**\n * Tests for correlation ID utility.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { generateCorrelationId } from \"../src/index.js\";\n\ndescribe(\"generateCorrelationId()\", () => {\n  it(\"returns a string\", () => {\n    const id = generateCorrelationId();\n    expect(typeof id).toBe(\"string\");\n  });\n\n  it(\"returns a non-empty string\", () => {\n    const id = generateCorrelationId();\n    expect(id.length).toBeGreaterThan(0);\n  });\n\n  it(\"returns unique IDs on successive calls\", () => {\n    const ids = new Set<"+"string>();\n    for (let i = 0; i <"+" 100; i++) {\n      ids.add(generateCorrelationId());\n    }\n    // With Math.random(), 100 IDs should all be unique\n    expect(ids.size).toBe(100);\n  });\n\n  it(\"returns an alphanumeric string\", () => {\n    const id = generateCorrelationId();\n    expect(id).toMatch(/^[a-z0-9]+$/);\n  });\n\n  it(\"returns a string with reasonable length\", () => {\n    const id = generateCorrelationId();\n    // substring(2, 15) should produce up to 13 chars\n    expect(id.length).toBeLessThanOrEqual(13);\n    expect(id.length).toBeGreaterThan(0);\n  });\n});\n"}},"projectRoot":"/Users/u1070457/Projects/Perso/hex-di/packages/core","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","packageManager":"pnpm","reporters":["html","clear-text","progress"],"plugins":["@stryker-mutator/vitest-runner"],"testRunner":"vitest","coverageAnalysis":"perTest","vitest":{"related":false},"mutate":["src/**/*.ts","!src/**/*.test.ts","!src/**/*.test-d.ts","!src/**/index.ts"],"ignorePatterns":["dist","node_modules","docs"],"thresholds":{"high":95,"low":90,"break":90},"concurrency":4,"timeoutMS":10000,"disableTypeChecks":"**/*.ts","allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignoreStatic":false,"incremental":false,"incrementalFile":"repor
