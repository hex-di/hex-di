TypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n\n  it(\"sync factory with transient works\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"transient\",\n      factory: () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"transient\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n\n  it(\"sync factory with singleton works\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"singleton\",\n      factory: () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n\n  it(\"sync factory with omitted lifetime defaults to singleton\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      factory: () => ({ doWork: () => {} }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n});\n\n// =============================================================================\n// Class-based adapters are always sync\n// =============================================================================\n\ndescribe(\"class-based adapters unaffected\", () => {\n  class TestServiceImpl implements TestService {\n    doWork(): void {}\n  }\n\n  it(\"class with scoped lifetime works\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"scoped\",\n      class: TestServiceImpl,\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n\n  it(\"class with transient lifetime works\", () => {\n    const adapter = createAdapter({\n      provides: TestPort,\n      lifetime: \"transient\",\n      class: TestServiceImpl,\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"transient\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n});\n"},"tests/library-inspector.test-d.ts":{"tests":[{"id":"18","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #1 accepts object with name: string and getSnapshot(): Record<"+"string, unknown>"},{"id":"19","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #2 rejects object missing name property"},{"id":"20","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #3 rejects object missing getSnapshot method"},{"id":"21","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #4 accepts object with optional subscribe method"},{"id":"22","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #5 accepts object with optional dispose method"},{"id":"23","name":"tests/library-inspector.test-d.ts LibraryInspector structural shape #6 rejects subscribe that returns non-function"},{"id":"24","name":"tests/library-inspector.test-d.ts LibraryEvent required fields #7 requires source: string"},{"id":"25","name":"tests/library-inspector.test-d.ts LibraryEvent required fields #8 requires type: string"},{"id":"26","name":"tests/library-inspector.test-d.ts LibraryEvent required fields #9 requires payload: Readonly<"+"Record<"+"string, unknown>>"},{"id":"27","name":"tests/library-inspector.test-d.ts LibraryEvent required fields #10 requires timestamp: number"},{"id":"28","name":"tests/library-inspector.test-d.ts LibraryEvent required fields #11 rejects object missing any of the four required fields"},{"id":"29","name":"tests/library-inspector.test-d.ts LibraryEventListener #12 is (event: LibraryEvent) => void"},{"id":"30","name":"tests/library-inspector.test-d.ts UnifiedSnapshot fields #13 has timestamp: number"},{"id":"31","name":"tests/library-inspector.test-d.ts UnifiedSnapshot fields #14 has container: ContainerSnapshot"},{"id":"32","name":"tests/library-inspector.test-d.ts UnifiedSnapshot fields #15 has libraries: Readonly<"+"Record<"+"string, Readonly<"+"Record<"+"string, unknown>>>>"},{"id":"33","name":"tests/library-inspector.test-d.ts UnifiedSnapshot fields #16 has registeredLibraries: readonly string[]"},{"id":"34","name":"tests/library-inspector.test-d.ts InspectorEvent library variants #17 discriminates on type: 'library' to narrow event field to LibraryEvent"},{"id":"35","name":"tests/library-inspector.test-d.ts InspectorEvent library variants #18 discriminates on type: 'library-registered' to narrow name field to string"},{"id":"36","name":"tests/library-inspector.test-d.ts InspectorEvent library variants #19 discriminates on type: 'library-unregistered' to narrow name field to string"},{"id":"37","name":"tests/library-inspector.test-d.ts InspectorEvent library variants #20 exhaustive switch on InspectorEvent.type covers all variants including library variants"},{"id":"38","name":"tests/library-inspector.test-d.ts InspectorAPI new library methods #21 registerLibrary accepts LibraryInspector and returns () => void"},{"id":"39","name":"tests/library-inspector.test-d.ts InspectorAPI new library methods #22 getLibraryInspectors returns ReadonlyMap<"+"string, LibraryInspector>"},{"id":"40","name":"tests/library-inspector.test-d.ts InspectorAPI new library methods #23 getLibraryInspector accepts string and returns LibraryInspector | undefined"},{"id":"41","name":"tests/library-inspector.test-d.ts InspectorAPI new library methods #24 getUnifiedSnapshot returns UnifiedSnapshot"}],"source":"/**\n * Type Tests for Library Inspector Protocol\n *\n * Covers DoD 1 (#1-#16) and DoD 2 (#17-#24):\n * - LibraryInspector structural shape validation\n * - LibraryEvent required fields\n * - LibraryEventListener signature\n * - UnifiedSnapshot fields\n * - InspectorEvent discrimination on new library variants\n * - InspectorAPI new method signatures\n *\n * @packageDocumentation\n */\n\nimport { describe, it, expectTypeOf, assertType } from \"vitest\";\nimport type {\n  LibraryInspector,\n  LibraryEvent,\n  LibraryEventListener,\n  UnifiedSnapshot,\n  ContainerSnapshot,\n  InspectorEvent,\n  InspectorAPI,\n} from \"../src/index.js\";\n\n// =============================================================================\n// DoD 1: LibraryInspector Protocol Types (#1-#16)\n// =============================================================================\n\ndescribe(\"LibraryInspector structural shape\", () => {\n  it(\"#1 accepts object with name: string and getSnapshot(): Record<"+"string, unknown>\", () => {\n    const inspector: LibraryInspector = {\n      name: \"test\",\n      getSnapshot: () => Object.freeze({}),\n    };\n    expectTypeOf(inspector).toMatchTypeOf<"+"LibraryInspector>();\n  });\n\n  it(\"#2 rejects object missing name property\", () => {\n    // @ts-expect-error - missing name property\n    const _bad: LibraryInspector = {\n      getSnapshot: () => Object.freeze({}),\n    };\n  });\n\n  it(\"#3 rejects object missing getSnapshot method\", () => {\n    // @ts-expect-error - missing getSnapshot method\n    const _bad: LibraryInspector = {\n      name: \"test\",\n    };\n  });\n\n  it(\"#4 accepts object with optional subscribe method\", () => {\n    const inspector: LibraryInspector = {\n      name: \"test\",\n      getSnapshot: () => Object.freeze({}),\n      subscribe: (_listener) => () => {},\n    };\n    expectTypeOf(inspector).toMatchTypeOf<"+"LibraryInspector>();\n  });\n\n  it(\"#5 accepts object with optional dispose method\", () => {\n    const inspector: LibraryInspector = {\n      name: \"test\",\n      getSnapshot: () => Object.freeze({}),\n      dispose: () => {},\n    };\n    expectTypeOf(inspector).toMatchTypeOf<"+"LibraryInspector>();\n  });\n\n  it(\"#6 rejects subscribe that returns non-function\", () => {\n    const _bad: LibraryInspector = {\n      name: \"test\",\n      getSnapshot: () => Object.freeze({}),\n      // @ts-expect-error - subscribe must return () => void, not string\n      subscribe: (_listener: LibraryEventListener) => \"not a function\",\n    };\n  });\n});\n\ndescribe(\"LibraryEvent required fields\", () => {\n  it(\"#7 requires source: string\", () => {\n    expectTypeOf<"+"LibraryEvent[\"source\"]>().toBeString();\n  });\n\n  it(\"#8 requires type: string\", () => {\n    expectTypeOf<"+"LibraryEvent[\"type\"]>().toBeString();\n  });\n\n  it(\"#9 requires payload: Readonly<"+"Record<"+"string, unknown>>\", () => {\n    expectTypeOf<"+"LibraryEvent[\"payload\"]>().toMatchTypeOf<"+"Readonly<"+"Record<"+"string, unknown>>>();\n  });\n\n  it(\"#10 requires timestamp: number\", () => {\n    expectTypeOf<"+"LibraryEvent[\"timestamp\"]>().toBeNumber();\n  });\n\n  it(\"#11 rejects object missing any of the four required fields\", () => {\n    // @ts-expect-error - missing source\n    const _bad1: LibraryEvent = { type: \"test\", payload: {}, timestamp: 0 };\n    // @ts-expect-error - missing type\n    const _bad2: LibraryEvent = { source: \"test\", payload: {}, timestamp: 0 };\n    // @ts-expect-error - missing payload\n    const _bad3: LibraryEvent = { source: \"test\", type: \"test\", timestamp: 0 };\n    // @ts-expect-error - missing timestamp\n    const _bad4: LibraryEvent = { source: \"test\", type: \"test\", payload: {} };\n  });\n});\n\ndescribe(\"LibraryEventListener\", () => {\n  it(\"#12 is (event: LibraryEvent) => void\", () => {\n    expectTypeOf<"+"LibraryEventListener>().toMatchTypeOf<"+"(event: LibraryEvent) => void>();\n  });\n});\n\ndescribe(\"UnifiedSnapshot fields\", () => {\n  it(\"#13 has timestamp: number\", () => {\n    expectTypeOf<"+"UnifiedSnapshot[\"timestamp\"]>().toBeNumber();\n  });\n\n  it(\"#14 has container: ContainerSnapshot\", () => {\n    expectTypeOf<"+"UnifiedSnapshot[\"container\"]>().toMatchTypeOf<"+"ContainerSnapshot>();\n  });\n\n  it(\"#15 has libraries: Readonly<"+"Record<"+"string, Readonly<"+"Record<"+"string, unknown>>>>\", () => {\n    expectTypeOf<"+"UnifiedSnapshot[\"libraries\"]>().toMatchTypeOf<"+"\n      Readonly<"+"Record<"+"string, Readonly<"+"Record<"+"string, unknown>>>>\n    >();\n  });\n\n  it(\"#16 has registeredLibraries: readonly string[]\", () => {\n    expectTypeOf<"+"UnifiedSnapshot[\"registeredLibraries\"]>().toMatchTypeOf<"+"readonly string[]>();\n  });\n});\n\n// =============================================================================\n// DoD 2: Extended InspectorEvent & InspectorAPI (#17-#24)\n// =============================================================================\n\ndescribe(\"InspectorEvent library variants\", () => {\n  it(\"#17 discriminates on type: 'library' to narrow event field to LibraryEvent\", () => {\n    const event = {} as InspectorEvent;\n    if (event.type === \"library\") {\n      expectTypeOf(event.event).toMatchTypeOf<"+"LibraryEvent>();\n    }\n  });\n\n  it(\"#18 discriminates on type: 'library-registered' to narrow name field to string\", () => {\n    const event = {} as InspectorEvent;\n    if (event.type === \"library-registered\") {\n      expectTypeOf(event.name).toBeString();\n    }\n  });\n\n  it(\"#19 discriminates on type: 'library-unregistered' to narrow name field to string\", () => {\n    const event = {} as InspectorEvent;\n    if (event.type === \"library-unregistered\") {\n      expectTypeOf(event.name).toBeString();\n    }\n  });\n\n  it(\"#20 exhaustive switch on InspectorEvent.type covers all variants including library variants\", () => {\n    function handleEvent(event: InspectorEvent): string {\n      switch (event.type) {\n        case \"snapshot-changed\":\n          return \"snapshot\";\n        case \"scope-created\":\n          return \"scope-created\";\n        case \"scope-disposed\":\n          return \"scope-disposed\";\n        case \"resolution\":\n          return \"resolution\";\n        case \"phase-changed\":\n          return \"phase\";\n        case \"init-progress\":\n          return \"init\";\n        case \"child-created\":\n          return \"child-created\";\n        case \"child-disposed\":\n          return \"child-disposed\";\n        case \"result:ok\":\n          return \"ok\";\n        case \"result:err\":\n          return \"err\";\n        case \"result:recovered\":\n          return \"recovered\";\n        case \"library\":\n          return \"library\";\n        case \"library-registered\":\n          return \"registered\";\n        case \"library-unregistered\":\n          return \"unregistered\";\n        default: {\n          // If all variants are covered, event should be `never`\n          assertType<"+"never>(event);\n          return \"never\";\n        }\n      }\n    }\n    expectTypeOf(handleEvent).toBeFunction();\n  });\n});\n\ndescribe(\"InspectorAPI new library methods\", () => {\n  it(\"#21 registerLibrary accepts LibraryInspector and returns () => void\", () => {\n    expectTypeOf<"+"InspectorAPI[\"registerLibrary\"]>().toMatchTypeOf<"+"\n      (inspector: LibraryInspector) => () => void\n    >();\n  });\n\n  it(\"#22 getLibraryInspectors returns ReadonlyMap<"+"string, LibraryInspector>\", () => {\n    expectTypeOf<"+"InspectorAPI[\"getLibraryInspectors\"]>().toMatchTypeOf<"+"\n      () => ReadonlyMap<"+"string, LibraryInspector>\n    >();\n  });\n\n  it(\"#23 getLibraryInspector accepts string and returns LibraryInspector | undefined\", () => {\n    expectTypeOf<"+"InspectorAPI[\"getLibraryInspector\"]>().toMatchTypeOf<"+"\n      (name: string) => LibraryInspector | undefined\n    >();\n  });\n\n  it(\"#24 getUnifiedSnapshot returns UnifiedSnapshot\", () => {\n    expectTypeOf<"+"InspectorAPI[\"getUnifiedSnapshot\"]>().toMatchTypeOf<"+"() => UnifiedSnapshot>();\n  });\n});\n"},"tests/port-category.test-d.ts":{"tests":[{"id":"42","name":"tests/port-category.test-d.ts DirectedPort TCategory parameter defaults 4th param to string when omitted"},{"id":"43","name":"tests/port-category.test-d.ts DirectedPort TCategory parameter preserves literal category"},{"id":"44","name":"tests/port-category.test-d.ts InboundPort category defaults category to string"},{"id":"45","name":"tests/port-category.test-d.ts InboundPort category preserves literal category"},{"id":"46","name":"tests/port-category.test-d.ts OutboundPort category defaults category to string"},{"id":"47","name":"tests/port-category.test-d.ts OutboundPort category preserves literal category"},{"id":"48","name":"tests/port-category.test-d.ts port() builder category inference has category string when no category specified"},{"id":"49","name":"tests/port-category.test-d.ts port() builder category inference infers literal category from config"},{"id":"50","name":"tests/port-category.test-d.ts port() builder category inference infers library-inspector category"},{"id":"51","name":"tests/port-category.test-d.ts InferPortCategory extracts literal category"},{"id":"52","name":"tests/port-category.test-d.ts InferPortCategory returns string for uncategorized ports"},{"id":"53","name":"tests/port-category.test-d.ts InferPortCategory returns never for non-directed ports"},{"id":"54","name":"tests/port-category.test-d.ts InboundPorts preserves category preserves category in filtered result"},{"id":"55","name":"tests/port-category.test-d.ts OutboundPorts preserves category preserves category in filtered result"},{"id":"56","name":"tests/port-category.test-d.ts createLibraryInspectorPort returns correct type with library-inspector category"},{"id":"57","name":"tests/port-category.test-d.ts createLibraryInspectorPort service type is LibraryInspector"}],"source":"/**\n * Type Tests for Port Category Tracking\n *\n * Verifies compile-time behavior of the TCategory phantom parameter\n * on DirectedPort, InboundPort, OutboundPort, and related utilities.\n *\n * @packageDocumentation\n */\n\nimport { describe, it, expectTypeOf } from \"vitest\";\nimport { port, createPort } from \"../src/ports/factory.js\";\nimport { createLibraryInspectorPort } from \"../src/inspection/library-inspector-types.js\";\nimport type {\n  DirectedPort,\n  InboundPort,\n  OutboundPort,\n  InboundPorts,\n  OutboundPorts,\n  InferPortCategory,\n} from \"../src/ports/types.js\";\nimport type { LibraryInspector } from \"../src/inspection/library-inspector-types.js\";\n\n// =============================================================================\n// Test Interfaces\n// =============================================================================\n\ninterface Logger {\n  log(msg: string): void;\n}\n\ninterface UserService {\n  getUser(id: string): { id: string; name: string };\n}\n\n// =============================================================================\n// DirectedPort TCategory defaults\n// =============================================================================\n\ndescribe(\"DirectedPort TCategory parameter\", () => {\n  it(\"defaults 4th param to string when omitted\", () => {\n    type ThreeParam = DirectedPort<"+"Logger, \"Logger\", \"outbound\">;\n    type FourParam = DirectedPort<"+"Logger, \"Logger\", \"outbound\", string>;\n    expectTypeOf<"+"ThreeParam>().toEqualTypeOf<"+"FourParam>();\n  });\n\n  it(\"preserves literal category\", () => {\n    type WithCategory = DirectedPort<"+"Logger, \"Logger\", \"outbound\", \"domain\">;\n    expectTypeOf<"+"InferPortCategory<"+"WithCategory>>().toEqualTypeOf<"+"\"domain\">();\n  });\n});\n\n// =============================================================================\n// InboundPort / OutboundPort aliases\n// =============================================================================\n\ndescribe(\"InboundPort category\", () => {\n  it(\"defaults category to string\", () => {\n    type DefaultCat = InboundPort<"+"UserService, \"UserService\">;\n    type ExplicitString = InboundPort<"+"UserService, \"UserService\", string>;\n    expectTypeOf<"+"DefaultCat>().toEqualTypeOf<"+"ExplicitString>();\n  });\n\n  it(\"preserves literal category\", () => {\n    type WithCat = InboundPort<"+"UserService, \"UserService\", \"domain\">;\n    expectTypeOf<"+"InferPortCategory<"+"WithCat>>().toEqualTypeOf<"+"\"domain\">();\n  });\n});\n\ndescribe(\"OutboundPort category\", () => {\n  it(\"defaults category to string\", () => {\n    type DefaultCat = OutboundPort<"+"Logger, \"Logger\">;\n    type ExplicitString = OutboundPort<"+"Logger, \"Logger\", string>;\n    expectTypeOf<"+"DefaultCat>().toEqualTypeOf<"+"ExplicitString>();\n  });\n\n  it(\"preserves literal category\", () => {\n    type WithCat = OutboundPort<"+"Logger, \"Logger\", \"infrastructure\">;\n    expectTypeOf<"+"InferPortCategory<"+"WithCat>>().toEqualTypeOf<"+"\"infrastructure\">();\n  });\n});\n\n// =============================================================================\n// port() builder category inference\n// =============================================================================\n\ndescribe(\"port() builder category inference\", () => {\n  it(\"has category string when no category specified\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n    expectTypeOf<"+"InferPortCategory<"+"typeof LoggerPort>>().toEqualTypeOf<"+"string>();\n  });\n\n  it(\"infers literal category from config\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\", category: \"domain\" });\n    expectTypeOf<"+"InferPortCategory<"+"typeof LoggerPort>>().toEqualTypeOf<"+"\"domain\">();\n  });\n\n  it(\"infers library-inspector category\", () => {\n    const InspectorPort = port<"+"LibraryInspector>()({\n      name: \"FlowInspector\",\n      category: \"library-inspector\",\n    });\n    expectTypeOf<"+"InferPortCategory<"+"typeof InspectorPort>>().toEqualTypeOf<"+"\"library-inspector\">();\n  });\n});\n\n// =============================================================================\n// InferPortCategory\n// =============================================================================\n\ndescribe(\"InferPortCategory\", () => {\n  it(\"extracts literal category\", () => {\n    type Cat = InferPortCategory<"+"DirectedPort<"+"Logger, \"Logger\", \"outbound\", \"domain\">>;\n    expectTypeOf<"+"Cat>().toEqualTypeOf<"+"\"domain\">();\n  });\n\n  it(\"returns string for uncategorized ports\", () => {\n    type Cat = InferPortCategory<"+"DirectedPort<"+"Logger, \"Logger\", \"outbound\">>;\n    expectTypeOf<"+"Cat>().toEqualTypeOf<"+"string>();\n  });\n\n  it(\"returns never for non-directed ports\", () => {\n    type Cat = InferPortCategory<"+"{ foo: string }>;\n    expectTypeOf<"+"Cat>().toEqualTypeOf<"+"never>();\n  });\n});\n\n// =============================================================================\n// InboundPorts / OutboundPorts preserve category\n// =============================================================================\n\ndescribe(\"InboundPorts preserves category\", () => {\n  it(\"preserves category in filtered result\", () => {\n    type DomainInbound = InboundPort<"+"UserService, \"UserService\", \"domain\">;\n    type InfraOutbound = OutboundPort<"+"Logger, \"Logger\", \"infrastructure\">;\n    type All = DomainInbound | InfraOutbound;\n\n    type Filtered = InboundPorts<"+"All>;\n    expectTypeOf<"+"InferPortCategory<"+"Filtered>>().toEqualTypeOf<"+"\"domain\">();\n  });\n});\n\ndescribe(\"OutboundPorts preserves category\", () => {\n  it(\"preserves category in filtered result\", () => {\n    type DomainInbound = InboundPort<"+"UserService, \"UserService\", \"domain\">;\n    type InfraOutbound = OutboundPort<"+"Logger, \"Logger\", \"infrastructure\">;\n    type All = DomainInbound | InfraOutbound;\n\n    type Filtered = OutboundPorts<"+"All>;\n    expectTypeOf<"+"InferPortCategory<"+"Filtered>>().toEqualTypeOf<"+"\"infrastructure\">();\n  });\n});\n\n// =============================================================================\n// createLibraryInspectorPort\n// =============================================================================\n\ndescribe(\"createLibraryInspectorPort\", () => {\n  it(\"returns correct type with library-inspector category\", () => {\n    const FlowPort = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    expectTypeOf<"+"InferPortCategory<"+"typeof FlowPort>>().toEqualTypeOf<"+"\"library-inspector\">();\n    expectTypeOf(FlowPort).toEqualTypeOf<"+"\n      DirectedPort<"+"LibraryInspector, \"FlowInspector\", \"outbound\", \"library-inspector\">\n    >();\n  });\n\n  it(\"service type is LibraryInspector\", () => {\n    const FlowPort = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    type Service = typeof FlowPort extends DirectedPort<"+"infer S, string, \"outbound\", string>\n      ? S\n      : never;\n    expectTypeOf<"+"Service>().toEqualTypeOf<"+"LibraryInspector>();\n  });\n});\n"},"tests/unified-adapter.test-d.ts":{"tests":[{"id":"58","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with defaults applies default values when all optional properties omitted"},{"id":"59","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with defaults preserves default lifetime as literal type"},{"id":"60","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with defaults preserves default clonable as literal false"},{"id":"61","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with defaults preserves empty requires tuple type"},{"id":"62","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with explicit values preserves explicit requires tuple type with explicit params"},{"id":"63","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with explicit values preserves explicit lifetime literal type"},{"id":"64","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with explicit values preserves explicit clonable literal type"},{"id":"65","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with explicit values supports multiple requires in tuple"},{"id":"66","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory variant with explicit values supports all lifetimes"},{"id":"67","name":"tests/unified-adapter.test-d.ts unified createAdapter - async factory detection detects async factory and sets factoryKind to async"},{"id":"68","name":"tests/unified-adapter.test-d.ts unified createAdapter - async factory detection forces lifetime to singleton for async factory"},{"id":"69","name":"tests/unified-adapter.test-d.ts unified createAdapter - async factory detection produces error type in lifetime for async factory with non-singleton lifetime"},{"id":"70","name":"tests/unified-adapter.test-d.ts unified createAdapter - async factory detection allows async factory with explicit singleton lifetime"},{"id":"71","name":"tests/unified-adapter.test-d.ts unified createAdapter - async factory detection keeps async factoryKind for Promise-returning sync factory"},{"id":"72","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory return type validation compiles when factory returns correct type"},{"id":"73","name":"tests/unified-adapter.test-d.ts unified createAdapter - factory return type validation compiles when async factory returns Promise of correct type"},{"id":"74","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with defaults applies default values when all optional properties omitted"},{"id":"75","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with defaults has sync factoryKind (classes are always sync)"},{"id":"76","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with explicit values preserves explicit requires tuple type"},{"id":"77","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with explicit values preserves explicit lifetime literal type"},{"id":"78","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with explicit values preserves explicit clonable literal type"},{"id":"79","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with explicit values supports multiple requires in constructor"},{"id":"80","name":"tests/unified-adapter.test-d.ts unified createAdapter - class variant with explicit values supports all lifetimes"},{"id":"81","name":"tests/unified-adapter.test-d.ts unified createAdapter - class type validation compiles when class implements port interface"},{"id":"82","name":"tests/unified-adapter.test-d.ts unified createAdapter - class type validation compiles when class constructor matches requires order"},{"id":"83","name":"tests/unified-adapter.test-d.ts unified createAdapter - mutual exclusion factory and class are mutually exclusive at type level"},{"id":"84","name":"tests/unified-adapter.test-d.ts unified createAdapter - default value inference infers requires as empty tuple when omitted"},{"id":"85","name":"tests/unified-adapter.test-d.ts unified createAdapter - default value inference infers lifetime as singleton when omitted"},{"id":"86","name":"tests/unified-adapter.test-d.ts unified createAdapter - default value inference infers clonable as false when omitted"},{"id":"87","name":"tests/unified-adapter.test-d.ts unified createAdapter - default value inference applies all defaults together"},{"id":"88","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options factory variant defaults requires to empty tuple when lifetime is explicit"},{"id":"89","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options factory variant defaults requires to empty tuple when clonable is explicit"},{"id":"90","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options factory variant defaults requires to empty tuple when lifetime and clonable are explicit"},{"id":"91","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options factory variant preserves explicit requires when provided with lifetime"},{"id":"92","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options factory variant preserves explicit requires when provided with clonable"},{"id":"93","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options class variant defaults requires to empty tuple when lifetime is explicit"},{"id":"94","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options class variant defaults requires to empty tuple when clonable is explicit"},{"id":"95","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options class variant defaults requires to empty tuple when lifetime and clonable are explicit"},{"id":"96","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options class variant preserves explicit requires when provided with lifetime"},{"id":"97","name":"tests/unified-adapter.test-d.ts unified createAdapter - optional requires with explicit options class variant preserves explicit requires when provided with clonable"}],"source":"/**\n * Type Tests for Unified createAdapter API\n *\n * These tests verify compile-time behavior of the unified createAdapter function,\n * including type inference, mutual exclusion, async detection, and default values.\n *\n * Test coverage:\n * - Factory variant with defaults\n * - Factory variant with explicit configuration\n * - Class variant with defaults\n * - Class variant with explicit configuration\n * - Mutual exclusion (both factory and class / neither)\n * - Async factory detection\n * - Factory return type validation\n * - Class type validation\n * - Default value inference\n *\n * @packageDocumentation\n */\n\nimport { describe, it, expectTypeOf } from \"vitest\";\nimport { port, createPort } from \"../src/ports/factory.js\";\nimport { createAdapter } from \"../src/adapters/unified.js\";\nimport type {\n  BothFactoryAndClassError,\n  NeitherFactoryNorClassError,\n} from \"../src/adapters/unified.js\";\n\n// =============================================================================\n// Test Fixtures\n// =============================================================================\n\n// Service interfaces\ninterface Logger {\n  log(msg: string): void;\n}\n\ninterface Database {\n  query(sql: string): Promise<"+"unknown>;\n}\n\ninterface UserService {\n  getUser(id: string): Promise<"+"{ id: string; name: string }>;\n}\n\n// Ports\nconst LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\nconst DatabasePort = port<"+"Database>()({ name: \"Database\" });\nconst UserServicePort = port<"+"UserService>()({ name: \"UserService\" });\n\n// Classes for class-based tests\nclass ConsoleLogger implements Logger {\n  log(_msg: string): void {\n    // Implementation not relevant for type tests\n  }\n}\n\nclass PostgresDatabase implements Database {\n  constructor(private logger: Logger) {}\n\n  async query(sql: string): Promise<"+"unknown> {\n    this.logger.log(`Executing query: ${sql}`);\n    return {};\n  }\n}\n\nclass UserServiceImpl implements UserService {\n  constructor(\n    private database: Database,\n    private logger: Logger\n  ) {}\n\n  async getUser(id: string): Promise<"+"{ id: string; name: string }> {\n    this.logger.log(`Getting user ${id}`);\n    await this.database.query(\"SELECT * FROM users WHERE id = $1\");\n    return { id, name: \"Test User\" };\n  }\n}\n\n// =============================================================================\n// Factory Variant Tests - Defaults\n// =============================================================================\n\ndescribe(\"unified createAdapter - factory variant with defaults\", () => {\n  it(\"applies default values when all optional properties omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Verify defaults\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"false>();\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n  });\n\n  it(\"preserves default lifetime as literal type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Must be literal \"singleton\", not widened to Lifetime\n    type LifetimeType = typeof adapter.lifetime;\n    expectTypeOf<"+"LifetimeType>().toEqualTypeOf<"+"\"singleton\">();\n  });\n\n  it(\"preserves default clonable as literal false\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Must be literal false, not widened to boolean\n    type ClonableType = typeof adapter.clonable;\n    expectTypeOf<"+"ClonableType>().toEqualTypeOf<"+"false>();\n  });\n\n  it(\"preserves empty requires tuple type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Must be readonly empty tuple, not any[]\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n  });\n});\n\n// =============================================================================\n// Factory Variant Tests - Explicit Configuration\n// =============================================================================\n\ndescribe(\"unified createAdapter - factory variant with explicit values\", () => {\n  it(\"preserves explicit requires tuple type with explicit params\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      requires: [LoggerPort],\n      lifetime: \"singleton\",\n      clonable: false,\n      factory: deps => ({\n        query: async () => {\n          deps.Logger.log(\"query\");\n          return {};\n        },\n      }),\n    });\n\n    // Verify requires tuple is preserved\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n  });\n\n  it(\"preserves explicit lifetime literal type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"scoped\",\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Must preserve literal \"scoped\", not widen to Lifetime\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n  });\n\n  it(\"preserves explicit clonable literal type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      clonable: true,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // Must preserve literal true, not widen to boolean\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n  });\n\n  it(\"supports multiple requires in tuple\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [DatabasePort, LoggerPort],\n      lifetime: \"singleton\",\n      clonable: false,\n      factory: deps => ({\n        getUser: async (id: string) => {\n          deps.Logger.log(`Getting user ${id}`);\n          await deps.Database.query(\"SELECT * FROM users\");\n          return { id, name: \"Test\" };\n        },\n      }),\n    });\n\n    // Verify tuple type is preserved\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"\n      readonly [typeof DatabasePort, typeof LoggerPort]\n    >();\n  });\n\n  it(\"supports all lifetimes\", () => {\n    const singleton = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"singleton\",\n      factory: () => ({ log: () => {} }),\n    });\n\n    const scoped = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"scoped\",\n      factory: () => ({ log: () => {} }),\n    });\n\n    const transient = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"transient\",\n      factory: () => ({ log: () => {} }),\n    });\n\n    expectTypeOf(singleton.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(scoped.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    expectTypeOf(transient.lifetime).toEqualTypeOf<"+"\"transient\">();\n  });\n});\n\n// =============================================================================\n// Factory Variant Tests - Async Detection\n// =============================================================================\n\ndescribe(\"unified createAdapter - async factory detection\", () => {\n  it(\"detects async factory and sets factoryKind to async\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      factory: async () => ({\n        query: async () => ({}),\n      }),\n    });\n\n    // Async factory should have factoryKind: \"async\"\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n\n  it(\"forces lifetime to singleton for async factory\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      factory: async () => ({\n        query: async () => ({}),\n      }),\n    });\n\n    // Async factory always has singleton lifetime\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n  });\n\n  it(\"produces error type in lifetime for async factory with non-singleton lifetime\", () => {\n    // Async factory with scoped lifetime produces error type in lifetime position\n    const scopedAsyncAdapter = createAdapter({\n      provides: DatabasePort,\n      lifetime: \"scoped\",\n      factory: async () => ({\n        query: async () => ({}),\n      }),\n    });\n\n    // The lifetime is an error message string, not a valid Lifetime\n    expectTypeOf(\n      scopedAsyncAdapter.lifetime\n    ).toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'scoped'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n\n    // Async factory with transient lifetime produces error type in lifetime position\n    const transientAsyncAdapter = createAdapter({\n      provides: DatabasePort,\n      lifetime: \"transient\",\n      factory: async () => ({\n        query: async () => ({}),\n      }),\n    });\n\n    expectTypeOf(\n      transientAsyncAdapter.lifetime\n    ).toEqualTypeOf<"+"\"Async factories must use 'singleton' lifetime. Got: 'transient'. Hint: Remove the lifetime property to use the default, or make the factory synchronous.\">();\n  });\n\n  it(\"allows async factory with explicit singleton lifetime\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      lifetime: \"singleton\",\n      factory: async () => ({\n        query: async () => ({}),\n      }),\n    });\n\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n\n  it(\"keeps async factoryKind for Promise-returning sync factory\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      factory: () => Promise.resolve({ query: async () => ({}) }),\n    });\n\n    // Returns Promise, so TypeScript infers this as async\n    // (sync function returning Promise still counts as async for type system)\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n});\n\n// =============================================================================\n// Factory Variant Tests - Return Type Validation\n// =============================================================================\n\ndescribe(\"unified createAdapter - factory return type validation\", () => {\n  it(\"compiles when factory returns correct type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: (): Logger => ({ log: () => {} }),\n    });\n\n    // Verify the adapter was created successfully\n    expectTypeOf(adapter.provides).toEqualTypeOf(LoggerPort);\n  });\n\n  it(\"compiles when async factory returns Promise of correct type\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      factory: async (): Promise<"+"Database> => ({\n        query: async () => ({}),\n      }),\n    });\n\n    // Verify the adapter was created successfully\n    expectTypeOf(adapter.provides).toEqualTypeOf(DatabasePort);\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"async\">();\n  });\n});\n\n// =============================================================================\n// Class Variant Tests - Defaults\n// =============================================================================\n\ndescribe(\"unified createAdapter - class variant with defaults\", () => {\n  it(\"applies default values when all optional properties omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n    });\n\n    // Verify defaults\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"false>();\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n  });\n\n  it(\"has sync factoryKind (classes are always sync)\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n    });\n\n    // Class instantiation is always synchronous\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n});\n\n// =============================================================================\n// Class Variant Tests - Explicit Configuration\n// =============================================================================\n\ndescribe(\"unified createAdapter - class variant with explicit values\", () => {\n  it(\"preserves explicit requires tuple type\", () => {\n    const adapter = createAdapter({\n      provides: DatabasePort,\n      requires: [LoggerPort],\n      class: PostgresDatabase,\n    });\n\n    // Verify requires tuple is preserved\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n  });\n\n  it(\"preserves explicit lifetime literal type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"transient\",\n      class: ConsoleLogger,\n    });\n\n    // Must preserve literal \"transient\", not widen to Lifetime\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"transient\">();\n  });\n\n  it(\"preserves explicit clonable literal type\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      clonable: true,\n      class: ConsoleLogger,\n    });\n\n    // Must preserve literal true, not widen to boolean\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n  });\n\n  it(\"supports multiple requires in constructor\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [DatabasePort, LoggerPort],\n      class: UserServiceImpl,\n    });\n\n    // Verify tuple type is preserved\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"\n      readonly [typeof DatabasePort, typeof LoggerPort]\n    >();\n  });\n\n  it(\"supports all lifetimes\", () => {\n    const singleton = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"singleton\",\n      class: ConsoleLogger,\n    });\n\n    const scoped = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"scoped\",\n      class: ConsoleLogger,\n    });\n\n    const transient = createAdapter({\n      provides: LoggerPort,\n      lifetime: \"transient\",\n      class: ConsoleLogger,\n    });\n\n    expectTypeOf(singleton.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(scoped.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    expectTypeOf(transient.lifetime).toEqualTypeOf<"+"\"transient\">();\n  });\n});\n\n// =============================================================================\n// Class Variant Tests - Type Validation\n// =============================================================================\n\ndescribe(\"unified createAdapter - class type validation\", () => {\n  it(\"compiles when class implements port interface\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n    });\n\n    // Verify the adapter was created successfully\n    expectTypeOf(adapter.provides).toEqualTypeOf(LoggerPort);\n  });\n\n  it(\"compiles when class constructor matches requires order\", () => {\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [DatabasePort, LoggerPort],\n      class: UserServiceImpl,\n    });\n\n    // Verify the adapter was created successfully\n    expectTypeOf(adapter.provides).toEqualTypeOf(UserServicePort);\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"\n      readonly [typeof DatabasePort, typeof LoggerPort]\n    >();\n  });\n});\n\n// =============================================================================\n// Mutual Exclusion Tests\n// =============================================================================\n\ndescribe(\"unified createAdapter - mutual exclusion\", () => {\n  it(\"factory and class are mutually exclusive at type level\", () => {\n    // These tests verify the API surface enforces mutual exclusion via types\n\n    // Factory variant works\n    const factoryAdapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n    expectTypeOf(factoryAdapter.provides).toEqualTypeOf(LoggerPort);\n\n    // Class variant works\n    const classAdapter = createAdapter({\n      provides: LoggerPort,\n      class: ConsoleLogger,\n    });\n    expectTypeOf(classAdapter.provides).toEqualTypeOf(LoggerPort);\n\n    // Note: The mutual exclusion is enforced at runtime via validation\n    // TypeScript overloads prevent both from being specified simultaneously\n    // by design - the config types use `factory?: never` and `class?: never`\n  });\n});\n\n// =============================================================================\n// Default Value Inference Tests\n// =============================================================================\n\ndescribe(\"unified createAdapter - default value inference\", () => {\n  it(\"infers requires as empty tuple when omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // When requires is omitted, it should be readonly []\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n  });\n\n  it(\"infers lifetime as singleton when omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // When lifetime is omitted, it should be \"singleton\"\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n  });\n\n  it(\"infers clonable as false when omitted\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // When clonable is omitted, it should be false\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"false>();\n  });\n\n  it(\"applies all defaults together\", () => {\n    const adapter = createAdapter({\n      provides: LoggerPort,\n      factory: () => ({ log: () => {} }),\n    });\n\n    // All defaults should be applied\n    expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"singleton\">();\n    expectTypeOf(adapter.clonable).toEqualTypeOf<"+"false>();\n    expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n    expectTypeOf(adapter.factoryKind).toEqualTypeOf<"+"\"sync\">();\n  });\n});\n\n// =============================================================================\n// Optional Requires Tests\n// =============================================================================\n\ndescribe(\"unified createAdapter - optional requires with explicit options\", () => {\n  describe(\"factory variant\", () => {\n    it(\"defaults requires to empty tuple when lifetime is explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        lifetime: \"scoped\",\n        factory: () => ({ log: () => {} }),\n      });\n\n      // requires should default to empty tuple even with explicit lifetime\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    });\n\n    it(\"defaults requires to empty tuple when clonable is explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        clonable: true,\n        factory: () => ({ log: () => {} }),\n      });\n\n      // requires should default to empty tuple even with explicit clonable\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n\n    it(\"defaults requires to empty tuple when lifetime and clonable are explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        lifetime: \"transient\",\n        clonable: true,\n        factory: () => ({ log: () => {} }),\n      });\n\n      // requires should default to empty tuple with all other options explicit\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"transient\">();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n\n    it(\"preserves explicit requires when provided with lifetime\", () => {\n      const adapter = createAdapter({\n        provides: DatabasePort,\n        requires: [LoggerPort],\n        lifetime: \"scoped\",\n        factory: deps => ({\n          query: async () => {\n            deps.Logger.log(\"query\");\n            return {};\n          },\n        }),\n      });\n\n      // explicit requires should be preserved\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    });\n\n    it(\"preserves explicit requires when provided with clonable\", () => {\n      const adapter = createAdapter({\n        provides: DatabasePort,\n        requires: [LoggerPort],\n        clonable: true,\n        factory: deps => ({\n          query: async () => {\n            deps.Logger.log(\"query\");\n            return {};\n          },\n        }),\n      });\n\n      // explicit requires should be preserved\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n  });\n\n  describe(\"class variant\", () => {\n    it(\"defaults requires to empty tuple when lifetime is explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        lifetime: \"scoped\",\n        class: ConsoleLogger,\n      });\n\n      // requires should default to empty tuple even with explicit lifetime\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    });\n\n    it(\"defaults requires to empty tuple when clonable is explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        clonable: true,\n        class: ConsoleLogger,\n      });\n\n      // requires should default to empty tuple even with explicit clonable\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n\n    it(\"defaults requires to empty tuple when lifetime and clonable are explicit\", () => {\n      const adapter = createAdapter({\n        provides: LoggerPort,\n        lifetime: \"transient\",\n        clonable: true,\n        class: ConsoleLogger,\n      });\n\n      // requires should default to empty tuple with all other options explicit\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly []>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"transient\">();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n\n    it(\"preserves explicit requires when provided with lifetime\", () => {\n      const adapter = createAdapter({\n        provides: DatabasePort,\n        requires: [LoggerPort],\n        lifetime: \"scoped\",\n        class: PostgresDatabase,\n      });\n\n      // explicit requires should be preserved\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n      expectTypeOf(adapter.lifetime).toEqualTypeOf<"+"\"scoped\">();\n    });\n\n    it(\"preserves explicit requires when provided with clonable\", () => {\n      const adapter = createAdapter({\n        provides: DatabasePort,\n        requires: [LoggerPort],\n        clonable: true,\n        class: PostgresDatabase,\n      });\n\n      // explicit requires should be preserved\n      expectTypeOf(adapter.requires).toEqualTypeOf<"+"readonly [typeof LoggerPort]>();\n      expectTypeOf(adapter.clonable).toEqualTypeOf<"+"true>();\n    });\n  });\n});\n"},"tests/error-parsing.test.ts":{"tests":[{"id":"98","name":"isHexError() returns true for ERROR[HEX...] messages"},{"id":"99","name":"isHexError() returns true for WARNING[HEX...] messages"},{"id":"100","name":"isHexError() returns true for Multiple validation errors: prefix"},{"id":"101","name":"isHexError() returns false for non-HEX error messages"},{"id":"102","name":"isHexError() returns false for empty string"},{"id":"103","name":"isHexError() returns false for ERROR without HEX prefix"},{"id":"104","name":"isHexError() returns false for WARNING without HEX prefix"},{"id":"105","name":"isHexError() returns false for partial match at non-start position"},{"id":"106","name":"parseError() - non-HEX messages returns undefined for non-HEX error"},{"id":"107","name":"parseError() - non-HEX messages returns undefined for empty string"},{"id":"108","name":"parseError() - HEX001: Duplicate Adapter parses duplicate adapter error with port name"},{"id":"109","name":"parseError() - HEX001: Duplicate Adapter extracts correct port name from duplicate adapter error"},{"id":"110","name":"parseError() - HEX002: Circular Dependency parses type-level format circular dependency"},{"id":"111","name":"parseError() - HEX002: Circular Dependency parses runtime format circular dependency with cycle path"},{"id":"112","name":"parseError() - HEX002: Circular Dependency parses runtime format with depth exceeded note"},{"id":"113","name":"parseError() - HEX002: Circular Dependency parses simple runtime format without cycle path"},{"id":"114","name":"parseError() - HEX003: Captive Dependency parses type-level format captive dependency"},{"id":"115","name":"parseError() - HEX003: Captive Dependency parses runtime format captive dependency"},{"id":"116","name":"parseError() - HEX003: Captive Dependency parses simple runtime format without details"},{"id":"117","name":"parseError() - HEX004: Reverse Captive Dependency parses reverse captive dependency error"},{"id":"118","name":"parseError() - HEX005: Lifetime Inconsistency parses lifetime inconsistency error"},{"id":"119","name":"parseError() - HEX006: Self-Dependency parses self-dependency error"},{"id":"120","name":"parseError() - HEX007: Depth Limit Exceeded parses depth limit warning with all details"},{"id":"121","name":"parseError() - HEX007: Depth Limit Exceeded parses depth limit warning with only maxDepth"},{"id":"122","name":"parseError() - HEX007: Depth Limit Exceeded parses depth limit warning with startPort but no lastPort"},{"id":"123","name":"parseError() - HEX008: Missing Dependency parses missing adapter error (singular)"},{"id":"124","name":"parseError() - HEX008: Missing Dependency parses missing adapters error (plural)"},{"id":"125","name":"parseError() - HEX009: Override Without Parent parses override without parent error"},{"id":"126","name":"parseError() - HEX010: Missing Provides parses missing provides error"},{"id":"127","name":"parseError() - HEX011: Invalid Provides parses invalid provides error with actual type"},{"id":"128","name":"parseError() - HEX011: Invalid Provides parses invalid provides error without actual type"},{"id":"129","name":"parseError() - HEX012: Invalid Requires Type parses invalid requires type error with actual type"},{"id":"130","name":"parseError() - HEX012: Invalid Requires Type parses invalid requires type error without actual type"},{"id":"131","name":"parseError() - HEX013: Invalid Requires Element parses invalid requires element error with index"},{"id":"132","name":"parseError() - HEX014: Invalid Lifetime Type parses invalid lifetime type error with actual type"},{"id":"133","name":"parseError() - HEX014: Invalid Lifetime Type parses invalid lifetime type error without actual type"},{"id":"134","name":"parseError() - HEX015: Invalid Lifetime Value parses invalid lifetime value error with actual value"},{"id":"135","name":"parseError() - HEX015: Invalid Lifetime Value parses invalid lifetime value error without actual value"},{"id":"136","name":"parseError() - HEX016: Invalid Factory parses invalid factory error with actual type"},{"id":"137","name":"parseError() - HEX016: Invalid Factory parses invalid factory error without actual type"},{"id":"138","name":"parseError() - HEX017: Duplicate Requires parses duplicate requires error"},{"id":"139","name":"parseError() - HEX018: Invalid Finalizer parses invalid finalizer error with actual type"},{"id":"140","name":"parseError() - HEX018: Invalid Finalizer parses invalid finalizer error without actual type"},{"id":"141","name":"parseError() - HEX019: Invalid Lazy Port parses invalid lazy port error"},{"id":"142","name":"parseError() - Multiple Errors parses multiple errors message with error count and codes"},{"id":"143","name":"parseError() - Multiple Errors parses multiple errors with single error code"},{"id":"144","name":"parseError() - Multiple Errors handles multiple errors with no embedded error codes"},{"id":"145","name":"parseError() - Unknown HEX Error Format returns UNKNOWN_ERROR for unrecognized HEX error format"},{"id":"146","name":"parseError() - Unknown HEX Error Format returns UNKNOWN_ERROR for WARNING that does not match HEX007"}],"source":"/**\n * Comprehensive tests for error parsing utilities.\n *\n * Tests isHexError() and parseError() for all error codes HEX001-HEX019,\n * plus multiple errors and unknown error formats.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { isHexError, parseError, ErrorCode } from \"../src/index.js\";\n\n// =============================================================================\n// isHexError()\n// =============================================================================\n\ndescribe(\"isHexError()\", () => {\n  it(\"returns true for ERROR[HEX...] messages\", () => {\n    expect(isHexError(\"ERROR[HEX001]: Duplicate adapter for 'Logger'\")).toBe(true);\n  });\n\n  it(\"returns true for WARNING[HEX...] messages\", () => {\n    expect(isHexError(\"WARNING[HEX007]: Type-level depth limit (10) exceeded\")).toBe(true);\n  });\n\n  it(\"returns true for Multiple validation errors: prefix\", () => {\n    expect(isHexError(\"Multiple validation errors: ERROR[HEX001] ERROR[HEX002]\")).toBe(true);\n  });\n\n  it(\"returns false for non-HEX error messages\", () => {\n    expect(isHexError(\"Something went wrong\")).toBe(false);\n  });\n\n  it(\"returns false for empty string\", () => {\n    expect(isHexError(\"\")).toBe(false);\n  });\n\n  it(\"returns false for ERROR without HEX prefix\", () => {\n    expect(isHexError(\"ERROR: something\")).toBe(false);\n  });\n\n  it(\"returns false for WARNING without HEX prefix\", () => {\n    expect(isHexError(\"WARNING: something\")).toBe(false);\n  });\n\n  it(\"returns false for partial match at non-start position\", () => {\n    expect(isHexError(\"prefix ERROR[HEX001]: something\")).toBe(false);\n  });\n});\n\n// =============================================================================\n// parseError() - returns undefined for non-HEX messages\n// =============================================================================\n\ndescribe(\"parseError() - non-HEX messages\", () => {\n  it(\"returns undefined for non-HEX error\", () => {\n    expect(parseError(\"random error\")).toBeUndefined();\n  });\n\n  it(\"returns undefined for empty string\", () => {\n    expect(parseError(\"\")).toBeUndefined();\n  });\n});\n\n// =============================================================================\n// parseError() - HEX001: Duplicate Adapter\n// =============================================================================\n\ndescribe(\"parseError() - HEX001: Duplicate Adapter\", () => {\n  it(\"parses duplicate adapter error with port name\", () => {\n    const msg = \"ERROR[HEX001]: Duplicate adapter for 'Logger'. Fix: remove one adapter.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.DUPLICATE_ADAPTER);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({ portName: \"Logger\" });\n  });\n\n  it(\"extracts correct port name from duplicate adapter error\", () => {\n    const msg = \"ERROR[HEX001]: Duplicate adapter for 'UserService'. Fix: remove one adapter.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(\"DUPLICATE_ADAPTER\");\n    expect(result?.details).toEqual({ portName: \"UserService\" });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX002: Circular Dependency\n// =============================================================================\n\ndescribe(\"parseError() - HEX002: Circular Dependency\", () => {\n  it(\"parses type-level format circular dependency\", () => {\n    const msg = \"ERROR[HEX002]: Circular dependency: A -> B -> A. Fix: break the cycle.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.CIRCULAR_DEPENDENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({ cyclePath: \"A -> B -> A\" });\n  });\n\n  it(\"parses runtime format circular dependency with cycle path\", () => {\n    const msg = \"ERROR[HEX002]: Circular dependency detected at runtime: X -> Y -> X\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.CIRCULAR_DEPENDENCY);\n    expect(result?.details).toEqual({ cyclePath: \"X -> Y -> X\" });\n  });\n\n  it(\"parses runtime format with depth exceeded note\", () => {\n    const msg =\n      \"ERROR[HEX002]: Circular dependency detected at runtime (depth exceeded type-level limit): P -> Q -> P\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.CIRCULAR_DEPENDENCY);\n    expect(result?.details).toEqual({ cyclePath: \"P -> Q -> P\" });\n  });\n\n  it(\"parses simple runtime format without cycle path\", () => {\n    const msg = \"ERROR[HEX002]: Circular dependency detected at runtime\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.CIRCULAR_DEPENDENCY);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX003: Captive Dependency\n// =============================================================================\n\ndescribe(\"parseError() - HEX003: Captive Dependency\", () => {\n  it(\"parses type-level format captive dependency\", () => {\n    const msg =\n      \"ERROR[HEX003]: Captive dependency: singleton 'CacheService' cannot depend on transient 'RequestLogger'\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.CAPTIVE_DEPENDENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({\n      dependentLifetime: \"singleton\",\n      dependentName: \"CacheService\",\n      captiveLifetime: \"transient\",\n      captiveName: \"RequestLogger\",\n    });\n  });\n\n  it(\"parses runtime format captive dependency\", () => {\n    const msg =\n      \"ERROR[HEX003]: Captive dependency detected at runtime: singleton 'A' cannot depend on scoped 'B'\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.CAPTIVE_DEPENDENCY);\n    expect(result?.details).toEqual({\n      dependentLifetime: \"singleton\",\n      dependentName: \"A\",\n      captiveLifetime: \"scoped\",\n      captiveName: \"B\",\n    });\n  });\n\n  it(\"parses simple runtime format without details\", () => {\n    const msg = \"ERROR[HEX003]: Captive dependency detected at runtime\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.CAPTIVE_DEPENDENCY);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX004: Reverse Captive Dependency\n// =============================================================================\n\ndescribe(\"parseError() - HEX004: Reverse Captive Dependency\", () => {\n  it(\"parses reverse captive dependency error\", () => {\n    const msg =\n      \"ERROR[HEX004]: Reverse captive dependency: Existing singleton 'Cache' would capture new transient 'Logger'\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.REVERSE_CAPTIVE_DEPENDENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({\n      existingLifetime: \"singleton\",\n      existingName: \"Cache\",\n      newLifetime: \"transient\",\n      newName: \"Logger\",\n    });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX005: Lifetime Inconsistency\n// =============================================================================\n\ndescribe(\"parseError() - HEX005: Lifetime Inconsistency\", () => {\n  it(\"parses lifetime inconsistency error\", () => {\n    const msg =\n      \"ERROR[HEX005]: Lifetime inconsistency for 'Logger': Graph A provides singleton, Graph B provides transient\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.LIFETIME_INCONSISTENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({\n      portName: \"Logger\",\n      lifetimeA: \"singleton\",\n      lifetimeB: \"transient\",\n    });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX006: Self-Dependency\n// =============================================================================\n\ndescribe(\"parseError() - HEX006: Self-Dependency\", () => {\n  it(\"parses self-dependency error\", () => {\n    const msg = \"ERROR[HEX006]: Self-dependency detected. Adapter for 'Logger' depends on itself.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.SELF_DEPENDENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({ portName: \"Logger\" });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX007: Depth Limit Exceeded\n// =============================================================================\n\ndescribe(\"parseError() - HEX007: Depth Limit Exceeded\", () => {\n  it(\"parses depth limit warning with all details\", () => {\n    const msg =\n      \"WARNING[HEX007]: Type-level depth limit (10) exceeded for port 'DeepService'. Last port visited: 'Service10'.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.DEPTH_LIMIT_EXCEEDED);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({\n      maxDepth: \"10\",\n      startPort: \"DeepService\",\n      lastPort: \"Service10\",\n    });\n  });\n\n  it(\"parses depth limit warning with only maxDepth\", () => {\n    const msg = \"WARNING[HEX007]: Type-level depth limit (5) exceeded. No port details.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.DEPTH_LIMIT_EXCEEDED);\n    expect(result?.details).toEqual({ maxDepth: \"5\" });\n  });\n\n  it(\"parses depth limit warning with startPort but no lastPort\", () => {\n    const msg =\n      \"WARNING[HEX007]: Type-level depth limit (8) exceeded for port 'StartService'. No last port.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.DEPTH_LIMIT_EXCEEDED);\n    expect(result?.details).toEqual({\n      maxDepth: \"8\",\n      startPort: \"StartService\",\n    });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX008: Missing Dependency\n// =============================================================================\n\ndescribe(\"parseError() - HEX008: Missing Dependency\", () => {\n  it(\"parses missing adapter error (singular)\", () => {\n    const msg = \"ERROR[HEX008]: Missing adapter for 'Logger'. Ensure it is registered.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.MISSING_DEPENDENCY);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({ missingPorts: \"'Logger'\" });\n  });\n\n  it(\"parses missing adapters error (plural)\", () => {\n    const msg = \"ERROR[HEX008]: Missing adapters for 'Logger', 'Database'. Ensure they are registered.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.MISSING_DEPENDENCY);\n    expect(result?.details).toEqual({ missingPorts: \"'Logger', 'Database'\" });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX009: Override Without Parent\n// =============================================================================\n\ndescribe(\"parseError() - HEX009: Override Without Parent\", () => {\n  it(\"parses override without parent error\", () => {\n    const msg = \"ERROR[HEX009]: Cannot use override() without forParent()\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.OVERRIDE_WITHOUT_PARENT);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX010: Missing Provides\n// =============================================================================\n\ndescribe(\"parseError() - HEX010: Missing Provides\", () => {\n  it(\"parses missing provides error\", () => {\n    const msg = \"ERROR[HEX010]: Invalid adapter config: 'provides' is required.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.MISSING_PROVIDES);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX011: Invalid Provides\n// =============================================================================\n\ndescribe(\"parseError() - HEX011: Invalid Provides\", () => {\n  it(\"parses invalid provides error with actual type\", () => {\n    const msg = \"ERROR[HEX011]: Invalid adapter config: 'provides' must be a Port. Got: string\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_PROVIDES);\n    expect(result?.details).toEqual({ actualType: \"string\" });\n  });\n\n  it(\"parses invalid provides error without actual type\", () => {\n    const msg = \"ERROR[HEX011]: Invalid adapter config: 'provides' is invalid.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_PROVIDES);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX012: Invalid Requires Type\n// =============================================================================\n\ndescribe(\"parseError() - HEX012: Invalid Requires Type\", () => {\n  it(\"parses invalid requires type error with actual type\", () => {\n    const msg = \"ERROR[HEX012]: Invalid adapter config: 'requires' must be array. Got: object\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_REQUIRES_TYPE);\n    expect(result?.details).toEqual({ actualType: \"object\" });\n  });\n\n  it(\"parses invalid requires type error without actual type\", () => {\n    const msg = \"ERROR[HEX012]: Invalid adapter config: 'requires' is invalid.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_REQUIRES_TYPE);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX013: Invalid Requires Element\n// =============================================================================\n\ndescribe(\"parseError() - HEX013: Invalid Requires Element\", () => {\n  it(\"parses invalid requires element error with index\", () => {\n    const msg = \"ERROR[HEX013]: Invalid element at 'requires[2]' is not a Port.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_REQUIRES_ELEMENT);\n    expect(result?.details).toEqual({ index: \"2\" });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX014: Invalid Lifetime Type\n// =============================================================================\n\ndescribe(\"parseError() - HEX014: Invalid Lifetime Type\", () => {\n  it(\"parses invalid lifetime type error with actual type\", () => {\n    const msg = \"ERROR[HEX014]: Invalid adapter config: 'lifetime' must be a string. Got: number\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_LIFETIME_TYPE);\n    expect(result?.details).toEqual({ actualType: \"number\" });\n  });\n\n  it(\"parses invalid lifetime type error without actual type\", () => {\n    const msg = \"ERROR[HEX014]: Invalid adapter config: 'lifetime' is missing.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_LIFETIME_TYPE);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX015: Invalid Lifetime Value\n// =============================================================================\n\ndescribe(\"parseError() - HEX015: Invalid Lifetime Value\", () => {\n  it(\"parses invalid lifetime value error with actual value\", () => {\n    const msg =\n      'ERROR[HEX015]: Invalid adapter config: \\'lifetime\\' must be \"singleton\", \"scoped\", \"transient\". Got: \"request\".';\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_LIFETIME_VALUE);\n    expect(result?.details).toEqual({ actualValue: \"request\" });\n  });\n\n  it(\"parses invalid lifetime value error without actual value\", () => {\n    const msg = \"ERROR[HEX015]: Invalid adapter config: 'lifetime' value is not valid.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_LIFETIME_VALUE);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX016: Invalid Factory\n// =============================================================================\n\ndescribe(\"parseError() - HEX016: Invalid Factory\", () => {\n  it(\"parses invalid factory error with actual type\", () => {\n    const msg = \"ERROR[HEX016]: Invalid adapter config: 'factory' must be a function. Got: string\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_FACTORY);\n    expect(result?.details).toEqual({ actualType: \"string\" });\n  });\n\n  it(\"parses invalid factory error without actual type\", () => {\n    const msg = \"ERROR[HEX016]: Invalid adapter config: 'factory' is missing.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_FACTORY);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX017: Duplicate Requires\n// =============================================================================\n\ndescribe(\"parseError() - HEX017: Duplicate Requires\", () => {\n  it(\"parses duplicate requires error\", () => {\n    const msg = \"ERROR[HEX017]: Invalid requires array. Duplicate port 'Logger' found.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.DUPLICATE_REQUIRES);\n    expect(result?.details).toEqual({ portName: \"Logger\" });\n  });\n});\n\n// =============================================================================\n// parseError() - HEX018: Invalid Finalizer\n// =============================================================================\n\ndescribe(\"parseError() - HEX018: Invalid Finalizer\", () => {\n  it(\"parses invalid finalizer error with actual type\", () => {\n    const msg = \"ERROR[HEX018]: Invalid adapter config: 'finalizer' must be a function, got string\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_FINALIZER);\n    expect(result?.details).toEqual({ actualType: \"string\" });\n  });\n\n  it(\"parses invalid finalizer error without actual type\", () => {\n    const msg = \"ERROR[HEX018]: Invalid adapter config: 'finalizer' is not valid.\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.INVALID_FINALIZER);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - HEX019: Invalid Lazy Port\n// =============================================================================\n\ndescribe(\"parseError() - HEX019: Invalid Lazy Port\", () => {\n  it(\"parses invalid lazy port error\", () => {\n    const msg = \"ERROR[HEX019]: Invalid lazy port: missing original port reference\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.INVALID_LAZY_PORT);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({});\n  });\n});\n\n// =============================================================================\n// parseError() - Multiple Errors\n// =============================================================================\n\ndescribe(\"parseError() - Multiple Errors\", () => {\n  it(\"parses multiple errors message with error count and codes\", () => {\n    const msg =\n      \"Multiple validation errors: ERROR[HEX001]: Duplicate adapter. ERROR[HEX002]: Circular dependency.\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.MULTIPLE_ERRORS);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({\n      errorCount: \"2\",\n      errorCodes: \"HEX001,HEX002\",\n    });\n  });\n\n  it(\"parses multiple errors with single error code\", () => {\n    const msg = \"Multiple validation errors: ERROR[HEX008]: Missing adapter for 'X'.\";\n    const result = parseError
