(msg);\n    expect(result?.code).toBe(ErrorCode.MULTIPLE_ERRORS);\n    expect(result?.details).toEqual({\n      errorCount: \"1\",\n      errorCodes: \"HEX008\",\n    });\n  });\n\n  it(\"handles multiple errors with no embedded error codes\", () => {\n    const msg = \"Multiple validation errors: something went wrong\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.MULTIPLE_ERRORS);\n    expect(result?.details).toEqual({\n      errorCount: \"0\",\n      errorCodes: \"\",\n    });\n  });\n});\n\n// =============================================================================\n// parseError() - Unknown HEX Error Format\n// =============================================================================\n\ndescribe(\"parseError() - Unknown HEX Error Format\", () => {\n  it(\"returns UNKNOWN_ERROR for unrecognized HEX error format\", () => {\n    const msg = \"ERROR[HEX999]: Some unknown error format\";\n    const result = parseError(msg);\n    expect(result).toBeDefined();\n    expect(result?.code).toBe(ErrorCode.UNKNOWN_ERROR);\n    expect(result?.message).toBe(msg);\n    expect(result?.details).toEqual({ rawMessage: msg });\n  });\n\n  it(\"returns UNKNOWN_ERROR for WARNING that does not match HEX007\", () => {\n    const msg = \"WARNING[HEX999]: Some unknown warning format\";\n    const result = parseError(msg);\n    expect(result?.code).toBe(ErrorCode.UNKNOWN_ERROR);\n    expect(result?.details).toEqual({ rawMessage: msg });\n  });\n});\n"},"tests/error-classes.test.ts":{"tests":[{"id":"147","name":"CircularDependencyError constructs with dependency chain"},{"id":"148","name":"CircularDependencyError has correct code"},{"id":"149","name":"CircularDependencyError has correct _tag"},{"id":"150","name":"CircularDependencyError isProgrammingError is true"},{"id":"151","name":"CircularDependencyError dependencyChain is frozen"},{"id":"152","name":"CircularDependencyError is instanceof ContainerError"},{"id":"153","name":"CircularDependencyError is instanceof Error"},{"id":"154","name":"CircularDependencyError name returns class name"},{"id":"155","name":"CircularDependencyError dependencyChain is a copy (not the original array)"},{"id":"156","name":"FactoryError constructs with port name and Error cause"},{"id":"157","name":"FactoryError constructs with non-Error cause (string)"},{"id":"158","name":"FactoryError constructs with non-Error cause (object with message)"},{"id":"159","name":"FactoryError constructs with non-Error cause (number)"},{"id":"160","name":"FactoryError has correct code"},{"id":"161","name":"FactoryError has correct _tag"},{"id":"162","name":"FactoryError isProgrammingError is false"},{"id":"163","name":"FactoryError is instanceof ContainerError"},{"id":"164","name":"FactoryError name returns class name"},{"id":"165","name":"DisposedScopeError constructs with port name"},{"id":"166","name":"DisposedScopeError has correct code"},{"id":"167","name":"DisposedScopeError has correct _tag"},{"id":"168","name":"DisposedScopeError isProgrammingError is true"},{"id":"169","name":"DisposedScopeError is instanceof ContainerError"},{"id":"170","name":"DisposedScopeError name returns class name"},{"id":"171","name":"DisposedScopeError message includes scope disposal hint"},{"id":"172","name":"ScopeRequiredError constructs with port name"},{"id":"173","name":"ScopeRequiredError has correct code"},{"id":"174","name":"ScopeRequiredError has correct _tag"},{"id":"175","name":"ScopeRequiredError isProgrammingError is true"},{"id":"176","name":"ScopeRequiredError is instanceof ContainerError"},{"id":"177","name":"ScopeRequiredError name returns class name"},{"id":"178","name":"ScopeRequiredError message mentions createScope"},{"id":"179","name":"AsyncFactoryError constructs with port name and Error cause"},{"id":"180","name":"AsyncFactoryError constructs with non-Error cause"},{"id":"181","name":"AsyncFactoryError has correct code"},{"id":"182","name":"AsyncFactoryError has correct _tag"},{"id":"183","name":"AsyncFactoryError isProgrammingError is false"},{"id":"184","name":"AsyncFactoryError is instanceof ContainerError"},{"id":"185","name":"AsyncFactoryError name returns class name"},{"id":"186","name":"AsyncInitializationRequiredError constructs with port name"},{"id":"187","name":"AsyncInitializationRequiredError has correct code"},{"id":"188","name":"AsyncInitializationRequiredError has correct _tag"},{"id":"189","name":"AsyncInitializationRequiredError isProgrammingError is true"},{"id":"190","name":"AsyncInitializationRequiredError is instanceof ContainerError"},{"id":"191","name":"AsyncInitializationRequiredError name returns class name"},{"id":"192","name":"AsyncInitializationRequiredError message mentions resolveAsync"},{"id":"193","name":"AsyncInitializationRequiredError message mentions initialize()"},{"id":"194","name":"NonClonableForkedError constructs with port name"},{"id":"195","name":"NonClonableForkedError has correct code"},{"id":"196","name":"NonClonableForkedError has correct _tag"},{"id":"197","name":"NonClonableForkedError isProgrammingError is true"},{"id":"198","name":"NonClonableForkedError is instanceof ContainerError"},{"id":"199","name":"NonClonableForkedError name returns class name"},{"id":"200","name":"NonClonableForkedError message mentions clonable"}],"source":"/**\n * Tests for concrete error classes.\n *\n * Tests CircularDependencyError, FactoryError, DisposedScopeError,\n * ScopeRequiredError, AsyncFactoryError, AsyncInitializationRequiredError,\n * and NonClonableForkedError.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  ContainerError,\n  CircularDependencyError,\n  FactoryError,\n  DisposedScopeError,\n  ScopeRequiredError,\n  AsyncFactoryError,\n  AsyncInitializationRequiredError,\n  NonClonableForkedError,\n} from \"../src/index.js\";\n\n// =============================================================================\n// CircularDependencyError\n// =============================================================================\n\ndescribe(\"CircularDependencyError\", () => {\n  it(\"constructs with dependency chain\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    expect(err.message).toBe(\"Circular dependency detected: A -> B -> A\");\n    expect(err.dependencyChain).toEqual([\"A\", \"B\", \"A\"]);\n  });\n\n  it(\"has correct code\", () => {\n    const err = new CircularDependencyError([\"X\", \"Y\", \"X\"]);\n    expect(err.code).toBe(\"CIRCULAR_DEPENDENCY\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    expect(err._tag).toBe(\"CircularDependency\");\n  });\n\n  it(\"isProgrammingError is true\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"dependencyChain is frozen\", () => {\n    const err = new CircularDependencyError([\"A\", \"B\", \"A\"]);\n    expect(Object.isFrozen(err.dependencyChain)).toBe(true);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new CircularDependencyError([\"A\"]);\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"is instanceof Error\", () => {\n    const err = new CircularDependencyError([\"A\"]);\n    expect(err).toBeInstanceOf(Error);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new CircularDependencyError([\"A\"]);\n    expect(err.name).toBe(\"CircularDependencyError\");\n  });\n\n  it(\"dependencyChain is a copy (not the original array)\", () => {\n    const chain = [\"A\", \"B\", \"A\"];\n    const err = new CircularDependencyError(chain);\n    // Modifying original should not affect error\n    chain.push(\"C\");\n    expect(err.dependencyChain).toEqual([\"A\", \"B\", \"A\"]);\n  });\n});\n\n// =============================================================================\n// FactoryError\n// =============================================================================\n\ndescribe(\"FactoryError\", () => {\n  it(\"constructs with port name and Error cause\", () => {\n    const cause = new Error(\"db connection failed\");\n    const err = new FactoryError(\"Database\", cause);\n    expect(err.message).toBe(\"Factory for port 'Database' threw: db connection failed\");\n    expect(err.portName).toBe(\"Database\");\n    expect(err.cause).toBe(cause);\n  });\n\n  it(\"constructs with non-Error cause (string)\", () => {\n    const err = new FactoryError(\"Logger\", \"string error\");\n    expect(err.message).toBe(\"Factory for port 'Logger' threw: string error\");\n    expect(err.cause).toBe(\"string error\");\n  });\n\n  it(\"constructs with non-Error cause (object with message)\", () => {\n    const cause = { message: \"custom object error\" };\n    const err = new FactoryError(\"Config\", cause);\n    expect(err.message).toBe(\"Factory for port 'Config' threw: custom object error\");\n    expect(err.cause).toBe(cause);\n  });\n\n  it(\"constructs with non-Error cause (number)\", () => {\n    const err = new FactoryError(\"Config\", 42);\n    expect(err.message).toBe(\"Factory for port 'Config' threw: 42\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new FactoryError(\"X\", new Error(\"e\"));\n    expect(err.code).toBe(\"FACTORY_FAILED\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new FactoryError(\"X\", new Error(\"e\"));\n    expect(err._tag).toBe(\"FactoryFailed\");\n  });\n\n  it(\"isProgrammingError is false\", () => {\n    const err = new FactoryError(\"X\", new Error(\"e\"));\n    expect(err.isProgrammingError).toBe(false);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new FactoryError(\"X\", new Error(\"e\"));\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new FactoryError(\"X\", new Error(\"e\"));\n    expect(err.name).toBe(\"FactoryError\");\n  });\n});\n\n// =============================================================================\n// DisposedScopeError\n// =============================================================================\n\ndescribe(\"DisposedScopeError\", () => {\n  it(\"constructs with port name\", () => {\n    const err = new DisposedScopeError(\"UserService\");\n    expect(err.message).toContain(\"Cannot resolve port 'UserService' from a disposed scope\");\n    expect(err.portName).toBe(\"UserService\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err.code).toBe(\"DISPOSED_SCOPE\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err._tag).toBe(\"DisposedScope\");\n  });\n\n  it(\"isProgrammingError is true\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err.name).toBe(\"DisposedScopeError\");\n  });\n\n  it(\"message includes scope disposal hint\", () => {\n    const err = new DisposedScopeError(\"X\");\n    expect(err.message).toContain(\"disposed\");\n  });\n});\n\n// =============================================================================\n// ScopeRequiredError\n// =============================================================================\n\ndescribe(\"ScopeRequiredError\", () => {\n  it(\"constructs with port name\", () => {\n    const err = new ScopeRequiredError(\"UserContext\");\n    expect(err.message).toContain(\"Cannot resolve scoped port 'UserContext' from the root container\");\n    expect(err.portName).toBe(\"UserContext\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err.code).toBe(\"SCOPE_REQUIRED\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err._tag).toBe(\"ScopeRequired\");\n  });\n\n  it(\"isProgrammingError is true\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err.name).toBe(\"ScopeRequiredError\");\n  });\n\n  it(\"message mentions createScope\", () => {\n    const err = new ScopeRequiredError(\"X\");\n    expect(err.message).toContain(\"createScope()\");\n  });\n});\n\n// =============================================================================\n// AsyncFactoryError\n// =============================================================================\n\ndescribe(\"AsyncFactoryError\", () => {\n  it(\"constructs with port name and Error cause\", () => {\n    const cause = new Error(\"network timeout\");\n    const err = new AsyncFactoryError(\"RemoteService\", cause);\n    expect(err.message).toBe(\"Async factory for port 'RemoteService' failed: network timeout\");\n    expect(err.portName).toBe(\"RemoteService\");\n    expect(err.cause).toBe(cause);\n  });\n\n  it(\"constructs with non-Error cause\", () => {\n    const err = new AsyncFactoryError(\"Service\", \"timeout\");\n    expect(err.message).toBe(\"Async factory for port 'Service' failed: timeout\");\n    expect(err.cause).toBe(\"timeout\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"e\"));\n    expect(err.code).toBe(\"ASYNC_FACTORY_FAILED\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"e\"));\n    expect(err._tag).toBe(\"AsyncFactoryFailed\");\n  });\n\n  it(\"isProgrammingError is false\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"e\"));\n    expect(err.isProgrammingError).toBe(false);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"e\"));\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new AsyncFactoryError(\"X\", new Error(\"e\"));\n    expect(err.name).toBe(\"AsyncFactoryError\");\n  });\n});\n\n// =============================================================================\n// AsyncInitializationRequiredError\n// =============================================================================\n\ndescribe(\"AsyncInitializationRequiredError\", () => {\n  it(\"constructs with port name\", () => {\n    const err = new AsyncInitializationRequiredError(\"Database\");\n    expect(err.message).toContain(\"Cannot resolve async port 'Database' synchronously\");\n    expect(err.portName).toBe(\"Database\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err.code).toBe(\"ASYNC_INIT_REQUIRED\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err._tag).toBe(\"AsyncInitRequired\");\n  });\n\n  it(\"isProgrammingError is true\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err.name).toBe(\"AsyncInitializationRequiredError\");\n  });\n\n  it(\"message mentions resolveAsync\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err.message).toContain(\"resolveAsync()\");\n  });\n\n  it(\"message mentions initialize()\", () => {\n    const err = new AsyncInitializationRequiredError(\"X\");\n    expect(err.message).toContain(\"initialize()\");\n  });\n});\n\n// =============================================================================\n// NonClonableForkedError\n// =============================================================================\n\ndescribe(\"NonClonableForkedError\", () => {\n  it(\"constructs with port name\", () => {\n    const err = new NonClonableForkedError(\"Database\");\n    expect(err.message).toContain(\"Cannot use forked inheritance for port 'Database'\");\n    expect(err.portName).toBe(\"Database\");\n  });\n\n  it(\"has correct code\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err.code).toBe(\"NON_CLONABLE_FORKED\");\n  });\n\n  it(\"has correct _tag\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err._tag).toBe(\"NonClonableForked\");\n  });\n\n  it(\"isProgrammingError is true\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err.isProgrammingError).toBe(true);\n  });\n\n  it(\"is instanceof ContainerError\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err).toBeInstanceOf(ContainerError);\n  });\n\n  it(\"name returns class name\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err.name).toBe(\"NonClonableForkedError\");\n  });\n\n  it(\"message mentions clonable\", () => {\n    const err = new NonClonableForkedError(\"X\");\n    expect(err.message).toContain(\"clonable\");\n  });\n});\n"},"tests/directed-ports.test.ts":{"tests":[{"id":"201","name":"createPort() with inbound direction (PORT-01) creates port with 'inbound' direction"},{"id":"202","name":"createPort() with inbound direction (PORT-01) preserves port name as literal type"},{"id":"203","name":"createPort() with inbound direction (PORT-01) preserves service type (InferService works)"},{"id":"204","name":"createPort() with inbound direction (PORT-01) includes metadata when provided"},{"id":"205","name":"createPort() with inbound direction (PORT-01) works with empty metadata (only name)"},{"id":"206","name":"createPort() with inbound direction (PORT-01) port is frozen (Object.isFrozen)"},{"id":"207","name":"createPort() with inbound direction (PORT-01) returns InboundPort type"},{"id":"208","name":"createPort() with outbound direction (PORT-02) creates port with 'outbound' direction"},{"id":"209","name":"createPort() with outbound direction (PORT-02) preserves port name as literal type"},{"id":"210","name":"createPort() with outbound direction (PORT-02) preserves service type (InferService works)"},{"id":"211","name":"createPort() with outbound direction (PORT-02) includes metadata when provided"},{"id":"212","name":"createPort() with outbound direction (PORT-02) works with empty metadata (only name)"},{"id":"213","name":"createPort() with outbound direction (PORT-02) port is frozen (Object.isFrozen)"},{"id":"214","name":"createPort() with outbound direction (PORT-02) returns OutboundPort type"},{"id":"215","name":"Port metadata (PORT-03) description field accessible via getPortMetadata()"},{"id":"216","name":"Port metadata (PORT-03) category field accessible"},{"id":"217","name":"Port metadata (PORT-03) tags array accessible and readonly"},{"id":"218","name":"Port metadata (PORT-03) metadata accessible from port created with createPort"},{"id":"219","name":"Port metadata (PORT-03) metadata object is frozen"},{"id":"220","name":"Port metadata (PORT-03) all metadata fields can be provided together"},{"id":"221","name":"isDirectedPort() type guard (PORT-04) returns true for inbound ports"},{"id":"222","name":"isDirectedPort() type guard (PORT-04) returns true for outbound ports"},{"id":"223","name":"isDirectedPort() type guard (PORT-04) all createPort ports are now directed"},{"id":"224","name":"isDirectedPort() type guard (PORT-04) type narrowing works correctly (expectTypeOf)"},{"id":"225","name":"isInboundPort() and isOutboundPort() guards isInboundPort returns true only for inbound"},{"id":"226","name":"isInboundPort() and isOutboundPort() guards isOutboundPort returns true only for outbound"},{"id":"227","name":"isInboundPort() and isOutboundPort() guards default direction is outbound"},{"id":"228","name":"isInboundPort() and isOutboundPort() guards type narrowing is specific to direction for isInboundPort"},{"id":"229","name":"isInboundPort() and isOutboundPort() guards type narrowing is specific to direction for isOutboundPort"},{"id":"230","name":"Backward compatibility (PORT-05) directed ports have __portName property"},{"id":"231","name":"Backward compatibility (PORT-05) InferService<"+"DirectedPort> returns service type"},{"id":"232","name":"Backward compatibility (PORT-05) InferPortName<"+"DirectedPort> returns name type"},{"id":"233","name":"Backward compatibility (PORT-05) directed port assignable to Port<"+"unknown, string>"},{"id":"234","name":"Backward compatibility (PORT-05) createPort() with object config works"},{"id":"235","name":"Type-level utilities IsDirectedPort<"+"InboundPort> is true"},{"id":"236","name":"Type-level utilities IsDirectedPort<"+"OutboundPort> is true"},{"id":"237","name":"Type-level utilities IsDirectedPort<"+"Port> is false"},{"id":"238","name":"Type-level utilities InferPortDirection extracts direction for inbound"},{"id":"239","name":"Type-level utilities InferPortDirection extracts direction for outbound"},{"id":"240","name":"Type-level utilities InferPortMetadata extracts metadata type"},{"id":"241","name":"Type-level utilities InferPortDirection returns never for regular Port"},{"id":"242","name":"Accessor functions getPortDirection() returns direction for inbound directed ports"},{"id":"243","name":"Accessor functions getPortDirection() returns direction for outbound directed ports"},{"id":"244","name":"Accessor functions getPortDirection() returns outbound by default"},{"id":"245","name":"Accessor functions getPortMetadata() returns metadata for directed ports"},{"id":"246","name":"Accessor functions getPortMetadata() returns metadata with defaults for ports without explicit metadata"},{"id":"247","name":"integration with adapters directed ports work as provides target"},{"id":"248","name":"integration with adapters directed ports work in requires array"},{"id":"249","name":"integration with adapters type inference flows correctly through the adapter"},{"id":"250","name":"integration with adapters multiple directed ports work together"},{"id":"251","name":"Unified createPort() with object config Direction defaults to outbound returns outbound direction when not specified (full inference)"},{"id":"252","name":"Unified createPort() with object config Direction defaults to outbound returns outbound direction when not specified (with service type)"},{"id":"253","name":"Unified createPort() with object config Direction defaults to outbound preserves inbound literal type when specified (full inference)"},{"id":"254","name":"Unified createPort() with object config Direction defaults to outbound preserves outbound literal type when explicitly specified (full inference)"},{"id":"255","name":"Unified createPort() with object config Name literal type preserved with full inference infers name as literal type when no type params provided"},{"id":"256","name":"Unified createPort() with object config Name literal type preserved with full inference works with InferPortName (full inference)"},{"id":"257","name":"Unified createPort() with object config Metadata handling returns empty array for tags when not specified"},{"id":"258","name":"Unified createPort() with object config Metadata handling returns undefined for description when not specified"},{"id":"259","name":"Unified createPort() with object config Metadata handling returns undefined for category when not specified"},{"id":"260","name":"Unified createPort() with object config Metadata handling preserves full metadata when provided"},{"id":"261","name":"Unified createPort() with object config Type compatibility is assignable to DirectedPort (full inference)"},{"id":"262","name":"Unified createPort() with object config Type compatibility is assignable to base Port (full inference)"},{"id":"263","name":"Unified createPort() with object config Type compatibility works with InferService when service type provided"},{"id":"264","name":"Unified createPort() with object config All createPort() calls return DirectedPort object config creates DirectedPort"},{"id":"265","name":"Unified createPort() with object config All createPort() calls return DirectedPort all ports are DirectedPort with default outbound direction"},{"id":"266","name":"port() builder for service-typed ports infers literal name when service type is provided"},{"id":"267","name":"port() builder for service-typed ports preserves service type"},{"id":"268","name":"port() builder for service-typed ports defaults direction to outbound"},{"id":"269","name":"port() builder for service-typed ports infers literal direction when provided"},{"id":"270","name":"port() builder for service-typed ports supports metadata"},{"id":"271","name":"port() builder for service-typed ports returns DirectedPort with correct type parameters"},{"id":"272","name":"port() builder for service-typed ports allows different port names with same service"},{"id":"273","name":"InboundPorts and OutboundPorts filter utilities InboundPorts filters to only inbound ports"},{"id":"274","name":"InboundPorts and OutboundPorts filter utilities OutboundPorts filters to only outbound ports"},{"id":"275","name":"InboundPorts and OutboundPorts filter utilities InboundPorts returns never for outbound-only union"},{"id":"276","name":"InboundPorts and OutboundPorts filter utilities OutboundPorts returns never for inbound-only union"},{"id":"277","name":"InboundPorts and OutboundPorts filter utilities preserves full DirectedPort type including service and name"}],"source":"/**\n * Unit tests for Directed Port APIs.\n *\n * These tests verify:\n * 1. createInboundPort() creates ports with 'inbound' direction (PORT-01)\n * 2. createOutboundPort() creates ports with 'outbound' direction (PORT-02)\n * 3. Port metadata (description, category, tags) accessible (PORT-03)\n * 4. isDirectedPort() correctly narrows type (PORT-04)\n * 5. Backward compatibility - directed ports work like regular ports (PORT-05)\n */\n\nimport { describe, it, expect, expectTypeOf } from \"vitest\";\nimport {\n  createPort,\n  port,\n  isDirectedPort,\n  isInboundPort,\n  isOutboundPort,\n  getPortDirection,\n  getPortMetadata,\n  createAdapter,\n} from \"../src/index.js\";\nimport type {\n  Port,\n  InboundPort,\n  OutboundPort,\n  DirectedPort,\n  PortDirection,\n  PortMetadata,\n  InferService,\n  InferPortName,\n  InferPortDirection,\n  InferPortMetadata,\n  IsDirectedPort,\n  InboundPorts,\n  OutboundPorts,\n} from \"../src/index.js\";\n\n// =============================================================================\n// Test Interfaces\n// =============================================================================\n\ninterface UserService {\n  getUser(id: string): { id: string; name: string };\n}\n\ninterface UserRepository {\n  findById(id: string): Promise<"+"{ id: string; name: string } | null>;\n}\n\ninterface Logger {\n  log(message: string): void;\n}\n\n// =============================================================================\n// PORT-01: createPort() with inbound direction\n// =============================================================================\n\ndescribe(\"createPort() with inbound direction (PORT-01)\", () => {\n  it(\"creates port with 'inbound' direction\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    expect(getPortDirection(testPort)).toBe(\"inbound\");\n  });\n\n  it(\"preserves port name as literal type\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    expect(testPort.__portName).toBe(\"UserService\");\n    expectTypeOf(testPort.__portName).toEqualTypeOf<"+"\"UserService\">();\n  });\n\n  it(\"preserves service type (InferService works)\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    type Extracted = InferService<"+"typeof testPort>;\n    expectTypeOf<"+"Extracted>().toEqualTypeOf<"+"UserService>();\n  });\n\n  it(\"includes metadata when provided\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n      description: \"User management use cases\",\n      category: \"domain\",\n      tags: [\"user\", \"crud\"],\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBe(\"User management use cases\");\n    expect(metadata?.category).toBe(\"domain\");\n    expect(metadata?.tags).toEqual([\"user\", \"crud\"]);\n  });\n\n  it(\"works with empty metadata (only name)\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"SimplePort\",\n      direction: \"inbound\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBeUndefined();\n    expect(metadata?.category).toBeUndefined();\n    // tags returns empty array when not specified\n    expect(metadata?.tags).toEqual([]);\n  });\n\n  it(\"port is frozen (Object.isFrozen)\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    expect(Object.isFrozen(testPort)).toBe(true);\n  });\n\n  it(\"returns InboundPort type\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    expectTypeOf(testPort).toMatchTypeOf<"+"InboundPort<"+"UserService, \"UserService\">>();\n  });\n});\n\n// =============================================================================\n// PORT-02: createPort() with outbound direction (default)\n// =============================================================================\n\ndescribe(\"createPort() with outbound direction (PORT-02)\", () => {\n  it(\"creates port with 'outbound' direction\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    expect(getPortDirection(testPort)).toBe(\"outbound\");\n  });\n\n  it(\"preserves port name as literal type\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    expect(testPort.__portName).toBe(\"UserRepository\");\n    expectTypeOf(testPort.__portName).toEqualTypeOf<"+"\"UserRepository\">();\n  });\n\n  it(\"preserves service type (InferService works)\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    type Extracted = InferService<"+"typeof testPort>;\n    expectTypeOf<"+"Extracted>().toEqualTypeOf<"+"UserRepository>();\n  });\n\n  it(\"includes metadata when provided\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n      description: \"User persistence operations\",\n      category: \"infrastructure\",\n      tags: [\"user\", \"database\", \"storage\"],\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBe(\"User persistence operations\");\n    expect(metadata?.category).toBe(\"infrastructure\");\n    expect(metadata?.tags).toEqual([\"user\", \"database\", \"storage\"]);\n  });\n\n  it(\"works with empty metadata (only name)\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"SimpleRepo\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBeUndefined();\n  });\n\n  it(\"port is frozen (Object.isFrozen)\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    expect(Object.isFrozen(testPort)).toBe(true);\n  });\n\n  it(\"returns OutboundPort type\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    expectTypeOf(testPort).toMatchTypeOf<"+"OutboundPort<"+"UserRepository, \"UserRepository\">>();\n  });\n});\n\n// =============================================================================\n// PORT-03: Port metadata\n// =============================================================================\n\ndescribe(\"Port metadata (PORT-03)\", () => {\n  it(\"description field accessible via getPortMetadata()\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n      description: \"A test port description\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata?.description).toBe(\"A test port description\");\n  });\n\n  it(\"category field accessible\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n      category: \"infrastructure\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata?.category).toBe(\"infrastructure\");\n  });\n\n  it(\"tags array accessible and readonly\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n      tags: [\"logging\", \"debug\"],\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata?.tags).toEqual([\"logging\", \"debug\"]);\n\n    // Type should be readonly\n    expectTypeOf(metadata?.tags).toEqualTypeOf<"+"readonly string[] | undefined>();\n  });\n\n  it(\"metadata accessible from port created with createPort\", () => {\n    const testPort = port<"+"Logger>()({ name: \"RegularPort\" });\n\n    const metadata = getPortMetadata(testPort);\n    // New API: all ports have metadata (tags defaults to [])\n    expect(metadata).toBeDefined();\n    expect(metadata?.tags).toEqual([]);\n  });\n\n  it(\"metadata object is frozen\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n      description: \"Frozen metadata\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(Object.isFrozen(metadata)).toBe(true);\n  });\n\n  it(\"all metadata fields can be provided together\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"FullMetadataPort\",\n      description: \"Full metadata example\",\n      category: \"domain\",\n      tags: [\"test\", \"example\", \"full\"],\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toEqual({\n      description: \"Full metadata example\",\n      category: \"domain\",\n      tags: [\"test\", \"example\", \"full\"],\n    });\n  });\n});\n\n// =============================================================================\n// PORT-04: isDirectedPort() type guard\n// =============================================================================\n\ndescribe(\"isDirectedPort() type guard (PORT-04)\", () => {\n  it(\"returns true for inbound ports\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestInbound\",\n      direction: \"inbound\",\n    });\n\n    expect(isDirectedPort(testPort)).toBe(true);\n  });\n\n  it(\"returns true for outbound ports\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"TestOutbound\",\n    });\n\n    expect(isDirectedPort(testPort)).toBe(true);\n  });\n\n  it(\"all createPort ports are now directed\", () => {\n    // In the new unified API, all ports are DirectedPort (default outbound)\n    const testPort = port<"+"Logger>()({ name: \"RegularPort\" });\n\n    expect(isDirectedPort(testPort)).toBe(true);\n    expect(getPortDirection(testPort)).toBe(\"outbound\");\n  });\n\n  it(\"type narrowing works correctly (expectTypeOf)\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n    });\n\n    // Before narrowing - port is InboundPort\n    expectTypeOf(testPort).toMatchTypeOf<"+"InboundPort<"+"Logger, \"TestPort\">>();\n\n    if (isDirectedPort(testPort)) {\n      // After narrowing - still DirectedPort\n      expectTypeOf(testPort).toMatchTypeOf<"+"DirectedPort<"+"unknown, string, PortDirection>>();\n    }\n  });\n});\n\n// =============================================================================\n// isInboundPort() and isOutboundPort() guards\n// =============================================================================\n\ndescribe(\"isInboundPort() and isOutboundPort() guards\", () => {\n  it(\"isInboundPort returns true only for inbound\", () => {\n    const inbound = port<"+"Logger>()({\n      name: \"Inbound\",\n      direction: \"inbound\",\n    });\n    const outbound = port<"+"UserRepository>()({ name: \"Outbound\" });\n\n    expect(isInboundPort(inbound)).toBe(true);\n    expect(isInboundPort(outbound)).toBe(false);\n  });\n\n  it(\"isOutboundPort returns true only for outbound\", () => {\n    const inbound = port<"+"Logger>()({\n      name: \"Inbound\",\n      direction: \"inbound\",\n    });\n    const outbound = port<"+"UserRepository>()({ name: \"Outbound\" });\n\n    expect(isOutboundPort(inbound)).toBe(false);\n    expect(isOutboundPort(outbound)).toBe(true);\n  });\n\n  it(\"default direction is outbound\", () => {\n    const testPort = port<"+"Logger>()({ name: \"Regular\" });\n\n    expect(isInboundPort(testPort)).toBe(false);\n    expect(isOutboundPort(testPort)).toBe(true);\n  });\n\n  it(\"type narrowing is specific to direction for isInboundPort\", () => {\n    const testPort: Port<"+"Logger, string> = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n    });\n\n    if (isInboundPort(testPort)) {\n      expectTypeOf(testPort).toMatchTypeOf<"+"InboundPort<"+"unknown, string>>();\n    }\n  });\n\n  it(\"type narrowing is specific to direction for isOutboundPort\", () => {\n    const testPort: Port<"+"UserRepository, string> = port<"+"UserRepository>()({\n      name: \"TestPort\",\n    });\n\n    if (isOutboundPort(testPort)) {\n      expectTypeOf(testPort).toMatchTypeOf<"+"OutboundPort<"+"unknown, string>>();\n    }\n  });\n});\n\n// =============================================================================\n// PORT-05: Backward compatibility\n// =============================================================================\n\ndescribe(\"Backward compatibility (PORT-05)\", () => {\n  it(\"directed ports have __portName property\", () => {\n    const inbound = port<"+"Logger>()({\n      name: \"InboundTest\",\n      direction: \"inbound\",\n    });\n    const outbound = port<"+"UserRepository>()({ name: \"OutboundTest\" });\n\n    expect(inbound.__portName).toBe(\"InboundTest\");\n    expect(outbound.__portName).toBe(\"OutboundTest\");\n  });\n\n  it(\"InferService<"+"DirectedPort> returns service type\", () => {\n    const testPort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    type Service = InferService<"+"typeof testPort>;\n    expectTypeOf<"+"Service>().toEqualTypeOf<"+"UserService>();\n  });\n\n  it(\"InferPortName<"+"DirectedPort> returns name type\", () => {\n    const testPort = port<"+"UserRepository>()({\n      name: \"UserRepository\",\n    });\n\n    type Name = InferPortName<"+"typeof testPort>;\n    expectTypeOf<"+"Name>().toEqualTypeOf<"+"\"UserRepository\">();\n  });\n\n  it(\"directed port assignable to Port<"+"unknown, string>\", () => {\n    const inbound = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n    });\n\n    // Should compile - directed port is assignable to base Port\n    const basePort: Port<"+"unknown, string> = inbound;\n    expect(basePort.__portName).toBe(\"TestPort\");\n  });\n\n  it(\"createPort() with object config works\", () => {\n    const testPort = port<"+"Logger>()({ name: \"RegularPort\" });\n\n    expect(testPort.__portName).toBe(\"RegularPort\");\n    // New API: all ports are directed (default outbound)\n    expect(isDirectedPort(testPort)).toBe(true);\n    expect(getPortDirection(testPort)).toBe(\"outbound\");\n    expect(getPortMetadata(testPort)).toBeDefined();\n  });\n});\n\n// =============================================================================\n// Type-level utilities\n// =============================================================================\n\ndescribe(\"Type-level utilities\", () => {\n  it(\"IsDirectedPort<"+"InboundPort> is true\", () => {\n    type Result = IsDirectedPort<"+"InboundPort<"+"Logger, \"Logger\">>;\n    expectTypeOf<"+"Result>().toEqualTypeOf<"+"true>();\n  });\n\n  it(\"IsDirectedPort<"+"OutboundPort> is true\", () => {\n    type Result = IsDirectedPort<"+"OutboundPort<"+"UserRepository, \"UserRepo\">>;\n    expectTypeOf<"+"Result>().toEqualTypeOf<"+"true>();\n  });\n\n  it(\"IsDirectedPort<"+"Port> is false\", () => {\n    type Result = IsDirectedPort<"+"Port<"+"Logger, \"Logger\">>;\n    expectTypeOf<"+"Result>().toEqualTypeOf<"+"false>();\n  });\n\n  it(\"InferPortDirection extracts direction for inbound\", () => {\n    type Direction = InferPortDirection<"+"InboundPort<"+"Logger, \"Logger\">>;\n    expectTypeOf<"+"Direction>().toEqualTypeOf<"+"\"inbound\">();\n  });\n\n  it(\"InferPortDirection extracts direction for outbound\", () => {\n    type Direction = InferPortDirection<"+"OutboundPort<"+"UserRepository, \"UserRepo\">>;\n    expectTypeOf<"+"Direction>().toEqualTypeOf<"+"\"outbound\">();\n  });\n\n  it(\"InferPortMetadata extracts metadata type\", () => {\n    type Meta = InferPortMetadata<"+"InboundPort<"+"Logger, \"Logger\">>;\n    expectTypeOf<"+"Meta>().toEqualTypeOf<"+"PortMetadata>();\n  });\n\n  it(\"InferPortDirection returns never for regular Port\", () => {\n    type Direction = InferPortDirection<"+"Port<"+"Logger, \"Logger\">>;\n    expectTypeOf<"+"Direction>().toEqualTypeOf<"+"never>();\n  });\n});\n\n// =============================================================================\n// Accessor functions\n// =============================================================================\n\ndescribe(\"Accessor functions\", () => {\n  it(\"getPortDirection() returns direction for inbound directed ports\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n    });\n\n    expect(getPortDirection(testPort)).toBe(\"inbound\");\n  });\n\n  it(\"getPortDirection() returns direction for outbound directed ports\", () => {\n    const testPort = port<"+"UserRepository>()({ name: \"TestPort\" });\n\n    expect(getPortDirection(testPort)).toBe(\"outbound\");\n  });\n\n  it(\"getPortDirection() returns outbound by default\", () => {\n    const testPort = port<"+"Logger>()({ name: \"TestPort\" });\n\n    // New API: defaults to outbound\n    expect(getPortDirection(testPort)).toBe(\"outbound\");\n  });\n\n  it(\"getPortMetadata() returns metadata for directed ports\", () => {\n    const testPort = port<"+"Logger>()({\n      name: \"TestPort\",\n      direction: \"inbound\",\n      description: \"Test description\",\n    });\n\n    const metadata = getPortMetadata(testPort);\n    expect(metadata).toBeDefined();\n    expect(metadata?.description).toBe(\"Test description\");\n  });\n\n  it(\"getPortMetadata() returns metadata with defaults for ports without explicit metadata\", () => {\n    const testPort = port<"+"Logger>()({ name: \"TestPort\" });\n\n    const metadata = getPortMetadata(testPort);\n    // New API: always has metadata, tags default to []\n    expect(metadata).toBeDefined();\n    expect(metadata?.tags).toEqual([]);\n  });\n});\n\n// =============================================================================\n// Integration with adapters\n// =============================================================================\n\ndescribe(\"integration with adapters\", () => {\n  it(\"directed ports work as provides target\", () => {\n    const UserServicePort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n      description: \"User operations\",\n    });\n\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [],\n      lifetime: \"singleton\",\n      factory: () => ({\n        getUser: (id: string) => ({ id, name: \"Test User\" }),\n      }),\n    });\n\n    expect(adapter.provides).toBe(UserServicePort);\n    expect(adapter.lifetime).toBe(\"singleton\");\n\n    // Type inference works\n    expectTypeOf(adapter.provides).toMatchTypeOf<"+"InboundPort<"+"UserService, \"UserService\">>();\n  });\n\n  it(\"directed ports work in requires array\", () => {\n    const LoggerPort = port<"+"Logger>()({\n      name: \"Logger\",\n      category: \"infrastructure\",\n    });\n\n    const UserServicePort = port<"+"UserService>()({\n      name: \"UserService\",\n      direction: \"inbound\",\n    });\n\n    const adapter = createAdapter({\n      provides: UserServicePort,\n      requires: [LoggerPort],\n      lifetime: \"singleton\",\n      factory: deps => ({\n        getUser: (id: string) => {\n          deps.Logger.log(`Getting user ${id}`);\n          return { id, name: \"Test User\" };\n        },\n      }),\n    });\n\n    expect(adapter.requires).toContain(LoggerPort);\n    expect(adapter.requires.length).toBe(1);\n  });\n\n  it(\"type inference flows correctly through the adapter\", () => {\n    const RepoPort = port<"+"UserRepository>()({\n      name: \"Repo\",\n    });\n\n    const ServicePort = port<"+"UserService>()({\n      name: \"Service\",\n      direction: \"inbound\",\n    });\n\n    const adapter = createAdapter({\n      provides: ServicePort,\n      requires: [RepoPort],\n      lifetime: \"scoped\",\n      factory: deps => {\n        // deps.Repo should be typed as UserRepository\n        expectTypeOf(deps.Repo).toMatchTypeOf<"+"UserRepository>();\n\n        return {\n          getUser: (id: string) => ({ id, name: \"From Repo\" }),\n        };\n      },\n    });\n\n    // Verify return type\n    type ProvidedService = InferService<"+"typeof adapter.provides>;\n    expectTypeOf<"+"ProvidedService>().toEqualTypeOf<"+"UserService>();\n  });\n\n  it(\"multiple directed ports work together\", () => {\n    const ConfigPort = port<"+"{ appName: string }>()({ name: \"Config\" });\n    const LoggerPort = port<"+"Logger>()({\n      name: \"Logger\",\n    });\n    const ServicePort = port<"+"UserService>()({\n      name: \"AppService\",\n      direction: \"inbound\",\n    });\n\n    const adapter = createAdapter({\n      provides: ServicePort,\n      requires: [ConfigPort, LoggerPort],\n      lifetime: \"singleton\",\n      factory: deps => {\n        // Both dependencies typed correctly\n        expectTypeOf(deps.Config).toMatchTypeOf<"+"{ appName: string }>();\n        expectTypeOf(deps.Logger).toMatchTypeOf<"+"Logger>();\n\n        return {\n          getUser: (id: string) => ({ id, name: deps.Config.appName }),\n        };\n      },\n    });\n\n    expect(adapter.requires.length).toBe(2);\n  });\n});\n\n// =============================================================================\n// Unified createPort() API Tests\n// =============================================================================\n\ndescribe(\"Unified createPort() with object config\", () => {\n  describe(\"Direction defaults to outbound\", () => {\n    it(\"returns outbound direction when not specified (full inference)\", () => {\n      // Full inference - TService is unknown, but name is literal\n      const LoggerPort = createPort({ name: \"Logger\" });\n\n      expect(getPortDirection(LoggerPort)).toBe(\"outbound\");\n      expectTypeOf<"+"InferPortDirection<"+"typeof LoggerPort>>().toEqualTypeOf<"+"\"outbound\">();\n      expectTypeOf(LoggerPort.__portName).toEqualTypeOf<"+"\"Logger\">();\n    });\n\n    it(\"returns outbound direction when not specified (with service type)\", () => {\n      // With service type - TName becomes string (TypeScript limitation)\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      expect(getPortDirection(LoggerPort)).toBe(\"outbound\");\n      expect(LoggerPort.__portName).toBe(\"Logger\");\n      // Note: When providing single type param, name type is widened to string\n      // This is a TypeScript limitation with partial type argument inference\n    });\n\n    it(\"preserves inbound literal type when specified (full inference)\", () => {\n      const ServicePort = createPort({\n        name: \"UserService\",\n        direction: \"inbound\",\n      });\n\n      expect(getPortDirection(ServicePort)).toBe(\"inbound\");\n      expectTypeOf<"+"InferPortDirection<"+"typeof ServicePort>>().toEqualTypeOf<"+"\"inbound\">();\n      expectTypeOf(ServicePort.__portName).toEqualTypeOf<"+"\"UserService\">();\n    });\n\n    it(\"preserves outbound literal type when explicitly specified (full inference)\", () => {\n      const RepoPort = createPort({\n        name: \"UserRepository\",\n        direction: \"outbound\",\n      });\n\n      expect(getPortDirection(RepoPort)).toBe(\"outbound\");\n      expectTypeOf<"+"InferPortDirection<"+"typeof RepoPort>>().toEqualTypeOf<"+"\"outbound\">();\n    });\n  });\n\n  describe(\"Name literal type preserved with full inference\", () => {\n    it(\"infers name as literal type when no type params provided\", () => {\n      const LoggerPort = createPort({ name: \"Logger\" });\n\n      expect(LoggerPort.__portName).toBe(\"Logger\");\n      // Full inference preserves literal type\n      expectTypeOf(LoggerPort.__portName).toEqualTypeOf<"+"\"Logger\">();\n    });\n\n    it(\"works with InferPortName (full inference)\", () => {\n      const LoggerPort = createPort({ name: \"MyLogger\" });\n\n      expectTypeOf<"+"InferPortName<"+"typeof LoggerPort>>().toEqualTypeOf<"+"\"MyLogger\">();\n    });\n  });\n\n  describe(\"Metadata handling\", () => {\n    it(\"returns empty array for tags when not specified\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n      const metadata = getPortMetadata(LoggerPort);\n\n      expect(metadata).toBeDefined();\n      expect(metadata?.tags).toEqual([]);\n    });\n\n    it(\"returns undefined for description when not specified\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n      const metadata = getPortMetadata(LoggerPort);\n\n      expect(metadata?.description).toBeUndefined();\n    });\n\n    it(\"returns undefined for category when not specified\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n      const metadata = getPortMetadata(LoggerPort);\n\n      expect(metadata?.category).toBeUndefined();\n    });\n\n    it(\"preserves full metadata when provided\", () => {\n      const LoggerPort = port<"+"Logger>()({\n        name: \"Logger\",\n        description: \"Application logging\",\n        category: \"infrastructure\",\n        tags: [\"logging\", \"core\"],\n      });\n\n      const metadata = getPortMetadata(LoggerPort);\n      expect(metadata?.description).toBe(\"Application logging\");\n      expect(metadata?.category).toBe(\"infrastructure\");\n      expect(metadata?.tags).toEqual([\"logging\", \"core\"]);\n    });\n  });\n\n  describe(\"Type compatibility\", () => {\n    it(\"is assignable to DirectedPort (full inference)\", () => {\n      const LoggerPort = createPort({ name: \"Logger\" });\n\n      // With full inference, TService is unknown but name literal is preserved\n      expectTypeOf(LoggerPort).toMatchTypeOf<"+"DirectedPort<"+"unknown, \"Logger\", \"outbound\">>();\n    });\n\n    it(\"is assignable to base Port (full inference)\", () => {\n      const LoggerPort = createPort({ name: \"Logger\" });\n\n      // DirectedPort extends Port, so this should work\n      expectTypeOf(LoggerPort).toMatchTypeOf<"+"Port<"+"unknown, \"Logger\">>();\n    });\n\n    it(\"works with InferService when service type provided\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      expectTypeOf<"+"InferService<"+"typeof LoggerPort>>().toEqualTypeOf<"+"Logger>();\n    });\n  });\n\n  describe(\"All createPort() calls return DirectedPort\", () => {\n    it(\"object config creates DirectedPort\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      expect(LoggerPort.__portName).toBe(\"Logger\");\n      expectTypeOf(LoggerPort.__portName).toEqualTypeOf<"+"\"Logger\">();\n    });\n\n    it(\"all ports are DirectedPort with default outbound direction\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      // All ports created with createPort are now DirectedPort\n      expect(isDirectedPort(LoggerPort)).toBe(true);\n      expect(getPortDirection(LoggerPort)).toBe(\"outbound\");\n    });\n  });\n});\n\n// =============================================================================\n// port() Builder - Service-typed ports with full name inference\n// =============================================================================\n\ndescribe(\"port() builder for service-typed ports\", () => {\n  it(\"infers literal name when service type is provided\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n    // TName should be \"Logger\" (literal), not string\n    expectTypeOf(LoggerPort.__portName).toEqualTypeOf<"+"\"Logger\">();\n    expect(LoggerPort.__portName).toBe(\"Logger\");\n  });\n\n  it(\"preserves service type\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n    expectTypeOf<"+"InferService<"+"typeof LoggerPort>>().toEqualTypeOf<"+"Logger>();\n  });\n\n  it(\"defaults direction to outbound\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n    expectTypeOf<"+"InferPortDirection<"+"typeof LoggerPort>>().toEqualTypeOf<"+"\"outbound\">();\n    expect(getPortDirection(LoggerPort)).toBe(\"outbound\");\n  });\n\n  it(\"infers literal direction when provided\", () => {\n    const RequestPort = port<"+"UserService>()({ name: \"Request\", direction: \"inbound\" });\n\n    expectTypeOf<"+"InferPortDirection<"+"typeof RequestPort>>().toEqualTypeOf<"+"\"inbound\">();\n    expect(getPortDirection(RequestPort)).toBe(\"inbound\");\n  });\n\n  it(\"supports metadata\", () => {\n    const LoggerPort = port<"+"Logger>()({\n      name: \"Logger\",\n      description: \"Application logging\",\n      category: \"infrastructure\",\n      tags: [\"logging\"],\n    });\n\n    const metadata = getPortMetadata(LoggerPort);\n    expect(metadata?.description).toBe(\"Application logging\");\n    expect(metadata?.category).toBe(\"infrastructure\");\n    expect(metadata?.tags).toEqual([\"logging\"]);\n  });\n\n  it(\"returns DirectedPort with correct type parameters\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n    // Full type check\n    expectTypeOf(LoggerPort).toEqualTypeOf<"+"DirectedPort<"+"Logger, \"Logger\", \"outbound\">>();\n  });\n\n  it(\"allows different port names with same service\", () => {\n    const ConsoleLogger = port<"+"Logger>()({ name: \"ConsoleLogger\" });\n    const FileLogger = port<"+"Logger>()({ name: \"FileLogger\" });\n\n    expectTypeOf(ConsoleLogger.__portName).toEqualTypeOf<"+"\"ConsoleLogger\">();\n    expectTypeOf(FileLogger.__portName).toEqualTypeOf<"+"\"FileLogger\">();\n  });\n});\n\n// =============================================================================\n// InboundPorts and OutboundPorts Filter Utilities\n// =============================================================================\n\ndescribe(\"InboundPorts and OutboundPorts filter utilities\", () => {\n  it(\"InboundPorts filters to only inbound ports\", () => {\n    const InboundPort1 = port<"+"{ a: string }>()({ name: \"Inbound1\", direction: \"inbound\" });\n    const OutboundPort1 = port<"+"{ b: string }>()({ name: \"Outbound1\" });\n    const InboundPort2 = port<"+"{ c: string }>()({ name: \"Inbound2\", direction: \"inbound\" });\n\n    type AllPorts = typeof InboundPort1 | typeof OutboundPort1 | typeof InboundPort2;\n    type Filtered = InboundPorts<"+"AllPorts>;\n\n    // Should only include inbound ports\n    expectTypeOf<"+"Filtered>().toEqualTypeOf<"+"typeof InboundPort1 | typeof InboundPort2>();\n  });\n\n  it(\"OutboundPorts filters to only outbound ports\", () => {\n    const InboundPort1 = port<"+"{ a: string }>()({ name: \"Inbound1\", direction: \"inbound\" });\n    const OutboundPort1 = port<"+"{ b: string }>()({ name: \"Outbound1\" });\n    const OutboundPort2 = port<"+"{ c: string }>()({ name: \"Outbound2\" });\n\n    type AllPorts = typeof InboundPort1 | typeof OutboundPort1 | typeof OutboundPort2;\n    type Filtered = OutboundPorts<"+"AllPorts>;\n\n    // Should only include outbound ports\n    expectTypeOf<"+"Filtered>().toEqualTypeOf<"+"typeof OutboundPort1 | typeof OutboundPort2>();\n  });\n\n  it(\"InboundPorts returns never for outbound-only union\", () => {\n    const OutboundOnly = port<"+"{ a: string }>()({ name: \"OutboundOnly\" });\n\n    type Filtered = InboundPorts<"+"typeof OutboundOnly>;\n\n    expectTypeOf<"+"Filtered>().toEqualTypeOf<"+"never>();\n  });\n\n  it(\"OutboundPorts returns never for inbound-only union\", () => {\n    const InboundOnly = port<"+"{ a: string }>()({ name: \"InboundOnly\", direction: \"inbound\" });\n\n    type Filtered = OutboundPorts<"+"typeof InboundOnly>;\n\n    expectTypeOf<"+"Filtered>().toEqualTypeOf<"+"never>();\n  });\n\n  it(\"preserves full DirectedPort type including service and name\", () => {\n    const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n    const RequestPort = port<"+"UserService>()({ name: \"Request\", direction: \"inbound\" });\n\n    type AllPorts = typeof LoggerPort | typeof RequestPort;\n    type FilteredInbound = InboundPorts<"+"AllPorts>;\n    type FilteredOutbound = OutboundPorts<"+"AllPorts>;\n\n    // Verify filtered types maintain full type information\n    expectTypeOf<"+"FilteredInbound>().toEqualTypeOf<"+"typeof RequestPort>();\n    expectTypeOf<"+"FilteredOutbound>().toEqualTypeOf<"+"typeof LoggerPort>();\n  });\n});\n"},"tests/uat-phase6.test.ts":{"tests":[{"id":"278","name":"Phase 6 UAT: Core Port API Test 1: port() builder infers literal name infers TName as literal type when TService is provided"},{"id":"279","name":"Phase 6 UAT: Core Port API Test 1: port() builder infers literal name preserves service type"},{"id":"280","name":"Phase 6 UAT: Core Port API Test 1: port() builder infers literal name returns correct DirectedPort type"},{"id":"281","name":"Phase 6 UAT: Core Port API Test 2: Direction defaults to outbound defaults direction to 'outbound' when not specified"},{"id":"282","name":"Phase 6 UAT: Core Port API Test 2: Direction defaults to outbound infers direction type as 'outbound'"},{"id":"283","name":"Phase 6 UAT: Core Port API Test 3: Explicit inbound direction creates port with 'inbound' direction when specified"},{"id":"284","name":"Phase 6 UAT: Core Port API Test 3: Explicit inbound direction infers direction type as 'inbound'"},{"id":"285","name":"Phase 6 UAT: Core Port API Test 4: Metadata - description property stores and returns description from metadata"},{"id":"286","name":"Phase 6 UAT: Core Port API Test 5: Metadata - category property stores and returns category from metadata"},{"id":"287","name":"Phase 6 UAT: Core Port API Test 5: Metadata - category property accepts custom category strings"},{"id":"288","name":"Phase 6 UAT: Core Port API Test 6: Metadata - tags property stores and returns tags from metadata"},{"id":"289","name":"Phase 6 UAT: Core Port API Test 7: Default metadata values returns empty array for tags when not specified"},{"id":"290","name":"Phase 6 UAT: Core Port API Test 7: Default metadata values returns undefined for description when not specified"},{"id":"291","name":"Phase 6 UAT: Core Port API Test 7: Default metadata values returns undefined for category when not specified"},{"id":"292","name":"Phase 6 UAT: Core Port API Test 8: Full type inference infers literal name with createPort (no type params)"},{"id":"293","name":"Phase 6 UAT: Core Port API Test 8: Full type inference service type is unknown when not specified"},{"id":"294","name":"Phase 6 UAT: Core Port API Test 8: Full type inference direction defaults to outbound"},{"id":"295","name":"Phase 6 UAT: Core Port API Test 8: Full type inference infers inbound direction when specified"},{"id":"296","name":"Phase 6 UAT: Core Port API Test 9: Build verification all imports resolve correctly"},{"id":"297","name":"Phase 6 UAT: Core Port API Test 10: Full integration creates fully configured port with all options"},{"id":"298","name":"Phase 6 UAT: Core Port API Test 10: Full integration different port names with same service work correctly"}],"source":"/**\n * UAT Tests for Phase 6: Core Port API\n *\n * Validates all user-observable outcomes from the unified createPort() API.\n */\n\nimport { describe, it, expect, expectTypeOf } from \"vitest\";\nimport {\n  port,\n  createPort,\n  getPortDirection,\n  getPortMetadata,\n  type DirectedPort,\n  type InferService,\n  type InferPortDirection,\n} from \"../src/index.js\";\n\n// Test service interfaces\ninterface MyService {\n  doSomething(): void;\n}\n\ninterface Logger {\n  log(message: string): void;\n}\n\ndescribe(\"Phase 6 UAT: Core Port API\", () => {\n  // ==========================================================================\n  // Test 1: Basic port() with object config - TName inference\n  // ==========================================================================\n  describe(\"Test 1: port() builder infers literal name\", () => {\n    it(\"infers TName as literal type when TService is provided\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      // TName should be \"Logger\" (literal), not string\n      expectTypeOf(LoggerPort.__portName).toEqualTypeOf<"+"\"Logger\">();\n      expect(LoggerPort.__portName).toBe(\"Logger\");\n    });\n\n    it(\"preserves service type\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      expectTypeOf<"+"InferService<"+"typeof LoggerPort>>().toEqualTypeOf<"+"Logger>();\n    });\n\n    it(\"returns correct DirectedPort type\", () => {\n      const LoggerPort = port<"+"Logger>()({ name: \"Logger\" });\n\n      expectTypeOf(LoggerPort).toEqualTypeOf<"+"DirectedPort<"+"Logger, \"Logger\", \"outbound\">>();\n    });\n  });\n\n  // ==========================================================================\n  // Test 2: Direction defaults to outbound\n  // ==========================================================================\n  describe(\"Test 2: Direction defaults to outbound\", () => {\n    it(\"defaults direction to 'outbound' when not specified\", () => {\n      const TestPort = port<"+"MyService>()({ name: \"Test\" });\n\n      expect(getPortDirection(TestPort)).toBe(\"outbound\");\n    });\n\n    it(\"infers direction type as 'outbound'\", () => {\n      const TestPort = port<"+"MyService>()({ name: \"Test\" });\n\n      expectTypeOf<"+"InferPortDirection<"+"typeof TestPort>>().toEqualTypeOf<"+"\"outbound\">();\n    });\n  });\n\n  // ==========================================================================\n  // Test 3: Explicit inbound direction\n  // ==========================================================================\n  describe(\"Test 3: Explicit inbound direction\", () => {\n    it(\"creates port with 'inbound' direction when specified\", () => {\n      const RequestPort = port<"+"MyService>()({ name: \"Request\", direction: \"inbound\" });\n\n      expect(getPortDirection(RequestPort)).toBe(\"inbound\");\n    });\n\n    it(\"infers direction type as 'inbound'\", () => {\n      const RequestPort = port<"+"MyService>()({ name: \"Request\", direction: \"inbound\" });\n\n      expectTypeOf<"+"InferPortDirection<"+"typeof RequestPort>>().toEqualTypeOf<"+"\"inbound\">();\n    });\n  });\n\n  // ==========================================================================\n  // Test 4: Metadata - description property\n  // ==========================================================================\n  describe(\"Test 4: Metadata - description property\", () => {\n    it(\"stores and returns description from metadata\", () => {\n      const TestPort = port<"+"MyService>()({\n        name: \"Test\",\n        description: \"My port description\",\n      });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.description).toBe(\"My port description\");\n    });\n  });\n\n  // ==========================================================================\n  // Test 5: Metadata - category property\n  // ==========================================================================\n  describe(\"Test 5: Metadata - category property\", () => {\n    it(\"stores and returns category from metadata\", () => {\n      const TestPort = port<"+"MyService>()({\n        name: \"Test\",\n        category: \"infrastructure\",\n      });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.category).toBe(\"infrastructure\");\n    });\n\n    it(\"accepts custom category strings\", () => {\n      const TestPort = port<"+"MyService>()({\n        name: \"Test\",\n        category: \"my-custom-category\",\n      });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.category).toBe(\"my-custom-category\");\n    });\n  });\n\n  // ==========================================================================\n  // Test 6: Metadata - tags property\n  // ==========================================================================\n  describe(\"Test 6: Metadata - tags property\", () => {\n    it(\"stores and returns tags from metadata\", () => {\n      const TestPort = port<"+"MyService>()({\n        name: \"Test\",\n        tags: [\"logging\", \"core\"],\n      });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.tags).toEqual([\"logging\", \"core\"]);\n    });\n  });\n\n  // ==========================================================================\n  // Test 7: Default metadata values\n  // ==========================================================================\n  describe(\"Test 7: Default metadata values\", () => {\n    it(\"returns empty array for tags when not specified\", () => {\n      const TestPort = port<"+"MyService>()({ name: \"Test\" });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.tags).toEqual([]);\n    });\n\n    it(\"returns undefined for description when not specified\", () => {\n      const TestPort = port<"+"MyService>()({ name: \"Test\" });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.description).toBeUndefined();\n    });\n\n    it(\"returns undefined for category when not specified\", () => {\n      const TestPort = port<"+"MyService>()({ name: \"Test\" });\n\n      const metadata = getPortMetadata(TestPort);\n      expect(metadata?.category).toBeUndefined();\n    });\n  });\n\n  // ==========================================================================\n  // Test 8: Full type inference (without explicit service type)\n  // ==========================================================================\n  describe(\"Test 8: Full type inference\", () => {\n    it(\"infers literal name with createPort (no type params)\", () => {\n      const TestPort = createPort({ name: \"TestInferred\" });\n\n      // Name should be literal\n      expectTypeOf(TestPort.__portName).toEqualTypeOf<"+"\"TestInferred\">();\n      expect(TestPort.__portName).toBe(\"TestInferred\");\n    });\n\n    it(\"service type is unknown when not specified\", () => {\n      const TestPort = createPort({ name: \"TestInferred\" });\n\n      expectTypeOf<"+"InferService<"+"typeof TestPort>>().toEqualTypeOf<"+"unknown>();\n    });\n\n    it(\"direction defaults to outbound\", () => {\n      const TestPort = createPort({ name: \"TestInferred\" });\n\n      expectTypeOf<"+"InferPortDirection<"+"typeof TestPort>>().toEqualTypeOf<"+"\"outbound\">();\n      expect(getPortDirection(TestPort)).toBe(\"outbound\");\n    });\n\n    it(\"infers inbound direction when specified\", () => {\n      const TestPort = createPort({ name: \"TestInferred\", direction: \"inbound\" });\n\n      expectTypeOf<"+"InferPortDirection<"+"typeof TestPort>>().toEqualTypeOf<"+"\"inbound\">();\n      expect(getPortDirection(TestPort)).toBe(\"inbound\");\n    });\n  });\n\n  // ==========================================================================\n  // Test 9: Build passes (verified by test runner)\n  // ==========================================================================\n  describe(\"Test 9: Build verification\", () => {\n    it(\"all imports resolve correctly\", () => {\n      // If this test runs, the build is working\n      expect(typeof port).toBe(\"function\");\n      expect(typeof createPort).toBe(\"function\");\n      expect(typeof getPortDirection).toBe(\"function\");\n      expect(typeof getPortMetadata).toBe(\"function\");\n    });\n  });\n\n  // ==========================================================================\n  // Test 10: All functionality works together\n  // ==========================================================================\n  describe(\"Test 10: Full integration\", () => {\n    it(\"creates fully configured port with all options\", () => {\n      const FullPort = port<"+"Logger>()({\n        name: \"FullLogger\",\n        direction: \"outbound\",\n        description: \"Full logging service\",\n        category: \"infrastructure\",\n        tags: [\"logging\", \"observability\", \"core\"],\n      });\n\n      // Verify all properties\n      expect(FullPort.__portName).toBe(\"FullLogger\");\n      expect(getPortDirection(FullPort)).toBe(\"outbound\");\n\n      const metadata = getPortMetadata(FullPort);\n      expect(metadata?.description).toBe(\"Full logging service\");\n      expect(metadata?.category).toBe(\"infrastructure\");\n      expect(metadata?.tags).toEqual([\"logging\", \"observability\", \"core\"]);\n\n      // Verify types\n      expectTypeOf(FullPort).toEqualTypeOf<"+"DirectedPort<"+"Logger, \"FullLogger\", \"outbound\", \"infrastructure\">>();\n    });\n\n    it(\"different port names with same service work correctly\", () => {\n      const ConsoleLogger = port<"+"Logger>()({ name: \"ConsoleLogger\" });\n      const FileLogger = port<"+"Logger>()({ name: \"FileLogger\" });\n\n      expect(ConsoleLogger.__portName).toBe(\"ConsoleLogger\");\n      expect(FileLogger.__portName).toBe(\"FileLogger\");\n\n      expectTypeOf(ConsoleLogger.__portName).toEqualTypeOf<"+"\"ConsoleLogger\">();\n      expectTypeOf(FileLogger.__portName).toEqualTypeOf<"+"\"FileLogger\">();\n    });\n  });\n});\n"},"tests/library-inspector-types.test.ts":{"tests":[{"id":"299","name":"isLibraryInspector() returns true for a minimal valid inspector (name + getSnapshot)"},{"id":"300","name":"isLibraryInspector() returns true for inspector with subscribe and dispose"},{"id":"301","name":"isLibraryInspector() returns false for null"},{"id":"302","name":"isLibraryInspector() returns false for undefined"},{"id":"303","name":"isLibraryInspector() returns false for a string"},{"id":"304","name":"isLibraryInspector() returns false for a number"},{"id":"305","name":"isLibraryInspector() returns false for an empty object (missing name and getSnapshot)"},{"id":"306","name":"isLibraryInspector() returns false when name is missing"},{"id":"307","name":"isLibraryInspector() returns false when name is not a string"},{"id":"308","name":"isLibraryInspector() returns false when name is empty string"},{"id":"309","name":"isLibraryInspector() returns false when getSnapshot is missing"},{"id":"310","name":"isLibraryInspector() returns false when getSnapshot is not a function"},{"id":"311","name":"isLibraryInspector() returns false when subscribe is present but not a function"},{"id":"312","name":"isLibraryInspector() returns false when dispose is present but not a function"},{"id":"313","name":"isLibraryInspector() returns true when subscribe is absent (optional)"},{"id":"314","name":"isLibraryInspector() returns true when dispose is absent (optional)"},{"id":"315","name":"createLibraryInspectorPort() creates a port with the given name"},{"id":"316","name":"createLibraryInspectorPort() creates a port with 'outbound' direction"},{"id":"317","name":"createLibraryInspectorPort() creates a port with 'library-inspector' category in metadata"},{"id":"318","name":"createLibraryInspectorPort() passes description through to metadata"},{"id":"319","name":"createLibraryInspectorPort() passes tags through to metadata"},{"id":"320","name":"createLibraryInspectorPort() returns a frozen port object"}],"source":"/**\n * Tests for library inspector types: isLibraryInspector() and createLibraryInspectorPort().\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport {\n  isLibraryInspector,\n  createLibraryInspectorPort,\n  getPortDirection,\n  getPortMetadata,\n} from \"../src/index.js\";\n\n// =============================================================================\n// isLibraryInspector()\n// =============================================================================\n\ndescribe(\"isLibraryInspector()\", () => {\n  it(\"returns true for a minimal valid inspector (name + getSnapshot)\", () => {\n    const inspector = {\n      name: \"test-lib\",\n      getSnapshot: () => ({}),\n    };\n    expect(isLibraryInspector(inspector)).toBe(true);\n  });\n\n  it(\"returns true for inspector with subscribe and dispose\", () => {\n    const inspector = {\n      name: \"test-lib\",\n      getSnapshot: () => ({}),\n      subscribe: () => () => {},\n      dispose: () => {},\n    };\n    expect(isLibraryInspector(inspector)).toBe(true);\n  });\n\n  it(\"returns false for null\", () => {\n    expect(isLibraryInspector(null)).toBe(false);\n  });\n\n  it(\"returns false for undefined\", () => {\n    expect(isLibraryInspector(undefined)).toBe(false);\n  });\n\n  it(\"returns false for a string\", () => {\n    expect(isLibraryInspector(\"inspector\")).toBe(false);\n  });\n\n  it(\"returns false for a number\", () => {\n    expect(isLibraryInspector(42)).toBe(false);\n  });\n\n  it(\"returns false for an empty object (missing name and getSnapshot)\", () => {\n    expect(isLibraryInspector({})).toBe(false);\n  });\n\n  it(\"returns false when name is missing\", () => {\n    expect(isLibraryInspector({ getSnapshot: () => ({}) })).toBe(false);\n  });\n\n  it(\"returns false when name is not a string\", () => {\n    expect(isLibraryInspector({ name: 42, getSnapshot: () => ({}) })).toBe(false);\n  });\n\n  it(\"returns false when name is empty string\", () => {\n    expect(isLibraryInspector({ name: \"\", getSnapshot: () => ({}) })).toBe(false);\n  });\n\n  it(\"returns false when getSnapshot is missing\", () => {\n    expect(isLibraryInspector({ name: \"test\" })).toBe(false);\n  });\n\n  it(\"returns false when getSnapshot is not a function\", () => {\n    expect(isLibraryInspector({ name: \"test\", getSnapshot: \"not-a-fn\" })).toBe(false);\n  });\n\n  it(\"returns false when subscribe is present but not a function\", () => {\n    expect(\n      isLibraryInspector({\n        name: \"test\",\n        getSnapshot: () => ({}),\n        subscribe: \"not-a-fn\",\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns false when dispose is present but not a function\", () => {\n    expect(\n      isLibraryInspector({\n        name: \"test\",\n        getSnapshot: () => ({}),\n        dispose: \"not-a-fn\",\n      })\n    ).toBe(false);\n  });\n\n  it(\"returns true when subscribe is absent (optional)\", () => {\n    expect(\n      isLibraryInspector({\n        name: \"test\",\n        getSnapshot: () => ({}),\n      })\n    ).toBe(true);\n  });\n\n  it(\"returns true when dispose is absent (optional)\", () => {\n    expect(\n      isLibraryInspector({\n        name: \"test\",\n        getSnapshot: () => ({}),\n      })\n    ).toBe(true);\n  });\n});\n\n// =============================================================================\n// createLibraryInspectorPort()\n// =============================================================================\n\ndescribe(\"createLibraryInspectorPort()\", () => {\n  it(\"creates a port with the given name\", () => {\n    const port = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    expect(port.__portName).toBe(\"FlowInspector\");\n  });\n\n  it(\"creates a port with 'outbound' direction\", () => {\n    const port = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    expect(getPortDirection(port)).toBe(\"outbound\");\n  });\n\n  it(\"creates a port with 'library-inspector' category in metadata\", () => {\n    const port = createLibraryInspectorPort({ name: \"FlowInspector\" });\n    const metadata = getPortMetadata(port);\n    expect(metadata).toBeDefined();\n    expect(metadata?.category).toBe(\"library-inspector\");\n  });\n\n  it(\"passes description through to metadata\", () => {\n    const port = createLibraryInspectorPort({\n      name: \"StoreInspector\",\n      description: \"Store inspection port\",\n    });\n    const metadata = getPortMetadata(port);\n    expect(metadata?.description).toBe(\"Store inspection port\");\n  });\n\n  it(\"passes tags through to metadata\", () => {\n    const port = createLibraryInspectorPort({\n      name: \"StoreInspector\",\n      tags: [\"store\", \"inspection\"],\n    });\n    const metadata = getPortMetadata(port);\n    expect(metadata?.tags).toEqual([\"store\", \"inspection\"]);\n  });\n\n  it(\"returns a frozen port object\", () => {\n    const port = createLibraryInspectorPort({ name: \"TestInspector\" });\n    expect(Object.isFrozen(port)).toBe(true);\n  });\n});\n"},"tests/directed-ports-mutants.test.ts":{"tests":[{"id":"321","name":"DIRECTION_BRAND symbol is the Symbol.for('@hex-di/core/PortDirection')"},{"id":"322","name":"DIRECTION_BRAND symbol has correct description"},{"id":"323","name":"DIRECTION_BRAND symbol is not an empty symbol"},{"id":"324","name":"METADATA_KEY symbol is the Symbol.for('@hex-di/core/PortMetadata')"},{"id":"325","name":"METADATA_KEY symbol has correct description"},{"id":"326","name":"METADATA_KEY symbol is not an empty symbol"},{"id":"327","name":"isDirectedPort() - negative cases returns false for a plain object with __portName but no direction brand"},{"id":"328","name":"isDirectedPort() - negative cases returns false for a port object with wrong direction value"},{"id":"329","name":"isInboundPort() - negative cases returns false for a plain object with __portName but no direction brand"},{"id":"330","name":"isOutboundPort() - negative cases returns false for a plain object with __portName but no direction brand"},{"id":"331","name":"getPortDirection() - non-directed ports returns undefined for a plain port without direction brand"},{"id":"332","name":"getPortDirection() - non-directed ports returns direction value from branded port"},{"id":"333","name":"getPortMetadata() - ports without metadata key returns undefined for a plain port without metadata key"},{"id":"334","name":"getPortMetadata() - ports without metadata key returns metadata from a port with metadata key"},{"id":"335","name":"Direction value precision inbound direction is exactly the string 'inbound'"},{"id":"336","name":"Direction value precision outbound direction is exactly the string 'outbound'"},{"id":"337","name":"Direction value precision default direction is exactly 'outbound'"}],"source":"/**\n * Tests specifically targeting surviving mutants in directed ports.\n
