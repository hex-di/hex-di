<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HexDI Playground</title>
    <meta
      name="description"
      content="Interactive browser-based playground for experimenting with HexDI dependency injection patterns"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: var(--hex-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--hex-bg-primary, #ffffff);
        color: var(--hex-text-primary, #1e293b);
      }

      :focus-visible {
        outline: 2px solid var(--hex-accent, #6366f1);
        outline-offset: 1px;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--hex-border, #e0e0e8);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--hex-border-strong, #c8c8d4);
      }

      @keyframes hex-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes hex-fade-in {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
