ed by the async module on import.\nlet _ResultAsyncImpl: {\n  ok<"+"T>(value: T): ResultAsync<"+"T, never>;\n  err<"+"E>(error: E): ResultAsync<"+"never, E>;\n  fromSafePromise<"+"T>(promise: Promise<"+"T>): ResultAsync<"+"T, never>;\n} | null = null;\n\nexport function _setResultAsyncImpl(impl: typeof _ResultAsyncImpl): void {\n  _ResultAsyncImpl = impl;\n}\n\nfunction getResultAsync(): NonNullable<"+"typeof _ResultAsyncImpl> {\n  if (_ResultAsyncImpl === null) {\n    throw new Error(\n      \"ResultAsync not initialized. Import '@hex-di/result' instead of importing from core directly.\"\n    );\n  }\n  return _ResultAsyncImpl;\n}\n\n// Ok's iterator returns value immediately (done: true on first next()).\n// Implemented as a plain object instead of a generator* to avoid require-yield lint.\nfunction createOkIterator<"+"T>(value: T): Generator<"+"never, T, unknown> {\n  const doneResult: IteratorReturnResult<"+"T> = { done: true, value };\n  const iterator: Generator<"+"never, T, unknown> = {\n    next(): IteratorResult<"+"never, T> {\n      return doneResult;\n    },\n    return(v: T): IteratorResult<"+"never, T> {\n      return { done: true, value: v };\n    },\n    throw(e: unknown): IteratorResult<"+"never, T> {\n      throw e;\n    },\n    [Symbol.iterator]() {\n      return iterator;\n    },\n  };\n  return iterator;\n}\n\n/**\n * Creates a frozen {@link Ok} instance containing the given value.\n *\n * The returned object is a plain object implementing the `Ok<"+"T, never>` interface.\n * All methods are closures capturing `value`. The object is stamped with\n * `[RESULT_BRAND]: true` and frozen via `Object.freeze()` before being returned.\n *\n * @typeParam T - The type of the success value.\n * @param value - The success value to wrap.\n * @returns A frozen `Ok<"+"T, never>` instance.\n *\n * @example\n * ```ts\n * import { ok } from '@hex-di/result';\n *\n * const result = ok(42);\n * console.log(result.isOk());  // true\n * console.log(result.value);   //     expect() {\n      return value;\n    },\n    expectErr(message) {\n      throw new UnwrapError(message, { _tag: \"Ok\", value });\n    },\n\n    // Conversion\n    toNullable() {\n      return value;\n    },\n    toUndefined() {\n      return value;\n    },\n    intoTuple() {\n      return [null, value];\n    },\n    merge() {\n      return value;\n    },\n\n    // Async bridges\n    toAsync() {\n      return getResultAsync().ok(value);\n    },\n    asyncMap(f) {\n      return getResultAsync().fromSafePromise(f(value));\n    },\n    asyncAndThen(f) {\n      return f(value);\n    },\n\n    // Option bridges\n    toOption() {\n      return some(value);\n    },\n    toOptionErr() {\n      return none();\n    },\n    // eslint-disable-next-line @typescript-eslint/no-explicit-any\n    transpose(this: Ok<"+"Option<"+"any>, never>): any {\n      // this.value is an Option: Some(v) → some(ok(v)), None → none()\n      const inner = this.value;\n      if (inner.isSome()) {\n        return some(ok(inner.value));\n      }\n      return none();\n    },\n\n    // Serialization\n    toJSON() {\n      return { _tag: \"Ok\" as const, _schemaVersion: 1, value };\n    },\n\n    // Generator protocol — Ok returns value immediately (done: true)\n    [Symbol.iterator](): Generator<"+"never, T, unknown> {\n      return createOkIterator(value);\n    },\n  };\n\n  Object.freeze(self);\n  return self;\n}\n\n/**\n * Creates a frozen {@link Err} instance containing the given error.\n *\n * The returned object is a plain object implementing the `Err<"+"never, E>` interface.\n * All methods are closures capturing `error`. The object is stamped with\n * `[RESULT_BRAND]: true` and frozen via `Object.freeze()` before being returned.\n *\n * @typeParam E - The type of the error value.\n * @param error - The error value to wrap.\n * @returns A frozen `Err<"+"never, E>` instance.\n *\n * @example\n * ```ts\n * import { err } from '@hex-di/result';\n *\n * const result = err('something went wrong')  unknown>>(\n    fields: Fields\n  ) => Readonly<"+"{ _namespace: NS; _tag: Tag } & Fields>;\n\n  is: (value: unknown) => value is Readonly<"+"{ _namespace: NS; _tag: string }>;\n\n  isTag: <"+"const Tag extends string>(\n    tag: Tag\n  ) => (\n    value: unknown\n  ) => value is Readonly<"+"{ _namespace: NS; _tag: Tag }>;\n} {\n  return {\n    create<"+"const Tag extends string>(tag: Tag) {\n      return <"+"const Fields extends Record<"+"string, unknown>>(\n        fields: Fields\n      ): Readonly<"+"{ _namespace: NS; _tag: Tag } & Fields> => {\n        return Object.freeze({ _namespace: namespace, _tag: tag, ...fields });\n      };\n    },\n\n    is(value: unknown): value is Readonly<"+"{ _namespace: NS; _tag: string }> {\n      if (value === null || value === undefined || typeof value !== \"object\") {\n        return false;\n      }\n      return (\n        \"_namespace\" in value &&\n        (value as Record<"+"string, unknown>)._namespace === namespace\n      );\n    },\n\n    isTag<"+"const Tag extends string>(tag: Tag) {\n      return (\n        value: unknown\n      ): value is Readonly<"+"{ _namespace: NS; _tag: Tag }> => {\n        if (\n          value === null ||\n          value === undefined ||\n          typeof value !== \"object\"\n        ) {\n          return false;\n        }\n        return (\n          \"_namespace\" in value &&\n          (value as Record<"+"string, unknown>)._namespace === namespace &&\n          \"_tag\" in value &&\n          (value as Record<"+"string, unknown>)._tag === tag\n        );\n      };\n    },\n  };\n}\n"},"src/async/result-async.ts":{"language":"typescript","mutants":[{"id":"0","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading '_tag')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["228"],"coveredBy":["228","237","238","239","243","244","245","252","393","394","395","396","397","592"],"location":{"end":{"column":2,"line":19},"start "static":false,"testsCompleted":1,"killedBy":["433"],"coveredBy":["433","434","435","444","447","448","555","556","557"],"location":{"end":{"column":14,"line":66},"start":{"column":10,"line":66}}}],"source":"import type { Result, ResultAsync } from \"./types.js\";\nimport { RESULT_BRAND } from \"./brand.js\";\n\n/**\n * Standalone type guard that checks whether an unknown value is a {@link Result}.\n *\n * Uses a Symbol brand check -- only objects created by {@link ok} or {@link err} pass.\n * This is strictly stronger than structural checking: an object with\n * `{ _tag: \"Ok\", value: 42 }` but without the brand symbol will return `false`.\n *\n * @param value - The value to check.\n * @returns `true` if `value` is a branded `Result`, `false` otherwise.\n *\n * @example\n * ```ts\n * import { ok, err, isResult } from '@hex-di/result';\n *\n * isResult(ok(1));          // true\n * isResult(err('fail'));    // true\n * isResult({ _tag: 'Ok' }); // false (not branded)\n * isResult(null);           // false\n * ```\n *\n * @since v1.0.0\n * @see {@link spec/result/behaviors/01-types-and-guards.md | BEH-01-009}\n */\nexport function isResult(value: unknown): value is Result<"+"unknown, unknown> {\n  if (value === null || value === undefined || typeof value !== \"object\") {\n    return false;\n  }\n  return RESULT_BRAND in value;\n}\n\n/**\n * Standalone type guard that checks whether an unknown value is a {@link ResultAsync}.\n *\n * Uses structural checking -- a non-null object with a `then` method (function) and a\n * `match` method (function) is considered a `ResultAsync`.\n *\n * @param value - The value to check.\n * @returns `true` if `value` structurally matches `ResultAsync`, `false` otherwise.\n *\n * @example\n * ```ts\n * import { ok, isResultAsync } from '@hex-di/result';\n *\n * const asyncResult = ok(42).toAsync();\n * isResultAsync(asyncResult);       // true\n * isResultAsync(Promise.resolve(1)); // false (no match method)\n * isResultAsync(null);              // false\n * ```\n *\n * @since v1.0.0\n * @see {@link spec/result/behaviors/01-types-and-guards.md | BEH-01-010}\n */\nexport function isResultAsync(value: unknown): value is ResultAsync<"+"unknown, unknown> {\n  if (value === null || value === undefined || typeof value !== \"object\") {\n    return false;\n  }\n  if (!(\"then\" in value) || typeof value.then !== \"function\") {\n    return false;\n  }\n  if (!(\"match\" in value) || typeof value.match !== \"function\") {\n    return false;\n  }\n  return true;\n}\n"},"src/do/bind.ts":{"language":"typescript","mutants":[{"id":"463","mutatorName":"BlockStatement","replacement":"{}","statusReason":"f is not a function","status":"Killed","static":false,"testsCompleted":1,"killedBy":["582"],"coveredBy":["582","583","584","585","588","589","590","591","592","593"],"location":{"end":{"column":2,"line":47},"start":{"column":60,"line":39}}},{"id":"464","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading '_tag')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["582"],"coveredBy":["582","583","584","585","588","589","590","591","592","593"],"location":{"end":{"column":4,"line":46},"start":{"column":24,"line":40}}},{"id":"466","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"expected 'Ok' to be 'Err' // Object.is equality","status":"Killed","static":false,"testsCompleted":2,"killedBy":["583"],"coveredBy":["582","583","584","585","588","589","590","591","592","593"],"location":{"end":{"column":23,"line":42},"start":{"column":9,"line":42}}},{"id":"465","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"expected 42 to deeply equal { a: 42 }","status":"Killed","static":false,"testsCompleted":1,"killedBy":["582"],"coveredBy":["582","583","584","585","588","589","590","591","592","593"],"location":{"end":{"column":23,"line":42},"start":{"column":9,"line":42}}},{"id":"467","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected 'Ok' to be 'Err' // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["583"],"coveredBy":["583","585"],"location":{"end":{"column":6,"line":44},"start":{"column":25,"line":42}}},{"id":"469","mutatorName":"BlockStatement","replacement":"{}","statusReason":"Cannot read properties of undefined (reading '_tag')","status":"Killed","static":false,"testsCompleted":1,"killedBy":["586"],"coveredBy":["586","587","588","589"],"location":{"end":{"column":4,"line":81},"start":{"column":24,"line":78}}},{"id":"468","mutatorName":"BlockStatement","replacement":"{}","statusReason":"f is not a function","status":"Killed","static":false,"testsCompleted":1,"killedBy":["586"],"coveredBy":["586","587","588","589"],"location":{"end":{"column":2,"line":82},"start":{"column":64,"line":77}}}],"source":"/**\n * Do notation primitives: bind and let_.\n *\n * These are standalone functions that return callbacks compatible with .andThen().\n * They build up a typed context object one field at a time.\n */\n\nimport type { Result } from \"../core/types.js\";\nimport { ok } from \"../core/result.js\";\n\n/**\n * Adds a named Result value to the Do context. Short-circuits on Err.\n *\n * Returns a function compatible with `.andThen()` that evaluates `f` with the current\n * context. If `f` returns Ok, its value is added to the context under `name`. If `f`\n * returns Err, the chain short-circuits with that error. The `name` parameter must not\n * already exist in the context (enforced at the type level).\n *\n * @param name - The key to add to the context object\n * @param f - A function receiving the current context and returning a Result<"+"T, E>\n * @returns A function compatible with .andThen()\n *\n * @example\n * ```ts\n * import { ok, err, bind, Result } from '@hex-di/result';\n *\n * const result = Result.Do\n *   .andThen(bind(\"x\", () => ok(1)))\n *   .andThen(bind(\"y\", ({ x }) => ok(x + 1)));\n * // => Ok({ x: 1, y: 2 })\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/12-do-notation.md — BEH-12-002\n */\nexport function bind<"+"N extends string, Ctx extends Record<"+"string, unknown>, T, E>(\n  name: Exclude<"+"N, keyof Ctx>,\n  f: (ctx: Ctx) => Result<"+"T, E>,\n): (ctx: Ctx) => Result<"+"Ctx & { readonly [K in N]: T }, E> {\n  return (ctx: Ctx) => {\n    const result = f(ctx);\n    if (result.isErr()) {\n      return result as unknown as Result<"+"Ctx & { readonly [K in N]: T }, E>;\n    }\n    return ok({ ...ctx, [name]: result.value } as Ctx & { readonly [K in N]: T });\n  };\n}\n\n/**\n * Adds a non-Result computed value to the Do context. Never short-circuits.\n *\n * Returns a function compatible with `.andThen()` that evaluates `f` with the current\n * context and adds the returned plain value under `name`. Since `f` returns a plain value\n * (not wrapped in Result), `let_` always succeeds. The trailing underscore avoids\n * collision with JavaScript's reserved `let` keyword.\n *\n * @param name - The key to add to the context object\n * @param f - A function receiving the current context and returning a plain value T\n * @returns A function compatible with .andThen() that always succeeds\n *\n * @example\n * ```ts\n * import { ok, bind, let_, Result } from '@hex-di/result';\n *\n * const result = Result.Do\n *   .andThen(bind(\"user\", () => ok({ name: \"Alice\" })))\n *   .andThen(let_(\"greeting\", ({ user }) => `Hello, ${user.name}`));\n * // => Ok({ user: { name: \"Alice\" }, greeting: \"Hello, Alice\" })\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/12-do-notation.md — BEH-12-003\n */\nexport function let_<"+"N extends string, Ctx extends Record<"+"string, unknown>, T>(\n  name: Exclude<"+"N, keyof Ctx>,\n  f: (ctx: Ctx) => T,\n): (ctx: Ctx) => Result<"+"Ctx & { readonly [K in N]: T }, never> {\n  return (ctx: Ctx) => {\n    const value = f(ctx);\n    return ok({ ...ctx, [name]: value } as Ctx & { readonly [K in N]: T });\n  };\n}\n"},"src/errors/assert-never.ts":{"language":"typescript","mutants":[{"id":"470","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected [Function] to throw an error","status":"Killed","static":false,"testsCompleted":1,"killedBy":["472"],"coveredBy":["472","473","474"],"location":{"end":{"column":2,"line":34},"start":{"column":68,"line":32}}},{"id":"471","mutatorName":"LogicalOperator","replacement":"message && `Unexpected value: ${JSON.stringify(value)}`","statusReason":"expected [Function] to throw error including 'custom message' but got 'Unexpected value: \"unexpected\"'","status":"Killed","static":false,"testsCompleted":1,"killedBy":["472"],"coveredBy":["472","473","474"],"location":{"end":{"column":74,"line":33},"start":{"column":19,"line":33}}},{"id":"472","mutatorName":"StringLiteral","replacement":"``","statusReason":"expected [Function] to throw error including 'Unexpected value' but got ''","status":"Killed","static":false,"testsCompleted":1,"killedBy":["473"],"coveredBy":["473","474"],"location":{"end":{"column":74,"line":33},"start":{"column":30,"line":33}}}],"source":"/**\n * Exhaustiveness check helper for discriminated unions.\n *\n * Call in the `default` branch of a switch statement to ensure all\n * variants of a discriminated union are handled. If a new variant is added\n * and not handled, TypeScript reports:\n * `\"Argument of type 'NewVariant' is not assignable to parameter of type 'never'.\"`\n *\n * At runtime, if ever reached (indicating a type system bypass or data corruption),\n * throws an `Error` with a descriptive message including the unexpected value.\n *\n * @example\n * ```ts\n * import { ok, err, assertNever } from '@hex-di/result';\n * import type { Result } from '@hex-di/result';\n *\n * function handle(result: Result<"+"number, string>): string {\n *   switch (result._tag) {\n *     case \"Ok\":\n *       return `Value: ${result.value}`;\n *     case \"Err\":\n *       return `Error: ${result.error}`; ";\nimport type { Result } from \"../core/types.js\";\nimport { OPTION_BRAND } from \"./brand.js\";\nimport { UnwrapError } from \"../unsafe/unwrap-error.js\";\nimport { ok, err } from \"../core/result.js\";\n\n/**\n * Creates a frozen `Some<"+"T>` instance wrapping the given value.\n *\n * Constructs a plain object implementing the `Some<"+"T>` interface with all\n * methods as closures capturing `value`. The object is stamped with\n * `OPTION_BRAND` and frozen via `Object.freeze()` before returning.\n *\n * @example\n * ```ts\n * import { some } from '@hex-di/result';\n *\n * const opt = some(42);\n * opt.isSome();       // true\n * opt.value;          // 42\n * opt.map(x => x + 1); // Some(43)\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/09-option.md — BEH-09-005\n */\nexport function some<"+"T>(value: T): Some<"+"T> {\n  const self = {\n    _tag: \"Some\" as const,\n    value,\n    [OPTION_BRAND]: true as const,\n\n    // Type guards -- must use method shorthand for type predicates\n    isSome(): boolean {\n      return true;\n    },\n    isNone(): boolean {\n      return false;\n    },\n    isSomeAnd(predicate: (value: T) => boolean): boolean {\n      return predicate(value);\n    },\n\n    // Transformations\n    map<"+"U>(f: (value: T) => U): Some<"+"U> {\n      return some(f(value));\n    },\n    filter(predicate: (value: T) => boolean): Option<"+"T> {\n      return predicate(value) ? self as unknown as Some<"+"T> : none();\n    },\n    flatten(): unknown {\n      return value;\n    },\n    zip<"+"U>(other: Option<"+"U>): Option<"+"[T, U]> {\n      if (other._tag === \"None\") {\n        return none();\n      }\n      return some([value, other.value] as [T, U]);\n    },\n    zipWith<"+"U, R>(other: Option<"+"U>, f: (a: T, b: U) => R): Option<"+"R> {\n      if (other._tag === \"None\") {\n        return none();\n      }\n      return some(f(value, other.value));\n    },\n\n    // Chaining\n    andThen<"+"U>(f: (value: T) => Option<"+"U>): Option<"+"U> {\n      return f(value);\n    },\n    orElse(): unknown {\n      return self;\n    },\n\n    // Extraction\n    match<"+"A, B>(onSome: (value: T) => A, _onNone: () => B): A {\n      return onSome(value);\n    },\n    unwrapOr(): T {\n      return value;\n    },\n    expect(): T {\n      return value;\n    },\n\n    // Conversion\n    toResult(): unknown {\n      return ok(value);\n    },\n    toNullable(): T {\n      return value;\n    },\n    toUndefined(): T {\n      return value;\n    },\n\n    // Serialization\n    toJSON(): { _tag: \"Some\"; _schemaVersion: 1; value: T } {\n      return { _tag: \"Some\" as const, _schemaVersion: 1 as const, value };\n    },\n\n    // Bridge\n    transpose(): unknown {\n      const inner = value as unknown as Result<"+"unknown, unknown>;\n      if (inner._tag === \"Ok\") {\n        return ok(some(inner.value));\n      }\n      // inner._tag === \"Err\"\n      return err(inner.error);\n    },\n  } as unknown as Some<"+"T>;\n\n  Object.freeze(self);\n  return self;\n}\n\n/** Frozen singleton None instance */\nlet NONE_SINGLETON: None | null = null;\n\n/**\n * Returns the frozen `None` singleton instance representing absence of a value.\n *\n * The singleton is stamped with `OPTION_BRAND` and frozen via `Object.freeze()`.\n * All calls to `none()` return the same singleton reference.\n *\n * @example\n * ```ts\n * import { none } from '@hex-di/result';\n *\n * const opt = none();\n * opt.isNone();      // true\n * opt.unwrapOr(0);   // 0\n * none() === none();  // true (singleton)\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/09-option.md — BEH-09-006\n */\nexport function none(): None {\n  if (NONE_SINGLETON !== null) {\n    return NONE_SINGLETON;\n  }\n\n  const self = {\n    _tag: \"None\" as const,\n    [OPTION_BRAND]: true as const,\n\n    // Type guards\n    isSome(): boolean {\n      return false;\n    },\n    isNone(): boolean {\n      return true;\n    },\n    isSomeAnd(): boolean {\n      return false;\n    },\n\n    // Transformations\n    map(): unknown {\n      return self;\n    },\n    filter(): unknown {\n      return self;\n    },\n    flatten(): unknown {\n      return self;\n    },\n    zip(): unknown {\n      return self;\n    },\n    zipWith(): unknown {\n      return self;\n    },\n\n    // Chaining\n    andThen(): unknown {\n      return self;\n    },\n    orElse<"+"T>(f: () => Option<"+"T>): Option<"+"T> {\n      return f();\n    },\n\n    // Extraction\n    match<"+"A, B>(_onSome: (value: never) => A, onNone: () => B): B {\n      return onNone();\n    },\n    unwrapOr<"+"U>(defaultValue: U): U {\n      return defaultValue;\n    },\n    expect(message: string): never {\n      throw new UnwrapError(message, { _tag: \"None\" as \"Ok\", value: undefined });\n    },\n\n    // Conversion\n    toResult<"+"E>(onNone: () => E): unknown {\n      return err(onNone());\n    },\n    toNullable(): null {\n      return null;\n    },\n    toUndefined(): undefined {\n      return undefined;\n    },\n\n    // Serialization\n    toJSON(): { _tag: \"None\"; _schemaVersion: 1 } {\n      return { _tag: \"None\" as const, _schemaVersion: 1 as const };\n    },\n\n    // Bridge\n    transpose(): unknown {\n      return ok(self);\n    },\n  } as unknown as None;\n\n  Object.freeze(self);\n  NONE_SINGLETON = self;\n  return NONE_SINGLETON;\n}\n"},"src/unsafe/unwrap-error.ts":{"language":"typescript","mutants":[{"id":"666","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected error to be instance of UnwrapError","status":"Killed","static":false,"testsCompleted":1,"killedBy":["568"],"coveredBy":["186","490","491","493","494","495","497","498","499","500","501","502","503","568","570"],"location":{"end":{"column":4,"line":41},"start":{"column":5,"line":37}}},{"id":"667","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected '' to be 'UnwrapError' // Object.is equality","status":"Killed","static":false,"testsCompleted":3,"killedBy":["491"],"coveredBy":["186","490","491","493","494","495","497","498","499","500","501","502","503","568","570"],"location":{"end":{"column":30,"line":39},"start":{"column":17,"line":39}}}],"source":"/**\n * A specialized `Error` subclass thrown by all unsafe extraction operations\n * (`unwrap`, `unwrapErr`, `expect`, `expectErr`).\n *\n * Carries a `context` object with the variant tag and contained value,\n * enabling programmatic inspection of what was inside the `Result` when\n * the unwrap failed.\n *\n * @example\n * ```ts\n * import { err } from '@hex-di/result';\n * import { unwrap, UnwrapError } from '@hex-di/result/unsafe';\n *\n * try {\n *   unwrap(err(\"something went wrong\"));\n * } catch (e) {\n *   if (e instanceof UnwrapError) {\n *     console.log(e.message);       // \"Called unwrap on Err\"\n *     console.log(e.context._tag);  // \"Err\"\n *     console.log(e.context.value); // \"something went wrong\"\n *   }\n * }\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/11-unsafe.md — BEH-11-001\n */\nexport class UnwrapError extends Error {\n  readonly context: {\n    readonly _tag: \"Ok\" | \"Err\";\n    readonly value: unknown;\n  };\n\n  constructor(\n    message: string,\n    context: { _tag: \"Ok\" | \"Err\"; value: unknown }\n  ) {\n    super(message);\n    this.name = \"UnwrapError\";\n    this.context = context;\n  }\n}\n"},"src/unsafe/unwrap.ts":{"language":"typescript","mutants":[{"id":"668","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected undefined to be 42 // Object.is equality","status":"Killed","static":false,"testsCompleted":1,"killedBy":["492"],"coveredBy":["492","493","494","495"],"location":{"end":{"column":2,"line":30},"start":{"column":55,"line":22}}},{"id":"670","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"Called unwrap on Err","status":"Killed","static":false,"testsCompleted":1,"killedBy":["492"],"coveredBy":["492","493","494","495"],"location":{"end":{"column":
