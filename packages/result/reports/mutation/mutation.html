r.\n * Inside a safeTry block, `yield*` on a Result either extracts the\n * Ok value or early-returns the Err.\n *\n * Sync overload: generator function returns Result<"+"T, E>\n * Async overload: async generator function returns ResultAsync<"+"T, E>\n */\n\n/** Extract E from Err<"+"never, E> or union of Err<"+"never, E1> | Err<"+"never, E2> */\ntype ExtractErrType<"+"Y> = Y extends Err<"+"never, infer E> ? E : never;\n\n// Sync overload — T from return, E from both yield and return\nexport function safeTry<"+"Y extends Err<"+"never, unknown>, T, RE>(\n  generator: () => Generator<"+"Y, Result<"+"T, RE>, unknown>\n): Result<"+"T, ExtractErrType<"+"Y> | RE>;\n\n// Async overload\nexport function safeTry<"+"Y extends Err<"+"never, unknown>, T, RE>(\n  generator: () => AsyncGenerator<"+"Y, Result<"+"T, RE>, unknown>\n): ResultAsync<"+"T, ExtractErrType<"+"Y> | RE>;\n\n// Implementation\nexport function safeTry(\n  generator: () =>\n    | Generator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n    | AsyncGenerator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n): Result<"+"unknown, unknown> | ResultAsync<"+"unknown, unknown> {\n  const gen = generator();\n\n  // AsyncGenerator has Symbol.asyncIterator; sync Generator does not\n  if (isAsyncGenerator(gen)) {\n    return runAsync(gen);\n  }\n\n  return runSync(gen);\n}\n\nfunction isAsyncGenerator(\n  gen:\n    | Generator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n    | AsyncGenerator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n): gen is AsyncGenerator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown> {\n  return Symbol.asyncIterator in gen;\n}\n\nfunction runSync(\n  gen: Generator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n): Result<"+"unknown, unknown> {\n  for (;;) {\n    const next = gen.next();\n\n    if (next.done) {\n      return next.value;\n    }\n\n    // The yielded value is an Err — early return\n    const yieldedErr = next.value;\n    // Tell the generator to clean up (run finally blocks)\n    gen.return(err(yieldedErr.error));\n    return err(yieldedErr.error);\n  }\n}\n\nfunction runAsync(\n  gen: AsyncGenerator<"+"Err<"+"never, unknown>, Result<"+"unknown, unknown>, unknown>\n): ResultAsync<"+"unknown, unknown> {\n  const promise = (async (): Promise<"+"Result<"+"unknown, unknown>> => {\n    for (;;) {\n      const next = await gen.next();\n\n      if (next.done) {\n        return next.value;\n      }\n\n      // The yielded value is an Err — early return\n      const yieldedErr = next.value;\n      // Tell the generator to clean up (run finally blocks)\n      await gen.return(err(yieldedErr.error));\n      return err(yieldedErr.error);\n    }\n  })();\n\n  return ResultAsyncClass.fromSafePromise(promise).andThen(result => result);\n}\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":70,"break":70},"testFiles":{"tests/chaining.test-d.ts":{"tests":[{"id":"0","name":"tests/chaining.test-d.ts Chaining - Type Level ok(1).andThen(v => ok('str')) infers Result<"+"string, never>"},{"id":"1","name":"tests/chaining.test-d.ts Chaining - Type Level andThen accumulates error types"},{"id":"2","name":"tests/chaining.test-d.ts Chaining - Type Level Three andThen calls accumulate three error types in union"},{"id":"3","name":"tests/chaining.test-d.ts Chaining - Type Level orElse replaces error type"},{"id":"4","name":"tests/chaining.test-d.ts Chaining - Type Level andThrough adds error type"},{"id":"5","name":"tests/chaining.test-d.ts Chaining - Type Level andTee does not change error type"},{"id":"6","name":"tests/chaining.test-d.ts Chaining - Type Level orTee does not change value type"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Chaining - Type Level\", () => {\n  // DoD 5 type #1\n  it(\"ok(1).andThen(v => ok('str')) infers Result<"+"string, never>\", () => {\n    const result = ok(1).andThen(() => ok(\"str\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 5 type #2\n  it(\"andThen accumulates error types\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = ok(1);\n    const result = r.andThen((): Result<"+"string, B> => ok(\"x\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, A | B>>();\n  });\n\n  // DoD 5 type #3\n  it(\"Three andThen calls accumulate three error types in union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    type E3 = { _tag: \"E3\" };\n    const r: Result<"+"number, E1> = ok(1);\n    const result = r\n      .andThen((): Result<"+"string, E2> => ok(\"x\"))\n      .andThen((): Result<"+"boolean, E3> => ok(true));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"boolean, E1 | E2 | E3>>();\n  });\n\n  // DoD 5 type #4\n  it(\"orElse replaces error type\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = err({ _tag: \"A\" });\n    const result = r.orElse((): Result<"+"number, B> => ok(99));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, B>>();\n  });\n\n  // DoD 5 type #5\n  it(\"andThrough adds error type\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = ok(42);\n    const result = r.andThrough((): Result<"+"unknown, B> => ok(\"x\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A | B>>();\n  });\n\n  // DoD 5 type #6\n  it(\"andTee does not change error type\", () => {\n    type A = { _tag: \"A\" };\n    const r: Result<"+"number, A> = ok(42);\n    const result = r.andTee(() => {});\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A>>();\n  });\n\n  // DoD 5 type #7\n  it(\"orTee does not change value type\", () => {\n    type A = { _tag: \"A\" };\n    const r: Result<"+"number, A> = err({ _tag: \"A\" });\n    const result = r.orTee(() => {});\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A>>();\n  });\n});\n"},"tests/combining.test-d.ts":{"tests":[{"id":"7","name":"tests/combining.test-d.ts Combining - Type Level all(ok(1), ok('str')) infers Result<"+"[number, string], never>"},{"id":"8","name":"tests/combining.test-d.ts Combining - Type Level all(ok(1), err('a')) error type is union of all error types"},{"id":"9","name":"tests/combining.test-d.ts Combining - Type Level allSettled(ok(1), ok('str')) Ok type is tuple [number, string]"},{"id":"10","name":"tests/combining.test-d.ts Combining - Type Level allSettled error type is array of error union"},{"id":"11","name":"tests/combining.test-d.ts Combining - Type Level any Ok type is union of all Ok types"},{"id":"12","name":"tests/combining.test-d.ts Combining - Type Level any error type is tuple of all error types"},{"id":"13","name":"tests/combining.test-d.ts Combining - Type Level collect({ a: ok(1), b: ok('str') }) infers correct record type"},{"id":"14","name":"tests/combining.test-d.ts Combining - Type Level collect error type is union of all record entry error types"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { all } from \"../src/combinators/all.js\";\nimport { allSettled } from \"../src/combinators/all-settled.js\";\nimport { any } from \"../src/combinators/any.js\";\nimport { collect } from \"../src/combinators/collect.js\";\n\ndescribe(\"Combining - Type Level\", () => {\n  // DoD 7 type #1\n  it(\"all(ok(1), ok('str')) infers Result<"+"[number, string], never>\", () => {\n    const result = all(ok(1), ok(\"str\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"[number, string], never>>();\n  });\n\n  // DoD 7 type #2\n  it(\"all(ok(1), err('a')) error type is union of all error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = ok(1);\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = all(r1, r2);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"[number, string], E1 | E2>>();\n  });\n\n  // DoD 7 type #3\n  it(\"allSettled(ok(1), ok('str')) Ok type is tuple [number, string]\", () => {\n    const result = allSettled(ok(1), ok(\"str\"));\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"[number, string]>();\n    }\n  });\n\n  // DoD 7 type #4\n  it(\"allSettled error type is array of error union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = ok(1);\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = allSettled(r1, r2);\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"(E1 | E2)[]>();\n    }\n  });\n\n  // DoD 7 type #5\n  it(\"any Ok type is union of all Ok types\", () => {\n    const result = any(ok(1), ok(\"str\"));\n    if (result.isOk()) {\n      expectTypeOf(result.value).toMatchTypeOf<"+"number | string>();\n    }\n  });\n\n  // DoD 7 type #6\n  it(\"any error type is tuple of all error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = err({ _tag: \"E1\" });\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = any(r1, r2);\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"[E1, E2]>();\n    }\n  });\n\n  // DoD 7 type #7\n  it(\"collect({ a: ok(1), b: ok('str') }) infers correct record type\", () => {\n    const result = collect({ a: ok(1), b: ok(\"str\") });\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"{ a: number; b: string }>();\n    }\n  });\n\n  // DoD 7 type #8\n  it(\"collect error type is union of all record entry error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const result = collect({\n      a: ok(1) as Result<"+"number, E1>,\n      b: err({ _tag: \"E2\" }) as Result<"+"string, E2>,\n    });\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"E1 | E2>();\n    }\n  });\n});\n"},"tests/constructors.test-d.ts":{"tests":[{"id":"15","name":"tests/constructors.test-d.ts Constructors - Type Level ok(42) infers as Ok<"+"number, never>"},{"id":"16","name":"tests/constructors.test-d.ts Constructors - Type Level err('fail') infers as Err<"+"never, string>"},{"id":"17","name":"tests/constructors.test-d.ts Constructors - Type Level fromThrowable return type matches Result<"+"T, E>"},{"id":"18","name":"tests/constructors.test-d.ts Constructors - Type Level fromThrowable function-wrapping overload infers argument types"},{"id":"19","name":"tests/constructors.test-d.ts Constructors - Type Level fromNullable strips null/undefined from Ok type"},{"id":"20","name":"tests/constructors.test-d.ts Constructors - Type Level fromPredicate with type guard narrows Ok type to U extends T"},{"id":"21","name":"tests/constructors.test-d.ts Constructors - Type Level tryCatch infers Result<"+"T, E> from fn and mapErr"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport { fromThrowable } from \"../src/constructors/from-throwable.js\";\nimport { fromNullable } from \"../src/constructors/from-nullable.js\";\nimport { fromPredicate } from \"../src/constructors/from-predicate.js\";\nimport { tryCatch } from \"../src/constructors/try-catch.js\";\n\ndescribe(\"Constructors - Type Level\", () => {\n  // DoD 2 type #1\n  it(\"ok(42) infers as Ok<"+"number, never>\", () => {\n    expectTypeOf(ok(42)).toEqualTypeOf<"+"Ok<"+"number, never>>();\n  });\n\n  // DoD 2 type #2\n  it(\"err('fail') infers as Err<"+"never, string>\", () => {\n    expectTypeOf(err(\"fail\")).toEqualTypeOf<"+"Err<"+"never, string>>();\n  });\n\n  // DoD 2 type #3\n  it(\"fromThrowable return type matches Result<"+"T, E>\", () => {\n    const result = fromThrowable(\n      () => 42,\n      () => \"error\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 2 type #4\n  it(\"fromThrowable function-wrapping overload infers argument types\", () => {\n    const safeParse = fromThrowable(\n      (input: string) => JSON.parse(input),\n      () => \"error\"\n    );\n    expectTypeOf(safeParse).toBeFunction();\n    expectTypeOf(safeParse).parameter(0).toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 2 type #7\n  it(\"fromNullable strips null/undefined from Ok type\", () => {\n    const value: string | null | undefined = \"hello\";\n    const result = fromNullable(value, () => \"was null\");\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, string>>();\n  });\n\n  // DoD 2 type #8\n  it(\"fromPredicate with type guard narrows Ok type to U extends T\", () => {\n    interface Admin {\n      role: \"admin\";\n    }\n    interface User {\n      role: string;\n    }\n    const user: User = { role: \"admin\" };\n    const result = fromPredicate(\n      user,\n      (u): u is Admin => u.role === \"admin\",\n      () => \"not admin\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"Admin, string>>();\n  });\n\n  // DoD 2 type #9\n  it(\"tryCatch infers Result<"+"T, E> from fn and mapErr\", () => {\n    const result = tryCatch(\n      () => 42,\n      () => \"error\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n});\n"},"tests/core-types.test-d.ts":{"tests":[{"id":"22","name":"tests/core-types.test-d.ts Core Types - Type Level Ok<"+"number, never> is assignable to Result<"+"number, string>"},{"id":"23","name":"tests/core-types.test-d.ts Core Types - Type Level Err<"+"never, string> is assignable to Result<"+"number, string>"},{"id":"24","name":"tests/core-types.test-d.ts Core Types - Type Level InferOk<"+"Result<"+"number, string>> resolves to number"},{"id":"25","name":"tests/core-types.test-d.ts Core Types - Type Level InferErr<"+"Result<"+"number, string>> resolves to string"},{"id":"26","name":"tests/core-types.test-d.ts Core Types - Type Level IsResult<"+"Result<"+"number, string>> resolves to true"},{"id":"27","name":"tests/core-types.test-d.ts Core Types - Type Level IsResult<"+"string> resolves to false"},{"id":"28","name":"tests/core-types.test-d.ts Core Types - Type Level FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>> resolves correctly"},{"id":"29","name":"tests/core-types.test-d.ts Core Types - Type Level InferOkTuple extracts Ok types from a tuple of Results"},{"id":"30","name":"tests/core-types.test-d.ts Core Types - Type Level InferErrUnion extracts union of Err types"},{"id":"31","name":"tests/core-types.test-d.ts Core Types - Type Level InferOkRecord extracts Ok types from a record"},{"id":"32","name":"tests/core-types.test-d.ts Core Types - Type Level Ok phantom type E = never does not widen"},{"id":"33","name":"tests/core-types.test-d.ts Core Types - Type Level Err phantom type T = never does not widen"},{"id":"34","name":"tests/core-types.test-d.ts Core Types - Type Level ok(42) infers as Ok<"+"number, never>"},{"id":"35","name":"tests/core-types.test-d.ts Core Types - Type Level err('fail') infers as Err<"+"never, string>"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/core/types.js\";\nimport type {\n  InferOk,\n  InferErr,\n  IsResult,\n  FlattenResult,\n  InferOkTuple,\n  InferErrUnion,\n  InferOkRecord,\n} from \"../src/type-utils.js\";\n\ndescribe(\"Core Types - Type Level\", () => {\n  // DoD 1 type #1\n  it(\"Ok<"+"number, never> is assignable to Result<"+"number, string>\", () => {\n    const success = ok(42);\n    expectTypeOf(success).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #2\n  it(\"Err<"+"never, string> is assignable to Result<"+"number, string>\", () => {\n    const failure = err(\"fail\");\n    expectTypeOf(failure).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #3\n  it(\"InferOk<"+"Result<"+"number, string>> resolves to number\", () => {\n    expectTypeOf<"+"InferOk<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 1 type #4\n  it(\"InferErr<"+"Result<"+"number, string>> resolves to string\", () => {\n    expectTypeOf<"+"InferErr<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 1 type #7\n  it(\"IsResult<"+"Result<"+"number, string>> resolves to true\", () => {\n    expectTypeOf<"+"IsResult<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"true>();\n  });\n\n  // DoD 1 type #8\n  it(\"IsResult<"+"string> resolves to false\", () => {\n    expectTypeOf<"+"IsResult<"+"string>>().toEqualTypeOf<"+"false>();\n  });\n\n  // DoD 1 type #10\n  it(\"FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>> resolves correctly\", () => {\n    expectTypeOf<"+"FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>>>().toEqualTypeOf<"+"\n      Result<"+"number, string | boolean>\n    >();\n  });\n\n  // DoD 1 type #11\n  it(\"InferOkTuple extracts Ok types from a tuple of Results\", () => {\n    expectTypeOf<"+"InferOkTuple<"+"[Result<"+"number, string>, Result<"+"boolean, Error>]>>().toEqualTypeOf<"+"\n      [number, boolean]\n    >();\n  });\n\n  // DoD 1 type #12\n  it(\"InferErrUnion extracts union of Err types\", () => {\n    expectTypeOf<"+"InferErrUnion<"+"[Result<"+"number, string>, Result<"+"boolean, Error>]>>().toEqualTypeOf<"+"\n      string | Error\n    >();\n  });\n\n  // DoD 1 type #13\n  it(\"InferOkRecord extracts Ok types from a record\", () => {\n    expectTypeOf<"+"\n      InferOkRecord<"+"{ a: Result<"+"number, string>; b: Result<"+"boolean, Error> }>\n    >().toEqualTypeOf<"+"{ a: number; b: boolean }>();\n  });\n\n  // DoD 1 type #14\n  it(\"Ok phantom type E = never does not widen\", () => {\n    const success = ok(42); // Ok<"+"number, never>\n    // Assigning to a Result with a specific error type should work\n    const _result: Result<"+"number, string> = success;\n    expectTypeOf(_result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #15\n  it(\"Err phantom type T = never does not widen\", () => {\n    const failure = err(\"fail\"); // Err<"+"never, string>\n    const _result: Result<"+"number, string> = failure;\n    expectTypeOf(_result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 2 type #1\n  it(\"ok(42) infers as Ok<"+"number, never>\", () => {\n    const result = ok(42);\n    expectTypeOf(result).toEqualTypeOf<"+"Ok<"+"number, never>>();\n  });\n\n  // DoD 2 type #2\n  it(\"err('fail') infers as Err<"+"never, string>\", () => {\n    const result = err(\"fail\");\n    expectTypeOf(result).toEqualTypeOf<"+"Err<"+"never, string>>();\n  });\n});\n"},"tests/error-patterns.test-d.ts":{"tests":[{"id":"36","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level createError('NotFound') return type has { readonly _tag: 'NotFound' }"},{"id":"37","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Factory with fields infers intersection of _tag and field types"},{"id":"38","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level assertNever parameter type is never (enforces exhaustive checks)"},{"id":"39","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Error type union narrows correctly in switch on _tag"},{"id":"40","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Error hierarchy type compositions resolve correctly"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { createError } from \"../src/errors/create-error.js\";\nimport { assertNever } from \"../src/errors/assert-never.js\";\n\ndescribe(\"Error Patterns - Type Level\", () => {\n  // DoD 10 type #1\n  it(\"createError('NotFound') return type has { readonly _tag: 'NotFound' }\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\" });\n    expectTypeOf(error).toHaveProperty(\"_tag\");\n    expectTypeOf(error._tag).toEqualTypeOf<"+"\"NotFound\">();\n  });\n\n  // DoD 10 type #2\n  it(\"Factory with fields infers intersection of _tag and field types\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expectTypeOf(error).toMatchTypeOf<"+"{\n      readonly _tag: \"NotFound\";\n      readonly resource: string;\n      readonly id: string;\n    }>();\n  });\n\n  // DoD 10 type #3\n  it(\"assertNever parameter type is never (enforces exhaustive checks)\", () => {\n    expectTypeOf(assertNever).parameter(0).toEqualTypeOf<"+"never>();\n  });\n\n  // DoD 10 type #4\n  it(\"Error type union narrows correctly in switch on _tag\", () => {\n    type AppError = { _tag: \"NotFound\"; id: string } | { _tag: \"Validation\"; field: string };\n\n    function handle(e: AppError): void {\n      switch (e._tag) {\n        case \"NotFound\":\n          expectTypeOf(e).toMatchTypeOf<"+"{ _tag: \"NotFound\"; id: string }>();\n          break;\n        case \"Validation\":\n          expectTypeOf(e).toMatchTypeOf<"+"{ _tag: \"Validation\"; field: string }>();\n          break;\n      }\n    }\n  });\n\n  // DoD 10 type #5\n  it(\"Error hierarchy type compositions resolve correctly\", () => {\n    type InfraError = { _tag: \"Timeout\"; ms: number } | { _tag: \"ConnectionFailed\"; host: string };\n\n    type DomainError =\n      | { _tag: \"NotFound\"; entity: string }\n      | { _tag: \"InfraFailure\"; cause: InfraError };\n\n    function infraStep(): Result<"+"number, InfraError> {\n      return ok(1);\n    }\n\n    function domainStep(n: number): Result<"+"string, DomainError> {\n      return ok(String(n));\n    }\n\n    const result = infraStep()\n      .mapErr((e): DomainError => ({ _tag: \"InfraFailure\", cause: e }))\n      .andThen(domainStep);\n\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, DomainError>>();\n  });\n});\n"},"tests/extraction.test-d.ts":{"tests":[{"id":"41","name":"tests/extraction.test-d.ts Extraction - Type Level match return type is union of both handler return types"},{"id":"42","name":"tests/extraction.test-d.ts Extraction - Type Level unwrapOr return type on Ok is T"},{"id":"43","name":"tests/extraction.test-d.ts Extraction - Type Level toNullable return type on Ok is T"},{"id":"44","name":"tests/extraction.test-d.ts Extraction - Type Level toUndefined return type on Ok is T"},{"id":"45","name":"tests/extraction.test-d.ts Extraction - Type Level intoTuple return type on Ok is [null, T]"},{"id":"46","name":"tests/extraction.test-d.ts Extraction - Type Level merge return type is T on Ok, E on Err"},{"id":"47","name":"tests/extraction.test-d.ts Extraction - Type Level toAsync return type is ResultAsync<"+"T, E>"},{"id":"48","name":"tests/extraction.test-d.ts Extraction - Type Level asyncMap return type is ResultAsync<"+"U, E>"},{"id":"49","name":"tests/extraction.test-d.ts Extraction - Type Level toJSON return type matches discriminated union shape"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport type { ResultAsync } from \"../src/core/types.js\";\n\ndescribe(\"Extraction - Type Level\", () => {\n  // DoD 6 type #1\n  it(\"match return type is union of both handler return types\", () => {\n    // On Ok<"+"number, string>, match returns A (string here)\n    const okResult = ok(42).match(\n      v => v.toString(),\n      (e: never) => 0\n    );\n    expectTypeOf(okResult).toEqualTypeOf<"+"string>();\n    // On Err<"+"number, string>, match returns B (number here)\n    const errResult = err(\"x\").match(\n      (v: never) => \"\",\n      e => e.length\n    );\n    expectTypeOf(errResult).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #2\n  it(\"unwrapOr return type on Ok is T\", () => {\n    const value = ok(42).unwrapOr(null);\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #3\n  it(\"toNullable return type on Ok is T\", () => {\n    const value = ok(42).toNullable();\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #4\n  it(\"toUndefined return type on Ok is T\", () => {\n    const value = ok(42).toUndefined();\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #5\n  it(\"intoTuple return type on Ok is [null, T]\", () => {\n    const tuple = ok(42).intoTuple();\n    expectTypeOf(tuple).toEqualTypeOf<"+"[null, number]>();\n  });\n\n  // DoD 6 type #6\n  it(\"merge return type is T on Ok, E on Err\", () => {\n    const okMerge = ok(42).merge();\n    expectTypeOf(okMerge).toEqualTypeOf<"+"number>();\n    const errMerge = err(\"x\").merge();\n    expectTypeOf(errMerge).toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 6 type #7\n  it(\"toAsync return type is ResultAsync<"+"T, E>\", () => {\n    expectTypeOf(ok(42).toAsync).returns.toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 6 type #8\n  it(\"asyncMap return type is ResultAsync<"+"U, E>\", () => {\n    // Just check the signature exists and returns the right shape\n    const fn = async (v: number) => String(v);\n    expectTypeOf(ok(42).asyncMap(fn)).toMatchTypeOf<"+"ResultAsync<"+"string, never>>();\n  });\n\n  // DoD 6 type #9\n  it(\"toJSON return type matches discriminated union shape\", () => {\n    const okJson = ok(42).toJSON();\n    expectTypeOf(okJson).toEqualTypeOf<"+"{ _tag: \"Ok\"; value: number }>();\n    const errJson = err(\"x\").toJSON();\n    expectTypeOf(errJson).toEqualTypeOf<"+"{ _tag: \"Err\"; error: string }>();\n  });\n});\n"},"tests/generators.test-d.ts":{"tests":[{"id":"50","name":"tests/generators.test-d.ts Generators - Type Level safeTry sync return type is Result<"+"T, E>"},{"id":"51","name":"tests/generators.test-d.ts Generators - Type Level safeTry async return type is ResultAsync<"+"T, E>"},{"id":"52","name":"tests/generators.test-d.ts Generators - Type Level yield* on Ok<"+"number, never> produces number"},{"id":"53","name":"tests/generators.test-d.ts Generators - Type Level Error types from multiple yields accumulate in union"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport type { ResultAsync } from \"../src/core/types.js\";\nimport { safeTry } from \"../src/generators/safe-try.js\";\n\ndescribe(\"Generators - Type Level\", () => {\n  // DoD 9 type #1\n  it(\"safeTry sync return type is Result<"+"T, E>\", () => {\n    const result = safeTry(function* () {\n      const n = yield* ok(1);\n      return ok(n + 1);\n    });\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, never>>();\n  });\n\n  // DoD 9 type #2\n  it(\"safeTry async return type is ResultAsync<"+"T, E>\", () => {\n    const result = safeTry(async function* () {\n      const n = yield* ok(1);\n      return ok(n + 1);\n    });\n    expectTypeOf(result).toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 9 type #3\n  it(\"yield* on Ok<"+"number, never> produces number\", () => {\n    safeTry(function* () {\n      const n = yield* ok(42);\n      expectTypeOf(n).toEqualTypeOf<"+"number>();\n      return ok(n);\n    });\n  });\n\n  // DoD 9 type #4\n  it(\"Error types from multiple yields accumulate in union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(): Result<"+"string, E2> {\n      return err({ _tag: \"E2\" });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* step1();\n      const b = yield* step2();\n      return ok(`${a}-${b}`);\n    });\n\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, E1 | E2>>();\n  });\n});\n"},"tests/result-async.test-d.ts":{"tests":[{"id":"54","name":"tests/result-async.test-d.ts ResultAsync - Type Level ResultAsync.ok(42) infers ResultAsync<"+"number, never>"},{"id":"55","name":"tests/result-async.test-d.ts ResultAsync - Type Level ResultAsync.err('x') infers ResultAsync<"+"never, string>"},{"id":"56","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.map(v => 'str') infers ResultAsync<"+"string, E>"},{"id":"57","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.andThen(v => ok(1)) accepts sync Result and returns ResultAsync"},{"id":"58","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.andThen(v => ResultAsync.ok(1)) accepts ResultAsync"},{"id":"59","name":"tests/result-async.test-d.ts ResultAsync - Type Level Async andThen accumulates error types"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err, ResultAsync } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"ResultAsync - Type Level\", () => {\n  // DoD 8 type #1\n  it(\"ResultAsync.ok(42) infers ResultAsync<"+"number, never>\", () => {\n    const ra = ResultAsync.ok(42);\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 8 type #2\n  it(\"ResultAsync.err('x') infers ResultAsync<"+"never, string>\", () => {\n    const ra = ResultAsync.err(\"x\");\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"never, string>>();\n  });\n\n  // DoD 8 type #3\n  it(\"resultAsync.map(v => 'str') infers ResultAsync<"+"string, E>\", () => {\n    const ra = ResultAsync.ok(42).map(() => \"str\");\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"string, never>>();\n  });\n\n  // DoD 8 type #4\n  it(\"resultAsync.andThen(v => ok(1)) accepts sync Result and returns ResultAsync\", () => {\n    const ra = ResultAsync.ok(42).andThen(() => ok(1));\n    // Verify the map method exists, confirming it's a ResultAsync\n    expectTypeOf(ra.map).toBeFunction();\n  });\n\n  // DoD 8 type #5\n  it(\"resultAsync.andThen(v => ResultAsync.ok(1)) accepts ResultAsync\", () => {\n    const ra = ResultAsync.ok(42).andThen(() => ResultAsync.ok(1));\n    expectTypeOf(ra.map).toBeFunction();\n  });\n\n  // DoD 8 type #6\n  it(\"Async andThen accumulates error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const ra = ResultAsync.ok(42)\n      .andThen((): Result<"+"string, E1> => ok(\"x\"))\n      .andThen((): Result<"+"boolean, E2> => ok(true));\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"boolean, E1 | E2>>();\n  });\n\n  // DoD 8 type #7 - covered by collect tests\n\n  // DoD 8 type #8 - covered by collect tests\n});\n"},"tests/transformations.test-d.ts":{"tests":[{"id":"60","name":"tests/transformations.test-d.ts Transformations - Type Level ok(1).map(v => String(v)) infers as Result<"+"string, never>"},{"id":"61","name":"tests/transformations.test-d.ts Transformations - Type Level err('x').mapErr(e => 42) infers as Result<"+"never, number>"},{"id":"62","name":"tests/transformations.test-d.ts Transformations - Type Level ok(ok(42)).flatten() infers as Result<"+"number, never>"},{"id":"63","name":"tests/transformations.test-d.ts Transformations - Type Level ok(42).flip() infers as Result<"+"never, number>"},{"id":"64","name":"tests/transformations.test-d.ts Transformations - Type Level err('x').flip() infers as Result<"+"string, never>"},{"id":"65","name":"tests/transformations.test-d.ts Transformations - Type Level mapBoth infers correct transformed types for both branches"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Transformations - Type Level\", () => {\n  // DoD 4 type #1\n  it(\"ok(1).map(v => String(v)) infers as Result<"+"string, never>\", () => {\n    const result = ok(1).map(v => String(v));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 4 type #2\n  it(\"err('x').mapErr(e => 42) infers as Result<"+"never, number>\", () => {\n    const result = err(\"x\").mapErr(() => 42);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"never, number>>();\n  });\n\n  // DoD 4 type #3\n  it(\"ok(ok(42)).flatten() infers as Result<"+"number, never>\", () => {\n    const result = ok(ok(42)).flatten();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, never>>();\n  });\n\n  // DoD 4 type #4\n  it(\"ok(42).flip() infers as Result<"+"never, number>\", () => {\n    const result = ok(42).flip();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"never, number>>();\n  });\n\n  // DoD 4 type #5\n  it(\"err('x').flip() infers as Result<"+"string, never>\", () => {\n    const result = err(\"x\").flip();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 4 type #6\n  it(\"mapBoth infers correct transformed types for both branches\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    const mapped = result.mapBoth(\n      v => String(v),\n      e => new Error(e)\n    );\n    expectTypeOf(mapped).toMatchTypeOf<"+"Result<"+"string, Error>>();\n  });\n});\n"},"tests/type-guards.test-d.ts":{"tests":[{"id":"66","name":"tests/type-guards.test-d.ts Type Guards - Type Level After isOk() guard, value is accessible"},{"id":"67","name":"tests/type-guards.test-d.ts Type Guards - Type Level After isErr() guard, error is accessible"},{"id":"68","name":"tests/type-guards.test-d.ts Type Guards - Type Level isResult is a type guard: value is Result<"+"unknown, unknown>"},{"id":"69","name":"tests/type-guards.test-d.ts Type Guards - Type Level After _tag === 'Ok' check, type is narrowed to Ok variant"},{"id":"70","name":"tests/type-guards.test-d.ts Type Guards - Type Level After _tag === 'Err' check, type is narrowed to Err variant"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport { isResult } from \"../src/core/guards.js\";\n\ndescribe(\"Type Guards - Type Level\", () => {\n  // DoD 3 type #1\n  it(\"After isOk() guard, value is accessible\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"number>();\n    }\n  });\n\n  // DoD 3 type #2\n  it(\"After isErr() guard, error is accessible\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result.isErr()) {\n      expectTypeOf(result.error).toEqualTypeOf<"+"string>();\n    }\n  });\n\n  // DoD 3 type #3\n  it(\"isResult is a type guard: value is Result<"+"unknown, unknown>\", () => {\n    const value: unknown = ok(42);\n    if (isResult(value)) {\n      expectTypeOf(value).toMatchTypeOf<"+"Result<"+"unknown, unknown>>();\n    }\n  });\n\n  // DoD 3 type #4\n  it(\"After _tag === 'Ok' check, type is narrowed to Ok variant\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result._tag === \"Ok\") {\n      expectTypeOf(result).toMatchTypeOf<"+"Ok<"+"number, string>>();\n      expectTypeOf(result.value).toEqualTypeOf<"+"number>();\n    }\n  });\n\n  // DoD 3 type #5\n  it(\"After _tag === 'Err' check, type is narrowed to Err variant\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result._tag === \"Err\") {\n      expectTypeOf(result).toMatchTypeOf<"+"Err<"+"number, string>>();\n      expectTypeOf(result.error).toEqualTypeOf<"+"string>();\n    }\n  });\n});\n"},"tests/extraction.test.ts":{"tests":[{"id":"71","name":"Extraction ok(42).match(v => v + 1, e => 0) returns 43"},{"id":"72","name":"Extraction err('x').match(v => v + 1, e => 0) returns 0"},{"id":"73","name":"Extraction ok(42).unwrapOr(0) returns 42"},{"id":"74","name":"Extraction err('x').unwrapOr(0) returns 0"},{"id":"75","name":"Extraction ok(42).unwrapOrElse(e => 0) returns 42"},{"id":"76","name":"Extraction err('x').unwrapOrElse(e => e.length) returns 1"},{"id":"77","name":"Extraction ok(42).toNullable() returns 42"},{"id":"78","name":"Extraction err('x').toNullable() returns null"},{"id":"79","name":"Extraction ok(42).toUndefined() returns 42"},{"id":"80","name":"Extraction err('x').toUndefined() returns undefined"},{"id":"81","name":"Extraction ok(42).intoTuple() returns [null, 42]"},{"id":"82","name":"Extraction err('x').intoTuple() returns ['x', null]"},{"id":"83","name":"Extraction ok(42).merge() returns 42"},{"id":"84","name":"Extraction err('x').merge() returns 'x'"},{"id":"85","name":"Extraction ok(42).expect('should not throw') returns 42"},{"id":"86","name":"Extraction err('x').expect('oops') throws Error with message 'oops'"},{"id":"87","name":"Extraction err('x').expectErr('should not throw') returns 'x'"},{"id":"88","name":"Extraction ok(42).expectErr('oops') throws Error with message 'oops'"},{"id":"89","name":"Extraction ok(42).toJSON() returns { _tag: 'Ok', value: 42 }"},{"id":"90","name":"Extraction err('x').toJSON() returns { _tag: 'Err', error: 'x' }"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Extraction\", () => {\n  // DoD 6 #1\n  it(\"ok(42).match(v => v + 1, e => 0) returns 43\", () => {\n    const result = ok(42).match(\n      v => v + 1,\n      () => 0\n    );\n    expect(result).toBe(43);\n  });\n\n  // DoD 6 #2\n  it(\"err('x').match(v => v + 1, e => 0) returns 0\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const matched = result.match(\n      v => v + 1,\n      () => 0\n    );\n    expect(matched).toBe(0);\n  });\n\n  // DoD 6 #3\n  it(\"ok(42).unwrapOr(0) returns 42\", () => {\n    expect(ok(42).unwrapOr(0)).toBe(42);\n  });\n\n  // DoD 6 #4\n  it(\"err('x').unwrapOr(0) returns 0\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.unwrapOr(0)).toBe(0);\n  });\n\n  // DoD 6 #5\n  it(\"ok(42).unwrapOrElse(e => 0) returns 42\", () => {\n    expect(ok(42).unwrapOrElse(() => 0)).toBe(42);\n  });\n\n  // DoD 6 #6\n  it(\"err('x').unwrapOrElse(e => e.length) returns 1\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.unwrapOrElse(e => e.length)).toBe(1);\n  });\n\n  // DoD 6 #7\n  it(\"ok(42).toNullable() returns 42\", () => {\n    expect(ok(42).toNullable()).toBe(42);\n  });\n\n  // DoD 6 #8\n  it(\"err('x').toNullable() returns null\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.toNullable()).toBeNull();\n  });\n\n  // DoD 6 #9\n  it(\"ok(42).toUndefined() returns 42\", () => {\n    expect(ok(42).toUndefined()).toBe(42);\n  });\n\n  // DoD 6 #10\n  it(\"err('x').toUndefined() returns undefined\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.toUndefined()).toBeUndefined();\n  });\n\n  // DoD 6 #11\n  it(\"ok(42).intoTuple() returns [null, 42]\", () => {\n    expect(ok(42).intoTuple()).toEqual([null, 42]);\n  });\n\n  // DoD 6 #12\n  it(\"err('x').intoTuple() returns ['x', null]\", () => {\n    expect(err(\"x\").intoTuple()).toEqual([\"x\", null]);\n  });\n\n  // DoD 6 #13\n  it(\"ok(42).merge() returns 42\", () => {\n    expect(ok(42).merge()).toBe(42);\n  });\n\n  // DoD 6 #14\n  it(\"err('x').merge() returns 'x'\", () => {\n    expect(err(\"x\").merge()).toBe(\"x\");\n  });\n\n  // DoD 6 #15\n  it(\"ok(42).expect('should not throw') returns 42\", () => {\n    expect(ok(42).expect(\"should not throw\")).toBe(42);\n  });\n\n  // DoD 6 #16\n  it(\"err('x').expect('oops') throws Error with message 'oops'\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(() => result.expect(\"oops\")).toThrow(\"oops\");\n  });\n\n  // DoD 6 #17\n  it(\"err('x').expectErr('should not throw') returns 'x'\", () => {\n    expect(err(\"x\").expectErr(\"should not throw\")).toBe(\"x\");\n  });\n\n  // DoD 6 #18\n  it(\"ok(42).expectErr('oops') throws Error with message 'oops'\", () => {\n    expect(() => ok(42).expectErr(\"oops\")).toThrow(\"oops\");\n  });\n\n  // DoD 6 #23\n  it(\"ok(42).toJSON() returns { _tag: 'Ok', value: 42 }\", () => {\n    expect(ok(42).toJSON()).toEqual({ _tag: \"Ok\", value: 42 });\n  });\n\n  // DoD 6 #24\n  it(\"err('x').toJSON() returns { _tag: 'Err', error: 'x' }\", () => {\n    expect(err(\"x\").toJSON()).toEqual({ _tag: \"Err\", error: \"x\" });\n  });\n});\n"},"tests/result-async.test.ts":{"tests":[{"id":"91","name":"ResultAsync ResultAsync.ok(42) resolves to Ok(42)"},{"id":"92","name":"ResultAsync ResultAsync.err('x') resolves to Err('x')"},{"id":"93","name":"ResultAsync fromPromise(resolved, mapErr) resolves to Ok"},{"id":"94","name":"ResultAsync fromPromise(rejected, mapErr) resolves to Err(mapped)"},{"id":"95","name":"ResultAsync fromSafePromise(promise) resolves to Ok"},{"id":"96","name":"ResultAsync ResultAsync never rejects, even when inner promise rejects"},{"id":"97","name":"ResultAsync resultAsync.map(v => v * 2) transforms Ok value"},{"id":"98","name":"ResultAsync resultAsync.map(async v => v * 2) accepts async transform"},{"id":"99","name":"ResultAsync resultAsync.mapErr(e => e.toUpperCase()) transforms Err value"},{"id":"100","name":"ResultAsync resultAsync.andThen(v => ok(v + 1)) chains sync Result"},{"id":"101","name":"ResultAsync resultAsync.andThen(v => ResultAsync.ok(v + 1)) chains async Result"},{"id":"102","name":"ResultAsync resultAsync.orElse(e => ok(99)) recovers from error"},{"id":"103","name":"ResultAsync resultAsync.andTee(v => {}) calls side effect, returns original"},{"id":"104","name":"ResultAsync resultAsync.andTee(async v => {}) accepts async side effect"},{"id":"105","name":"ResultAsync resultAsync.orTee(e => {}) calls side effect on Err"},{"id":"106","name":"ResultAsync resultAsync.andThrough(v => ok('x')) returns original on Ok"},{"id":"107","name":"ResultAsync resultAsync.andThrough(v => err('fail')) propagates Err"},{"id":"108","name":"ResultAsync resultAsync.match(onOk, onErr) returns Promise"},{"id":"109","name":"ResultAsync resultAsync.unwrapOr(0) returns Promise of value or default"},{"id":"110","name":"ResultAsync resultAsync.toNullable() returns Promise of value or null"},{"id":"111","name":"ResultAsync resultAsync.intoTuple() returns Promise of tuple"},{"id":"112","name":"ResultAsync fromAsyncThrowable(asyncFn, mapErr) wraps async fn"},{"id":"113","name":"ResultAsync Chaining multiple async operations preserves error accumulation"},{"id":"114","name":"ResultAsync resultAsync.map() on Err passes through unchanged"},{"id":"115","name":"ResultAsync resultAsync.mapErr() on Ok passes through unchanged"},{"id":"116","name":"ResultAsync resultAsync.mapBoth() transforms Ok value"},{"id":"117","name":"ResultAsync resultAsync.mapBoth() transforms Err value"},{"id":"118","name":"ResultAsync resultAsync.mapBoth() accepts async transforms"},{"id":"119","name":"ResultAsync resultAsync.andThen() on Err does not call fn and passes through"},{"id":"120","name":"ResultAsync resultAsync.orElse() on Ok passes through unchanged"},{"id":"121","name":"ResultAsync resultAsync.orTee() on Ok does not call side effect"},{"id":"122","name":"ResultAsync resultAsync.andTee() swallows errors from side effect"},{"id":"123","name":"ResultAsync resultAsync.andTee() on Err does not call side effect"},{"id":"124","name":"ResultAsync resultAsync.orTee() swallows errors from side effect"},{"id":"125","name":"ResultAsync resultAsync.match() on Err calls onErr"},{"id":"126","name":"ResultAsync resultAsync.unwrapOrElse() returns value on Ok"},{"id":"127","name":"ResultAsync resultAsync.unwrapOrElse() calls fn on Err"},{"id":"128","name":"ResultAsync resultAsync.toUndefined() returns value on Ok"},{"id":"129","name":"ResultAsync resultAsync.toUndefined() returns undefined on Err"},{"id":"130","name":"ResultAsync resultAsync.merge() returns value on Ok"},{"id":"131","name":"ResultAsync resultAsync.merge() returns error on Err"},{"id":"132","name":"ResultAsync resultAsync.flatten() unwraps nested Ok"},{"id":"133","name":"ResultAsync resultAsync.flatten() unwraps nested Err"},{"id":"134","name":"ResultAsync resultAsync.flatten() on outer Err passes through"},{"id":"135","name":"ResultAsync resultAsync.flip() converts Ok to Err"},{"id":"136","name":"ResultAsync resultAsync.flip() converts Err to Ok"},{"id":"137","name":"ResultAsync resultAsync.inspect() calls fn on Ok"},{"id":"138","name":"ResultAsync resultAsync.inspect() does not call fn on Err"},{"id":"139","name":"ResultAsync resultAsync.inspectErr() calls fn on Err"},{"id":"140","name":"ResultAsync resultAsync.inspectErr() does not call fn on Ok"},{"id":"141","name":"ResultAsync resultAsync.toJSON() returns Ok JSON"},{"id":"142","name":"ResultAsync resultAsync.toJSON() returns Err JSON"},{"id":"143","name":"ResultAsync ResultAsync.fromResult() wraps a Promise<"+"Result>"},{"id":"144","name":"ResultAsync ResultAsync.fromResult() wraps a Promise<"+"Err>"},{"id":"145","name":"ResultAsync resultAsync.andThrough() works with ResultAsync side effect"},{"id":"146","name":"ResultAsync resultAsync.andThrough() on Err passes through"},{"id":"147","name":"ResultAsync ok(42).toAsync() returns ResultAsync that resolves to Ok(42)"},{"id":"148","name":"ResultAsync err('x').toAsync() returns ResultAsync that resolves to Err('x')"},{"id":"149","name":"ResultAsync ok(42).asyncMap(async v => v * 2) returns ResultAsync resolving to Ok(84)"},{"id":"150","name":"ResultAsync ok(42).asyncAndThen(v => ResultAsync.ok(v * 2)) returns ResultAsync"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err, ResultAsync } from \"../src/index.js\";\nimport { fromPromise, fromSafePromise, fromAsyncThrowable } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"ResultAsync\", () => {\n  // DoD 8 #1\n  it(\"ResultAsync.ok(42) resolves to Ok(42)\", async () => {\n    const result = await ResultAsync.ok(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #2\n  it(\"ResultAsync.err('x') resolves to Err('x')\", async () => {\n    const result = await ResultAsync.err(\"x\");\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 8 #3\n  it(\"fromPromise(resolved, mapErr) resolves to Ok\", async () => {\n    const result = await fromPromise(Promise.resolve(42), () => \"error\");\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #4\n  it(\"fromPromise(rejected, mapErr) resolves to Err(mapped)\", async () => {\n    const result = await fromPromise(Promise.reject(\"boom\"), e => `mapped: ${e}`);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"mapped: boom\");\n  });\n\n  // DoD 8 #5\n  it(\"fromSafePromise(promise) resolves to Ok\", async () => {\n    const result = await fromSafePromise(Promise.resolve(42));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #6\n  it(\"ResultAsync never rejects, even when inner promise rejects\", async () => {\n    const ra = fromPromise(Promise.reject(\"bad\"), e => `err: ${e}`);\n    // Should not reject - should resolve to Err\n    const result = await ra;\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // DoD 8 #7\n  it(\"resultAsync.map(v => v * 2) transforms Ok value\", async () => {\n    const result = await ResultAsync.ok(21).map(v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #8\n  it(\"resultAsync.map(async v => v * 2) accepts async transform\", async () => {\n    const result = await ResultAsync.ok(21).map(async v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #9\n  it(\"resultAsync.mapErr(e => e.toUpperCase()) transforms Err value\", async () => {\n    const result = await ResultAsync.err(\"fail\").mapErr(e => e.toUpperCase());\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n  });\n\n  // DoD 8 #10\n  it(\"resultAsync.andThen(v => ok(v + 1)) chains sync Result\", async () => {\n    const result = await ResultAsync.ok(41).andThen(v => ok(v + 1));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #11\n  it(\"resultAsync.andThen(v => ResultAsync.ok(v + 1)) chains async Result\", async () => {\n    const result = await ResultAsync.ok(41).andThen(v => ResultAsync.ok(v + 1));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #12\n  it(\"resultAsync.orElse(e => ok(99)) recovers from error\", async () => {\n    const result = await ResultAsync.err(\"x\").orElse(() => ok(99));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(99);\n  });\n\n  // DoD 8 #13\n  it(\"resultAsync.andTee(v => {}) calls side effect, returns original\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).andTee(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #14\n  it(\"resultAsync.andTee(async v => {}) accepts async side effect\", async () => {\n    const fn = vi.fn(async () => {});\n    const result = await ResultAsync.ok(42).andTee(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // DoD 8 #15\n  it(\"resultAsync.orTee(e => {}) calls side effect on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").orTee(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // DoD 8 #16\n  it(\"resultAsync.andThrough(v => ok('x')) returns original on Ok\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => ok(\"x\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #17\n  it(\"resultAsync.andThrough(v => err('fail')) propagates Err\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => err(\"fail\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 8 #18\n  it(\"resultAsync.match(onOk, onErr) returns Promise\", async () => {\n    const value = await ResultAsync.ok(42).match(\n      v => v + 1,\n      () => 0\n    );\n    expect(value).toBe(43);\n  });\n\n  // DoD 8 #19\n  it(\"resultAsync.unwrapOr(0) returns Promise of value or default\", async () => {\n    expect(await ResultAsync.ok(42).unwrapOr(0)).toBe(42);\n    expect(await ResultAsync.err(\"x\").unwrapOr(0)).toBe(0);\n  });\n\n  // DoD 8 #20\n  it(\"resultAsync.toNullable() returns Promise of value or null\", async () => {\n    expect(await ResultAsync.ok(42).toNullable()).toBe(42);\n    expect(await ResultAsync.err(\"x\").toNullable()).toBeNull();\n  });\n\n  // DoD 8 #21\n  it(\"resultAsync.intoTuple() returns Promise of tuple\", async () => {\n    expect(await ResultAsync.ok(42).intoTuple()).toEqual([null, 42]);\n    expect(await ResultAsync.err(\"x\").intoTuple()).toEqual([\"x\", null]);\n  });\n\n  // DoD 8 #26\n  it(\"fromAsyncThrowable(asyncFn, mapErr) wraps async fn\", async () => {\n    const safeFn = fromAsyncThrowable(\n      async (n: number) => n * 2,\n      () => \"error\"\n    );\n    const result = await safeFn(21);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #27\n  it(\"Chaining multiple async operations preserves error accumulation\", async () => {\n    type _E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const result = await ResultAsync.ok(1)\n      .andThen(v => ok(v + 1))\n      .andThen(() => err({ _tag: \"E2\" } satisfies E2));\n\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // --- Dual-path coverage: map on Err ---\n  it(\"resultAsync.map() on Err passes through unchanged\", async () => {\n    const fn = vi.fn((v: number) => v * 2);\n    const result = await ResultAsync.err(\"x\").map(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: mapErr on Ok ---\n  it(\"resultAsync.mapErr() on Ok passes through unchanged\", async () => {\n    const fn = vi.fn((e: string) => e.toUpperCase());\n    const result = await ResultAsync.ok(42).mapErr(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- mapBoth ---\n  it(\"resultAsync.mapBoth() transforms Ok value\", async () => {\n    const result = await ResultAsync.ok(21).mapBoth(\n      v => v * 2,\n      e => e\n    );\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.mapBoth() transforms Err value\", async () => {\n    const result = await ResultAsync.err(\"fail\").mapBoth(\n      v => v,\n      e => e.toUpperCase()\n    );\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n  });\n\n  it(\"resultAsync.mapBoth() accepts async transforms\", async () => {\n    const result = await ResultAsync.ok(10).mapBoth(\n      async v => v + 1,\n      async e => e\n    );\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(11);\n  });\n\n  // --- Mutation gap: andThen on Err does not call fn ---\n  it(\"resultAsync.andThen() on Err does not call fn and passes through\", async () => {\n    const fn = vi.fn(() => ok(99));\n    const result = await ResultAsync.err(\"x\").andThen(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: orElse on Ok ---\n  it(\"resultAsync.orElse() on Ok passes through unchanged\", async () => {\n    const fn = vi.fn(() => ok(99));\n    const result = await ResultAsync.ok(42).orElse(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: orTee on Ok ---\n  it(\"resultAsync.orTee() on Ok does not call side effect\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).orTee(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- andTee error swallowing ---\n  it(\"resultAsync.andTee() swallows errors from side effect\", async () => {\n    const result = await ResultAsync.ok(42).andTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.andTee() on Err does not call side effect\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").andTee(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- orTee error swallowing ---\n  it(\"resultAsync.orTee() swallows errors from side effect\", async () => {\n    const result = await ResultAsync.err(\"x\").orTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // --- Dual-path coverage: match on Err ---\n  it(\"resultAsync.match() on Err calls onErr\", async () => {\n    const value = await ResultAsync.err(\"x\").match(\n      () => 0,\n      e => e.length\n    );\n    expect(value).toBe(1);\n  });\n\n  // --- unwrapOrElse ---\n  it(\"resultAsync.unwrapOrElse() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).unwrapOrElse(() => 0)).toBe(42);\n  });\n\n  it(\"resultAsync.unwrapOrElse() calls fn on Err\", async () => {\n    expect(await ResultAsync.err(\"abc\").unwrapOrElse(e => e.length)).toBe(3);\n  });\n\n  // --- toUndefined ---\n  it(\"resultAsync.toUndefined() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).toUndefined()).toBe(42);\n  });\n\n  it(\"resultAsync.toUndefined() returns undefined on Err\", async () => {\n    expect(await ResultAsync.err(\"x\").toUndefined()).toBeUndefined();\n  });\n\n  // --- merge ---\n  it(\"resultAsync.merge() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).merge()).toBe(42);\n  });\n\n  it(\"resultAsync.merge() returns error on Err\", async () => {\n    expect(await ResultAsync.err(\"x\").merge()).toBe(\"x\");\n  });\n\n  // --- flatten ---\n  it(\"resultAsync.flatten() unwraps nested Ok\", async () => {\n    const inner: Result<"+"number, string> = ok(42);\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.ok(inner);\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Ok\");\n    if (flat.isOk()) expect(flat.value).toBe(42);\n  });\n\n  it(\"resultAsync.flatten() unwraps nested Err\", async () => {\n    const inner: Result<"+"number, string> = err(\"inner\");\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.ok(inner);\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) expect(flat.error).toBe(\"inner\");\n  });\n\n  it(\"resultAsync.flatten() on outer Err passes through\", async () => {\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.err(\"outer\");\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) expect(flat.error).toBe(\"outer\");\n  });\n\n  // --- flip ---\n  it(\"resultAsync.flip() converts Ok to Err\", async () => {\n    const result = await ResultAsync.ok(42).flip();\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(42);\n  });\n\n  it(\"resultAsync.flip() converts Err to Ok\", async () => {\n    const result = await ResultAsync.err(\"x\").flip();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(\"x\");\n  });\n\n  // --- inspect / inspectErr ---\n  it(\"resultAsync.inspect() calls fn on Ok\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).inspect(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.inspect() does not call fn on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").inspect(fn);\n    expect(fn).not.toHaveBeenCalled();\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  it(\"resultAsync.inspectErr() calls fn on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").inspectErr(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  it(\"resultAsync.inspectErr() does not call fn on Ok\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).inspectErr(fn);\n    expect(fn).not.toHaveBeenCalled();\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // --- toJSON ---\n  it(\"resultAsync.toJSON() returns Ok JSON\", async () => {\n    expect(await ResultAsync.ok(42).toJSON()).toEqual({ _tag: \"Ok\", value: 42 });\n  });\n\n  it(\"resultAsync.toJSON() returns Err JSON\", async () => {\n    expect(await ResultAsync.err(\"x\").toJSON()).toEqual({ _tag: \"Err\", error: \"x\" });\n  });\n\n  // --- fromResult ---\n  it(\"ResultAsync.fromResult() wraps a Promise<"+"Result>\", async () => {\n    const promise = Promise.resolve(ok(42));\n    const result = await ResultAsync.fromResult(promise);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"ResultAsync.fromResult() wraps a Promise<"+"Err>\", async () => {\n    const promise: Promise<"+"Result<"+"number, string>> = Promise.resolve(err(\"x\"));\n    const result = await ResultAsync.fromResult(promise);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // --- andThrough with ResultAsync return ---\n  it(\"resultAsync.andThrough() works with ResultAsync side effect\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => ResultAsync.ok(\"ignored\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.andThrough() on Err passes through\", async () => {\n    const fn = vi.fn(() => ok(\"x\"));\n    const result = await ResultAsync.err(\"fail\").andThrough(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // DoD 6 #19\n  it(\"ok(42).toAsync() returns ResultAsync that resolves to Ok(42)\", async () => {\n    const result = await ok(42).toAsync();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 6 #20\n  it(\"err('x').toAsync() returns ResultAsync that resolves to Err('x')\", async () => {\n    const result = await err(\"x\").toAsync();\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 6 #21\n  it(\"ok(42).asyncMap(async v => v * 2) returns ResultAsync resolving to Ok(84)\", async () => {\n    const result = await ok(42).asyncMap(async v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(84);\n  });\n\n  // DoD 6 #22\n  it(\"ok(42).asyncAndThen(v => ResultAsync.ok(v * 2)) returns ResultAsync\", async () => {\n    const result = await ok(42).asyncAndThen(v => ResultAsync.ok(v * 2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(84);\n  });\n});\n"},"tests/transformations.test.ts":{"tests":[{"id":"151","name":"Transformations ok(2).map(x => x * 3) returns Ok(6)"},{"id":"152","name":"Transformations err('x').map(x => x * 3) returns Err('x') unchanged"},{"id":"153","name":"Transformations ok(2).mapErr(e => e.toUpperCase()) returns Ok(2) unchanged"},{"id":"154","name":"Transformations err('fail').mapErr(e => e.toUpperCase()) returns Err('FAIL')"},{"id":"155","name":"Transformations ok(2).mapBoth(v => v * 2, e => e) returns Ok(4)"},{"id":"156","name":"Transformations err('x').mapBoth(v => v * 2, e => e.toUpperCase()) returns Err('X')"},{"id":"157","name":"Transformations ok(ok(42)).flatten() returns Ok(42)"},{"id":"158","name":"Transformations ok(err('inner')).flatten() returns Err('inner')"},{"id":"159","name":"Transformations err('outer').flatten() returns Err('outer')"},{"id":"160","name":"Transformations ok(42).flip() returns Err(42)"},{"id":"161","name":"Transformations err('x').flip() returns Ok('x')"},{"id":"162","name":"Transformations map does not call the function on Err"},{"id":"163","name":"Transformations mapErr does not call the function on Ok"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Transformations\", () => {\n  // DoD 4 #1\n  it(\"ok(2).map(x => x * 3) returns Ok(6)\", () => {\n    const result = ok(2).map(x => x * 3);\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(6);\n  });\n\n  // DoD 4 #2\n  it(\"err('x').map(x => x * 3) returns Err('x') unchanged\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const mapped = result.map(x => x * 3);\n    expect(mapped._tag).toBe(\"Err\");\n    if (mapped.isErr()) {\n      expect(mapped.error).toBe(\"x\");\n    }\n  });\n\n  // DoD 4 #3\n  it(\"ok(2).mapErr(e => e.toUpperCase()) returns Ok(2) unchanged\", () => {\n    const result: Result<"+"number, string> = ok(2);\n    const mapped = result.mapErr(e => e.toUpperCase());\n    expect(mapped._tag).toBe(\"Ok\");\n    if (mapped.isOk()) {\n      expect(mapped.value).toBe(2);\n    }\n  });\n\n  // DoD 4 #4\n  it(\"err('fail').mapErr(e => e.toUpperCase()) returns Err('FAIL')\", () => {\n    const result = err(\"fail\").mapErr(e => e.toUpperCase());\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(\"FAIL\");\n  });\n\n  // DoD 4 #5\n  it(\"ok(2).mapBoth(v => v * 2, e => e) returns Ok(4)\", () => {\n    const result: Result<"+"number, string> = ok(2);\n    const mapped = result.mapBoth(\n      v => v * 2,\n      e => e\n    );\n    expect(mapped._tag).toBe(\"Ok\");\n    if (mapped.isOk()) {\n      expect(mapped.value).toBe(4);\n    }\n  });\n\n  // DoD 4 #6\n  it(\"err('x').mapBoth(v => v * 2, e => e.toUpperCase()) returns Err('X')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const mapped = result.mapBoth(\n      v => v * 2,\n      e => e.toUpperCase()\n    );\n    expect(mapped._tag).toBe(\"Err\");\n    if (mapped.isErr()) {\n      expect(mapped.error).toBe(\"X\");\n    }\n  });\n\n  // DoD 4 #7\n  it(\"ok(ok(42)).flatten() returns Ok(42)\", () => {\n    const nested = ok(ok(42));\n    const flat = nested.flatten();\n    expect(flat._tag).toBe(\"Ok\");\n    if (flat.isOk()) {\n      expect(flat.value).toBe(42);\n    }\n  });\n\n  // DoD 4 #8\n  it(\"ok(err('inner')).flatten() returns Err('inner')\", () => {\n    const nested = ok(err(\"inner\"));\n    const flat = nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) {\n      expect(flat.error).toBe(\"inner\");\n    }\n  });\n\n  // DoD 4 #9\n  it(\"err('outer').flatten() returns Err('outer')\", () => {\n    const outer: Result<"+"Result<"+"number, string>, string> = err(\"outer\");\n    const flat = outer.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) {\n      expect(flat.error).toBe(\"outer\");\n    }\n  });\n\n  // DoD 4 #10\n  it(\"ok(42).flip() returns Err(42)\", () => {\n    const result = ok(42).flip();\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(42);\n  });\n\n  // DoD 4 #11\n  it(\"err('x').flip() returns Ok('x')\", () => {\n    const result = err(\"x\").flip();\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(\"x\");\n  });\n\n  // DoD 4 #12\n  it(\"map does not call the function on Err\", () => {\n    const fn = vi.fn((x: number) => x * 2);\n    const result: Result<"+"number, string> = err(\"x\");\n    result.map(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // DoD 4 #13\n  it(\"mapErr does not call the function on Ok\", () => {\n    const fn = vi.fn((e: string) => e.toUpperCase());\n    const result: Result<"+"number, string> = ok(2);\n    result.mapErr(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n});\n"},"tests/error-patterns.test.ts":{"tests":[{"id":"164","name":"Error Patterns Tagged error with _tag discriminant is created correctly"},{"id":"165","name":"Error Patterns createError('NotFound') returns factory producing { _tag: 'NotFound' }"},{"id":"166","name":"Error Patterns createError('NotFound') factory accepts and merges additional fields"},{"id":"167","name":"Error Patterns createError factory produces frozen (immutable) objects"},{"id":"168","name":"Error Patterns assertNever throws with custom message when provided"},{"id":"169","name":"Error Patterns assertNever default message includes the value"},{"id":"170","name":"Error Patterns assertNever throws on non-exhaustive match"},{"id":"171","name":"Error Patterns Switch on error._tag handles all variants exhaustively"},{"id":"172","name":"Error Patterns Error with cause chain preserves inner error reference"},{"id":"173","name":"Error Patterns mapErr transforms error from infrastructure to domain type"},{"id":"174","name":"Error Patterns Error types compose via andThen union accumulation"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { createError } from \"../src/errors/create-error.js\";\nimport { assertNever } from \"../src/errors/assert-never.js\";\n\ndescribe(\"Error Patterns\", () => {\n  // DoD 10 #1\n  it(\"Tagged error with _tag discriminant is created correctly\", () => {\n    const error = { _tag: \"NotFound\" as const, resource: \"User\", id: \"123\" };\n    expect(error._tag).toBe(\"NotFound\");\n    expect(error.resource).toBe(\"User\");\n    expect(error.id).toBe(\"123\");\n  });\n\n  // DoD 10 #2\n  it(\"createError('NotFound') returns factory producing { _tag: 'NotFound' }\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({});\n    expect(error._tag).toBe(\"NotFound\");\n  });\n\n  // DoD 10 #3\n  it(\"createError('NotFound') factory accepts and merges additional fields\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expect(error._tag).toBe(\"NotFound\");\n    expect(error.resource).toBe(\"User\");\n    expect(error.id).toBe(\"123\");\n  });\n\n  // --- Mutation gap: createError returns frozen object ---\n  it(\"createError factory produces frozen (immutable) objects\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ id: \"123\" });\n    expect(Object.isFrozen(error)).toBe(true);\n  });\n\n  // --- Mutation gap: assertNever with custom message ---\n  it(\"assertNever throws with custom message when provided\", () => {\n    const badValue = \"unexpected\" as never;\n    expect(() => assertNever(badValue, \"custom message\")).toThrow(\"custom message\");\n  });\n\n  // --- Mutation gap: assertNever default message includes value ---\n  it(\"assertNever default message includes the value\", () => {\n    const badValue = \"oops\" as never;\n    expect(() => assertNever(badValue)).toThrow(\"Unexpected value\");\n  });\n\n  // DoD 10 #4\n  it(\"assertNever throws on non-exhaustive match\", () => {\n    type MyError = { _tag: \"A\" } | { _tag: \"B\" };\n\n    function handle(e: MyError): string {\n      switch (e._tag) {\n        case \"A\":\n          return \"handled A\";\n        case \"B\":\n          return \"handled B\";\n        default:\n          return assertNever(e);\n      }\n    }\n\n    expect(handle({ _tag: \"A\" })).toBe(\"handled A\");\n    expect(handle({ _tag: \"B\" })).toBe(\"handled B\");\n\n    // Force a bad value past TypeScript to test runtime behavior\n    const badError = { _tag: \"C\" } as unknown as MyError;\n    expect(() => handle(badError)).toThrow();\n  });\n\n  // DoD 10 #5\n  it(\"Switch on error._tag handles all variants exhaustively\", () => {\n    type AppError =\n      | { _tag: \"NotFound\"; id: string }\n      | { _tag: \"Validation\"; field: string }\n      | { _tag: \"Database\"; cause: string };\n\n    function toStatus(error: AppError): number {\n      switch (error._tag) {\n        case \"NotFound\":\n          return 404;\n        case \"Validation\":\n          return 422;\n        case \"Database\":\n          return 500;\n      }\n    }\n\n    expect(toStatus({ _tag: \"NotFound\", id: \"1\" })).toBe(404);\n    expect(toStatus({ _tag: \"Validation\", field: \"email\" })).toBe(422);\n    expect(toStatus({ _tag: \"Database\", cause: \"timeout\" })).toBe(500);\n  });\n\n  // DoD 10 #6\n  it(\"Error with cause chain preserves inner error reference\", () => {\n    const inner = { _tag: \"ConnectionFailed\" as const, host: \"db.example.com\" };\n    const outer = { _tag: \"InfraFailure\" as const, cause: inner };\n\n    expect(outer.cause._tag).toBe(\"ConnectionFailed\");\n    expect(outer.cause.host).toBe(\"db.example.com\");\n  });\n\n  // DoD 10 #7\n  it(\"mapErr transforms error from infrastructure to domain type\", () => {\n    type InfraError = { _tag: \"Timeout\"; ms: number };\n    type DomainError = { _tag: \"ServiceUnavailable\"; reason: string };\n\n    const infraResult: Result<"+"string, InfraError> = err({ _tag: \"Timeout\", ms: 5000 });\n    const domainResult = infraResult.mapErr(\n      (e): DomainError => ({\n        _tag: \"ServiceUnavailable\",\n        reason: `Timed out after ${e.ms}ms`,\n      })\n    );\n\n    expect(domainResult._tag).toBe(\"Err\");\n    if (domainResult.isErr()) {\n      expect(domainResult.error._tag).toBe(\"ServiceUnavailable\");\n      expect(domainResult.error.reason).toBe(\"Timed out after 5000ms\");\n    }\n  });\n\n  // DoD 10 #8\n  it(\"Error types compose via andThen union accumulation\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    type E3 = { _tag: \"E3\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(n: number): Result<"+"string, E2> {\n      return ok(String(n));\n    }\n    function step3(_s: string): Result<"+"boolean, E3> {\n      return err({ _tag: \"E3\" });\n    }\n\n    const result = step1().andThen(step2).andThen(step3);\n\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) {\n      expect(result.error._tag).toBe(\"E3\");\n    }\n  });\n});\n"},"tests/chaining.test.ts":{"tests":[{"id":"175","name":"Chaining ok(2).andThen(v => ok(v * 3)) returns Ok(6)"},{"id":"176","name":"Chaining ok(2).andThen(v => err('fail')) returns Err('fail')"},{"id":"177","name":"Chaining err('x').andThen(v => ok(v * 3)) returns Err('x')"},{"id":"178","name":"Chaining err('x').orElse(e => ok(99)) returns Ok(99)"},{"id":"179","name":"Chaining err('x').orElse(e => err('new')) returns Err('new')"},{"id":"180","name":"Chaining ok(1).orElse(e => ok(99)) returns Ok(1)"},{"id":"181","name":"Chaining ok(2).andTee(v => {}) returns Ok(2)"},{"id":"182","name":"Chaining ok(2).andTee(v => { throw ... }) returns Ok(2) (swallows error)"},{"id":"183","name":"Chaining err('x').andTee(v => {}) returns Err('x')"},{"id":"184","name":"Chaining andTee calls the function with the Ok value"},{"id":"185","name":"Chaining err('x').orTee(e => {}) returns Err('x')"},{"id":"186","name":"Chaining orTee calls the function with the Err value"},{"id":"187","name":"Chaining ok(1).orTee(e => {}) returns Ok(1)"},{"id":"188","name":"Chaining ok(2).andThrough(v => ok('ignored')) returns Ok(2) (original value)"},{"id":"189","name":"Chaining ok(2).andThrough(v => err('fail')) returns Err('fail') (propagates)"},{"id":"190","name":"Chaining err('x').andThrough(v => ok('ignored')) returns Err('x')"},{"id":"191","name":"Chaining inspect calls function on Ok, returns same Result"},{"id":"192","name":"Chaining inspect does not call function on Err"},{"id":"193","name":"Chaining inspectErr calls function on Err, returns same Result"},{"id":"194","name":"Chaining inspectErr does not call function on Ok"},{"id":"195","name":"Chaining inspect on Err returns the same Err instance"},{"id":"196","name":"Chaining inspectErr on Ok returns the same Ok instance"},{"id":"197","name":"Chaining err('x').orTee(throwing fn) returns Err('x') (swallows error)"},{"id":"198","name":"Chaining err('x').andTee() does not call the function"},{"id":"199","name":"Chaining ok(1).orTee() does not call the function"},{"id":"200","name":"Chaining Chaining andThen accumulates error types via union"},{"id":"201","name":"Chaining Three-step andThen chain short-circuits on first Err"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Chaining\", () => {\n  // DoD 5 #1\n  it(\"ok(2).andThen(v => ok(v * 3)) returns Ok(6)\", () => {\n    const result = ok(2).andThen(v => ok(v * 3));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(6);\n  });\n\n  // DoD 5 #2\n  it(\"ok(2).andThen(v => err('fail')) returns Err('fail')\", () => {\n    const result = ok(2).andThen(() => err(\"fail\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 5 #3\n  it(\"err('x').andThen(v => ok(v * 3)) returns Err('x')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const chained = result.andThen(v => ok(v * 3));\n    expect(chained._tag).toBe(\"Err\");\n    if (chained.isErr()) expect(chained.error).toBe(\"x\");\n  });\n\n  // DoD 5 #4\n  it(\"err('x').orElse(e => ok(99)) returns Ok(99)\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const recovered = result.orElse(() => ok(99));\n    expect(recovered._tag).toBe(\"Ok\");\n    if (recovered.isOk()) expect(recovered.value).toBe(99);\n  });\n\n  // DoD 5 #5\n  it(\"err('x').orElse(e => err('new')) returns Err('new')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const recovered = result.orElse(() => err(\"new\"));\n    expect(recovered._tag).toBe(\"Err\");\n    if (recovered.isErr()) expect(recovered.error).toBe(\"new\");\n  });\n\n  // DoD 5 #6\n  it(\"ok(1).orElse(e => ok(99)) returns Ok(1)\", () => {\n    const result: Result<"+"number, string> = ok(1);\n    const recovered = result.orElse(() => ok(99));\n    expect(recovered._tag).toBe(\"Ok\");\n    if (recovered.isOk()) expect(recovered.value).toBe(1);\n  });\n\n  // DoD 5 #7\n  it(\"ok(2).andTee(v => {}) returns Ok(2)\", () => {\n    const result = ok(2).andTee(() => {});\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(2);\n  });\n\n  // DoD 5 #8\n  it(\"ok(2).andTee(v => { throw ... }) returns Ok(2) (swallows error)\", () => {\n    const result = ok(2).andTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(2);\n  });\n\n  // DoD 5 #9\n  it(\"err('x').andTee(v => {}) returns Err('x')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const teed = result.andTee(() => {});\n    expect(teed._tag).toBe(\"Err\");\n    if (teed.isErr()) expect(teed.error).toBe(\"x\");\n  });\n\n  // DoD 5 #10\n  it(\"andTee calls the function with the Ok value\", () => {\n    const fn = vi.fn();\n    ok(42).andTee(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n  });\n\n  // DoD 5 #11\n  it(\"err('x').orTee(e => {}) returns Err('x')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const teed = result.orTee(() => {});\n    expect(teed._tag).toBe(\"Err\");\n    if (teed.isErr()) expect(teed.error).toBe(\"x\");\n  });\n\n  // DoD 5 #12\n  it(\"orTee calls the function with the Err value\", () => {\n    const fn = vi.fn();\n    err(\"x\").orTee(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n  });\n\n  // DoD 5 #13\n  it(\"ok(1).orTee(e => {}) returns Ok(1)\", () => {\n    const result: Result<"+"number, string> = ok(1);\n    const teed = result.orTee(() => {});\n    expect(teed._tag).toBe(\"Ok\");\n    if (teed.isOk()) expect(teed.value).toBe(1);\n  });\n\n  // DoD 5 #14\n  it(\"ok(2).andThrough(v => ok('ignored')) returns Ok(2) (original value)\", () => {\n    const result = ok(2).andThrough(() => ok(\"ignored\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(2);\n  });\n\n  // DoD 5 #15\n  it(\"
