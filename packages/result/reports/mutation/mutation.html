en(() => none()) returns none"},{"id":"154","name":"Option BEH-09-002: andThen – Some chaining / BEH-09-003: None passthrough none().andThen(x => some(x)) returns none"},{"id":"155","name":"Option BEH-09-002: filter – Some filtering / BEH-09-003: None passthrough some(4).filter(x => x > 2) returns some(4)"},{"id":"156","name":"Option BEH-09-002: filter – Some filtering / BEH-09-003: None passthrough some(1).filter(x => x > 2) returns none"},{"id":"157","name":"Option BEH-09-002: filter – Some filtering / BEH-09-003: None passthrough none().filter() returns none"},{"id":"158","name":"Option BEH-09-002: unwrapOr – Some extraction / BEH-09-003: None default some(42).unwrapOr(0) returns 42"},{"id":"159","name":"Option BEH-09-002: unwrapOr – Some extraction / BEH-09-003: None default none().unwrapOr(0) returns 0"},{"id":"160","name":"Option BEH-09-002: match – Some/BEH-09-003: None pattern matching some(5).match returns onSome result"},{"id":"161","name":"Option BEH-09-002: match – Some/BEH-09-003: None pattern matching none().match returns onNone result"},{"id":"162","name":"Option BEH-09-002: toResult – Some conversion / BEH-09-003: None conversion some(42).toResult() returns ok(42)"},{"id":"163","name":"Option BEH-09-002: toResult – Some conversion / BEH-09-003: None conversion none().toResult(() => 'missing') returns err('missing')"},{"id":"164","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable(null) returns none"},{"id":"165","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable(undefined) returns none"},{"id":"166","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable(42) returns some(42)"},{"id":"167","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable('hello') returns some('hello')"},{"id":"168","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable(0) returns some(0) (falsy but not null/undefined)"},{"id":"169","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable('') returns some('') (falsy but not null/undefined)"},{"id":"170","name":"Option BEH-09-008: fromNullable – converts nullable to Option fromNullable(false) returns some(false) (falsy but not null/undefined)"},{"id":"171","name":"Option BEH-09-002: flatten – Some chaining / BEH-09-003: None passthrough some(some(42)).flatten() returns some(42)"},{"id":"172","name":"Option BEH-09-002: flatten – Some chaining / BEH-09-003: None passthrough some(none()).flatten() returns none"},{"id":"173","name":"Option BEH-09-002: flatten – Some chaining / BEH-09-003: None passthrough none().flatten() returns none"},{"id":"174","name":"Option BEH-09-002: zip – Some combining / BEH-09-003: None passthrough some(1).zip(some('a')) returns some([1, 'a'])"},{"id":"175","name":"Option BEH-09-002: zip – Some combining / BEH-09-003: None passthrough some(1).zip(none()) returns none"},{"id":"176","name":"Option BEH-09-002: zip – Some combining / BEH-09-003: None passthrough none().zip(some(1)) returns none"},{"id":"177","name":"Option BEH-09-002: zip – Some combining / BEH-09-003: None passthrough none().zip(none()) returns none"},{"id":"178","name":"Option BEH-09-002: zipWith – Some combining / BEH-09-003: None passthrough some(1).zipWith(some(2), (a, b) => a + b) returns some(3)"},{"id":"179","name":"Option BEH-09-002: zipWith – Some combining / BEH-09-003: None passthrough some(1).zipWith(none(), (a, b) => a + b) returns none"},{"id":"180","name":"Option BEH-09-002: zipWith – Some combining / BEH-09-003: None passthrough none().zipWith(some(1), f) returns none"},{"id":"181","name":"Option BEH-09-009: toJSON – serializes Option to JSON with _schemaVersion some(42).toJSON() returns correct structure"},{"id":"182","name":"Option BEH-09-009: toJSON – serializes Option to JSON with _schemaVersion none().toJSON() returns correct structure"},{"id":"183","name":"Option BEH-09-009: toJSON – serializes Option to JSON with _schemaVersion JSON.stringify integration with Some"},{"id":"184","name":"Option BEH-09-009: toJSON – serializes Option to JSON with _schemaVersion JSON.stringify integration with None"},{"id":"185","name":"Option BEH-09-002: expect – Some extraction / BEH-09-003: None throws some(42).expect('msg') returns 42"},{"id":"186","name":"Option BEH-09-002: expect – Some extraction / BEH-09-003: None throws none().expect('msg') throws UnwrapError"},{"id":"187","name":"Option BEH-09-002: orElse – Some passthrough / BEH-09-003: None fallback some(1).orElse(() => some(2)) returns some(1)"},{"id":"188","name":"Option BEH-09-002: orElse – Some passthrough / BEH-09-003: None fallback none().orElse(() => some(2)) returns some(2)"},{"id":"189","name":"Option BEH-09-002: orElse – Some passthrough / BEH-09-003: None fallback none().orElse(() => none()) returns none"},{"id":"190","name":"Option BEH-09-002: toNullable – Some extraction / BEH-09-003: None returns null some(42).toNullable() returns 42"},{"id":"191","name":"Option BEH-09-002: toNullable – Some extraction / BEH-09-003: None returns null none().toNullable() returns null"},{"id":"192","name":"Option BEH-09-002: toUndefined – Some extraction / BEH-09-003: None returns undefined some(42).toUndefined() returns 42"},{"id":"193","name":"Option BEH-09-002: toUndefined – Some extraction / BEH-09-003: None returns undefined none().toUndefined() returns undefined"},{"id":"194","name":"Option BEH-09-002: transpose – Some bridge / BEH-09-003: None bridge some(ok(42)).transpose() returns ok(some(42))"},{"id":"195","name":"Option BEH-09-002: transpose – Some bridge / BEH-09-003: None bridge some(err('fail')).transpose() returns err('fail')"},{"id":"196","name":"Option BEH-09-002: transpose – Some bridge / BEH-09-003: None bridge none().transpose() returns ok(none())"},{"id":"197","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option round-trips some(42) through toJSON/fromOptionJSON"},{"id":"198","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option round-trips none() through toJSON/fromOptionJSON"},{"id":"199","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option accepts legacy format without _schemaVersion"},{"id":"200","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option accepts legacy None format without _schemaVersion"},{"id":"201","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option throws TypeError for invalid _tag"},{"id":"202","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option restored Option is frozen"},{"id":"203","name":"Option BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option restored Option is a genuine Option (isOption)"},{"id":"204","name":"Option BEH-09-004: _tag discriminant – Option<"+"T> discriminated union (Some | None) some() has _tag 'Some'"},{"id":"205","name":"Option BEH-09-004: _tag discriminant – Option<"+"T> discriminated union (Some | None) none() has _tag 'None'"},{"id":"206","name":"Option BEH-09-005: value property – some(value) creates frozen Some instance with OPTION_BRAND some(42) has value 42"},{"id":"207","name":"Option BEH-09-005: value property – some(value) creates frozen Some instance with OPTION_BRAND some('hello') has value 'hello'"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { some, none, isOption, fromNullable, fromOptionJSON, OPTION_BRAND } from \"../src/option/index.js\";\nimport { UnwrapError } from \"../src/unsafe/unwrap-error.js\";\nimport { ok, err } from \"../src/core/result.js\";\nimport type { Option } from \"../src/option/types.js\";\n\ndescribe(\"Option\", () => {\n  // =========================================================================\n  // BEH-09-001: OPTION_BRAND unique symbol\n  // =========================================================================\n  describe(\"BEH-09-001: OPTION_BRAND unique symbol for Option identity\", () => {\n    it(\"OPTION_BRAND is a symbol\", () => {\n      expect(typeof OPTION_BRAND).toBe(\"symbol\");\n    });\n\n    it(\"OPTION_BRAND description is 'Option'\", () => {\n      expect(OPTION_BRAND.description).toBe(\"Option\");\n    });\n  });\n\n  // =========================================================================\n  // Type guards (isSome / isNone)\n  // =========================================================================\n  describe(\"BEH-09-002: Some<"+"T> / BEH-09-003: None – isSome / isNone type guards\", () => {\n    it(\"some(42).isSome() returns true\", () => {\n      expect(some(42).isSome()).toBe(true);\n    });\n\n    it(\"some(42).isNone() returns false\", () => {\n      expect(some(42).isNone()).toBe(false);\n    });\n\n    it(\"none().isSome() returns false\", () => {\n      expect(none().isSome()).toBe(false);\n    });\n\n    it(\"none().isNone() returns true\", () => {\n      expect(none().isNone()).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // isSomeAnd\n  // =========================================================================\n  describe(\"BEH-09-002: isSomeAnd – Some conditional guard / BEH-09-003: None returns false\", () => {\n    it(\"some(5).isSomeAnd(v => v > 3) returns true\", () => {\n      expect(some(5).isSomeAnd(v => v > 3)).toBe(true);\n    });\n\n    it(\"some(1).isSomeAnd(v => v > 3) returns false\", () => {\n      expect(some(1).isSomeAnd(v => v > 3)).toBe(false);\n    });\n\n    it(\"none().isSomeAnd() returns false\", () => {\n      const opt: Option<"+"number> = none();\n      expect(opt.isSomeAnd(v => v > 3)).toBe(false);\n    });\n  });\n\n  // =========================================================================\n  // Frozen (INV-10)\n  // =========================================================================\n  describe(\"INV-10: frozen instances – all Option instances are Object.freeze()d\", () => {\n    it(\"some(42) is frozen\", () => {\n      expect(Object.isFrozen(some(42))).toBe(true);\n    });\n\n    it(\"none() is frozen\", () => {\n      expect(Object.isFrozen(none())).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // Brand / isOption (BEH-09-007, INV-11)\n  // =========================================================================\n  describe(\"BEH-09-007 / INV-11: isOption – brand-based type guard and forgery prevention\", () => {\n    it(\"isOption(some(1)) returns true\", () => {\n      expect(isOption(some(1))).toBe(true);\n    });\n\n    it(\"isOption(none()) returns true\", () => {\n      expect(isOption(none())).toBe(true);\n    });\n\n    it(\"isOption rejects fake object without brand\", () => {\n      expect(isOption({ _tag: \"Some\", value: 1 })).toBe(false);\n    });\n\n    it(\"isOption(null) returns false\", () => {\n      expect(isOption(null)).toBe(false);\n    });\n\n    it(\"isOption(undefined) returns false\", () => {\n      expect(isOption(undefined)).toBe(false);\n    });\n\n    it(\"isOption('string') returns false\", () => {\n      expect(isOption(\"string\")).toBe(false);\n    });\n\n    it(\"isOption(42) returns false\", () => {\n      expect(isOption(42)).toBe(false);\n    });\n\n    it(\"brand symbol is present on some()\", () => {\n      expect(OPTION_BRAND in some(1)).toBe(true);\n    });\n\n    it(\"brand symbol is present on none()\", () => {\n      expect(OPTION_BRAND in none()).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // none() singleton (BEH-09-006)\n  // =========================================================================\n  describe(\"BEH-09-006: none() returns frozen None singleton with OPTION_BRAND\", () => {\n    it(\"none() always returns the same instance\", () => {\n      expect(none()).toBe(none());\n    });\n  });\n\n  // =========================================================================\n  // map\n  // =========================================================================\n  describe(\"BEH-09-002: map – Some transformation / BEH-09-003: None passthrough\", () => {\n    it(\"some(2).map(x => x * 3) returns some(6)\", () => {\n      const result = some(2).map(x => x * 3);\n      expect(result._tag).toBe(\"Some\");\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(6);\n      }\n    });\n\n    it(\"none().map(x => x * 3) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.map(x => x * 3);\n      expect(result._tag).toBe(\"None\");\n      expect(result.isNone()).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // andThen\n  // =========================================================================\n  describe(\"BEH-09-002: andThen – Some chaining / BEH-09-003: None passthrough\", () => {\n    it(\"some(2).andThen(x => some(x * 3)) returns some(6)\", () => {\n      const result = some(2).andThen(x => some(x * 3));\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(6);\n      }\n    });\n\n    it(\"some(2).andThen(() => none()) returns none\", () => {\n      const result = some(2).andThen(() => none());\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().andThen(x => some(x)) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.andThen(x => some(x));\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // filter\n  // =========================================================================\n  describe(\"BEH-09-002: filter – Some filtering / BEH-09-003: None passthrough\", () => {\n    it(\"some(4).filter(x => x > 2) returns some(4)\", () => {\n      const result = some(4).filter(x => x > 2);\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(4);\n      }\n    });\n\n    it(\"some(1).filter(x => x > 2) returns none\", () => {\n      const result = some(1).filter(x => x > 2);\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().filter() returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.filter(x => x > 2);\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // unwrapOr\n  // =========================================================================\n  describe(\"BEH-09-002: unwrapOr – Some extraction / BEH-09-003: None default\", () => {\n    it(\"some(42).unwrapOr(0) returns 42\", () => {\n      expect(some(42).unwrapOr(0)).toBe(42);\n    });\n\n    it(\"none().unwrapOr(0) returns 0\", () => {\n      expect(none().unwrapOr(0)).toBe(0);\n    });\n  });\n\n  // =========================================================================\n  // match\n  // =========================================================================\n  describe(\"BEH-09-002: match – Some/BEH-09-003: None pattern matching\", () => {\n    it(\"some(5).match returns onSome result\", () => {\n      const result = some(5).match(\n        v => v * 2,\n        () => 0,\n      );\n      expect(result).toBe(10);\n    });\n\n    it(\"none().match returns onNone result\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.match(\n        v => v * 2,\n        () => 0,\n      );\n      expect(result).toBe(0);\n    });\n  });\n\n  // =========================================================================\n  // toResult\n  // =========================================================================\n  describe(\"BEH-09-002: toResult – Some conversion / BEH-09-003: None conversion\", () => {\n    it(\"some(42).toResult() returns ok(42)\", () => {\n      const result = some(42).toResult(() => \"missing\");\n      expect(result._tag).toBe(\"Ok\");\n      expect(result.isOk()).toBe(true);\n      if (result.isOk()) {\n        expect(result.value).toBe(42);\n      }\n    });\n\n    it(\"none().toResult(() => 'missing') returns err('missing')\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.toResult(() => \"missing\");\n      expect(result._tag).toBe(\"Err\");\n      expect(result.isErr()).toBe(true);\n      if (result.isErr()) {\n        expect(result.error).toBe(\"missing\");\n      }\n    });\n  });\n\n  // =========================================================================\n  // fromNullable\n  // =========================================================================\n  describe(\"BEH-09-008: fromNullable – converts nullable to Option\", () => {\n    it(\"fromNullable(null) returns none\", () => {\n      const result = fromNullable(null);\n      expect(result._tag).toBe(\"None\");\n      expect(result.isNone()).toBe(true);\n    });\n\n    it(\"fromNullable(undefined) returns none\", () => {\n      const result = fromNullable(undefined);\n      expect(result._tag).toBe(\"None\");\n      expect(result.isNone()).toBe(true);\n    });\n\n    it(\"fromNullable(42) returns some(42)\", () => {\n      const result = fromNullable(42);\n      expect(result._tag).toBe(\"Some\");\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(42);\n      }\n    });\n\n    it(\"fromNullable('hello') returns some('hello')\", () => {\n      const result = fromNullable(\"hello\");\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(\"hello\");\n      }\n    });\n\n    it(\"fromNullable(0) returns some(0) (falsy but not null/undefined)\", () => {\n      const result = fromNullable(0);\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(0);\n      }\n    });\n\n    it(\"fromNullable('') returns some('') (falsy but not null/undefined)\", () => {\n      const result = fromNullable(\"\");\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(\"\");\n      }\n    });\n\n    it(\"fromNullable(false) returns some(false) (falsy but not null/undefined)\", () => {\n      const result = fromNullable(false);\n      expect(result.isSome()).toBe(true);\n      if (result.isSome()) {\n        expect(result.value).toBe(false);\n      }\n    });\n  });\n\n  // =========================================================================\n  // flatten\n  // =========================================================================\n  describe(\"BEH-09-002: flatten – Some chaining / BEH-09-003: None passthrough\", () => {\n    it(\"some(some(42)).flatten() returns some(42)\", () => {\n      const nested = some(some(42));\n      const result = nested.flatten();\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(42);\n      }\n    });\n\n    it(\"some(none()).flatten() returns none\", () => {\n      const nested = some(none());\n      const result = nested.flatten();\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().flatten() returns none\", () => {\n      const opt: Option<"+"Option<"+"number>> = none();\n      const result = opt.flatten();\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // zip\n  // =========================================================================\n  describe(\"BEH-09-002: zip – Some combining / BEH-09-003: None passthrough\", () => {\n    it(\"some(1).zip(some('a')) returns some([1, 'a'])\", () => {\n      const result = some(1).zip(some(\"a\"));\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toEqual([1, \"a\"]);\n      }\n    });\n\n    it(\"some(1).zip(none()) returns none\", () => {\n      const result = some(1).zip(none());\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().zip(some(1)) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.zip(some(1));\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().zip(none()) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.zip(none());\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // zipWith\n  // =========================================================================\n  describe(\"BEH-09-002: zipWith – Some combining / BEH-09-003: None passthrough\", () => {\n    it(\"some(1).zipWith(some(2), (a, b) => a + b) returns some(3)\", () => {\n      const result = some(1).zipWith(some(2), (a, b) => a + b);\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(3);\n      }\n    });\n\n    it(\"some(1).zipWith(none(), (a, b) => a + b) returns none\", () => {\n      const result = some(1).zipWith(none() as Option<"+"number>, (a, b) => a + b);\n      expect(result._tag).toBe(\"None\");\n    });\n\n    it(\"none().zipWith(some(1), f) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.zipWith(some(1), (_a, _b) => 0);\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // toJSON (BEH-09-009)\n  // =========================================================================\n  describe(\"BEH-09-009: toJSON – serializes Option to JSON with _schemaVersion\", () => {\n    it(\"some(42).toJSON() returns correct structure\", () => {\n      expect(some(42).toJSON()).toEqual({\n        _tag: \"Some\",\n        _schemaVersion: 1,\n        value: 42,\n      });\n    });\n\n    it(\"none().toJSON() returns correct structure\", () => {\n      expect(none().toJSON()).toEqual({\n        _tag: \"None\",\n        _schemaVersion: 1,\n      });\n    });\n\n    it(\"JSON.stringify integration with Some\", () => {\n      const json = JSON.stringify(some({ name: \"Alice\" }));\n      const parsed = JSON.parse(json) as { _tag: string; _schemaVersion: number; value: unknown };\n      expect(parsed._tag).toBe(\"Some\");\n      expect(parsed._schemaVersion).toBe(1);\n      expect(parsed.value).toEqual({ name: \"Alice\" });\n    });\n\n    it(\"JSON.stringify integration with None\", () => {\n      const json = JSON.stringify(none());\n      const parsed = JSON.parse(json) as { _tag: string; _schemaVersion: number };\n      expect(parsed._tag).toBe(\"None\");\n      expect(parsed._schemaVersion).toBe(1);\n    });\n  });\n\n  // =========================================================================\n  // expect\n  // =========================================================================\n  describe(\"BEH-09-002: expect – Some extraction / BEH-09-003: None throws\", () => {\n    it(\"some(42).expect('msg') returns 42\", () => {\n      expect(some(42).expect(\"should have value\")).toBe(42);\n    });\n\n    it(\"none().expect('msg') throws UnwrapError\", () => {\n      expect(() => none().expect(\"value was missing\")).toThrow(UnwrapError);\n      expect(() => none().expect(\"value was missing\")).toThrow(\"value was missing\");\n    });\n  });\n\n  // =========================================================================\n  // orElse\n  // =========================================================================\n  describe(\"BEH-09-002: orElse – Some passthrough / BEH-09-003: None fallback\", () => {\n    it(\"some(1).orElse(() => some(2)) returns some(1)\", () => {\n      const result = some(1).orElse(() => some(2));\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(1);\n      }\n    });\n\n    it(\"none().orElse(() => some(2)) returns some(2)\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.orElse(() => some(2));\n      expect(result._tag).toBe(\"Some\");\n      if (result.isSome()) {\n        expect(result.value).toBe(2);\n      }\n    });\n\n    it(\"none().orElse(() => none()) returns none\", () => {\n      const opt: Option<"+"number> = none();\n      const result = opt.orElse(() => none());\n      expect(result._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // toNullable / toUndefined\n  // =========================================================================\n  describe(\"BEH-09-002: toNullable – Some extraction / BEH-09-003: None returns null\", () => {\n    it(\"some(42).toNullable() returns 42\", () => {\n      expect(some(42).toNullable()).toBe(42);\n    });\n\n    it(\"none().toNullable() returns null\", () => {\n      expect(none().toNullable()).toBeNull();\n    });\n  });\n\n  describe(\"BEH-09-002: toUndefined – Some extraction / BEH-09-003: None returns undefined\", () => {\n    it(\"some(42).toUndefined() returns 42\", () => {\n      expect(some(42).toUndefined()).toBe(42);\n    });\n\n    it(\"none().toUndefined() returns undefined\", () => {\n      expect(none().toUndefined()).toBeUndefined();\n    });\n  });\n\n  // =========================================================================\n  // transpose (bridge)\n  // =========================================================================\n  describe(\"BEH-09-002: transpose – Some bridge / BEH-09-003: None bridge\", () => {\n    it(\"some(ok(42)).transpose() returns ok(some(42))\", () => {\n      const opt = some(ok(42));\n      const result = opt.transpose();\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        const inner = result.value;\n        expect(inner._tag).toBe(\"Some\");\n        if (inner.isSome()) {\n          expect(inner.value).toBe(42);\n        }\n      }\n    });\n\n    it(\"some(err('fail')).transpose() returns err('fail')\", () => {\n      const opt = some(err(\"fail\"));\n      const result = opt.transpose();\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) {\n        expect(result.error).toBe(\"fail\");\n      }\n    });\n\n    it(\"none().transpose() returns ok(none())\", () => {\n      const opt: Option<"+"ReturnType<"+"typeof ok<"+"number>>> = none();\n      const result = opt.transpose();\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value._tag).toBe(\"None\");\n      }\n    });\n  });\n\n  // =========================================================================\n  // fromOptionJSON (BEH-09-010)\n  // =========================================================================\n  describe(\"BEH-09-010: fromOptionJSON – deserializes JSON back to branded frozen Option\", () => {\n    it(\"round-trips some(42) through toJSON/fromOptionJSON\", () => {\n      const original = some(42);\n      const restored = fromOptionJSON(original.toJSON());\n      expect(restored._tag).toBe(\"Some\");\n      if (restored.isSome()) {\n        expect(restored.value).toBe(42);\n      }\n    });\n\n    it(\"round-trips none() through toJSON/fromOptionJSON\", () => {\n      const original = none();\n      const restored = fromOptionJSON(original.toJSON());\n      expect(restored._tag).toBe(\"None\");\n      expect(restored.isNone()).toBe(true);\n    });\n\n    it(\"accepts legacy format without _schemaVersion\", () => {\n      const restored = fromOptionJSON({ _tag: \"Some\", value: \"hello\" });\n      expect(restored._tag).toBe(\"Some\");\n      if (restored.isSome()) {\n        expect(restored.value).toBe(\"hello\");\n      }\n    });\n\n    it(\"accepts legacy None format without _schemaVersion\", () => {\n      const restored = fromOptionJSON({ _tag: \"None\" });\n      expect(restored._tag).toBe(\"None\");\n    });\n\n    it(\"throws TypeError for invalid _tag\", () => {\n      expect(() => fromOptionJSON({ _tag: \"Invalid\" } as never)).toThrow(TypeError);\n    });\n\n    it(\"restored Option is frozen\", () => {\n      const restored = fromOptionJSON({ _tag: \"Some\", _schemaVersion: 1, value: 99 });\n      expect(Object.isFrozen(restored)).toBe(true);\n    });\n\n    it(\"restored Option is a genuine Option (isOption)\", () => {\n      const restored = fromOptionJSON({ _tag: \"Some\", _schemaVersion: 1, value: 1 });\n      expect(isOption(restored)).toBe(true);\n    });\n  });\n\n  // =========================================================================\n  // _tag discriminant\n  // =========================================================================\n  describe(\"BEH-09-004: _tag discriminant – Option<"+"T> discriminated union (Some | None)\", () => {\n    it(\"some() has _tag 'Some'\", () => {\n      expect(some(1)._tag).toBe(\"Some\");\n    });\n\n    it(\"none() has _tag 'None'\", () => {\n      expect(none()._tag).toBe(\"None\");\n    });\n  });\n\n  // =========================================================================\n  // value property\n  // =========================================================================\n  describe(\"BEH-09-005: value property – some(value) creates frozen Some instance with OPTION_BRAND\", () => {\n    it(\"some(42) has value 42\", () => {\n      expect(some(42).value).toBe(42);\n    });\n\n    it(\"some('hello') has value 'hello'\", () => {\n      expect(some(\"hello\").value).toBe(\"hello\");\n    });\n  });\n});\n"},"tests/result-async.test.ts":{"tests":[{"id":"208","name":"BEH-06-001: ResultAsync class definition with brand, private constructor and promise ResultAsync is a class (constructor function)"},{"id":"209","name":"BEH-06-001: ResultAsync class definition with brand, private constructor and promise ResultAsync instances cannot be constructed directly (private constructor)"},{"id":"210","name":"BEH-06-002: ResultAsync PromiseLike implementation (then/await) ResultAsync implements then() and can be awaited"},{"id":"211","name":"BEH-06-002: ResultAsync PromiseLike implementation (then/await) ResultAsync.then() receives the resolved Result"},{"id":"212","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) ResultAsync.ok(42) resolves to Ok(42)"},{"id":"213","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) ResultAsync.err('x') resolves to Err('x')"},{"id":"214","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromPromise(resolved, mapErr) resolves to Ok"},{"id":"215","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromPromise(rejected, mapErr) resolves to Err(mapped)"},{"id":"216","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromSafePromise(promise) resolves to Ok"},{"id":"217","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromAsyncThrowable(asyncFn, mapErr) wraps async fn"},{"id":"218","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) ResultAsync.fromResult() wraps a Promise<"+"Result>"},{"id":"219","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) ResultAsync.fromResult() wraps a Promise<"+"Err>"},{"id":"220","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromCallback resolves to Ok when callback provides value"},{"id":"221","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromCallback resolves to Err when callback provides error"},{"id":"222","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) fromCallback handles async callbacks"},{"id":"223","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) race returns the first ResultAsync to resolve"},{"id":"224","name":"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race) race returns Err if the first to resolve is Err"},{"id":"225","name":"BEH-06-004: ResultAsync static combinators re-export ResultAsync.partition is available"},{"id":"226","name":"BEH-06-004: ResultAsync static combinators re-export ResultAsync.forEach is available"},{"id":"227","name":"BEH-06-004: ResultAsync static combinators re-export ResultAsync.zipOrAccumulate is available"},{"id":"228","name":"BEH-06-005: ResultAsync.Do starts async Do notation chain ResultAsync.ok({}) starts a Do-notation chain via andThen"},{"id":"229","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.map(v => v * 2) transforms Ok value"},{"id":"230","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.map(async v => v * 2) accepts async transform"},{"id":"231","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.mapErr(e => e.toUpperCase()) transforms Err value"},{"id":"232","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.map() on Err passes through unchanged"},{"id":"233","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.mapErr() on Ok passes through unchanged"},{"id":"234","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.mapBoth() transforms Ok value"},{"id":"235","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.mapBoth() transforms Err value"},{"id":"236","name":"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth) resultAsync.mapBoth() accepts async transforms"},{"id":"237","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.andThen(v => ok(v + 1)) chains sync Result"},{"id":"238","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.andThen(v => ResultAsync.ok(v + 1)) chains async Result"},{"id":"239","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.orElse(e => ok(99)) recovers from error"},{"id":"240","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.andTee(v => {}) calls side effect, returns original"},{"id":"241","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.andTee(async v => {}) accepts async side effect"},{"id":"242","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.orTee(e => {}) calls side effect on Err"},{"id":"243","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.andThrough(v => ok('x')) returns original on Ok g methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.inspect() calls fn on Ok"},{"id":"255","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.inspect() does not call fn on Err"},{"id":"256","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.inspectErr() calls fn on Err"},{"id":"257","name":"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr) resultAsync.inspectErr() does not call fn on Ok"},{"id":"258","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.match(onOk, onErr) returns Promise"},{"id":"259","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.match() on Err calls onErr"},{"id":"260","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.unwrapOr(0) returns Promise of value or default"},{"id":"261","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.unwrapOrElse() returns value on Ok"},{"id":"262","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.unwrapOrElse() calls fn on Err"},{"id":"263","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.toNullable() returns Promise of value or null"},{"id":"264","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.toUndefined() returns value on Ok"},{"id":"265","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.toUndefined() returns undefined on Err"},{"id":"266","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.intoTuple() returns Promise of tuple"},{"id":"267","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.merge() returns value on Ok"},{"id":"268","name":"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge) resultAsync.merge() returns error on Err"},{"id":"269","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.flatten() unwraps nested Ok"},{"id":"270","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.flatten() unwraps nested Err"},{"id":"271","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.flatten() on outer Err passes through"},{"id":"272","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.flip() converts Ok to Err"},{"id":"273","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.flip() converts Err to Ok"},{"id":"274","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.toJSON() returns Ok JSON"},{"id":"275","name":"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON) resultAsync.toJSON() returns Err JSON"},{"id":"276","name":"BEH-06-010: Async bridges on sync Result (toAsync, asyncMap, asyncAndThen) ok(42).toAsync() returns ResultAsync that resolves to Ok(42)"},{"id":"277","name":"BEH-06-010: Async bridges on sync Result (toAsync, asyncMap, asyncAndThen) err('x').toAsync() returns ResultAsync that resolves to Err('x')"},{"id":"278","name":"BEH-06-010: Async bridges on sync Result (toAsync, asyncMap, asyncAndThen) ok(42).asyncMap(async v => v * 2) returns ResultAsync resolving to Ok(84)"},{"id":"279","name":"BEH-06-010: Async bridges on sync Result (toAsync, asyncMap, asyncAndThen) ok(42).asyncAndThen(v => ResultAsync.ok(v * 2)) returns ResultAsync"},{"id":"280","name":"BEH-06-011 / INV-8: Lazy ResultAsync registration via _setResultAsyncImpl() ok().toAsync() works because _setResultAsyncImpl was called at import time"},{"id":"281","name":"BEH-06-011 / INV-8: Lazy ResultAsync registration via _setResultAsyncImpl() err().toAsync() works because _setResultAsyncImpl was called at import time"},{"id":"282","name":"INV-2: ResultAsync internal promise never rejects ResultAsync never rejects, even when inner promise rejects"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err, ResultAsync } from \"../src/index.js\";\nimport { fromPromise, fromSafePromise, fromAsyncThrowable } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"BEH-06-001: ResultAsync class definition with brand, private constructor and promise\", () => {\n  it(\"ResultAsync is a class (constructor function)\", () => {\n    expect(typeof ResultAsync).toBe(\"function\");\n  });\n\n  it(\"ResultAsync instances cannot be constructed directly (private constructor)\", () => {\n    // Only static constructors can create instances\n    const ra = ResultAsync.ok(1);\n    expect(ra).toBeInstanceOf(ResultAsync);\n  });\n});\n\ndescribe(\"BEH-06-002: ResultAsync PromiseLike implementation (then/await)\", () => {\n  it(\"ResultAsync implements then() and can be awaited\", async () => {\n    const ra = ResultAsync.ok(42);\n    // .then is available (PromiseLike)\n    expect(typeof ra.then).toBe(\"function\");\n    const result = await ra;\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"ResultAsync.then() receives the resolved Result\", async () => {\n    const ra = ResultAsync.ok(42);\n    const result = await ra.then((r) => r);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n});\n\ndescribe(\"BEH-06-003: ResultAsync static constructors (ok, err, fromPromise, fromSafePromise, fromResult, fromThrowable, fromCallback, race)\", () => {\n  // DoD 8 #1\n  it(\"ResultAsync.ok(42) resolves to Ok(42)\", async () => {\n    const result = await ResultAsync.ok(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #2\n  it(\"ResultAsync.err('x') resolves to Err('x')\", async () => {\n    const result = await ResultAsync.err(\"x\");\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 8 #3\n  it(\"fromPromise(resolved, mapErr) resolves to Ok\", async () => {\n    const result = await fromPromise(Promise.resolve(42), () => \"error\");\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #4\n  it(\"fromPromise(rejected, mapErr) resolves to Err(mapped)\", async () => {\n    const result = await fromPromise(Promise.reject(\"boom\"), e => `mapped: ${e}`);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"mapped: boom\");\n  });\n\n  // DoD 8 #5\n  it(\"fromSafePromise(promise) resolves to Ok\", async () => {\n    const result = await fromSafePromise(Promise.resolve(42));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #26\n  it(\"fromAsyncThrowable(asyncFn, mapErr) wraps async fn\", async () => {\n    const safeFn = fromAsyncThrowable(\n      async (n: number) => n * 2,\n      () => \"error\"\n    );\n    const result = await safeFn(21);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // --- fromResult ---\n  it(\"ResultAsync.fromResult() wraps a Promise<"+"Result>\", async () => {\n    const promise = Promise.resolve(ok(42));\n    const result = await ResultAsync.fromResult(promise);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"ResultAsync.fromResult() wraps a Promise<"+"Err>\", async () => {\n    const promise: Promise<"+"Result<"+"number, string>> = Promise.resolve(err(\"x\"));\n    const result = await ResultAsync.fromResult(promise);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // BEH-06-003: fromCallback\n  describe(\"fromCallback\", () => {\n    it(\"resolves to Ok when callback provides value\", async () => {\n      const result = await ResultAsync.fromCallback<"+"number, string>((cb) => {\n        cb(null, 42);\n      });\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"resolves to Err when callback provides error\", async () => {\n      const result = await ResultAsync.fromCallback<"+"number, string>((cb) => {\n        cb(\"fail\", 0 as never);\n      });\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"fail\");\n    });\n\n    it(\"handles async callbacks\", async () => {\n      const result = await ResultAsync.fromCallback<"+"number, string>((cb) => {\n        Promise.resolve().then(() => cb(null, 99));\n      });\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(99);\n    });\n  });\n\n  // BEH-05-008 / BEH-06-003: race\n  describe(\"race\", () => {\n    it(\"returns the first ResultAsync to resolve\", async () => {\n      const fast = ResultAsync.ok(1);\n      const slow = new Promise<"+"never>(() => {}); // never resolves\n      const result = await ResultAsync.race(fast, ResultAsync.fromSafePromise(slow as Promise<"+"never>));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(1);\n    });\n\n    it(\"returns Err if the first to resolve is Err\", async () => {\n      const fast = ResultAsync.err(\"first\");\n      const slow = ResultAsync.fromSafePromise(new Promise<"+"number>(() => {})); // never resolves\n      const result = await ResultAsync.race(fast, slow);\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"first\");\n    });\n  });\n});\n\ndescribe(\"BEH-06-004: ResultAsync static combinators re-export\", () => {\n  it(\"ResultAsync.partition is available\", () => {\n    expect(typeof ResultAsync.partition).toBe(\"function\");\n  });\n\n  it(\"ResultAsync.forEach is available\", () => {\n    expect(typeof ResultAsync.forEach).toBe(\"function\");\n  });\n\n  it(\"ResultAsync.zipOrAccumulate is available\", () => {\n    expect(typeof ResultAsync.zipOrAccumulate).toBe(\"function\");\n  });\n});\n\ndescribe(\"BEH-06-005: ResultAsync.Do starts async Do notation chain\", () => {\n  it(\"ResultAsync.ok({}) starts a Do-notation chain via andThen\", async () => {\n    const result = await ResultAsync.ok({}).andThen(() => ok(42));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n});\n\ndescribe(\"BEH-06-006: ResultAsync instance transformation methods (map, mapErr, mapBoth)\", () => {\n  // DoD 8 #7\n  it(\"resultAsync.map(v => v * 2) transforms Ok value\", async () => {\n    const result = await ResultAsync.ok(21).map(v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #8\n  it(\"resultAsync.map(async v => v * 2) accepts async transform\", async () => {\n    const result = await ResultAsync.ok(21).map(async v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #9\n  it(\"resultAsync.mapErr(e => e.toUpperCase()) transforms Err value\", async () => {\n    const result = await ResultAsync.err(\"fail\").mapErr(e => e.toUpperCase());\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n  });\n\n  // --- Dual-path coverage: map on Err ---\n  it(\"resultAsync.map() on Err passes through unchanged\", async () => {\n    const fn = vi.fn((v: number) => v * 2);\n    const result = await ResultAsync.err(\"x\").map(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: mapErr on Ok ---\n  it(\"resultAsync.mapErr() on Ok passes through unchanged\", async () => {\n    const fn = vi.fn((e: string) => e.toUpperCase());\n    const result = await ResultAsync.ok(42).mapErr(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- mapBoth ---\n  it(\"resultAsync.mapBoth() transforms Ok value\", async () => {\n    const result = await ResultAsync.ok(21).mapBoth(\n      v => v * 2,\n      e => e\n    );\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.mapBoth() transforms Err value\", async () => {\n    const result = await ResultAsync.err(\"fail\").mapBoth(\n      v => v,\n      e => e.toUpperCase()\n    );\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n  });\n\n  it(\"resultAsync.mapBoth() accepts async transforms\", async () => {\n    const result = await ResultAsync.ok(10).mapBoth(\n      async v => v + 1,\n      async e => e\n    );\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(11);\n  });\n});\n\ndescribe(\"BEH-06-007: ResultAsync instance chaining methods (andThen, orElse, andTee, orTee, andThrough, inspect, inspectErr)\", () => {\n  // DoD 8 #10\n  it(\"resultAsync.andThen(v => ok(v + 1)) chains sync Result\", async () => {\n    const result = await ResultAsync.ok(41).andThen(v => ok(v + 1));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #11\n  it(\"resultAsync.andThen(v => ResultAsync.ok(v + 1)) chains async Result\", async () => {\n    const result = await ResultAsync.ok(41).andThen(v => ResultAsync.ok(v + 1));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #12\n  it(\"resultAsync.orElse(e => ok(99)) recovers from error\", async () => {\n    const result = await ResultAsync.err(\"x\").orElse(() => ok(99));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(99);\n  });\n\n  // DoD 8 #13\n  it(\"resultAsync.andTee(v => {}) calls side effect, returns original\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).andTee(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #14\n  it(\"resultAsync.andTee(async v => {}) accepts async side effect\", async () => {\n    const fn = vi.fn(async () => {});\n    const result = await ResultAsync.ok(42).andTee(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // DoD 8 #15\n  it(\"resultAsync.orTee(e => {}) calls side effect on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").orTee(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // DoD 8 #16\n  it(\"resultAsync.andThrough(v => ok('x')) returns original on Ok\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => ok(\"x\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 8 #17\n  it(\"resultAsync.andThrough(v => err('fail')) propagates Err\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => err(\"fail\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 8 #27\n  it(\"Chaining multiple async operations preserves error accumulation\", async () => {\n    type _E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const result = await ResultAsync.ok(1)\n      .andThen(v => ok(v + 1))\n      .andThen(() => err({ _tag: \"E2\" } satisfies E2));\n\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // --- Mutation gap: andThen on Err does not call fn ---\n  it(\"resultAsync.andThen() on Err does not call fn and passes through\", async () => {\n    const fn = vi.fn(() => ok(99));\n    const result = await ResultAsync.err(\"x\").andThen(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: orElse on Ok ---\n  it(\"resultAsync.orElse() on Ok passes through unchanged\", async () => {\n    const fn = vi.fn(() => ok(99));\n    const result = await ResultAsync.ok(42).orElse(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Dual-path coverage: orTee on Ok ---\n  it(\"resultAsync.orTee() on Ok does not call side effect\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).orTee(fn);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- andTee error swallowing ---\n  it(\"resultAsync.andTee() swallows errors from side effect\", async () => {\n    const result = await ResultAsync.ok(42).andTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.andTee() on Err does not call side effect\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").andTee(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- orTee error swallowing ---\n  it(\"resultAsync.orTee() swallows errors from side effect\", async () => {\n    const result = await ResultAsync.err(\"x\").orTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // --- andThrough with ResultAsync return ---\n  it(\"resultAsync.andThrough() works with ResultAsync side effect\", async () => {\n    const result = await ResultAsync.ok(42).andThrough(() => ResultAsync.ok(\"ignored\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.andThrough() on Err passes through\", async () => {\n    const fn = vi.fn(() => ok(\"x\"));\n    const result = await ResultAsync.err(\"fail\").andThrough(fn);\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- inspect / inspectErr ---\n  it(\"resultAsync.inspect() calls fn on Ok\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).inspect(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  it(\"resultAsync.inspect() does not call fn on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").inspect(fn);\n    expect(fn).not.toHaveBeenCalled();\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  it(\"resultAsync.inspectErr() calls fn on Err\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.err(\"x\").inspectErr(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  it(\"resultAsync.inspectErr() does not call fn on Ok\", async () => {\n    const fn = vi.fn();\n    const result = await ResultAsync.ok(42).inspectErr(fn);\n    expect(fn).not.toHaveBeenCalled();\n    expect(result._tag).toBe(\"Ok\");\n  });\n});\n\ndescribe(\"BEH-06-008: ResultAsync instance extraction methods (match, unwrapOr, unwrapOrElse, toNullable, toUndefined, intoTuple, merge)\", () => {\n  // DoD 8 #18\n  it(\"resultAsync.match(onOk, onErr) returns Promise\", async () => {\n    const value = await ResultAsync.ok(42).match(\n      v => v + 1,\n      () => 0\n    );\n    expect(value).toBe(43);\n  });\n\n  // --- Dual-path coverage: match on Err ---\n  it(\"resultAsync.match() on Err calls onErr\", async () => {\n    const value = await ResultAsync.err(\"x\").match(\n      () => 0,\n      e => e.length\n    );\n    expect(value).toBe(1);\n  });\n\n  // DoD 8 #19\n  it(\"resultAsync.unwrapOr(0) returns Promise of value or default\", async () => {\n    expect(await ResultAsync.ok(42).unwrapOr(0)).toBe(42);\n    expect(await ResultAsync.err(\"x\").unwrapOr(0)).toBe(0);\n  });\n\n  // --- unwrapOrElse ---\n  it(\"resultAsync.unwrapOrElse() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).unwrapOrElse(() => 0)).toBe(42);\n  });\n\n  it(\"resultAsync.unwrapOrElse() calls fn on Err\", async () => {\n    expect(await ResultAsync.err(\"abc\").unwrapOrElse(e => e.length)).toBe(3);\n  });\n\n  // DoD 8 #20\n  it(\"resultAsync.toNullable() returns Promise of value or null\", async () => {\n    expect(await ResultAsync.ok(42).toNullable()).toBe(42);\n    expect(await ResultAsync.err(\"x\").toNullable()).toBeNull();\n  });\n\n  // --- toUndefined ---\n  it(\"resultAsync.toUndefined() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).toUndefined()).toBe(42);\n  });\n\n  it(\"resultAsync.toUndefined() returns undefined on Err\", async () => {\n    expect(await ResultAsync.err(\"x\").toUndefined()).toBeUndefined();\n  });\n\n  // DoD 8 #21\n  it(\"resultAsync.intoTuple() returns Promise of tuple\", async () => {\n    expect(await ResultAsync.ok(42).intoTuple()).toEqual([null, 42]);\n    expect(await ResultAsync.err(\"x\").intoTuple()).toEqual([\"x\", null]);\n  });\n\n  // --- merge ---\n  it(\"resultAsync.merge() returns value on Ok\", async () => {\n    expect(await ResultAsync.ok(42).merge()).toBe(42);\n  });\n\n  it(\"resultAsync.merge() returns error on Err\", async () => {\n    expect(await ResultAsync.err(\"x\").merge()).toBe(\"x\");\n  });\n});\n\ndescribe(\"BEH-06-009: ResultAsync conversion methods (flatten, flip, toJSON)\", () => {\n  // --- flatten ---\n  it(\"resultAsync.flatten() unwraps nested Ok\", async () => {\n    const inner: Result<"+"number, string> = ok(42);\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.ok(inner);\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Ok\");\n    if (flat.isOk()) expect(flat.value).toBe(42);\n  });\n\n  it(\"resultAsync.flatten() unwraps nested Err\", async () => {\n    const inner: Result<"+"number, string> = err(\"inner\");\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.ok(inner);\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) expect(flat.error).toBe(\"inner\");\n  });\n\n  it(\"resultAsync.flatten() on outer Err passes through\", async () => {\n    const nested: ResultAsync<"+"Result<"+"number, string>, string> = ResultAsync.err(\"outer\");\n    const flat = await nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) expect(flat.error).toBe(\"outer\");\n  });\n\n  // --- flip ---\n  it(\"resultAsync.flip() converts Ok to Err\", async () => {\n    const result = await ResultAsync.ok(42).flip();\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(42);\n  });\n\n  it(\"resultAsync.flip() converts Err to Ok\", async () => {\n    const result = await ResultAsync.err(\"x\").flip();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(\"x\");\n  });\n\n  // --- toJSON ---\n  it(\"resultAsync.toJSON() returns Ok JSON\", async () => {\n    expect(await ResultAsync.ok(42).toJSON()).toEqual({ _tag: \"Ok\", _schemaVersion: 1, value: 42 });\n  });\n\n  it(\"resultAsync.toJSON() returns Err JSON\", async () => {\n    expect(await ResultAsync.err(\"x\").toJSON()).toEqual({ _tag: \"Err\", _schemaVersion: 1, error: \"x\" });\n  });\n});\n\ndescribe(\"BEH-06-010: Async bridges on sync Result (toAsync, asyncMap, asyncAndThen)\", () => {\n  // DoD 6 #19\n  it(\"ok(42).toAsync() returns ResultAsync that resolves to Ok(42)\", async () => {\n    const result = await ok(42).toAsync();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(42);\n  });\n\n  // DoD 6 #20\n  it(\"err('x').toAsync() returns ResultAsync that resolves to Err('x')\", async () => {\n    const result = await err(\"x\").toAsync();\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 6 #21\n  it(\"ok(42).asyncMap(async v => v * 2) returns ResultAsync resolving to Ok(84)\", async () => {\n    const result = await ok(42).asyncMap(async v => v * 2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(84);\n  });\n\n  // DoD 6 #22\n  it(\"ok(42).asyncAndThen(v => ResultAsync.ok(v * 2)) returns ResultAsync\", async () => {\n    const result = await ok(42).asyncAndThen(v => ResultAsync.ok(v * 2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(84);\n  });\n});\n\ndescribe(\"BEH-06-011 / INV-8: Lazy ResultAsync registration via _setResultAsyncImpl()\", () => {\n  it(\"ok().toAsync() works because _setResultAsyncImpl was called at import time\", async () => {\n    // If registration didn't happen, toAsync() would throw\n    const result = await ok(1).toAsync();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(1);\n  });\n\n  it(\"err().toAsync() works because _setResultAsyncImpl was called at import time\", async () => {\n    const result = await err(\"e\").toAsync();\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"e\");\n  });\n});\n\ndescribe(\"INV-2: ResultAsync internal promise never rejects\", () => {\n  // DoD 8 #6\n  it(\"ResultAsync never rejects, even when inner promise rejects\", async () => {\n    const ra = fromPromise(Promise.reject(\"bad\"), e => `err: ${e}`);\n    // Should not reject - should resolve to Err\n    const result = await ra;\n    expect(result._tag).toBe(\"Err\");\n  });\n});\n"},"tests/core-types.test.ts":{"tests":[{"id":"283","name":"Core Types BEH-01-004: Ok variant has _tag: 'Ok'"},{"id":"284","name":"Core Types BEH-01-005: Err variant has _tag: 'Err'"},{"id":"285","name":"Core Types BEH-01-004: Ok variant holds the value in .value"},{"id":"286","name":"Core Types BEH-01-005: Err variant holds the error in .error"},{"id":"287","name":"Core Types BEH-01-006: Ok and Err are structurally distinct (discriminated union)"},{"id":"288","name":"Core Types BEH-01-006: Result is a union of Ok and Err"},{"id":"289","name":"Core Types BEH-01-007: ok(42) creates Ok with value 42"},{"id":"290","name":"Core Types BEH-01-008: err('fail') creates Err with error 'fail'"},{"id":"291","name":"Core Types BEH-01-007: ok(42) has _tag: 'Ok'"},{"id":"292","name":"Core Types BEH-01-008: err('fail') has _tag: 'Err'"},{"id":"293","name":"Core Types BEH-01-001: RESULT_BRAND is a unique symbol for brand-based identity"},{"id":"294","name":"Core Types BEH-01-002: ResultAsync has distinct identity (class-based, PromiseLike)"},{"id":"295","name":"Core Types BEH-01-003: OPTION_BRAND is a unique symbol for Option identity"},{"id":"296","name":"Core Types INV-1: ok() returns a frozen (immutable) object"},{"id":"297","name":"Core Types INV-1: err() returns a frozen (immutable) object"},{"id":"298","name":"Core Types INV-6: Ok<"+"T, never> and Err<"+"never, E> compose freely into Result<"+"T, E>"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err, RESULT_BRAND, OPTION_BRAND, some, none, ResultAsync } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Core Types\", () => {\n  // DoD 1 #1\n  it(\"BEH-01-004: Ok variant has _tag: 'Ok'\", () => {\n    const result = ok(42);\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // DoD 1 #2\n  it(\"BEH-01-005: Err variant has _tag: 'Err'\", () => {\n    const result = err(\"fail\");\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // DoD 1 #3\n  it(\"BEH-01-004: Ok variant holds the value in .value\", () => {\n    const result = ok(42);\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 1 #4\n  it(\"BEH-01-005: Err variant holds the error in .error\", () => {\n    const result = err(\"fail\");\n    expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 1 #5\n  it(\"BEH-01-006: Ok and Err are structurally distinct (discriminated union)\", () => {\n    const success: Result<"+"number, string> = ok(1);\n    const failure: Result<"+"number, string> = err(\"x\");\n    expect(success._tag).not.toBe(failure._tag);\n  });\n\n  // DoD 1 #6\n  it(\"BEH-01-006: Result is a union of Ok and Err\", () => {\n    const success: Result<"+"number, string> = ok(1);\n    const failure: Result<"+"number, string> = err(\"x\");\n    // Both should be valid Results — tags are one of the two valid discriminants\n    expect([\"Ok\", \"Err\"]).toContain(success._tag);\n    expect([\"Ok\", \"Err\"]).toContain(failure._tag);\n  });\n\n  // DoD 2 #1\n  it(\"BEH-01-007: ok(42) creates Ok with value 42\", () => {\n    const result = ok(42);\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 2 #2\n  it(\"BEH-01-008: err('fail') creates Err with error 'fail'\", () => {\n    const result = err(\"fail\");\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 2 #3\n  it(\"BEH-01-007: ok(42) has _tag: 'Ok'\", () => {\n    expect(ok(42)._tag).toBe(\"Ok\");\n  });\n\n  // DoD 2 #4\n  it(\"BEH-01-008: err('fail') has _tag: 'Err'\", () => {\n    expect(err(\"fail\")._tag).toBe(\"Err\");\n  });\n\n  // Brand symbols\n  it(\"BEH-01-001: RESULT_BRAND is a unique symbol for brand-based identity\", () => {\n    expect(typeof RESULT_BRAND).toBe(\"symbol\");\n    expect(RESULT_BRAND.toString()).toBe(\"Symbol(Result)\");\n    const result = ok(1);\n    expect(result[RESULT_BRAND]).toBe(true);\n  });\n\n  it(\"BEH-01-002: ResultAsync has distinct identity (class-based, PromiseLike)\", () => {\n    // ResultAsync is identified as a class (PromiseLike) rather than via a brand symbol.\n    const ra = ResultAsync.ok(42);\n    expect(ra).toBeDefined();\n    expect(typeof ra.then).toBe(\"function\");\n    expect(ra).toBeInstanceOf(ResultAsync);\n  });\n\n  it(\"BEH-01-003: OPTION_BRAND is a unique symbol for Option identity\", () => {\n    expect(typeof OPTION_BRAND).toBe(\"symbol\");\n    expect(OPTION_BRAND.toString()).toBe(\"Symbol(Option)\");\n    const s = some(1);\n    expect(s[OPTION_BRAND]).toBe(true);\n    const n = none();\n    expect(n[OPTION_BRAND]).toBe(true);\n  });\n\n  // Immutability invariant\n  it(\"INV-1: ok() returns a frozen (immutable) object\", () => {\n    const result = ok(42);\n    expect(Object.isFrozen(result)).toBe(true);\n  });\n\n  it(\"INV-1: err() returns a frozen (immutable) object\", () => {\n    const result = err(\"fail\");\n    expect(Object.isFrozen(result)).toBe(true);\n  });\n\n  // Phantom types enable free composition\n  it(\"INV-6: Ok<"+"T, never> and Err<"+"never, E> compose freely into Result<"+"T, E>\", () => {\n    // ok() returns Ok<"+"number, never>, err() returns Err<"+"never, string>.\n    // Both must be assignable to Result<"+"number, string> without explicit casting.\n    const success: Result<"+"number, string> = ok(42);\n    const failure: Result<"+"number, string> = err(\"oops\");\n    expect(success._tag).toBe(\"Ok\");\n    expect(failure._tag).toBe(\"Err\");\n  });\n});\n"},"tests/standalone-functions.test.ts":{"tests":[{"id":"299","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-002: pipe pipe(value) returns value unchanged"},{"id":"300","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-002: pipe pipe(ok(21), map(n => n * 2)) returns Ok(42)"},{"id":"301","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-002: pipe pipe chains multiple functions"},{"id":"302","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: map delegates to result.map"},{"id":"303","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: map passes through Err"},{"id":"304","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: mapErr delegates to result.mapErr"},{"id":"305","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: mapBoth delegates to result.mapBoth on Ok"},{"id":"306","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: mapBoth delegates to result.mapBoth on Err"},{"id":"307","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: andThen delegates to result.andThen"},{"id":"308","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: orElse delegates to result.orElse"},{"id":"309","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: match delegates to result.match on Ok"},{"id":"310","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: match delegates to result.match on Err"},{"id":"311","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: unwrapOr delegates to result.unwrapOr"},{"id":"312","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: flatten delegates to result.flatten"},{"id":"313","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: flip delegates to result.flip"},{"id":"314","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: and delegates to result.and"},{"id":"315","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: or delegates to result.or"},{"id":"316","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: mapOr delegates to result.mapOr"},{"id":"317","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: mapOrElse delegates to result.mapOrElse"},{"id":"318","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: contains delegates to result.contains"},{"id":"319","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: containsErr delegates to result.containsErr"},{"id":"320","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: inspect delegates to result.inspect"},{"id":"321","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: inspectErr delegates to result.inspectErr"},{"id":"322","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: toNullable delegates to result.toNullable"},{"id":"323","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: toUndefined delegates to result.toUndefined"},{"id":"324","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: intoTuple delegates to result.intoTuple"},{"id":"325","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: merge delegates to result.merge"},{"id":"326","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: toOption delegates to result.toOption"},{"id":"327","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: toOptionErr delegates to result.toOptionErr"},{"id":"328","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-003: toJSON delegates to result.toJSON"},{"id":"329","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-004: Usage examples pipe chain: transforms Ok through multiple standalone functions"},{"id":"330","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-004: Usage examples reusable pipeline: composed standalone functions can be stored and reused"},{"id":"331","name":"BEH-10-001, INV-14: Standalone Functions BEH-10-004: Usage examples mixing with methods: standalone pipe and instance methods interop"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport {\n  pipe, map, mapErr, mapBoth, andThen, orElse, match,\n  unwrapOr, flatten, flip, and, or, mapOr, mapOrElse,\n  contains, containsErr, inspect, inspectErr,\n  toNullable, toUndefined, intoTuple, merge,\n  toOption, toOptionErr, toJSON,\n} from \"../src/fn/index.js\";\n\ndescribe(\"BEH-10-001, INV-14: Standalone Functions\", () => {\n  describe(\"BEH-10-002: pipe\", () => {\n    it(\"pipe(value) returns value unchanged\", () => {\n      expect(pipe(42)).toBe(42);\n    });\n\n    it(\"pipe(ok(21), map(n => n * 2)) returns Ok(42)\", () => {\n      const result = pipe(ok(21), map((n: number) => n * 2));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"pipe chains multiple functions\", () => {\n      const result = pipe(\n        ok(10),\n        map((n: number) => n * 2),\n        map((n: number) => n + 1),\n        unwrapOr(0),\n      );\n      expect(result).toBe(21);\n    });\n  });\n\n  describe(\"BEH-10-003: map\", () => {\n    it(\"delegates to result.map\", () => {\n      const result = map((n: number) => n * 2)(ok(21));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"passes through Err\", () => {\n      const result = map((n: number) => n * 2)(err(\"x\") as Result<"+"number, string>);\n      expect(result._tag).toBe(\"Err\");\n    });\n  });\n\n  describe(\"BEH-10-003: mapErr\", () => {\n    it(\"delegates to result.mapErr\", () => {\n      const result = mapErr((e: string) => e.toUpperCase())(err(\"fail\"));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n    });\n  });\n\n  describe(\"BEH-10-003: mapBoth\", () => {\n    it(\"delegates to result.mapBoth on Ok\", () => {\n      const result = mapBoth((n: number) => n * 2, (e: string) => e.toUpperCase())(ok(21) as Result<"+"number, string>);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"delegates to result.mapBoth on Err\", () => {\n      const result = mapBoth((n: number) => n * 2, (e: string) => e.toUpperCase())(err(\"fail\") as Result<"+"number, string>);\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"FAIL\");\n    });\n  });\n\n  describe(\"BEH-10-003: andThen\", () => {\n    it(\"delegates to result.andThen\", () => {\n      const result = andThen((n: number) => ok(n * 2))(ok(21));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n  });\n\n  describe(\"BEH-10-003: orElse\", () => {\n    it(\"delegates to result.orElse\", () => {\n      const result = orElse((_: string) => ok(99))(err(\"fail\") as Result<"+"number, string>);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(99);\n    });\n  });\n\n  describe(\"BEH-10-003: match\", () => {\n    it(\"delegates to result.match on Ok\", () => {\n      expect(match((n: number) => n * 2, (e: string) => e.length)(ok(21) as Result<"+"number, string>)).toBe(42);\n    });\n\n    it(\"delegates to result.match on Err\", () => {\n      expect(match((n: number) => n * 2, (e: string) => e.length)(err(\"ab\") as Result<"+"number, string>)).toBe(2);\n    });\n  });\n\n  describe(\"BEH-10-003: unwrapOr\", () => {\n    it(\"delegates to result.unwrapOr\", () => {\n      expect(unwrapOr(0)(ok(42))).toBe(42);\n      expect(unwrapOr(0)(err(\"x\") as Result<"+"number, string>)).toBe(0);\n    });\n  });\n\n  describe(\"BEH-10-003: flatten\", () => {\n    it(\"delegates to result.flatten\", () => {\n      const result = flatten()(ok(ok(42)));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n  });\n\n  describe(\"BEH-10-003: flip\", () => {\n    it(\"delegates to result.flip\", () => {\n      const result = flip()(ok(42));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(42);\n    });\n  });\n\n  describe(\"BEH-10-003: and\", () => {\n    it(\"delegates to result.and\", () => {\n      const result = and(ok(\"b\"))(ok(1));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(\"b\");\n    });\n  });\n\n  describe(\"BEH-10-003: or\", () => {\n    it(\"delegates to result.or\", () => {\n      const result = or(ok(99))(err(\"x\") as Result<"+"number, string>);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(99);\n    });\n  });\n\n  describe(\"BEH-10-003: mapOr\", () => {\n    it(\"delegates to result.mapOr\", () => {\n      expect(mapOr(0, (n: number) => n * 2)(ok(21))).toBe(42);\n      expect(mapOr(0, (n: number) => n * 2)(err(\"x\") as Result<"+"number, string>)).toBe(0);\n    });\n  });\n\n  describe(\"BEH-10-003: mapOrElse\", () => {\n    it(\"delegates to result.mapOrElse\", () => {\n      expect(mapOrElse((e: string) => e.length, (n: number) => n * 2)(ok(21) as Result<"+"number, string>)).toBe(42);\n      expect(mapOrElse((e: string) => e.length, (n: number) => n * 2)(err(\"ab\") as Result<"+"number, string>)).toBe(2);\n    });\n  });\n\n  describe(\"BEH-10-003: contains\", () => {\n    it(\"delegates to result.contains\", () => {\n      expect(contains(42)(ok(42))).toBe(true);\n      expect(contains(42)(ok(99))).toBe(false);\n    });\n  });\n\n  describe(\"BEH-10-003: containsErr\", () => {\n    it(\"delegates to result.containsErr\", () => {\n      expect(containsErr(\"x\")(err(\"x\"))).toBe(true);\n      expect(containsErr(\"x\")(err(\"y\"))).toBe(false);\n    });\n  });\n\n  describe(\"BEH-10-003: inspect\", () => {\n    it(\"delegates to result.inspect\", () => {\n      const fn = vi.fn();\n      inspect(fn)(ok(42));\n      expect(fn).toHaveBeenCalledWith(42);\n    });\n  });\n\n  describe(\"BEH-10-003: inspectErr\", () => {\n    it(\"delegates to result.inspectErr\", () => {\n      const fn = vi.fn();\n      inspectErr(fn)(err(\"x\"));\n      expect(fn).toHaveBeenCalledWith(\"x\");\n    });\n  });\n\n  describe(\"BEH-10-003: toNullable\", () => {\n    it(\"delegates to result.toNullable\", () => {\n      expect(toNullable()(ok(42))).toBe(42);\n      expect(toNullable()(err(\"x\"))).toBeNull();\n    });\n  });\n\n  describe(\"BEH-10-003: toUndefined\", () => {\n    it(\"delegates to result.toUndefined\", () => {\n      expect(toUndefined()(ok(42))).toBe(42);\n      expect(toUndefined()(err(\"x\"))).toBeUndefined();\n    });\n  });\n\n  describe(\"BEH-10-003: intoTuple\", () => {\n    it(\"delegates to result.intoTuple\", () => {\n      expect(intoTuple()(ok(42))).toEqual([null, 42]);\n      expect(intoTuple()(err(\"x\"))).toEqual([\"x\", null]);\n    });\n  });\n\n  describe(\"BEH-10-003: merge\", () => {\n    it(\"delegates to result.merge\", () => {\n      expect(merge()(ok(42))).toBe(42);\n      expect(merge()(err(\"x\"))).toBe(\"x\");\n    });\n  });\n\n  describe(\"BEH-10-003: toOption\", () => {\n    it(\"delegates to result.toOption\", () => {\n      const opt = toOption()(ok(42));\n      expect(opt._tag).toBe(\"Some\");\n      if (opt.isSome()) expect(opt.value).toBe(42);\n    });\n  });\n\n  describe(\"BEH-10-003: toOptionErr\", () => {\n    it(\"delegates to result.toOptionErr\", () => {\n      const opt = toOptionErr()(err(\"x\"));\n      expect(opt._tag).toBe(\"Some\");\
