n      if (opt.isSome()) expect(opt.value).toBe(\"x\");\n    });\n  });\n\n  describe(\"BEH-10-003: toJSON\", () => {\n    it(\"delegates to result.toJSON\", () => {\n      expect(toJSON()(ok(42))).toEqual({ _tag: \"Ok\", _schemaVersion: 1, value: 42 });\n      expect(toJSON()(err(\"x\"))).toEqual({ _tag: \"Err\", _schemaVersion: 1, error: \"x\" });\n    });\n  });\n\n  describe(\"BEH-10-004: Usage examples\", () => {\n    it(\"pipe chain: transforms Ok through multiple standalone functions\", () => {\n      const result = pipe(\n        ok(5),\n        map((n: number) => n * 3),\n        andThen((n: number) => (n > 10 ? ok(n) : err(\"too small\"))),\n        mapErr((e: string) => e.toUpperCase()),\n        unwrapOr(0),\n      );\n      expect(result).toBe(15);\n    });\n\n    it(\"reusable pipeline: composed standalone functions can be stored and reused\", () => {\n      const double = map((n: number) => n * 2);\n      const addOne = map((n: number) => n + 1);\n      const extract = unwrapOr(0);\n\n      expect(extract(addOne(double(ok(10))))).toBe(21);\n      expect(extract(addOne(double(err(\"x\") as Result<"+"number, string>)))).toBe(0);\n    });\n\n    it(\"mixing with methods: standalone pipe and instance methods interop\", () => {\n      const result = pipe(\n        ok(10),\n        map((n: number) => n + 5),\n      );\n      // Continue with instance method\n      const final = result.map((n) => n * 2).unwrapOr(0);\n      expect(final).toBe(30);\n    });\n  });\n});\n"},"tests/chaining.test.ts":{"tests":[{"id":"332","name":"Chaining BEH-03-006: andThen(f) monadic bind on Ok value ok(2).andThen(v => ok(v * 3)) returns Ok(6)"},{"id":"333","name":"Chaining BEH-03-006: andThen(f) monadic bind on Ok value ok(2).andThen(v => err('fail')) returns Err('fail')"},{"id":"334","name":"Chaining BEH-03-006: andThen(f) monadic bind on Ok value err('x').andThen(v => ok(v * 3)) returns Err('x')"},{"id":"335","name":"Chaining BEH-03-006: andThen(f) monadic bind on Ok value Chaining andThen accumulates error types via union"},{"id":"336","name":"Chaining BEH-03-006: andThen(f) monadic bind on Ok value Three-step andThen chain short-circuits on first Err"},{"id":"337","name":"Chaining BEH-03-007: orElse(f) recovery operation on Err error err('x').orElse(e => ok(99)) returns Ok(99)"},{"id":"338","name":"Chaining BEH-03-007: orElse(f) recovery operation on Err error err('x').orElse(e => err('new')) returns Err('new')"},{"id":"339","name":"Chaining BEH-03-007: orElse(f) recovery operation on Err error ok(1).orElse(e => ok(99)) returns Ok(1)"},{"id":"340","name":"Chaining BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions ok(2).andTee(v => {}) returns Ok(2)"},{"id":"341","name":"Chaining BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions INV-5: ok(2).andTee(v => { throw ... }) returns Ok(2) (swallows error)"},{"id":"342","name":"Chaining BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions err('x').andTee(v => {}) returns Err('x')"},{"id":"343","name":"Chaining BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions andTee calls the function with the Ok value"},{"id":"344","name":"Chaining BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions err('x').andTee() does not call the function"},{"id":"345","name":"Chaining BEH-03-009: orTee(f) side effect on Err, suppresses exceptions err('x').orTee(e => {}) returns Err('x')"},{"id":"346","name":"Chaining BEH-03-009: orTee(f) side effect on Err, suppresses exceptions orTee calls the function with the Err value"},{"id":"347","name":"Chaining BEH-03-009: orTee(f) side effect on Err, suppresses exceptions ok(1).orTee(e => {}) returns Ok(1)"},{"id":"348","name":"Chaining BEH-03-009: orTee(f) side effect on Err, suppresses exceptions INV-5: err('x').orTee(throwing fn) returns Err('x') (swallows error)"},{"id":"349","name":"Chaining BEH-03-009: orTee(f) side effect on Err, suppresses exceptions ok(1).orTee() does not call the function"},{"id":"350","name":"Chaining BEH-03-010: andThrough(f) side effect with error propagation on Ok ok(2).andThrough(v => ok('ignored')) returns Ok(2) (original value)"},{"id":"351","name":"Chaining BEH-03-010: andThrough(f) side effect with error propagation on Ok ok(2).andThrough(v => err('fail')) returns Err('fail') (propagates)"},{"id":"352","name":"Chaining BEH-03-010: andThrough(f) side effect with error propagation on Ok err('x').andThrough(v => ok('ignored')) returns Err('x')"},{"id":"353","name":"Chaining BEH-03-011: inspect(f) observation on Ok without catching exceptions inspect calls function on Ok, returns same Result"},{"id":"354","name":"Chaining BEH-03-011: inspect(f) observation on Ok without catching exceptions inspect does not call function on Err"},{"id":"355","name":"Chaining BEH-03-011: inspect(f) observation on Ok without catching exceptions inspect on Err returns the same Err instance"},{"id":"356","name":"Chaining BEH-03-011: inspect(f) observation on Ok without catching exceptions inspect does not catch exceptions thrown by callback"},{"id":"357","name":"Chaining BEH-03-012: inspectErr(f) observation on Err without catching exceptions inspectErr calls function on Err, returns same Result"},{"id":"358","name":"Chaining BEH-03-012: inspectErr(f) observation on Err without catching exceptions inspectErr does not call function on Ok"},{"id":"359","name":"Chaining BEH-03-012: inspectErr(f) observation on Err without catching exceptions inspectErr on Ok returns the same Ok instance"},{"id":"360","name":"Chaining BEH-03-012: inspectErr(f) observation on Err without catching exceptions inspectErr does not catch exceptions thrown by callback"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Chaining\", () => {\n  describe(\"BEH-03-006: andThen(f) monadic bind on Ok value\", () => {\n    // DoD 5 #1\n    it(\"ok(2).andThen(v => ok(v * 3)) returns Ok(6)\", () => {\n      const result = ok(2).andThen(v => ok(v * 3));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(6);\n    });\n\n    // DoD 5 #2\n    it(\"ok(2).andThen(v => err('fail')) returns Err('fail')\", () => {\n      const result = ok(2).andThen(() => err(\"fail\"));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"fail\");\n    });\n\n    // DoD 5 #3\n    it(\"err('x').andThen(v => ok(v * 3)) returns Err('x')\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const chained = result.andThen(v => ok(v * 3));\n      expect(chained._tag).toBe(\"Err\");\n      if (chained.isErr()) expect(chained.error).toBe(\"x\");\n    });\n\n    // DoD 5 #21\n    it(\"Chaining andThen accumulates error types via union\", () => {\n      type E1 = { _tag: \"E1\" };\n      type E2 = { _tag: \"E2\" };\n      const step1 = (): Result<"+"number, E1> => ok(1);\n      const step2 = (_n: number): Result<"+"string, E2> => ok(\"done\");\n\n      const result = step1().andThen(step2);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(\"done\");\n    });\n\n    // DoD 5 #22\n    it(\"Three-step andThen chain short-circuits on first Err\", () => {\n      const step1 = vi.fn((): Result<"+"number, string> => ok(1));\n      const step2 = vi.fn((_n: number): Result<"+"number, string> => err(\"fail\"));\n      const step3 = vi.fn((_n: number): Result<"+"number, string> => ok(3));\n\n      const result = step1().andThen(step2).andThen(step3);\n      expect(result._tag).toBe(\"Err\");\n      expect(step3).not.toHaveBeenCalled();\n    });\n  });\n\n  describe(\"BEH-03-007: orElse(f) recovery operation on Err error\", () => {\n    // DoD 5 #4\n    it(\"err('x').orElse(e => ok(99)) returns Ok(99)\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const recovered = result.orElse(() => ok(99));\n      expect(recovered._tag).toBe(\"Ok\");\n      if (recovered.isOk()) expect(recovered.value).toBe(99);\n    });\n\n    // DoD 5 #5\n    it(\"err('x').orElse(e => err('new')) returns Err('new')\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const recovered = result.orElse(() => err(\"new\"));\n      expect(recovered._tag).toBe(\"Err\");\n      if (recovered.isErr()) expect(recovered.error).toBe(\"new\");\n    });\n\n    // DoD 5 #6\n    it(\"ok(1).orElse(e => ok(99)) returns Ok(1)\", () => {\n      const result: Result<"+"number, string> = ok(1);\n      const recovered = result.orElse(() => ok(99));\n      expect(recovered._tag).toBe(\"Ok\");\n      if (recovered.isOk()) expect(recovered.value).toBe(1);\n    });\n  });\n\n  describe(\"BEH-03-008: andTee(f) side effect on Ok, suppresses exceptions\", () => {\n    // DoD 5 #7\n    it(\"ok(2).andTee(v => {}) returns Ok(2)\", () => {\n      const result = ok(2).andTee(() => {});\n      expect(result._tag).toBe(\"Ok\");\n      expect(result.value).toBe(2);\n    });\n\n    // DoD 5 #8\n    it(\"INV-5: ok(2).andTee(v => { throw ... }) returns Ok(2) (swallows error)\", () => {\n      const result = ok(2).andTee(() => {\n        throw new Error(\"boom\");\n      });\n      expect(result._tag).toBe(\"Ok\");\n      expect(result.value).toBe(2);\n    });\n\n    // DoD 5 #9\n    it(\"err('x').andTee(v => {}) returns Err('x')\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const teed = result.andTee(() => {});\n      expect(teed._tag).toBe(\"Err\");\n      if (teed.isErr()) expect(teed.error).toBe(\"x\");\n    });\n\n    // DoD 5 #10\n    it(\"andTee calls the function with the Ok value\", () => {\n      const fn = vi.fn();\n      ok(42).andTee(fn);\n      expect(fn).toHaveBeenCalledWith(42);\n    });\n\n    // --- Mutation gap: andTee on Err does not call fn ---\n    it(\"err('x').andTee() does not call the function\", () => {\n      const fn = vi.fn();\n      const result: Result<"+"number, string> = err(\"x\");\n      result.andTee(fn);\n      expect(fn).not.toHaveBeenCalled();\n    });\n  });\n\n  describe(\"BEH-03-009: orTee(f) side effect on Err, suppresses exceptions\", () => {\n    // DoD 5 #11\n    it(\"err('x').orTee(e => {}) returns Err('x')\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const teed = result.orTee(() => {});\n      expect(teed._tag).toBe(\"Err\");\n      if (teed.isErr()) expect(teed.error).toBe(\"x\");\n    });\n\n    // DoD 5 #12\n    it(\"orTee calls the function with the Err value\", () => {\n      const fn = vi.fn();\n      err(\"x\").orTee(fn);\n      expect(fn).toHaveBeenCalledWith(\"x\");\n    });\n\n    // DoD 5 #13\n    it(\"ok(1).orTee(e => {}) returns Ok(1)\", () => {\n      const result: Result<"+"number, string> = ok(1);\n      const teed = result.orTee(() => {});\n      expect(teed._tag).toBe(\"Ok\");\n      if (teed.isOk()) expect(teed.value).toBe(1);\n    });\n\n    // --- Mutation gap: orTee error swallowing on Err ---\n    it(\"INV-5: err('x').orTee(throwing fn) returns Err('x') (swallows error)\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const teed = result.orTee(() => {\n        throw new Error(\"boom\");\n      });\n      expect(teed._tag).toBe(\"Err\");\n      if (teed.isErr()) expect(teed.error).toBe(\"x\");\n    });\n\n    // --- Mutation gap: orTee on Ok does not call fn ---\n    it(\"ok(1).orTee() does not call the function\", () => {\n      const fn = vi.fn();\n      const result: Result<"+"number, string> = ok(1);\n      result.orTee(fn);\n      expect(fn).not.toHaveBeenCalled();\n    });\n  });\n\n  describe(\"BEH-03-010: andThrough(f) side effect with error propagation on Ok\", () => {\n    // DoD 5 #14\n    it(\"ok(2).andThrough(v => ok('ignored')) returns Ok(2) (original value)\", () => {\n      const result = ok(2).andThrough(() => ok(\"ignored\"));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(2);\n    });\n\n    // DoD 5 #15\n    it(\"ok(2).andThrough(v => err('fail')) returns Err('fail') (propagates)\", () => {\n      const result = ok(2).andThrough(() => err(\"fail\"));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"fail\");\n    });\n\n    // DoD 5 #16\n    it(\"err('x').andThrough(v => ok('ignored')) returns Err('x')\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const through = result.andThrough(() => ok(\"ignored\"));\n      expect(through._tag).toBe(\"Err\");\n      if (through.isErr()) expect(through.error).toBe(\"x\");\n    });\n  });\n\n  describe(\"BEH-03-011: inspect(f) observation on Ok without catching exceptions\", () => {\n    // DoD 5 #17\n    it(\"inspect calls function on Ok, returns same Result\", () => {\n      const fn = vi.fn();\n      const original = ok(42);\n      const result = original.inspect(fn);\n      expect(fn).toHaveBeenCalledWith(42);\n      expect(result).toBe(original);\n    });\n\n    // DoD 5 #18\n    it(\"inspect does not call function on Err\", () => {\n      const fn = vi.fn();\n      const result: Result<"+"number, string> = err(\"x\");\n      result.inspect(fn);\n      expect(fn).not.toHaveBeenCalled();\n    });\n\n    // --- Mutation gap: inspect return value on Err ---\n    it(\"inspect on Err returns the same Err instance\", () => {\n      const fn = vi.fn();\n      const original: Result<"+"number, string> = err(\"x\");\n      const result = original.inspect(fn);\n      expect(result).toBe(original);\n      expect(result._tag).toBe(\"Err\");\n    });\n\n    it(\"inspect does not catch exceptions thrown by callback\", () => {\n      const thrower = () => {\n        throw new Error(\"inspect boom\");\n      };\n      expect(() => ok(1).inspect(thrower)).toThrow(\"inspect boom\");\n    });\n  });\n\n  describe(\"BEH-03-012: inspectErr(f) observation on Err without catching exceptions\", () => {\n    // DoD 5 #19\n    it(\"inspectErr calls function on Err, returns same Result\", () => {\n      const fn = vi.fn();\n      const original = err(\"x\");\n      const result = original.inspectErr(fn);\n      expect(fn).toHaveBeenCalledWith(\"x\");\n      expect(result).toBe(original);\n    });\n\n    // DoD 5 #20\n    it(\"inspectErr does not call function on Ok\", () => {\n      const fn = vi.fn();\n      const result: Result<"+"number, string> = ok(42);\n      result.inspectErr(fn);\n      expect(fn).not.toHaveBeenCalled();\n    });\n\n    // --- Mutation gap: inspectErr return value on Ok ---\n    it(\"inspectErr on Ok returns the same Ok instance\", () => {\n      const fn = vi.fn();\n      const original: Result<"+"number, string> = ok(42);\n      const result = original.inspectErr(fn);\n      expect(result).toBe(original);\n      expect(result._tag).toBe(\"Ok\");\n    });\n\n    it(\"inspectErr does not catch exceptions thrown by callback\", () => {\n      const thrower = () => {\n        throw new Error(\"inspectErr boom\");\n      };\n      expect(() => err(\"x\").inspectErr(thrower)).toThrow(\"inspectErr boom\");\n    });\n  });\n});\n"},"tests/combining.test.ts":{"tests":[{"id":"361","name":"Combining BEH-05-001: all(ok(1), ok(2), ok(3)) returns Ok([1, 2, 3])"},{"id":"362","name":"Combining BEH-05-001: all(ok(1), err('a'), ok(3)) returns Err('a') (first error)"},{"id":"363","name":"Combining BEH-05-001: all(ok(1), err('a'), err('b')) returns Err('a') (short-circuits)"},{"id":"364","name":"Combining BEH-05-001: all() with empty args returns Ok([])"},{"id":"365","name":"Combining BEH-05-002: allSettled(ok(1), ok(2)) returns Ok([1, 2])"},{"id":"366","name":"Combining BEH-05-002: allSettled(ok(1), err('a'), err('b')) returns Err(['a', 'b'])"},{"id":"367","name":"Combining BEH-05-002: allSettled(ok(1), err('a'), ok(3)) returns Err(['a'])"},{"id":"368","name":"Combining BEH-05-003: any(ok(1), err('a')) returns Ok(1) (first success)"},{"id":"369","name":"Combining BEH-05-003: any(err('a'), ok(2)) returns Ok(2)"},{"id":"370","name":"Combining BEH-05-003: any(err('a'), err('b')) returns Err(['a', 'b'])"},{"id":"371","name":"Combining BEH-05-004: collect({ a: ok(1), b: ok('str') }) returns Ok({ a: 1, b: 'str' })"},{"id":"372","name":"Combining BEH-05-004: collect({ a: ok(1), b: err('x') }) returns Err('x')"},{"id":"373","name":"Combining BEH-05-001: all preserves tuple types (not widened to array)"},{"id":"374","name":"Combining BEH-05-001: all with array input (non-tuple) works correctly"},{"id":"375","name":"Combining BEH-05-005: partition splits mixed results into [oks, errs]"},{"id":"376","name":"Combining BEH-05-005: partition all Ok returns [allValues, []]"},{"id":"377","name":"Combining BEH-05-005: partition all Err returns [[], allErrors]"},{"id":"378","name":"Combining BEH-05-005: partition empty input returns [[], []]"},{"id":"379","name":"Combining BEH-05-005: partition preserves order within each array"},{"id":"380","name":"Combining BEH-05-006: forEach maps all items when all succeed"},{"id":"381","name":"Combining BEH-05-006: forEach short-circuits on first Err"},{"id":"382","name":"Combining BEH-05-006: forEach passes index as second argument"},{"id":"383","name":"Combining BEH-05-006: forEach empty input returns Ok([])"},{"id":"384","name":"Combining BEH-05-006: forEach does not call f for items after first Err"},{"id":"385","name":"Combining BEH-05-007: zipOrAccumulate all Ok returns Ok with tuple of values"},{"id":"386","name":"Combining BEH-05-007: zipOrAccumulate collects all errors into NonEmptyArray"},{"id":"387","name":"Combining BEH-05-007: zipOrAccumulate single error returns NonEmptyArray with one element"},{"id":"388","name":"Combining BEH-05-007: zipOrAccumulate empty input returns Ok([])"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport { all } from \"../src/combinators/all.js\";\nimport { allSettled } from \"../src/combinators/all-settled.js\";\nimport { any } from \"../src/combinators/any.js\";\nimport { collect } from \"../src/combinators/collect.js\";\nimport { partition } from \"../src/combinators/partition.js\";\nimport { forEach } from \"../src/combinators/for-each.js\";\nimport { zipOrAccumulate } from \"../src/combinators/zip-or-accumulate.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Combining\", () => {\n  // DoD 7 #1\n  it(\"BEH-05-001: all(ok(1), ok(2), ok(3)) returns Ok([1, 2, 3])\", () => {\n    const result = all(ok(1), ok(2), ok(3));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2, 3]);\n  });\n\n  // DoD 7 #2\n  it(\"BEH-05-001: all(ok(1), err('a'), ok(3)) returns Err('a') (first error)\", () => {\n    const result = all(ok(1), err(\"a\"), ok(3));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"a\");\n  });\n\n  // DoD 7 #3\n  it(\"BEH-05-001: all(ok(1), err('a'), err('b')) returns Err('a') (short-circuits)\", () => {\n    const result = all(ok(1), err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"a\");\n  });\n\n  // DoD 7 #4\n  it(\"BEH-05-001: all() with empty args returns Ok([])\", () => {\n    const result = all();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([]);\n  });\n\n  // DoD 7 #5\n  it(\"BEH-05-002: allSettled(ok(1), ok(2)) returns Ok([1, 2])\", () => {\n    const result = allSettled(ok(1), ok(2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2]);\n  });\n\n  // DoD 7 #6\n  it(\"BEH-05-002: allSettled(ok(1), err('a'), err('b')) returns Err(['a', 'b'])\", () => {\n    const result = allSettled(ok(1), err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\", \"b\"]);\n  });\n\n  // DoD 7 #7\n  it(\"BEH-05-002: allSettled(ok(1), err('a'), ok(3)) returns Err(['a'])\", () => {\n    const result = allSettled(ok(1), err(\"a\"), ok(3));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\"]);\n  });\n\n  // DoD 7 #8\n  it(\"BEH-05-003: any(ok(1), err('a')) returns Ok(1) (first success)\", () => {\n    const result = any(ok(1), err(\"a\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(1);\n  });\n\n  // DoD 7 #9\n  it(\"BEH-05-003: any(err('a'), ok(2)) returns Ok(2)\", () => {\n    const result = any(err(\"a\"), ok(2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(2);\n  });\n\n  // DoD 7 #10\n  it(\"BEH-05-003: any(err('a'), err('b')) returns Err(['a', 'b'])\", () => {\n    const result = any(err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\", \"b\"]);\n  });\n\n  // DoD 7 #11\n  it(\"BEH-05-004: collect({ a: ok(1), b: ok('str') }) returns Ok({ a: 1, b: 'str' })\", () => {\n    const result = collect({ a: ok(1), b: ok(\"str\") });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual({ a: 1, b: \"str\" });\n  });\n\n  // DoD 7 #12\n  it(\"BEH-05-004: collect({ a: ok(1), b: err('x') }) returns Err('x')\", () => {\n    const result = collect({ a: ok(1), b: err(\"x\") });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 7 #13\n  it(\"BEH-05-001: all preserves tuple types (not widened to array)\", () => {\n    const result = all(ok(1), ok(\"two\"), ok(true));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) {\n      expect(result.value[0]).toBe(1);\n      expect(result.value[1]).toBe(\"two\");\n      expect(result.value[2]).toBe(true);\n    }\n  });\n\n  // DoD 7 #14\n  it(\"BEH-05-001: all with array input (non-tuple) works correctly\", () => {\n    const results = [ok(1), ok(2), ok(3)];\n    const result = all(...results);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2, 3]);\n  });\n\n  // BEH-05-005: partition\n  describe(\"BEH-05-005: partition\", () => {\n    it(\"splits mixed results into [oks, errs]\", () => {\n      const [oks, errs] = partition([ok(1), err(\"a\"), ok(2), err(\"b\")]);\n      expect(oks).toEqual([1, 2]);\n      expect(errs).toEqual([\"a\", \"b\"]);\n    });\n\n    it(\"all Ok returns [allValues, []]\", () => {\n      const [oks, errs] = partition([ok(1), ok(2), ok(3)]);\n      expect(oks).toEqual([1, 2, 3]);\n      expect(errs).toEqual([]);\n    });\n\n    it(\"all Err returns [[], allErrors]\", () => {\n      const results: Result<"+"number, string>[] = [err(\"a\"), err(\"b\")];\n      const [oks, errs] = partition(results);\n      expect(oks).toEqual([]);\n      expect(errs).toEqual([\"a\", \"b\"]);\n    });\n\n    it(\"empty input returns [[], []]\", () => {\n      const [oks, errs] = partition([]);\n      expect(oks).toEqual([]);\n      expect(errs).toEqual([]);\n    });\n\n    it(\"preserves order within each array\", () => {\n      const [oks, errs] = partition([ok(1), err(\"x\"), ok(2), err(\"y\"), ok(3)]);\n      expect(oks).toEqual([1, 2, 3]);\n      expect(errs).toEqual([\"x\", \"y\"]);\n    });\n  });\n\n  // BEH-05-006: forEach\n  describe(\"BEH-05-006: forEach\", () => {\n    it(\"maps all items when all succeed\", () => {\n      const result = forEach([1, 2, 3], (n) => ok(n * 2));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual([2, 4, 6]);\n    });\n\n    it(\"short-circuits on first Err\", () => {\n      const result = forEach([1, -1, 3], (n) =>\n        n > 0 ? ok(n * 2) : err(\"negative\"),\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"negative\");\n    });\n\n    it(\"passes index as second argument\", () => {\n      const result = forEach([\"a\", \"b\", \"c\"], (_item, i) => ok(i));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual([0, 1, 2]);\n    });\n\n    it(\"empty input returns Ok([])\", () => {\n      const result = forEach([], () => err(\"never\"));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual([]);\n    });\n\n    it(\"does not call f for items after first Err\", () => {\n      let callCount = 0;\n      forEach([1, -1, 3], (n) => {\n        callCount++;\n        return n > 0 ? ok(n) : err(\"negative\");\n      });\n      expect(callCount).toBe(2); // called for 1 and -1, not 3\n    });\n  });\n\n  // BEH-05-007: zipOrAccumulate\n  describe(\"BEH-05-007: zipOrAccumulate\", () => {\n    it(\"all Ok returns Ok with tuple of values\", () => {\n      const result = zipOrAccumulate(ok(1), ok(\"hello\"), ok(true));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual([1, \"hello\", true]);\n    });\n\n    it(\"collects all errors into NonEmptyArray\", () => {\n      const result = zipOrAccumulate(ok(1), err(\"a\"), err(\"b\"));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) {\n        expect(result.error).toEqual([\"a\", \"b\"]);\n        expect(result.error.length).toBeGreaterThanOrEqual(1);\n      }\n    });\n\n    it(\"single error returns NonEmptyArray with one element\", () => {\n      const result = zipOrAccumulate(ok(1), err(\"only\"), ok(3));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toEqual([\"only\"]);\n    });\n\n    it(\"empty input returns Ok([])\", () => {\n      const result = zipOrAccumulate();\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual([]);\n    });\n  });\n});\n"},"tests/generators.test.ts":{"tests":[{"id":"389","name":"BEH-07-001: Generators BEH-07-003: safeTry sync: all Ok yields produce final Ok"},{"id":"390","name":"BEH-07-001: Generators BEH-07-001: safeTry sync: first Err yield short-circuits"},{"id":"391","name":"BEH-07-001: Generators BEH-07-005: safeTry sync: intermediate Ok values are extracted by yield*"},{"id":"392","name":"BEH-07-001: Generators BEH-07-005: safeTry sync: error type is union of all yielded Err types"},{"id":"393","name":"BEH-07-001: Generators BEH-07-003: safeTry async: all Ok yields produce final Ok"},{"id":"394","name":"BEH-07-001: Generators BEH-07-001: safeTry async: first Err yield short-circuits"},{"id":"395","name":"BEH-07-001: Generators BEH-07-003: safeTry async: can yield* both Result and ResultAsync (via await)"},{"id":"396","name":"BEH-07-001: Generators BEH-07-003: safeTry async: returns ResultAsync"},{"id":"397","name":"BEH-07-001: Generators BEH-07-004: safeTry async: generator cleanup runs on early return"},{"id":"398","name":"BEH-07-001: Generators BEH-07-002: Ok [Symbol.iterator] yields the Ok value"},{"id":"399","name":"BEH-07-001: Generators BEH-07-002: Err [Symbol.iterator] yields early return with Err"},{"id":"400","name":"BEH-07-001: Generators BEH-07-002: Ok iterator return() produces done result with given value"},{"id":"401","name":"BEH-07-001: Generators BEH-07-002: Ok iterator throw() re-throws the error"},{"id":"402","name":"BEH-07-001: Generators BEH-07-002: Ok iterator [Symbol.iterator]() returns self"},{"id":"403","name":"BEH-07-001: Generators INV-4: Err iterator throws unreachable on second next()"},{"id":"404","name":"BEH-07-001: Generators BEH-07-004: Generator cleanup runs on early return"},{"id":"405","name":"BEH-07-001: Generators BEH-07-005: Nested safeTry calls compose correctly"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { safeTry } from \"../src/generators/safe-try.js\";\nimport { ResultAsync } from \"../src/async/result-async.js\";\n\ndescribe(\"BEH-07-001: Generators\", () => {\n  // DoD 9 #1\n  it(\"BEH-07-003: safeTry sync: all Ok yields produce final Ok\", () => {\n    const result = safeTry(function* () {\n      const a = yield* ok(1);\n      const b = yield* ok(2);\n      const c = yield* ok(3);\n      return ok(a + b + c);\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(6);\n  });\n\n  // DoD 9 #2\n  it(\"BEH-07-001: safeTry sync: first Err yield short-circuits\", () => {\n    const result = safeTry(function* () {\n      const a = yield* ok(1);\n      const _b = yield* err(\"fail\");\n      // This line should never execute\n      return ok(a + 999);\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 9 #3\n  it(\"BEH-07-005: safeTry sync: intermediate Ok values are extracted by yield*\", () => {\n    const result = safeTry(function* () {\n      const name = yield* ok(\"Alice\");\n      const age = yield* ok(30);\n      return ok({ name, age });\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) {\n      expect(result.value).toEqual({ name: \"Alice\", age: 30 });\n    }\n  });\n\n  // DoD 9 #4\n  it(\"BEH-07-005: safeTry sync: error type is union of all yielded Err types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(): Result<"+"string, E2> {\n      return err({ _tag: \"E2\" });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* step1();\n      const b = yield* step2();\n      return ok(`${a}-${b}`);\n    });\n\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) {\n      expect(result.error).toEqual({ _tag: \"E2\" });\n    }\n  });\n\n  // DoD 9 #5\n  it(\"BEH-07-003: safeTry async: all Ok yields produce final Ok\", async () => {\n    const result = safeTry(async function* () {\n      const a = yield* ok(1);\n      const b = yield* ok(2);\n      return ok(a + b);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(3);\n  });\n\n  // DoD 9 #6\n  it(\"BEH-07-001: safeTry async: first Err yield short-circuits\", async () => {\n    const result = safeTry(async function* () {\n      const _a = yield* ok(1);\n      const _b = yield* err(\"async-fail\");\n      return ok(999);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Err\");\n    if (resolved.isErr()) expect(resolved.error).toBe(\"async-fail\");\n  });\n\n  // DoD 9 #7\n  it(\"BEH-07-003: safeTry async: can yield* both Result and ResultAsync (via await)\", async () => {\n    const result = safeTry(async function* () {\n      const a = yield* ok(10); // sync Result\n      const b = yield* await ResultAsync.ok(20); // async ResultAsync → await → Result\n      return ok(a + b);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(30);\n  });\n\n  // DoD 9 #8\n  it(\"BEH-07-003: safeTry async: returns ResultAsync\", async () => {\n    const result = safeTry(async function* () {\n      const v = yield* ok(42);\n      return ok(v);\n    });\n    // ResultAsync is PromiseLike — can be awaited\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(42);\n  });\n\n  // --- Mutation gap: async generator cleanup ---\n  it(\"BEH-07-004: safeTry async: generator cleanup runs on early return\", async () => {\n    const cleanup = vi.fn();\n\n    const result = safeTry(async function* () {\n      try {\n        const _a = yield* ok(1);\n        const _b = yield* err(\"async-stop\");\n        return ok(999);\n      } finally {\n        cleanup();\n      }\n    });\n\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Err\");\n    if (resolved.isErr()) expect(resolved.error).toBe(\"async-stop\");\n    expect(cleanup).toHaveBeenCalledOnce();\n  });\n\n  // DoD 9 #9\n  it(\"BEH-07-002: Ok [Symbol.iterator] yields the Ok value\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    const result = iter.next();\n    expect(result.done).toBe(true);\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 9 #10\n  it(\"BEH-07-002: Err [Symbol.iterator] yields early return with Err\", () => {\n    const e = err(\"bad\");\n    const iter = e[Symbol.iterator]();\n    const result = iter.next();\n    expect(result.done).toBe(false);\n    expect(result.value).toBe(e);\n  });\n\n  // --- Mutation gap: Ok iterator return() method ---\n  it(\"BEH-07-002: Ok iterator return() produces done result with given value\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    const result = iter.return(99);\n    expect(result.done).toBe(true);\n    expect(result.value).toBe(99);\n  });\n\n  // --- Mutation gap: Ok iterator throw() method ---\n  it(\"BEH-07-002: Ok iterator throw() re-throws the error\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    expect(() => iter.throw(new Error(\"test\"))).toThrow(\"test\");\n  });\n\n  // --- Mutation gap: Ok iterator [Symbol.iterator] returns self ---\n  it(\"BEH-07-002: Ok iterator [Symbol.iterator]() returns self\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    expect(iter[Symbol.iterator]()).toBe(iter);\n  });\n\n  // --- Mutation gap: Err iterator continues with error after yield ---\n  it(\"INV-4: Err iterator throws unreachable on second next()\", () => {\n    const e = err(\"bad\");\n    const iter = e[Symbol.iterator]();\n    iter.next(); // first yields the Err\n    expect(() => iter.next()).toThrow(\"unreachable\");\n  });\n\n  // DoD 9 #11\n  it(\"BEH-07-004: Generator cleanup runs on early return\", () => {\n    const cleanup = vi.fn();\n\n    const result = safeTry(function* () {\n      try {\n        const _a = yield* ok(1);\n        const _b = yield* err(\"stop\");\n        return ok(999);\n      } finally {\n        cleanup();\n      }\n    });\n\n    expect(result._tag).toBe(\"Err\");\n    expect(cleanup).toHaveBeenCalledOnce();\n  });\n\n  // DoD 9 #12\n  it(\"BEH-07-005: Nested safeTry calls compose correctly\", () => {\n    function inner(n: number): Result<"+"number, string> {\n      return safeTry(function* () {\n        const v = yield* ok(n * 2);\n        return ok(v);\n      });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* inner(5);\n      const b = yield* inner(10);\n      return ok(a + b);\n    });\n\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(30);\n  });\n});\n"},"tests/type-guards.test.ts":{"tests":[{"id":"406","name":"Type Guards BEH-01-011: ok(1).isOk() returns true"},{"id":"407","name":"Type Guards BEH-01-011: ok(1).isErr() returns false"},{"id":"408","name":"Type Guards BEH-01-011: err('x').isOk() returns false"},{"id":"409","name":"Type Guards BEH-01-011: err('x').isErr() returns true"},{"id":"410","name":"Type Guards BEH-01-011: isOk() narrows type to Ok in conditional"},{"id":"411","name":"Type Guards BEH-01-011: isErr() narrows type to Err in conditional"},{"id":"412","name":"Type Guards BEH-01-011: ok(5).isOkAnd(v => v > 3) returns true"},{"id":"413","name":"Type Guards BEH-01-011: ok(1).isOkAnd(v => v > 3) returns false"},{"id":"414","name":"Type Guards BEH-01-011: err('x').isOkAnd(v => v > 3) returns false"},{"id":"415","name":"Type Guards BEH-01-011: err('x').isErrAnd(e => e === 'x') returns true"},{"id":"416","name":"Type Guards BEH-01-011: ok(1).isErrAnd(e => e === 'x') returns false"},{"id":"417","name":"Type Guards BEH-01-009: isResult(ok(1)) returns true"},{"id":"418","name":"Type Guards BEH-01-009: isResult(err('x')) returns true"},{"id":"419","name":"Type Guards BEH-01-009: isResult('not a result') returns false"},{"id":"420","name":"Type Guards BEH-01-009: isResult(null) returns false"},{"id":"421","name":"Type Guards BEH-01-009: isResult(undefined) returns false"},{"id":"422","name":"Type Guards BEH-01-011: Narrowing with _tag discriminant works in switch statement"},{"id":"423","name":"Type Guards BEH-01-009, INV-3: isResult({ _tag: 'Ok' }) without value property returns false"},{"id":"424","name":"Type Guards BEH-01-009, INV-3: isResult({ _tag: 'Err' }) without error property returns false"},{"id":"425","name":"Type Guards BEH-01-009, INV-3: isResult({ _tag: 'Other', value: 1 }) returns false"},{"id":"426","name":"Type Guards BEH-01-009: isResult(42) returns false"},{"id":"427","name":"Type Guards BEH-01-009: isResult(true) returns false"},{"id":"428","name":"Type Guards BEH-01-009, INV-3: isResult({ _tag: 'Err', value: 1 }) returns false (has value, not error)"},{"id":"429","name":"Type Guards BEH-01-009, INV-3: isResult({ _tag: 'Ok', error: 'x' }) returns false (has error, not value)"},{"id":"430","name":"Type Guards BEH-01-011: Array .filter(r => r.isOk()) produces only Ok values"},{"id":"431","name":"Type Guards INV-3: rejects structurally similar object that lacks RESULT_BRAND symbol"},{"id":"432","name":"Type Guards INV-3: real Result carries RESULT_BRAND symbol"},{"id":"433","name":"BEH-01-010: isResultAsync BEH-01-010: returns true for ResultAsync.ok(1)"},{"id":"434","name":"BEH-01-010: isResultAsync BEH-01-010: returns true for ResultAsync.err('x')"},{"id":"435","name":"BEH-01-010: isResultAsync BEH-01-010: returns true for ResultAsync.fromSafePromise(...)"},{"id":"436","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for ok(1) (sync Result, no then)"},{"id":"437","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for err('x') (sync Result)"},{"id":"438","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for null"},{"id":"439","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for undefined"},{"id":"440","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for a string"},{"id":"441","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for a number"},{"id":"442","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for a plain Promise (has then but no match)"},{"id":"443","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for { match: 'not-a-fn' }"},{"id":"444","name":"BEH-01-010: isResultAsync BEH-01-010: returns true for structural match { then: fn, match: fn }"},{"id":"445","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for { match: fn } without then"},{"id":"446","name":"BEH-01-010: isResultAsync BEH-01-010: returns false for { then: 'not-a-fn', match: fn }"},{"id":"447","name":"BEH-01-010: isResultAsync INV-9: ResultAsync.ok() is recognized by isResultAsync"},{"id":"448","name":"BEH-01-010: isResultAsync INV-9: ResultAsync.err() is recognized by isResultAsync"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err, ResultAsync, RESULT_BRAND } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { isResult, isResultAsync } from \"../src/core/guards.js\";\n\ndescribe(\"Type Guards\", () => {\n  // DoD 3 #1\n  it(\"BEH-01-011: ok(1).isOk() returns true\", () => {\n    expect(ok(1).isOk()).toBe(true);\n  });\n\n  // DoD 3 #2\n  it(\"BEH-01-011: ok(1).isErr() returns false\", () => {\n    expect(ok(1).isErr()).toBe(false);\n  });\n\n  // DoD 3 #3\n  it(\"BEH-01-011: err('x').isOk() returns false\", () => {\n    expect(err(\"x\").isOk()).toBe(false);\n  });\n\n  // DoD 3 #4\n  it(\"BEH-01-011: err('x').isErr() returns true\", () => {\n    expect(err(\"x\").isErr()).toBe(true);\n  });\n\n  // DoD 3 #5\n  it(\"BEH-01-011: isOk() narrows type to Ok in conditional\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result.isOk()) {\n      // If this compiles, narrowing works\n      expect(result.value).toBe(42);\n    } else {\n      throw new Error(\"Should not reach here\");\n    }\n  });\n\n  // DoD 3 #6\n  it(\"BEH-01-011: isErr() narrows type to Err in conditional\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result.isErr()) {\n      expect(result.error).toBe(\"fail\");\n    } else {\n      throw new Error(\"Should not reach here\");\n    }\n  });\n\n  // DoD 3 #7\n  it(\"BEH-01-011: ok(5).isOkAnd(v => v > 3) returns true\", () => {\n    expect(ok(5).isOkAnd(v => v > 3)).toBe(true);\n  });\n\n  // DoD 3 #8\n  it(\"BEH-01-011: ok(1).isOkAnd(v => v > 3) returns false\", () => {\n    expect(ok(1).isOkAnd(v => v > 3)).toBe(false);\n  });\n\n  // DoD 3 #9\n  it(\"BEH-01-011: err('x').isOkAnd(v => v > 3) returns false\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.isOkAnd(v => v > 3)).toBe(false);\n  });\n\n  // DoD 3 #10\n  it(\"BEH-01-011: err('x').isErrAnd(e => e === 'x') returns true\", () => {\n    expect(err(\"x\").isErrAnd(e => e === \"x\")).toBe(true);\n  });\n\n  // DoD 3 #11\n  it(\"BEH-01-011: ok(1).isErrAnd(e => e === 'x') returns false\", () => {\n    const result: Result<"+"number, string> = ok(1);\n    expect(result.isErrAnd(e => e === \"x\")).toBe(false);\n  });\n\n  // DoD 3 #12\n  it(\"BEH-01-009: isResult(ok(1)) returns true\", () => {\n    expect(isResult(ok(1))).toBe(true);\n  });\n\n  // DoD 3 #13\n  it(\"BEH-01-009: isResult(err('x')) returns true\", () => {\n    expect(isResult(err(\"x\"))).toBe(true);\n  });\n\n  // DoD 3 #14\n  it(\"BEH-01-009: isResult('not a result') returns false\", () => {\n    expect(isResult(\"not a result\")).toBe(false);\n  });\n\n  // DoD 3 #15\n  it(\"BEH-01-009: isResult(null) returns false\", () => {\n    expect(isResult(null)).toBe(false);\n  });\n\n  // DoD 3 #16\n  it(\"BEH-01-009: isResult(undefined) returns false\", () => {\n    expect(isResult(undefined)).toBe(false);\n  });\n\n  // DoD 3 #17\n  it(\"BEH-01-011: Narrowing with _tag discriminant works in switch statement\", () => {\n    function extract(result: Result<"+"number, string>): number | string {\n      switch (result._tag) {\n        case \"Ok\":\n          return result.value;\n        case \"Err\":\n          return result.error;\n      }\n    }\n    expect(extract(ok(42))).toBe(42);\n    expect(extract(err(\"fail\"))).toBe(\"fail\");\n  });\n\n  // --- Mutation gap: isResult with object having _tag: \"Ok\" but no value ---\n  it(\"BEH-01-009, INV-3: isResult({ _tag: 'Ok' }) without value property returns false\", () => {\n    expect(isResult({ _tag: \"Ok\" })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object having _tag: \"Err\" but no error ---\n  it(\"BEH-01-009, INV-3: isResult({ _tag: 'Err' }) without error property returns false\", () => {\n    expect(isResult({ _tag: \"Err\" })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with non-Result object having _tag ---\n  it(\"BEH-01-009, INV-3: isResult({ _tag: 'Other', value: 1 }) returns false\", () => {\n    expect(isResult({ _tag: \"Other\", value: 1 })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with number ---\n  it(\"BEH-01-009: isResult(42) returns false\", () => {\n    expect(isResult(42)).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with boolean ---\n  it(\"BEH-01-009: isResult(true) returns false\", () => {\n    expect(isResult(true)).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object matching Ok shape but wrong tag ---\n  it(\"BEH-01-009, INV-3: isResult({ _tag: 'Err', value: 1 }) returns false (has value, not error)\", () => {\n    expect(isResult({ _tag: \"Err\", value: 1 })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object matching Err shape but wrong tag ---\n  it(\"BEH-01-009, INV-3: isResult({ _tag: 'Ok', error: 'x' }) returns false (has error, not value)\", () => {\n    expect(isResult({ _tag: \"Ok\", error: \"x\" })).toBe(false);\n  });\n\n  // DoD 3 #18\n  it(\"BEH-01-011: Array .filter(r => r.isOk()) produces only Ok values\", () => {\n    const results: Result<"+"number, string>[] = [ok(1), err(\"bad\"), ok(3)];\n    const successes = results.filter((r): r is typeof r & { _tag: \"Ok\" } => r.isOk());\n    expect(successes).toHaveLength(2);\n    expect(successes[0].value).toBe(1);\n    expect(successes[1].value).toBe(3);\n  });\n\n  // INV-3: Brand symbol prevents forgery — structurally identical object without RESULT_BRAND is rejected\n  it(\"INV-3: rejects structurally similar object that lacks RESULT_BRAND symbol\", () => {\n    const forgery = { _tag: \"Ok\" as const, value: 42, isOk: () => true, isErr: () => false };\n    expect(isResult(forgery)).toBe(false);\n    // Confirm a real Result passes for contrast\n    expect(isResult(ok(42))).toBe(true);\n  });\n\n  it(\"INV-3: real Result carries RESULT_BRAND symbol\", () => {\n    const result = ok(1);\n    expect(RESULT_BRAND in result).toBe(true);\n  });\n});\n\ndescribe(\"BEH-01-010: isResultAsync\", () => {\n  it(\"BEH-01-010: returns true for ResultAsync.ok(1)\", () => {\n    expect(isResultAsync(ResultAsync.ok(1))).toBe(true);\n  });\n\n  it(\"BEH-01-010: returns true for ResultAsync.err('x')\", () => {\n    expect(isResultAsync(ResultAsync.err(\"x\"))).toBe(true);\n  });\n\n  it(\"BEH-01-010: returns true for ResultAsync.fromSafePromise(...)\", () => {\n    expect(isResultAsync(ResultAsync.fromSafePromise(Promise.resolve(42)))).toBe(true);\n  });\n\n  it(\"BEH-01-010: returns false for ok(1) (sync Result, no then)\", () => {\n    expect(isResultAsync(ok(1))).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for err('x') (sync Result)\", () => {\n    expect(isResultAsync(err(\"x\"))).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for null\", () => {\n    expect(isResultAsync(null)).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for undefined\", () => {\n    expect(isResultAsync(undefined)).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for a string\", () => {\n    expect(isResultAsync(\"string\")).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for a number\", () => {\n    expect(isResultAsync(42)).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for a plain Promise (has then but no match)\", () => {\n    expect(isResultAsync(Promise.resolve(1))).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for { match: 'not-a-fn' }\", () => {\n    expect(isResultAsync({ match: \"not-a-fn\" })).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns true for structural match { then: fn, match: fn }\", () => {\n    const fake = { then: () => {}, match: () => {} };\n    expect(isResultAsync(fake)).toBe(true);\n  });\n\n  it(\"BEH-01-010: returns false for { match: fn } without then\", () => {\n    expect(isResultAsync({ match: () => {} })).toBe(false);\n  });\n\n  it(\"BEH-01-010: returns false for { then: 'not-a-fn', match: fn }\", () => {\n    expect(isResultAsync({ then: \"not-a-fn\", match: () => {} })).toBe(false);\n  });\n\n  // INV-9: ResultAsync brand identity — every ResultAsync created via factory methods is recognized\n  it(\"INV-9: ResultAsync.ok() is recognized by isResultAsync\", () => {\n    const ra = ResultAsync.ok(1);\n    expect(isResultAsync(ra)).toBe(true);\n  });\n\n  it(\"INV-9: ResultAsync.err() is recognized by isResultAsync\", () => {\n    const ra = ResultAsync.err(\"fail\");\n    expect(isResultAsync(ra)).toBe(true);\n  });\n});\n"},"tests/constructors.test.ts":{"tests":[{"id":"449","name":"Constructors BEH-02-001: fromThrowable returns Ok when fn succeeds (zero-arg overload)"},{"id":"450","name":"Constructors BEH-02-001: fromThrowable returns Err when fn throws (zero-arg overload)"},{"id":"451","name":"Constructors BEH-02-001: fromThrowable passes thrown value to mapErr"},{"id":"452","name":"Constructors BEH-02-001: fromThrowable overload wraps function: returns (...args) => Result"},{"id":"453","name":"Constructors BEH-02-001: fromThrowable wrapped function returns Ok on success"},{"id":"454","name":"Constructors BEH-02-001: fromThrowable wrapped function returns Err on throw"},{"id":"455","name":"Constructors BEH-02-003: fromNullable returns Ok for non-null value"},{"id":"456","name":"Constructors BEH-02-003: fromNullable returns Err with onNull() result for null"},{"id":"457","name":"Constructors BEH-02-003: fromNullable returns Err with onNull() result for undefined"},{"id":"458","name":"Constructors BEH-02-004: fromPredicate returns Ok when predicate is true"},{"id":"459","name":"Constructors BEH-02-004: fromPredicate returns Err when predicate is false"},{"id":"460","name":"Constructors BEH-02-004: fromPredicate with type guard narrows the Ok type"},{"id":"461","name":"Constructors BEH-02-002: tryCatch returns Ok when fn succeeds (executes immediately)"},{"id":"462","name":"Constructors BEH-02-002: tryCatch returns Err when fn throws"},{"id":"463","name":"Constructors BEH-02-005: fromPromise wraps a resolving Promise into a ResultAsync with Ok"},{"id":"464","name":"Constructors BEH-02-005: fromPromise wraps a rejecting Promise into a ResultAsync with Err"},{"id":"465","name":"Constructors BEH-02-006: fromSafePromise wraps a non-rejecting Promise into a ResultAsync with Ok"},{"id":"466","name":"Constructors BEH-02-007: fromAsyncThrowable wraps async fn into a ResultAsync-returning fn (Ok on success)"},{"id":"467","name":"Constructors BEH-02-007: fromAsyncThrowable wraps async fn into a ResultAsync-returning fn (Err on throw)"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { fromThrowable } from \"../src/constructors/from-throwable.js\";\nimport { fromNullable } from \"../src/constructors/from-nullable.js\";\nimport { fromPredicate } from \"../src/constructors/from-predicate.js\";\nimport { tryCatch } from \"../src/constructors/try-catch.js\";\nimport { fromPromise, fromSafePromise, fromAsyncThrowable } from \"../src/constructors/from-promise.js\";\n\ndescribe(\"Constructors\", () => {\n  describe(\"BEH-02-001: fromThrowable\", () => {\n    // DoD 2 #5\n    it(\"returns Ok when fn succeeds (zero-arg overload)\", () => {\n      const result = fromThrowable(\n        () => JSON.parse('{\"a\":1}'),\n        () => \"parse error\"\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual({ a: 1 });\n    });\n\n    // DoD 2 #6\n    it(\"returns Err when fn throws (zero-arg overload)\", () => {\n      const result = fromThrowable(\n        () => JSON.parse(\"not json\"),\n        () => \"parse error\"\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"parse error\");\n    });\n\n    // DoD 2 #7\n    it(\"passes thrown value to mapErr\", () => {\n      const result = fromThrowable(\n        () => {\n          throw new Error(\"boom\");\n        },\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"boom\");\n    });\n\n    // DoD 2 #8\n    it(\"overload wraps function: returns (...args) => Result\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      expect(typeof safeParse).toBe(\"function\");\n    });\n\n    // DoD 2 #9\n    it(\"wrapped function returns Ok on success\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      const result = safeParse('{\"a\":1}');\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual({ a: 1 });\n    });\n\n    // DoD 2 #10\n    it(\"wrapped function returns Err on throw\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      const result = safeParse(\"not json\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"parse error\");\n    });\n  });\n\n  describe(\"BEH-02-003: fromNullable\", () => {\n    // DoD 2 #16\n    it(\"returns Ok for non-null value\", () => {\n      const result = fromNullable(42, () => \"was null\");\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    // DoD 2 #17\n    it(\"returns Err with onNull() result for null\", () => {\n      const result = fromNullable(null, () => \"was null\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"was null\");\n    });\n\n    // DoD 2 #18\n    it(\"returns Err with onNull() result for undefined\", () => {\n      const result = fromNullable(undefined, () => \"was null\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"was null\");\n    });\n  });\n\n  describe(\"BEH-02-004: fromPredicate\", () => {\n    // DoD 2 #19\n    it(\"returns Ok when predicate is true\", () => {\n      const result = fromPredicate(\n        5,\n        n => n > 3,\n        n => `${n} too small`\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(5);\n    });\n\n    // DoD 2 #20\n    it(\"returns Err when predicate is false\", () => {\n      const result = fromPredicate(\n        1,\n        n => n > 3,\n        n => `${n} too small`\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"1 too small\");\n    });\n\n    // DoD 2 #21\n    it(\"with type guard narrows the Ok type\", () => {\n      interface Admin {\n        role: \"admin\";\n        permissions: string[];\n      }\n      interface User {\n        role: string;\n      }\n      const user: User = { role: \"admin\" };\n      const result = fromPredicate(\n        user,\n        (u): u is Admin => u.role === \"admin\",\n        u => `${u.role} is not admin`\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value.role).toBe(\"admin\");\n      }\n    });\n  });\n\n  describe(\"BEH-02-002: tryCatch\", () => {\n    // DoD 2 #22\n    it(\"returns Ok when fn succeeds (executes immediately)\", () => {\n      const result = tryCatch(\n        () => 42,\n        () => \"error\"\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    // DoD 2 #23\n    it(\"returns Err when fn throws\", () => {\n      const result = tryCatch(\n        () => {\n          throw new Error(\"boom\");\n        },\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"boom\");\n    });\n  });\n\n  describe(\"BEH-02-005: fromPromise\", () => {\n    it(\"wraps a resolving Promise into a ResultAsync with Ok\", async () => {\n      const resultAsync = fromPromise(\n        Promise.resolve(42),\n        () => \"error\"\n      );\n      const result = await resultAsync;\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"wraps a rejecting Promise into a ResultAsync with Err\", async () => {\n      const resultAsync = fromPromise(\n        Promise.reject(new Error(\"boom\")),\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      const result = await resultAsync;\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"boom\");\n    });\n  });\n\n  describe(\"BEH-02-006: fromSafePromise\", () => {\n    it(\"wraps a non-rejecting Promise into a ResultAsync with Ok\", async () => {\n      const resultAsync = fromSafePromise(Promise.resolve(\"hello\"));\n      const result = await resultAsync;\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(\"hello\");\n    });\n  });\n\n  describe(\"BEH-02-007: fromAsyncThrowable\", () => {\n    it(\"wraps async fn into a ResultAsync-returning fn (Ok on success)\", async () => {\n      const safeFetch = fromAsyncThrowable(\n        async (x: number) => x * 2,\n        () => \"async error\"\n      );\n      expect(typeof safeFetch).toBe(\"function\");\n      const result = await safeFetch(21);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    it(\"wraps async fn into a ResultAsync-returning fn (Err on throw)\", async () => {\n      const safeFetch = fromAsyncThrowable(\n        async () => { throw new Error(\"network failure\"); },\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      const result = await safeFetch();\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"network failure\");\n    });\n  });\n});\n"},"tests/error-patterns.test.ts":{"tests":[{"id":"468","name":"Error Patterns Tagged error with _tag discriminant is created correctly"},{"id":"469","name":"Error Patterns BEH-08-001: createError('NotFound') returns factory producing { _tag: 'NotFound' }"},{"id":"470","name":"Error Patterns createError('NotFound') factory accepts and merges additional fields"},{"id":"471","name":"Error Patterns INV-7: createError factory produces frozen (immutable) objects"},{"id":"472","name":"Error Patterns assertNever throws with custom message when provided"},{"id":"473","name":"Error Patterns assertNever default message includes the value"},{"id":"474","name":"Error Patterns BEH-08-002: assertNever throws on non-exhaustive match"},{"id":"475","name":"Error Patterns Switch on error._tag handles all variants exhaustively"},{"id":"476","name":"Error Patterns Error with cause chain preserves inner error reference"},{"id":"477","name":"Error Patterns mapErr transforms error from infrastructure to domain type"},{"id":"478","name":"Error Patterns Error types compose via andThen union accumulation"},{"id":"479","name":"Error Patterns BEH-08-004: createError _tag supports discriminated union patterns for severity classification"},{"id":"480","name":"BEH-08-003: createErrorGroup create produces error with _namespace and _tag"},{"id":"481","name":"BEH-08-003: createErrorGroup created errors are frozen (INV-7)"},{"id":"482","name":"BEH-08-003: createErrorGroup .is() returns true for matching namespace"},{"id":"483","name":"BEH-08-003: createErrorGroup .is() returns false for non-matching namespace"},{"id":"484","name":"BEH-08-003: createErrorGroup .is() returns false for objects without _namespace"},{"id":"485","name":"BEH-08-003: createErrorGroup .is() returns false for null/undefined/non-objects"},{"id":"486","name":"BEH-08-003: createErrorGroup .isTag() returns true for matching namespace and tag"},{"id":"487","name":"BEH-08-003: createErrorGroup .isTag() returns false for matching namespace but wrong tag"},{"id":"488","name":"BEH-08-003: createErrorGroup .isTag() returns false for wrong namespace"},{"id":"489","name":"BEH-08-003: createErrorGroup two groups produce independent errors"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { createError } from \"../src/errors/create-error.js\";\nimport { createErrorGroup } from \"../src/errors/create-error-group.js\";\nimport { assertNever } from \"../src/errors/assert-never.js\";\n\ndescribe(\"Error Patterns\", () => {\n  // DoD 10 #1\n  it(\"Tagged error with _tag discriminant is created correctly\", () => {\n    const error = { _tag: \"NotFound\" as const, resource: \"User\", id: \"123\" };\n    expect(error._tag).toBe(\"NotFound\");\n    expect(error.resource).toBe(\"User\");\n    expect(error.id).toBe(\"123\");\n  });\n\n  // DoD 10 #2\n  it(\"BEH-08-001: createError('NotFound') returns factory producing { _tag: 'NotFound' }\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({});\n    expect(error._tag).toBe(\"NotFound\");\n  });\n\n  // DoD 10 #3\n  it(\"createError('NotFound') factory accepts and merges additional fields\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expect(error._tag).toBe(\"NotFound\");\n    expect(error.resource).toBe(\"User\");\n    expect(error.id).toBe(\"123\");\n  });\n\n  // --- Mutation gap: createError returns frozen object ---\n  it(\"INV-7: createError factory produces frozen (immutable) objects\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ id: \"123\" });\n    expect(Object.isFrozen(error)).toBe(true);\n  });\n\n  // --- Mutation gap: assertNever with custom message ---\n  it(\"assertNever throws with custom message when provided\", () => {\n    const badValue = \"unexpected\" as never;\n    expect(() => assertNever(badValue, \"custom message\")).toThrow(\"custom message\");\n  });\n\n  // --- Mutation gap: assertNever default message includes value ---\n  it(\"assertNever default message includes the value\", () => {\n    const badValue = \"oops\" as never;\n    expect(() => assertNever(badValue)).toThrow(\"Unexpected value\");\n  });\n\n  // DoD 10 #4\n  it(\"BEH-08-002: assertNever throws on non-exhaustive match\", () => {\n    type MyError = { _tag: \"A\" } | { _tag: \"B\" };\n\n    function handle(e: MyError): string {\n      switch (e._tag) {\n        case \"A\":\n          return \"handled A\";\n        case \"B\":\n          return \"handled B\";\n        default:\n          return assertNever(e);\n      }\n    }\n\n    expect(handle({ _tag: \"A\" })).toBe(\"handled A\");\n    expect(handle({ _tag: \"B\" })).toBe(\"handled B\");\n\n    // Force a bad value past TypeScript to test runtime behavior\n    const badError = { _tag: \"C\" } as unknown as MyError;\n    expect(() => handle(badError)).toThrow();\n  });\n\n  // DoD 10 #5\n  it(\"Switch on error._tag handles all variants exhaustively\", () => {\n    type AppError =\n      | { _tag: \"NotFound\"; id: string }\n      | { _tag: \"Validation\"; field: string }\n      | { _tag: \"Database\"; cause: string };\n\n    function toStatus(error: AppError): number {\n      switch (error._tag) {\n        case \"NotFound\":\n          return 404;\n        case \"Validation\":\n          return 422;\n        case \"Database\":\n          return 500;\n      }\n    }\n\n    expect(toStatus({ _tag: \"NotFound\", id: \"1\" })).toBe(404);\n    expect(toStatus({ _tag: \"Validation\", field: \"email\" })).toBe(422);\n    expect(toStatus({ _tag: \"Database\", cause: \"timeout\" })).toBe(500);\n  });\n\n  // DoD 10 #6\n  it(\"Error with cause chain preserves inner error reference\", () => {\n    const inner = { _tag: \"ConnectionFailed\" as const, host: \"db.example.com\" };\n    const outer = { _tag: \"InfraFailure\" as const, cause: inner };\n\n    expect(outer.cause._tag).toBe(\"ConnectionFailed\");\n    expect(outer.cause.host).toBe(\"db.example.com\");\n  });\n\n  // DoD 10 #7\n  it(\"mapErr transforms error from infrastructure to domain type\", () => {\n    type InfraError = { _tag: \"Timeout\"; ms: number };\n    type DomainError = { _tag: \"ServiceUnavailable\"; reason: string };\n\n    const infraResult: Result<"+"string, InfraError> = err({ _tag: \"Timeout\", ms: 5000 });\n    const domainResult = infraResult.mapErr(\n      (e): DomainError => ({\n        _tag: \"ServiceUnavailable\",\n        reason: `Timed out after ${e.ms}ms`,\n      })\n    );\n\n    expect(domainResult._tag).toBe(\"Err\");\n    if (domainResult.isErr()) {\n      expect(domainResult.error._tag).toBe(\"ServiceUnavailable\");\n      expect(domainResult.error.reason).toBe(\"Timed out after 5000ms\");\n    }\n  });\n\n  // DoD 10 #8\n  it(\"Error types compose via andThen union accumulation\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    type E3 = { _tag: \"E3\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(n: number): Result<"+"string, E2> {\n      return ok(String(n));\n    }\n    function step3(_s: string): Result<"+"boolean, E3> {\n      return err({ _tag: \"E3\" });\n    }\n\n    const result = step1().andThen(step2).andThen(step3);\n\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) {\n      expect(result.error._tag).toBe(\"E3\");\n    }\n  });\n\n  // BEH-08-004: Error severity classification convention for GxP\n  it(\"BEH-08-004: createError _tag supports discriminated union patterns for severity classification\", () => {\n    const Critical = createError(\"Critical\");\n    const Major = createError(\"Major\");\n    const Minor = createError(\"Minor\");\n\n    type SeverityError =\n      | ReturnType<"+"typeof Critical>\n      | ReturnType<"+"typeof Major>\n      | ReturnType<"+"typeof Minor>;\n\n    function classifySeverity(error: SeverityError): \"critical\" | \"major\" | \"minor\" {\n      switch (error._tag) {\n        case \"Critical\":\n          return \"critical\";\n        case \"Major\":\n          return \"major\";\n        case \"Minor\":\n          return \"minor\";\n        default:\n          return assertNever(error);\n      }\n    }\n\n    expect(classifySeverity(Critical({}))).toBe(\"critical\");\n    expect(classifySeverity(Major({}))).toBe(\"major\");\n    expect(classifySeverity(Minor({}))).toBe(\"minor\");\n\n    // Verify the _tag property is present and correct on each severity level\n    expect(Critical({})._tag).toBe(\"Critical\");\n    expect(Major({})._tag).toBe(\"Major\");\n    expect(Minor({})._tag).toBe(\"Minor\");\n  });\n});\n\ndescribe(\"BEH-08-003: createErrorGroup\", () => {\n  it(\"create produces error with _namespace and _tag\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ url: \"/api\", status: 404 });\n    expect(error._namespace).toBe(\"HttpError\");\n    expect(error._tag).toBe(\"NotFound\");\n    expect(error.url).toBe(\"/api\");\n    expect(error.status).toBe(404);\n  });\n\n  it(\"created errors are frozen (INV-7)\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ status: 404 });\n    expect(Object.isFrozen(error)).toBe(true);\n  });\n\n  it(\".is() returns true for matching namespace\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ status: 404 });\n    expect(Http.is(error)).toBe(true);\n  });\n\n  it(\".is() returns false for non-matching namespace\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const Db = createErrorGroup(\"DbError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ status: 404 });\n    expect(Db.is(error)).toBe(false);\n  });\n\n  it(\".is() returns false for objects without _namespace\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    expect(Http.is({ _tag: \"NotFound\" })).toBe(false);\n  });\n\n  it(\".is() returns false for null/undefined/non-objects\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    expect(Http.is(null)).toBe(false);\n    expect(Http.is(undefined)).toBe(false);\n    expect(Http.is(\"string\")).toBe(false);\n    expect(Http.is(42)).toBe(false);\n  });\n\n  it(\".isTag() returns true for matching namespace and tag\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ status: 404 });\n    expect(Http.isTag(\"NotFound\")(error)).toBe(true);\n  });\n\n  it(\".isTag() returns false for matching namespace but wrong tag\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const NotFound = Http.create(\"NotFound\");\n    const error = NotFound({ status: 404 });\n    expect(Http.isTag(\"Timeout\")(error)).toBe(false);\n  });\n\n  it(\".isTag() returns false for wrong namespace\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const Db = createErrorGroup(\"DbError\");\n    const ConnLost = Db.create(\"ConnectionLost\");\n    const error = ConnLost({ host: \"db.example.com\" });\n    expect(Http.isTag(\"ConnectionLost\")(error)).toBe(false);\n  });\n\n  it(\"two groups produce independent errors\", () => {\n    const Http = createErrorGroup(\"HttpError\");\n    const Db = createErrorGroup(\"DbError\");\n    const NotFound = Http.create(\"NotFound\");\n    const ConnLost = Db.create(\"ConnectionLost\");\n\n    const httpErr = NotFound({ url: \"/api\" });\n    const dbErr = ConnLost({ host: \"db.example.com\" });\n\n    expect(Http.is(httpErr)).toBe(true);\n    expect(Http.is(dbErr)).toBe(false);\n    expect(Db.is(dbErr)).toBe(true);\n    expect(Db.is(httpErr)).toBe(false);\n  });\n});\n"},"tests/unsafe.test.ts":{"tests":[{"id":"490","name":"[BEH-11-001] UnwrapError [INV-12] has .context with _tag and value"},{"id":"491","name":"[BEH-11-001] UnwrapError extends Error"},{"id":"492","name":"[BEH-11-002] unwrap unwrap(ok(42)) returns 42"},{"id":"493","name":"[BEH-11-002] unwrap unwrap(err('x')) throws UnwrapError"},{"id":"494","name":"[BEH-11-002] unwrap unwrap(err('x')) throws with context._tag === 'Err'"},{"id":"495","name":"[BEH-11-002] unwrap unwrap(err('x')) throws with message 'Called unwrap on Err'"},{"id":"496","name":"[BEH-11-003] unwrapErr unwrapErr(err('x')) returns 'x'"},{"id":"497","name":"[BEH-11-003] unwrapErr unwrapErr(ok(42)) throws UnwrapError"},{"id":"498","name":"[BEH-11-003] unwrapErr unwrapErr(ok(42)) throws with context._tag === 'Ok'"},{"id":"499","name":"[BEH-11-004] expect/expectErr throw UnwrapError err('x').expect('msg') throws UnwrapError"},{"id":"500","name":"[BEH-11-004] expect/expectErr throw UnwrapError err('x').expect('msg') includes error in context"},{"id":"501","name":"[BEH-11-004] expect/expectErr throw UnwrapError ok(42).expectErr('msg') throws UnwrapError"},{"id":"502","name":"[BEH-11-004] expect/expectErr throw UnwrapError ok(42).expectErr('msg') includes value in context"},{"id":"503","name":"[BEH-11-004] expect/expectErr throw UnwrapError expect/expectErr still extend Error"},{"id":"504","name":"[BEH-11-005] unsafe subpath exports exports UnwrapError, unwrap, and unwrapErr from unsafe/index"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { UnwrapError, unwrap, unwrapErr } from \"../src/unsafe/index.js\";\n\ndescribe(\"[BEH-11-001] UnwrapError\", () => {\n  it(\"[INV-12] has .context with _tag and value\", () => {\n    const e = new UnwrapError(\"msg\", { _tag: \"Err\", value: \"x\" });\n    expect(e.context._tag).toBe(\"Err\");\n    expect(e.context.value).toBe(\"x\");\n  });\n\n  it(\"extends Error\", () => {\n    const e = new UnwrapError(\"msg\", { _tag: \"Ok\", value: 42 });\n    expect(e).toBeInstanceOf(Error);\n    expect(e.message).toBe(\"msg\");\n    expect(e.name).toBe(\"UnwrapError\");\n  });\n});\n\ndescribe(\"[BEH-11-002] unwrap\", () => {\n  it(\"unwrap(ok(42)) returns 42\", () => {\n    expect(unwrap(ok(42))).toBe(42);\n  });\n\n  it(\"unwrap(err('x')) throws UnwrapError\", () => {\n    expect(() => unwrap(err(\"x\"))).toThrow(UnwrapError);\n  });\n\n  it(\"unwrap(err('x')) throws with context._tag === 'Err'\", () => {\n    try {\n      unwrap(err(\"x\"));\n    } catch (e) {\n      expect(e).toBeInstanceOf(UnwrapError);\n      expect((e as UnwrapError).context._tag).toBe(\"Err\");\n      expect((e as UnwrapError).context.value).toBe(\"x\");\n    }\n  });\n\n  it(\"unwrap(err('x')) throws with message 'Called unwrap on Err'\", () => {\n    expect(() => unwrap(err(\"x\"))).toThrow(\"Called unwrap on Err\");\n  });\n});\n\ndescribe(\"[BEH-11-003] unwrapErr\", () => {\n  it(\"unwrapErr(err('x')) returns 'x'\", () => {\n    expect(unwrapErr(err(\"x\"))).toBe(\"x\");\n  });\n\n  it(\"unwrapErr(ok(42)) throws UnwrapError\", () => {\n    expect(() => unwrapErr(ok(42))).toThrow(UnwrapError);\n  });\n\n  it(\"unwrapErr(ok(42)) throws with context._tag === 'Ok'\", () => {\n    try {\n      unwrapErr(ok(42));\n    } catch (e) {\n      expect(e).toBeInstanceOf(UnwrapError);\n      expect((e as UnwrapError).context._tag).toBe(\"Ok\");\n      expect((e as UnwrapError).context.value).toBe(42);\n    }\n  });\n});\n\ndescribe(\"[BEH-11-004] expect/expectErr throw UnwrapError\", () => {\n  it(\"err('x').expect('msg') throws UnwrapError\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(() => result.expect(\"msg\")).toThrow(UnwrapError);\n  });\n\n  it(\"err('x').expect('msg') includes error in context\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    try {\n      result.expect(\"msg\");\n    } catch (e) {\n      expect(e).toBeInstanceOf(UnwrapError);\n      expect((e as UnwrapError).context._tag).toBe(\"Err\");\n      expect((e as UnwrapError).context.value).toBe(\"x\");\n      expect((e as UnwrapError).message).toBe(\"msg\");\n    }\n  });\n\n  it(\"ok(42).expectErr('msg') throws UnwrapError\", () => {\n    expect(() => ok(42).expectErr(\"msg\")).toThrow(UnwrapError);\n  });\n\n  it(\"ok(42).expectErr('msg') includes value in context\", () => {\n    try {\n      ok(42).expectErr(\"msg\");\n    } catch (e) {\n      expect(e).toBeInstanceOf(UnwrapError);\n      expect((e as UnwrapError).context._tag).toBe(\"Ok\");\n      expect((e as UnwrapError).context.value).toBe(42);\n    }\n  });\n\n  it(\"expect/expectErr still extend Error\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(() => result.expect(\"msg\")).toThrow(Error);\n    expect(() => ok(42).expectErr(\"msg\")).toThrow(Error);\n  });\n});\n\ndescribe(\"[BEH-11-005] unsafe subpath exports\", () => {\n  it(\"exports UnwrapError, unwrap, and unwrapErr from unsafe/index\", () => {\n    expect(UnwrapError).toBeDefined();\n    expect(typeof UnwrapError).toBe(\"function\");\n    expect(unwrap).toBeDefined();\n    expect(typeof unwrap).toBe(\"function\");\n    expect(unwrapErr).toBeDefined();\n    expect(typeof unwrapErr).toBe(\"function\");\n  });\n});\n"},"tests/interop.test.ts":{"tests":[{"id":"505","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 ~standard.version is 1"},{"id":"506","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 ~standard.vendor is '@hex-di/result'"},{"id":"507","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 valid input returns { value }"},{"id":"508","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 invalid input returns { issues }"},{"id":"509","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 wrong type input returns { issues }"},{"id":"510","name":"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1 error is stringified via String()"},{"id":"511","name":"BEH-13-003: structuredClone compatibility — toJSON/fromJSON pattern ok(42) survives toJSON/fromJSON roundtrip"},{"id":"512","name":"BEH-13-003: structuredClone compatibility — toJSON/fromJSON pattern err(\"x\") survives toJSON/fromJSON roundtrip"},{"id":"513","name":"BEH-13-003: structuredClone compatibility — toJSON/fromJSON pattern toJSON output is JSON-serializable (structuredClone alternative)"},{"id":"514","name":"BEH-13-004: data retention — schema-versioned output for regulatory record-keeping ok toJSON includes _schemaVersion for long-term storage"},{"id":"515","name":"BEH-13-004: data retention — schema-versioned output for regulatory record-keeping err toJSON includes _schemaVersion for long-term storage"},{"id":"516","name":"BEH-13-004: data retention — schema-versioned output for regulatory record-keeping fromJSON restores schema-versioned payloads"},{"id":"517","name":"INV-13: subpath blocking via package.json exports prevents internal imports package.json exports \"./internal/*\" is null"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err, toSchema, fromJSON } from \"../src/index.js\";\nimport pkg from \"../package.json\";\n\n// BEH-13-002: toSchema\ndescribe(\"BEH-13-002: toSchema wraps Result-returning fn as StandardSchemaV1\", () => {\n  const positiveNumber = toSchema((input: unknown) => {\n    if (typeof input !== \"number\") return err(\"Expected number\");\n    if (input <"+"= 0) return err(\"Expected positive number\");\n    return ok(input);\n  });\n\n  it(\"~standard.version is 1\", () => {\n    expect(positiveNumber[\"~standard\"].version).toBe(1);\n  });\n\n  it(\"~standard.vendor is '@hex-di/result'\", () => {\n    expect(positiveNumber[\"~standard\"].vendor).toBe(\"@hex-di/result\");\n  });\n\n  it(\"valid input returns { value }\", () => {\n    const result = positiveNumber[\"~standard\"].validate(42);\n    expect(result).toEqual({ value: 42 });\n  });\n\n  it(\"invalid input returns { issues }\", () => {\n    const result = positiveNumber[\"~standard\"].validate(-1);\n    expect(result).toEqual({\n      issues: [{ message: \"Expected positive number\" }],\n    });\n  });\n\n  it(\"wrong type input returns { issues }\", () => {\n    const result = positiveNumber[\"~standard\"].validate(\"not a number\");\n    expect(result).toEqual({\n      issues: [{ message: \"Expected number\" }],\n    });\n  });\n\n  it(\"error is stringified via String()\", () => {\n    const schema = toSchema((input: unknown) => {\n      if (input === null) return err(null);\n      return ok(input);\n    });\n    const result = schema[\"~standard\"].validate(null);\n    expect(result).toEqual({\n      issues: [{ message: \"null\" }],\n    });\n  });\n});\n\n// BEH-13-003: structuredClone compatibility — toJSON/fromJSON roundtrip\ndescribe(\"BEH-13-003: structuredClone compatibility — toJSON/fromJSON pattern\", () => {\n  it(\"ok(42) survives toJSON/fromJSON roundtrip\", () => {\n    const original = ok(42);\n    const json = original.toJSON();\n    const restored = fromJSON(json);\n\n    expect(restored.isOk()).toBe(true);\n    expect(restored.isOk() && restored.value).toBe(42);\n  });\n\n  it('err(\"x\") survives toJSON/fromJSON roundtrip', () => {\n    const original = err(\"x\");\n    const json = original.toJSON();\n    const restored = fromJSON(json);\n\n    expect(restored.isErr()).toBe(true);\n    expect(restored.isErr() && restored.error).toBe(\"x\");\n  });\n\n  it(\"toJSON output is JSON-serializable (structuredClone alternative)\", () => {\n    const okJson = JSON.stringify(ok(42).toJSON());\n    const errJson = JSON.stringify(err(\"x\").toJSON());\n\n    const okRestored = fromJSON(JSON.parse(okJson));\n    const errRestored = fromJSON(JSON.parse(errJson));\n\n    expect(okRestored.isOk() && okRestored.value).toBe(42);\n    expect(errRestored.isErr() && errRestored.error).toBe(\"x\");\n  });\n});\n\n// BEH-13-004: Data retention — toJSON produces schema-versioned output for long-term storage\ndescribe(\"BEH-13-004: data retention — schema-versioned output for regulatory record-keeping\", () => {\n  it(\"ok toJSON includes _schemaVersion for long-term storage\", () => {\n    const json = ok(\"audit-data\").toJSON();\n\n    expect(json).toHaveProperty(\"_tag\", \"Ok\");\n    expect(json).toHaveProperty(\"_schemaVersion\", 1);\n    expect(json).toHaveProperty(\"value\", \"audit-data\");\n  });\n\n  it(\"err toJSON includes _schemaVersion for long-term storage\", () => {\n    const json = err(\"validation-failure\").toJSON();\n\n    expect(json).toHaveProperty(\"_tag\", \"Err\");\n    expect(json).toHaveProperty(\"_schemaVersion\", 1);\n    expect(json).toHaveProperty(\"error\", \"validation-failure\");\n  });\n\n  it(\"fromJSON restores schema-versioned payloads\", () => {\n    const stored = { _tag: \"Ok\" as const, _schemaVersion: 1, value: \"archived\" };\n    const restored = fromJSON(stored);\n\n    expect(restored.isOk() && restored.value).toBe(\"archived\");\n  });\n});\n\n// BEH-13-005: RxJS companion package (future scope, planned)\ndescribe.todo(\"BEH-13-005: RxJS companion
