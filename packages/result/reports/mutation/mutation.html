 package (future scope)\");\n\n// INV-13: Subpath blocking via package.json exports prevents internal imports\ndescribe(\"INV-13: subpath blocking via package.json exports prevents internal imports\", () => {\n  it('package.json exports \"./internal/*\" is null', () => {\n    expect(pkg.exports).toHaveProperty(\"./internal/*\", null);\n  });\n});\n"},"tests/gxp/generator-safety.test.ts":{"tests":[{"id":"518","name":"GxP: safeTry generator safety — INV-4 yielding Err short-circuits the generator"},{"id":"519","name":"GxP: safeTry generator safety — INV-4 yielding Ok continues the generator"},{"id":"520","name":"GxP: safeTry generator safety — INV-4 Err generator throws on manual continuation past yield"}],"source":"/**\n * GxP integrity: Generator safety (INV-4).\n *\n * Verifies that Err's generator throws on continuation past yield,\n * and that safeTry correctly short-circuits on Err.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ok, err, safeTry } from \"../../src/index.js\";\n\ndescribe(\"GxP: safeTry generator safety — INV-4\", () => {\n  it(\"yielding Err short-circuits the generator\", () => {\n    let reachedAfterYield = false;\n\n    const result = safeTry(function* () {\n      const _value: number = yield* err(\"short-circuit\");\n      reachedAfterYield = true;\n      return ok(_value);\n    });\n\n    expect(result._tag).toBe(\"Err\");\n    if (result._tag === \"Err\") {\n      expect(result.error).toBe(\"short-circuit\");\n    }\n    expect(reachedAfterYield).toBe(false);\n  });\n\n  it(\"yielding Ok continues the generator\", () => {\n    const result = safeTry(function* () {\n      const a: number = yield* ok(1);\n      const b: number = yield* ok(2);\n      return ok(a + b);\n    });\n\n    expect(result._tag).toBe(\"Ok\");\n    if (result._tag === \"Ok\") {\n      expect(result.value).toBe(3);\n    }\n  });\n\n  it(\"Err generator throws on manual continuation past yield\", () => {\n    const errResult = err(\"fail\");\n    const gen = errResult[Symbol.iterator]();\n\n    // First yield returns the Err itself\n    const first = gen.next();\n    expect(first.done).toBe(false);\n\n    // Continuing past the yield should throw\n    expect(() => gen.next()).toThrow(/unreachable/);\n  });\n});\n"},"tests/gxp/freeze.test.ts":{"tests":[{"id":"521","name":"GxP: Result immutability — INV-1 ok() values are frozen"},{"id":"522","name":"GxP: Result immutability — INV-1 err() values are frozen"},{"id":"523","name":"GxP: Result immutability — INV-1 ok() value property cannot be mutated"},{"id":"524","name":"GxP: Result immutability — INV-1 err() error property cannot be mutated"},{"id":"525","name":"GxP: Result immutability — INV-1 ok() _tag property cannot be mutated"},{"id":"526","name":"GxP: Result immutability — INV-1 err() _tag property cannot be mutated"},{"id":"527","name":"GxP: Result immutability — INV-1 cannot add new properties to ok()"},{"id":"528","name":"GxP: Result immutability — INV-1 cannot add new properties to err()"}],"source":"/**\n * GxP integrity: Result immutability (INV-1).\n *\n * Verifies that all Result instances created by ok() and err() are\n * Object.freeze()d and cannot be mutated after construction.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../../src/index.js\";\n\ndescribe(\"GxP: Result immutability — INV-1\", () => {\n  it(\"ok() values are frozen\", () => {\n    const result = ok(42);\n    expect(Object.isFrozen(result)).toBe(true);\n  });\n\n  it(\"err() values are frozen\", () => {\n    const result = err(\"fail\");\n    expect(Object.isFrozen(result)).toBe(true);\n  });\n\n  it(\"ok() value property cannot be mutated\", () => {\n    const result = ok({ mutable: true });\n    expect(() => {\n      (result as any).value = \"tampered\";\n    }).toThrow();\n  });\n\n  it(\"err() error property cannot be mutated\", () => {\n    const result = err(\"original\");\n    expect(() => {\n      (result as any).error = \"tampered\";\n    }).toThrow();\n  });\n\n  it(\"ok() _tag property cannot be mutated\", () => {\n    const result = ok(1);\n    expect(() => {\n      (result as any)._tag = \"Err\";\n    }).toThrow();\n  });\n\n  it(\"err() _tag property cannot be mutated\", () => {\n    const result = err(\"x\");\n    expect(() => {\n      (result as any)._tag = \"Ok\";\n    }).toThrow();\n  });\n\n  it(\"cannot add new properties to ok()\", () => {\n    const result = ok(1);\n    expect(() => {\n      (result as any).injected = true;\n    }).toThrow();\n  });\n\n  it(\"cannot add new properties to err()\", () => {\n    const result = err(\"x\");\n    expect(() => {\n      (result as any).injected = true;\n    }).toThrow();\n  });\n});\n"},"tests/gxp/error-suppression.test.ts":{"tests":[{"id":"529","name":"GxP: andTee error suppression — INV-5 ok().andTee(throwing fn) returns Ok unchanged"},{"id":"530","name":"GxP: andTee error suppression — INV-5 err().andTee(throwing fn) returns Err unchanged (fn not called)"},{"id":"531","name":"GxP: orTee error suppression — INV-5 err().orTee(throwing fn) returns Err unchanged"},{"id":"532","name":"GxP: orTee error suppression — INV-5 ok().orTee(throwing fn) returns Ok unchanged (fn not called)"},{"id":"533","name":"GxP: async tee error suppression — INV-5 ResultAsync andTee suppresses async errors"},{"id":"534","name":"GxP: async tee error suppression — INV-5 ResultAsync orTee suppresses async errors"}],"source":"/**\n * GxP integrity: Error suppression in tee operations (INV-5).\n *\n * Verifies that andTee() and orTee() catch and suppress all exceptions\n * thrown by the side-effect function, returning the original Result unchanged.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ok, err, ResultAsync } from \"../../src/index.js\";\n\ndescribe(\"GxP: andTee error suppression — INV-5\", () => {\n  it(\"ok().andTee(throwing fn) returns Ok unchanged\", () => {\n    const result = ok(42).andTee(() => {\n      throw new Error(\"side effect exploded\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result._tag === \"Ok\") {\n      expect(result.value).toBe(42);\n    }\n  });\n\n  it(\"err().andTee(throwing fn) returns Err unchanged (fn not called)\", () => {\n    const result = err(\"fail\").andTee(() => {\n      throw new Error(\"should not reach\");\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result._tag === \"Err\") {\n      expect(result.error).toBe(\"fail\");\n    }\n  });\n});\n\ndescribe(\"GxP: orTee error suppression — INV-5\", () => {\n  it(\"err().orTee(throwing fn) returns Err unchanged\", () => {\n    const result = err(\"fail\").orTee(() => {\n      throw new Error(\"side effect exploded\");\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result._tag === \"Err\") {\n      expect(result.error).toBe(\"fail\");\n    }\n  });\n\n  it(\"ok().orTee(throwing fn) returns Ok unchanged (fn not called)\", () => {\n    const result = ok(42).orTee(() => {\n      throw new Error(\"should not reach\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result._tag === \"Ok\") {\n      expect(result.value).toBe(42);\n    }\n  });\n});\n\ndescribe(\"GxP: async tee error suppression — INV-5\", () => {\n  it(\"ResultAsync andTee suppresses async errors\", async () => {\n    const result = await ResultAsync.ok(42).andTee(async () => {\n      throw new Error(\"async side effect exploded\");\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result._tag === \"Ok\") {\n      expect(result.value).toBe(42);\n    }\n  });\n\n  it(\"ResultAsync orTee suppresses async errors\", async () => {\n    const result = await ResultAsync.err(\"fail\").orTee(async () => {\n      throw new Error(\"async side effect exploded\");\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result._tag === \"Err\") {\n      expect(result.error).toBe(\"fail\");\n    }\n  });\n});\n"},"tests/gxp/error-freeze.test.ts":{"tests":[{"id":"535","name":"GxP: createError freeze — INV-7 errors created with createError are frozen"},{"id":"536","name":"GxP: createError freeze — INV-7 createError output _tag cannot be mutated"},{"id":"537","name":"GxP: createError freeze — INV-7 createError output fields cannot be mutated"},{"id":"538","name":"GxP: createErrorGroup freeze — INV-7 errors created with createErrorGroup are frozen"},{"id":"539","name":"GxP: createErrorGroup freeze — INV-7 createErrorGroup output _tag cannot be mutated"}],"source":"/**\n * GxP integrity: Error factory immutability (INV-7).\n *\n * Verifies that errors created by createError() and createErrorGroup()\n * are Object.freeze()d.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { createError, createErrorGroup } from \"../../src/index.js\";\n\ndescribe(\"GxP: createError freeze — INV-7\", () => {\n  it(\"errors created with createError are frozen\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expect(Object.isFrozen(error)).toBe(true);\n  });\n\n  it(\"createError output _tag cannot be mutated\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\" });\n    expect(() => {\n      (error as any)._tag = \"Tampered\";\n    }).toThrow();\n  });\n\n  it(\"createError output fields cannot be mutated\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\" });\n    expect(() => {\n      (error as any).resource = \"tampered\";\n    }).toThrow();\n  });\n});\n\ndescribe(\"GxP: createErrorGroup freeze — INV-7\", () => {\n  it(\"errors created with createErrorGroup are frozen\", () => {\n    const group = createErrorGroup(\"MyGroup\");\n    const NotFound = group.create(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expect(Object.isFrozen(error)).toBe(true);\n  });\n\n  it(\"createErrorGroup output _tag cannot be mutated\", () => {\n    const group = createErrorGroup(\"MyGroup\");\n    const NotFound = group.create(\"NotFound\");\n    const error = NotFound({ resource: \"User\" });\n    expect(() => {\n      (error as any)._tag = \"Tampered\";\n    }).toThrow();\n  });\n});\n"},"tests/gxp/delegation.test.ts":{"tests":[{"id":"540","name":"GxP: Standalone function delegation — INV-14 map(fn) produces same result as .map(fn)"},{"id":"541","name":"GxP: Standalone function delegation — INV-14 mapErr(fn) produces same result as .mapErr(fn)"},{"id":"542","name":"GxP: Standalone function delegation — INV-14 andThen(fn) produces same result as .andThen(fn)"},{"id":"543","name":"GxP: Standalone function delegation — INV-14 orElse(fn) produces same result as .orElse(fn)"},{"id":"544","name":"GxP: Standalone function delegation — INV-14 unwrapOr(fallback) produces same result as .unwrapOr(fallback)"}],"source":"/**\n * GxP integrity: Standalone function delegation (INV-14).\n *\n * Verifies that every standalone function in fn/* delegates to the\n * corresponding Result instance method and produces identical results.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../../src/index.js\";\nimport { map } from \"../../src/fn/map.js\";\nimport { mapErr } from \"../../src/fn/map-err.js\";\nimport { andThen } from \"../../src/fn/and-then.js\";\nimport { orElse } from \"../../src/fn/or-else.js\";\nimport { unwrapOr } from \"../../src/fn/unwrap-or.js\";\n\ndescribe(\"GxP: Standalone function delegation — INV-14\", () => {\n  it(\"map(fn) produces same result as .map(fn)\", () => {\n    const fn = (x: number) => x * 2;\n    const result = ok(21);\n    const viaMethod = result.map(fn);\n    const viaStandalone = map(fn)(result);\n    expect(viaMethod.match(v => v, () => null)).toBe(viaStandalone.match(v => v, () => null));\n  });\n\n  it(\"mapErr(fn) produces same result as .mapErr(fn)\", () => {\n    const fn = (e: string) => e.toUpperCase();\n    const result = err(\"fail\");\n    const viaMethod = result.mapErr(fn);\n    const viaStandalone = mapErr(fn)(result);\n    expect(viaMethod.match(() => null, e => e)).toBe(viaStandalone.match(() => null, e => e));\n  });\n\n  it(\"andThen(fn) produces same result as .andThen(fn)\", () => {\n    const fn = (x: number) => ok(x + 1);\n    const result = ok(1);\n    const viaMethod = result.andThen(fn);\n    const viaStandalone = andThen(fn)(result);\n    expect(viaMethod.match(v => v, () => null)).toBe(viaStandalone.match(v => v, () => null));\n  });\n\n  it(\"orElse(fn) produces same result as .orElse(fn)\", () => {\n    const fn = (e: string) => ok(e.length);\n    const result = err(\"fail\");\n    const viaMethod = result.orElse(fn);\n    const viaStandalone = orElse(fn)(result);\n    expect(viaMethod.match(v => v, () => null)).toBe(viaStandalone.match(v => v, () => null));\n  });\n\n  it(\"unwrapOr(fallback) produces same result as .unwrapOr(fallback)\", () => {\n    const okResult = ok(42);\n    const errResult = err(\"fail\");\n    expect(unwrapOr(0)(okResult)).toBe(okResult.unwrapOr(0));\n    expect(unwrapOr(0)(errResult)).toBe(errResult.unwrapOr(0));\n  });\n});\n"},"tests/gxp/option-freeze.test.ts":{"tests":[{"id":"545","name":"GxP: Option immutability — INV-10 some() values are frozen"},{"id":"546","name":"GxP: Option immutability — INV-10 none() values are frozen"},{"id":"547","name":"GxP: Option immutability — INV-10 some() value property cannot be mutated"},{"id":"548","name":"GxP: Option immutability — INV-10 some() _tag cannot be mutated"},{"id":"549","name":"GxP: Option immutability — INV-10 cannot add properties to some()"},{"id":"550","name":"GxP: Option immutability — INV-10 cannot add properties to none()"}],"source":"/**\n * GxP integrity: Option immutability (INV-10).\n *\n * Verifies that all Option instances created by some() and none() are\n * Object.freeze()d and cannot be mutated after construction.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { some, none } from \"../../src/index.js\";\n\ndescribe(\"GxP: Option immutability — INV-10\", () => {\n  it(\"some() values are frozen\", () => {\n    const opt = some(42);\n    expect(Object.isFrozen(opt)).toBe(true);\n  });\n\n  it(\"none() values are frozen\", () => {\n    const opt = none();\n    expect(Object.isFrozen(opt)).toBe(true);\n  });\n\n  it(\"some() value property cannot be mutated\", () => {\n    const opt = some(42);\n    expect(() => {\n      (opt as any).value = \"tampered\";\n    }).toThrow();\n  });\n\n  it(\"some() _tag cannot be mutated\", () => {\n    const opt = some(42);\n    expect(() => {\n      (opt as any)._tag = \"None\";\n    }).toThrow();\n  });\n\n  it(\"cannot add properties to some()\", () => {\n    const opt = some(42);\n    expect(() => {\n      (opt as any).injected = true;\n    }).toThrow();\n  });\n\n  it(\"cannot add properties to none()\", () => {\n    const opt = none();\n    expect(() => {\n      (opt as any).injected = true;\n    }).toThrow();\n  });\n});\n"},"tests/gxp/promise-safety.test.ts":{"tests":[{"id":"551","name":"GxP: ResultAsync never rejects — INV-2 ResultAsync.fromPromise catches rejected promises"},{"id":"552","name":"GxP: ResultAsync never rejects — INV-2 ResultAsync.ok never rejects"},{"id":"553","name":"GxP: ResultAsync never rejects — INV-2 ResultAsync.err never rejects"},{"id":"554","name":"GxP: ResultAsync never rejects — INV-2 ResultAsync.fromPromise with synchronous throw in mapper"}],"source":"/**\n * GxP integrity: ResultAsync promise safety (INV-2).\n *\n * Verifies that the internal promise of ResultAsync never rejects.\n * All rejections are caught and converted to Err.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ResultAsync } from \"../../src/index.js\";\n\ndescribe(\"GxP: ResultAsync never rejects — INV-2\", () => {\n  it(\"ResultAsync.fromPromise catches rejected promises\", async () => {\n    const result = ResultAsync.fromPromise(\n      Promise.reject(new Error(\"boom\")),\n      (e) => (e as Error).message,\n    );\n    const awaited = await result;\n    expect(awaited._tag).toBe(\"Err\");\n    if (awaited._tag === \"Err\") {\n      expect(awaited.error).toBe(\"boom\");\n    }\n  });\n\n  it(\"ResultAsync.ok never rejects\", async () => {\n    const result = ResultAsync.ok(42);\n    const awaited = await result;\n    expect(awaited._tag).toBe(\"Ok\");\n    if (awaited._tag === \"Ok\") {\n      expect(awaited.value).toBe(42);\n    }\n  });\n\n  it(\"ResultAsync.err never rejects\", async () => {\n    const result = ResultAsync.err(\"fail\");\n    const awaited = await result;\n    expect(awaited._tag).toBe(\"Err\");\n    if (awaited._tag === \"Err\") {\n      expect(awaited.error).toBe(\"fail\");\n    }\n  });\n\n  it(\"ResultAsync.fromPromise with synchronous throw in mapper\", async () => {\n    const result = ResultAsync.fromPromise(\n      Promise.reject(\"raw-rejection\"),\n      (e) => `caught: ${e}`,\n    );\n    const awaited = await result;\n    expect(awaited._tag).toBe(\"Err\");\n    if (awaited._tag === \"Err\") {\n      expect(awaited.error).toBe(\"caught: raw-rejection\");\n    }\n  });\n});\n"},"tests/gxp/async-tamper.test.ts":{"tests":[{"id":"555","name":"GxP: ResultAsync guard — INV-9 ResultAsync.ok() is recognized"},{"id":"556","name":"GxP: ResultAsync guard — INV-9 ResultAsync.err() is recognized"},{"id":"557","name":"GxP: ResultAsync guard — INV-9 ResultAsync.fromPromise() is recognized"},{"id":"558","name":"GxP: ResultAsync guard — INV-9 rejects a plain Promise (no match method)"},{"id":"559","name":"GxP: ResultAsync guard — INV-9 rejects null and undefined"},{"id":"560","name":"GxP: ResultAsync guard — INV-9 rejects a plain object without then"}],"source":"/**\n * GxP integrity: ResultAsync structural guard (INV-9).\n *\n * Verifies that isResultAsync() identifies genuine ResultAsync instances\n * and rejects non-ResultAsync values. Currently uses structural checking\n * (then + match methods). Brand-based checking is specified by INV-9 but\n * not yet implemented.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ResultAsync, isResultAsync } from \"../../src/index.js\";\n\ndescribe(\"GxP: ResultAsync guard — INV-9\", () => {\n  it(\"ResultAsync.ok() is recognized\", () => {\n    const ra = ResultAsync.ok(42);\n    expect(isResultAsync(ra)).toBe(true);\n  });\n\n  it(\"ResultAsync.err() is recognized\", () => {\n    const ra = ResultAsync.err(\"fail\");\n    expect(isResultAsync(ra)).toBe(true);\n  });\n\n  it(\"ResultAsync.fromPromise() is recognized\", () => {\n    const ra = ResultAsync.fromPromise(\n      Promise.resolve(42),\n      () => \"error\",\n    );\n    expect(isResultAsync(ra)).toBe(true);\n  });\n\n  it(\"rejects a plain Promise (no match method)\", () => {\n    expect(isResultAsync(Promise.resolve(42))).toBe(false);\n  });\n\n  it(\"rejects null and undefined\", () => {\n    expect(isResultAsync(null)).toBe(false);\n    expect(isResultAsync(undefined)).toBe(false);\n  });\n\n  it(\"rejects a plain object without then\", () => {\n    expect(isResultAsync({ match: () => {} })).toBe(false);\n  });\n});\n"},"tests/extraction.test.ts":{"tests":[{"id":"561","name":"Extraction BEH-04-001: match(onOk, onErr) pattern matching / fold extraction ok(42).match(v => v + 1, e => 0) returns 43"},{"id":"562","name":"Extraction BEH-04-001: match(onOk, onErr) pattern matching / fold extraction err('x').match(v => v + 1, e => 0) returns 0"},{"id":"563","name":"Extraction BEH-04-002: unwrapOr(default) extracts Ok value or returns default ok(42).unwrapOr(0) returns 42"},{"id":"564","name":"Extraction BEH-04-002: unwrapOr(default) extracts Ok value or returns default err('x').unwrapOr(0) returns 0"},{"id":"565","name":"Extraction BEH-04-003: unwrapOrElse(f) extracts Ok value or computes fallback from error ok(42).unwrapOrElse(e => 0) returns 42"},{"id":"566","name":"Extraction BEH-04-003: unwrapOrElse(f) extracts Ok value or computes fallback from error err('x').unwrapOrElse(e => e.length) returns 1"},{"id":"567","name":"Extraction BEH-04-004: expect(msg) assertive Ok extraction, throws UnwrapError on Err ok(42).expect('should not throw') returns 42"},{"id":"568","name":"Extraction BEH-04-004: expect(msg) assertive Ok extraction, throws UnwrapError on Err err('x').expect('oops') throws UnwrapError with message 'oops'"},{"id":"569","name":"Extraction BEH-04-005: expectErr(msg) assertive Err extraction, throws UnwrapError on Ok err('x').expectErr('should not throw') returns 'x'"},{"id":"570","name":"Extraction BEH-04-005: expectErr(msg) assertive Err extraction, throws UnwrapError on Ok ok(42).expectErr('oops') throws UnwrapError with message 'oops'"},{"id":"571","name":"Extraction BEH-04-006: toNullable() returns value for Ok, null for Err ok(42).toNullable() returns 42"},{"id":"572","name":"Extraction BEH-04-006: toNullable() returns value for Ok, null for Err err('x').toNullable() returns null"},{"id":"573","name":"Extraction BEH-04-007: toUndefined() returns value for Ok, undefined for Err ok(42).toUndefined() returns 42"},{"id":"574","name":"Extraction BEH-04-007: toUndefined() returns value for Ok, undefined for Err err('x').toUndefined() returns undefined"},{"id":"575","name":"Extraction BEH-04-008: intoTuple() Go-style [error, value] tuple extraction ok(42).intoTuple() returns [null, 42]"},{"id":"576","name":"Extraction BEH-04-008: intoTuple() Go-style [error, value] tuple extraction err('x').intoTuple() returns ['x', null]"},{"id":"577","name":"Extraction BEH-04-009: merge() extracts contained value regardless of variant ok(42).merge() returns 42"},{"id":"578","name":"Extraction BEH-04-009: merge() extracts contained value regardless of variant err('x').merge() returns 'x'"},{"id":"579","name":"Extraction ok(42).toJSON() returns { _tag: 'Ok', _schemaVersion: 1, value: 42 }"},{"id":"580","name":"Extraction err('x').toJSON() returns { _tag: 'Err', _schemaVersion: 1, error: 'x' }"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { UnwrapError } from \"../src/unsafe/unwrap-error.js\";\n\ndescribe(\"Extraction\", () => {\n  describe(\"BEH-04-001: match(onOk, onErr) pattern matching / fold extraction\", () => {\n    // DoD 6 #1\n    it(\"ok(42).match(v => v + 1, e => 0) returns 43\", () => {\n      const result = ok(42).match(\n        v => v + 1,\n        () => 0\n      );\n      expect(result).toBe(43);\n    });\n\n    // DoD 6 #2\n    it(\"err('x').match(v => v + 1, e => 0) returns 0\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      const matched = result.match(\n        v => v + 1,\n        () => 0\n      );\n      expect(matched).toBe(0);\n    });\n  });\n\n  describe(\"BEH-04-002: unwrapOr(default) extracts Ok value or returns default\", () => {\n    // DoD 6 #3\n    it(\"ok(42).unwrapOr(0) returns 42\", () => {\n      expect(ok(42).unwrapOr(0)).toBe(42);\n    });\n\n    // DoD 6 #4\n    it(\"err('x').unwrapOr(0) returns 0\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      expect(result.unwrapOr(0)).toBe(0);\n    });\n  });\n\n  describe(\"BEH-04-003: unwrapOrElse(f) extracts Ok value or computes fallback from error\", () => {\n    // DoD 6 #5\n    it(\"ok(42).unwrapOrElse(e => 0) returns 42\", () => {\n      expect(ok(42).unwrapOrElse(() => 0)).toBe(42);\n    });\n\n    // DoD 6 #6\n    it(\"err('x').unwrapOrElse(e => e.length) returns 1\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      expect(result.unwrapOrElse(e => e.length)).toBe(1);\n    });\n  });\n\n  describe(\"BEH-04-004: expect(msg) assertive Ok extraction, throws UnwrapError on Err\", () => {\n    // DoD 6 #15\n    it(\"ok(42).expect('should not throw') returns 42\", () => {\n      expect(ok(42).expect(\"should not throw\")).toBe(42);\n    });\n\n    // DoD 6 #16\n    it(\"err('x').expect('oops') throws UnwrapError with message 'oops'\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      expect(() => result.expect(\"oops\")).toThrow(UnwrapError);\n      expect(() => result.expect(\"oops\")).toThrow(\"oops\");\n    });\n  });\n\n  describe(\"BEH-04-005: expectErr(msg) assertive Err extraction, throws UnwrapError on Ok\", () => {\n    // DoD 6 #17\n    it(\"err('x').expectErr('should not throw') returns 'x'\", () => {\n      expect(err(\"x\").expectErr(\"should not throw\")).toBe(\"x\");\n    });\n\n    // DoD 6 #18\n    it(\"ok(42).expectErr('oops') throws UnwrapError with message 'oops'\", () => {\n      expect(() => ok(42).expectErr(\"oops\")).toThrow(UnwrapError);\n      expect(() => ok(42).expectErr(\"oops\")).toThrow(\"oops\");\n    });\n  });\n\n  describe(\"BEH-04-006: toNullable() returns value for Ok, null for Err\", () => {\n    // DoD 6 #7\n    it(\"ok(42).toNullable() returns 42\", () => {\n      expect(ok(42).toNullable()).toBe(42);\n    });\n\n    // DoD 6 #8\n    it(\"err('x').toNullable() returns null\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      expect(result.toNullable()).toBeNull();\n    });\n  });\n\n  describe(\"BEH-04-007: toUndefined() returns value for Ok, undefined for Err\", () => {\n    // DoD 6 #9\n    it(\"ok(42).toUndefined() returns 42\", () => {\n      expect(ok(42).toUndefined()).toBe(42);\n    });\n\n    // DoD 6 #10\n    it(\"err('x').toUndefined() returns undefined\", () => {\n      const result: Result<"+"number, string> = err(\"x\");\n      expect(result.toUndefined()).toBeUndefined();\n    });\n  });\n\n  describe(\"BEH-04-008: intoTuple() Go-style [error, value] tuple extraction\", () => {\n    // DoD 6 #11\n    it(\"ok(42).intoTuple() returns [null, 42]\", () => {\n      expect(ok(42).intoTuple()).toEqual([null, 42]);\n    });\n\n    // DoD 6 #12\n    it(\"err('x').intoTuple() returns ['x', null]\", () => {\n      expect(err(\"x\").intoTuple()).toEqual([\"x\", null]);\n    });\n  });\n\n  describe(\"BEH-04-009: merge() extracts contained value regardless of variant\", () => {\n    // DoD 6 #13\n    it(\"ok(42).merge() returns 42\", () => {\n      expect(ok(42).merge()).toBe(42);\n    });\n\n    // DoD 6 #14\n    it(\"err('x').merge() returns 'x'\", () => {\n      expect(err(\"x\").merge()).toBe(\"x\");\n    });\n  });\n\n  // DoD 6 #23\n  it(\"ok(42).toJSON() returns { _tag: 'Ok', _schemaVersion: 1, value: 42 }\", () => {\n    expect(ok(42).toJSON()).toEqual({ _tag: \"Ok\", _schemaVersion: 1, value: 42 });\n  });\n\n  // DoD 6 #24\n  it(\"err('x').toJSON() returns { _tag: 'Err', _schemaVersion: 1, error: 'x' }\", () => {\n    expect(err(\"x\").toJSON()).toEqual({ _tag: \"Err\", _schemaVersion: 1, error: \"x\" });\n  });\n});\n"},"tests/do-notation.test.ts":{"tests":[{"id":"581","name":"Do Notation Result.Do (BEH-12-001) [BEH-12-001] Do is ok({})"},{"id":"582","name":"Do Notation bind (BEH-12-002) [BEH-12-002] adds a named Ok value to the context"},{"id":"583","name":"Do Notation bind (BEH-12-002) [BEH-12-002] short-circuits on Err"},{"id":"584","name":"Do Notation bind (BEH-12-002) [BEH-12-002] chains multiple binds accumulating context"},{"id":"585","name":"Do Notation bind (BEH-12-002) [BEH-12-002] second bind short-circuits preserving first Err"},{"id":"586","name":"Do Notation let_ (BEH-12-003) [BEH-12-003] adds a non-Result computed value to the context"},{"id":"587","name":"Do Notation let_ (BEH-12-003) [BEH-12-003] never short-circuits (always succeeds)"},{"id":"588","name":"Do Notation let_ (BEH-12-003) [BEH-12-003] receives context from previous binds"},{"id":"589","name":"Do Notation Type Accumulation (BEH-12-004) [BEH-12-004] context grows with each bind/let_ call"},{"id":"590","name":"Do Notation Usage with method chaining (BEH-12-006) [BEH-12-006] works with .map() at the end"},{"id":"591","name":"Do Notation Usage with pipe() (BEH-12-005) [BEH-12-005] Do notation works with pipe and andThen"},{"id":"592","name":"Do Notation ResultAsync.Do (BEH-12-007) [BEH-12-007] works with ResultAsync.andThen and bind"},{"id":"593","name":"Do Notation Relationship between Do notation and safeTry (BEH-12-008) [BEH-12-008] Do and safeTry achieve the same result for equivalent logic"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err, bind, let_, safeTry } from \"../src/index.js\";\nimport { pipe } from \"../src/fn/pipe.js\";\nimport { andThen } from \"../src/fn/and-then.js\";\nimport { map } from \"../src/fn/map.js\";\nimport type { Result } from \"../src/index.js\";\n\n// BEH-12-001\ndescribe(\"Do Notation\", () => {\n  describe(\"Result.Do (BEH-12-001)\", () => {\n    it(\"[BEH-12-001] Do is ok({})\", () => {\n      const Do = ok({});\n      expect(Do._tag).toBe(\"Ok\");\n      if (Do.isOk()) {\n        expect(Do.value).toEqual({});\n      }\n    });\n  });\n\n  // BEH-12-002\n  describe(\"bind (BEH-12-002)\", () => {\n    it(\"[BEH-12-002] adds a named Ok value to the context\", () => {\n      const result = ok({})\n        .andThen(bind(\"a\", () => ok(42)));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toEqual({ a: 42 });\n      }\n    });\n\n    it(\"[BEH-12-002] short-circuits on Err\", () => {\n      const result = ok({})\n        .andThen(bind(\"a\", () => err(\"fail\") as Result<"+"number, string>));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) {\n        expect(result.error).toBe(\"fail\");\n      }\n    });\n\n    it(\"[BEH-12-002] chains multiple binds accumulating context\", () => {\n      const result = ok({})\n        .andThen(bind(\"x\", () => ok(1)))\n        .andThen(bind(\"y\", (ctx) => ok(ctx.x + 10)));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toEqual({ x: 1, y: 11 });\n      }\n    });\n\n    it(\"[BEH-12-002] second bind short-circuits preserving first Err\", () => {\n      const result = ok({})\n        .andThen(bind(\"x\", () => ok(1)))\n        .andThen(bind(\"y\", () => err(\"boom\") as Result<"+"number, string>));\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) {\n        expect(result.error).toBe(\"boom\");\n      }\n    });\n  });\n\n  // BEH-12-003\n  describe(\"let_ (BEH-12-003)\", () => {\n    it(\"[BEH-12-003] adds a non-Result computed value to the context\", () => {\n      const result = ok({})\n        .andThen(let_(\"greeting\", () => \"hello\"));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toEqual({ greeting: \"hello\" });\n      }\n    });\n\n    it(\"[BEH-12-003] never short-circuits (always succeeds)\", () => {\n      const result = ok({})\n        .andThen(let_(\"val\", () => 42));\n      expect(result._tag).toBe(\"Ok\");\n    });\n\n    it(\"[BEH-12-003] receives context from previous binds\", () => {\n      const result = ok({})\n        .andThen(bind(\"x\", () => ok(10)))\n        .andThen(let_(\"doubled\", (ctx) => ctx.x * 2));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toEqual({ x: 10, doubled: 20 });\n      }\n    });\n  });\n\n  // BEH-12-004\n  describe(\"Type Accumulation (BEH-12-004)\", () => {\n    it(\"[BEH-12-004] context grows with each bind/let_ call\", () => {\n      const result = ok({})\n        .andThen(bind(\"name\", () => ok(\"Alice\")))\n        .andThen(bind(\"age\", () => ok(30)))\n        .andThen(let_(\"greeting\", (ctx) => `Hi ${ctx.name}, you are ${ctx.age}`));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value.name).toBe(\"Alice\");\n        expect(result.value.age).toBe(30);\n        expect(result.value.greeting).toBe(\"Hi Alice, you are 30\");\n      }\n    });\n  });\n\n  // BEH-12-006\n  describe(\"Usage with method chaining (BEH-12-006)\", () => {\n    it(\"[BEH-12-006] works with .map() at the end\", () => {\n      const result = ok({})\n        .andThen(bind(\"x\", () => ok(5)))\n        .andThen(bind(\"y\", () => ok(3)))\n        .map(({ x, y }) => x + y);\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toBe(8);\n      }\n    });\n  });\n\n  // BEH-12-005\n  describe(\"Usage with pipe() (BEH-12-005)\", () => {\n    it(\"[BEH-12-005] Do notation works with pipe and andThen\", () => {\n      const result = pipe(\n        ok({}),\n        andThen(bind(\"x\", () => ok(10))),\n        andThen(bind(\"y\", (ctx: { x: number }) => ok(ctx.x + 5))),\n        map(({ x, y }: { x: number; y: number }) => x + y),\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toBe(25);\n      }\n    });\n  });\n\n  // BEH-12-007\n  describe(\"ResultAsync.Do (BEH-12-007)\", () => {\n    it(\"[BEH-12-007] works with ResultAsync.andThen and bind\", async () => {\n      const { ResultAsync } = await import(\"../src/index.js\");\n      const result = await ResultAsync.ok({})\n        .andThen(bind(\"a\", () => ok(1)))\n        .andThen(bind(\"b\", (ctx: { a: number }) => ok(ctx.a + 1)));\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value).toEqual({ a: 1, b: 2 });\n      }\n    });\n  });\n\n  // BEH-12-008\n  describe(\"Relationship between Do notation and safeTry (BEH-12-008)\", () => {\n    it(\"[BEH-12-008] Do and safeTry achieve the same result for equivalent logic\", () => {\n      // Do notation approach\n      const doResult = ok({})\n        .andThen(bind(\"x\", () => ok(10)))\n        .andThen(bind(\"y\", (ctx) => ok(ctx.x * 2)))\n        .map(({ x, y }) => x + y);\n\n      // safeTry generator approach\n      const safeTryResult = safeTry(function* () {\n        const x = yield* ok(10);\n        const y = yield* ok(x * 2);\n        return ok(x + y);\n      });\n\n      expect(doResult._tag).toBe(\"Ok\");\n      expect(safeTryResult._tag).toBe(\"Ok\");\n      if (doResult.isOk() && safeTryResult.isOk()) {\n        expect(doResult.value).toBe(safeTryResult.value);\n        expect(doResult.value).toBe(30);\n      }\n    });\n  });\n});\n"},"tests/gxp/tamper-evidence.test.ts":{"tests":[{"id":"594","name":"GxP: RESULT_BRAND — INV-3 ok() values carry the RESULT_BRAND symbol"},{"id":"595","name":"GxP: RESULT_BRAND — INV-3 err() values carry the RESULT_BRAND symbol"},{"id":"596","name":"GxP: RESULT_BRAND — INV-3 RESULT_BRAND is a unique symbol"},{"id":"597","name":"GxP: Brand-based isResult — INV-3 rejects structurally similar objects without brand"},{"id":"598","name":"GxP: Brand-based isResult — INV-3 rejects structurally similar Err objects without brand"},{"id":"599","name":"GxP: Brand-based isResult — INV-3 accepts genuine ok() results"},{"id":"600","name":"GxP: Brand-based isResult — INV-3 accepts genuine err() results"},{"id":"601","name":"GxP: Brand-based isResult — INV-3 rejects objects with a manually set RESULT_BRAND-like symbol"}],"source":"/**\n * GxP integrity: Result brand tamper evidence (INV-3).\n *\n * Verifies that RESULT_BRAND prevents forgery and that isResult()\n * rejects structurally similar objects without the genuine brand symbol.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { ok, err, isResult, RESULT_BRAND } from \"../../src/index.js\";\n\ndescribe(\"GxP: RESULT_BRAND — INV-3\", () => {\n  it(\"ok() values carry the RESULT_BRAND symbol\", () => {\n    const result = ok(42);\n    expect(RESULT_BRAND in result).toBe(true);\n    expect(result[RESULT_BRAND]).toBe(true);\n  });\n\n  it(\"err() values carry the RESULT_BRAND symbol\", () => {\n    const result = err(\"fail\");\n    expect(RESULT_BRAND in result).toBe(true);\n    expect(result[RESULT_BRAND]).toBe(true);\n  });\n\n  it(\"RESULT_BRAND is a unique symbol\", () => {\n    expect(typeof RESULT_BRAND).toBe(\"symbol\");\n  });\n});\n\ndescribe(\"GxP: Brand-based isResult — INV-3\", () => {\n  it(\"rejects structurally similar objects without brand\", () => {\n    const fake = { _tag: \"Ok\" as const, value: 42 };\n    expect(isResult(fake)).toBe(false);\n  });\n\n  it(\"rejects structurally similar Err objects without brand\", () => {\n    const fake = { _tag: \"Err\" as const, error: \"fail\" };\n    expect(isResult(fake)).toBe(false);\n  });\n\n  it(\"accepts genuine ok() results\", () => {\n    expect(isResult(ok(1))).toBe(true);\n  });\n\n  it(\"accepts genuine err() results\", () => {\n    expect(isResult(err(\"x\"))).toBe(true);\n  });\n\n  it(\"rejects objects with a manually set RESULT_BRAND-like symbol\", () => {\n    const fakeSymbol = Symbol(\"Result\");\n    const fake = { _tag: \"Ok\", value: 1, [fakeSymbol]: true };\n    expect(isResult(fake)).toBe(false);\n  });\n});\n"},"tests/gxp/option-tamper.test.ts":{"tests":[{"id":"602","name":"GxP: Brand-based isOption — INV-11 rejects structurally similar objects without brand"},{"id":"603","name":"GxP: Brand-based isOption — INV-11 accepts genuine some()"},{"id":"604","name":"GxP: Brand-based isOption — INV-11 accepts genuine none()"},{"id":"605","name":"GxP: Brand-based isOption — INV-11 rejects objects with a manually set OPTION_BRAND-like symbol"},{"id":"606","name":"GxP: Brand-based isOption — INV-11 OPTION_BRAND is a unique symbol"}],"source":"/**\n * GxP integrity: Option brand tamper evidence (INV-11).\n *\n * Verifies that OPTION_BRAND prevents forgery and that isOption()\n * rejects structurally similar objects without the genuine brand symbol.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { some, none, isOption, OPTION_BRAND } from \"../../src/index.js\";\n\ndescribe(\"GxP: Brand-based isOption — INV-11\", () => {\n  it(\"rejects structurally similar objects without brand\", () => {\n    const fake = { _tag: \"Some\" as const, value: 42 };\n    expect(isOption(fake)).toBe(false);\n  });\n\n  it(\"accepts genuine some()\", () => {\n    expect(isOption(some(1))).toBe(true);\n  });\n\n  it(\"accepts genuine none()\", () => {\n    expect(isOption(none())).toBe(true);\n  });\n\n  it(\"rejects objects with a manually set OPTION_BRAND-like symbol\", () => {\n    const fakeSymbol = Symbol(\"Option\");\n    const fake = { _tag: \"Some\", value: 1, [fakeSymbol]: true };\n    expect(isOption(fake)).toBe(false);\n  });\n\n  it(\"OPTION_BRAND is a unique symbol\", () => {\n    expect(typeof OPTION_BRAND).toBe(\"symbol\");\n  });\n});\n"},"tests/serialization.test.ts":{"tests":[{"id":"607","name":"BEH-04-010: Serialization ok(42).toJSON() returns { _tag: 'Ok', _schemaVersion: 1, value: 42 }"},{"id":"608","name":"BEH-04-010: Serialization err('fail').toJSON() returns { _tag: 'Err', _schemaVersion: 1, error: 'fail' }"},{"id":"609","name":"BEH-04-010: Serialization toJSON _schemaVersion is exactly 1"},{"id":"610","name":"BEH-04-010: Serialization JSON.stringify integration with Ok"},{"id":"611","name":"BEH-04-010: Serialization JSON.stringify integration with Err"},{"id":"612","name":"BEH-04-010: Serialization toJSON round-trip preserves Ok structure"},{"id":"613","name":"BEH-04-010: Serialization toJSON round-trip preserves Err structure"},{"id":"614","name":"BEH-04-011 BEH-13-001: fromJSON fromJSON with Ok tag returns branded Result"},{"id":"615","name":"BEH-04-011 BEH-13-001: fromJSON fromJSON with Err tag returns branded Result"},{"id":"616","name":"BEH-04-011 BEH-13-001: fromJSON fromJSON with invalid _tag throws TypeError"},{"id":"617","name":"BEH-04-011 BEH-13-001: fromJSON fromJSON accepts legacy format (no _schemaVersion)"},{"id":"618","name":"BEH-04-011 BEH-13-001: fromJSON fromJSON returns frozen Result"},{"id":"619","name":"BEH-04-011 BEH-13-001: fromJSON round-trip: fromJSON(ok(v).toJSON()) produces branded Result"},{"id":"620","name":"BEH-04-011 BEH-13-001: fromJSON round-trip: fromJSON(err(e).toJSON()) produces branded Result"},{"id":"621","name":"BEH-13-006: Option serialization interop toJSON/fromOptionJSON round-trip preserves Some"},{"id":"622","name":"BEH-13-006: Option serialization interop toJSON/fromOptionJSON round-trip preserves None"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err, fromJSON, isResult, some, none, fromOptionJSON, isOption } from \"../src/index.js\";\n\ndescribe(\"BEH-04-010: Serialization\", () => {\n  it(\"ok(42).toJSON() returns { _tag: 'Ok', _schemaVersion: 1, value: 42 }\", () => {\n    expect(ok(42).toJSON()).toEqual({ _tag: \"Ok\", _schemaVersion: 1, value: 42 });\n  });\n\n  it(\"err('fail').toJSON() returns { _tag: 'Err', _schemaVersion: 1, error: 'fail' }\", () => {\n    expect(err(\"fail\").toJSON()).toEqual({ _tag: \"Err\", _schemaVersion: 1, error: \"fail\" });\n  });\n\n  it(\"toJSON _schemaVersion is exactly 1\", () => {\n    expect(ok(42).toJSON()._schemaVersion).toBe(1);\n    expect(err(\"x\").toJSON()._schemaVersion).toBe(1);\n  });\n\n  it(\"JSON.stringify integration with Ok\", () => {\n    const result = ok({ name: \"Alice\", age: 30 });\n    const json = JSON.stringify(result);\n    const parsed = JSON.parse(json);\n    expect(parsed._tag).toBe(\"Ok\");\n    expect(parsed._schemaVersion).toBe(1);\n    expect(parsed.value).toEqual({ name: \"Alice\", age: 30 });\n  });\n\n  it(\"JSON.stringify integration with Err\", () => {\n    const result = err({ _tag: \"NotFound\", id: \"123\" });\n    const json = JSON.stringify(result);\n    const parsed = JSON.parse(json);\n    expect(parsed._tag).toBe(\"Err\");\n    expect(parsed._schemaVersion).toBe(1);\n    expect(parsed.error).toEqual({ _tag: \"NotFound\", id: \"123\" });\n  });\n\n  it(\"toJSON round-trip preserves Ok structure\", () => {\n    const original = ok([1, 2, 3]);\n    const serialized = original.toJSON();\n    expect(serialized._tag).toBe(\"Ok\");\n    expect(serialized._schemaVersion).toBe(1);\n    expect(serialized.value).toEqual([1, 2, 3]);\n  });\n\n  it(\"toJSON round-trip preserves Err structure\", () => {\n    const original = err({ code: 404, message: \"not found\" });\n    const serialized = original.toJSON();\n    expect(serialized._tag).toBe(\"Err\");\n    expect(serialized._schemaVersion).toBe(1);\n    expect(serialized.error).toEqual({ code: 404, message: \"not found\" });\n  });\n});\n\ndescribe(\"BEH-04-011 BEH-13-001: fromJSON\", () => {\n  it(\"fromJSON with Ok tag returns branded Result\", () => {\n    const restored = fromJSON({ _tag: \"Ok\", _schemaVersion: 1, value: 42 });\n    expect(isResult(restored)).toBe(true);\n    expect(restored.isOk()).toBe(true);\n    if (restored.isOk()) expect(restored.value).toBe(42);\n  });\n\n  it(\"fromJSON with Err tag returns branded Result\", () => {\n    const restored = fromJSON({ _tag: \"Err\", _schemaVersion: 1, error: \"fail\" });\n    expect(isResult(restored)).toBe(true);\n    expect(restored.isErr()).toBe(true);\n    if (restored.isErr()) expect(restored.error).toBe(\"fail\");\n  });\n\n  it(\"fromJSON with invalid _tag throws TypeError\", () => {\n    expect(() =>\n      fromJSON({ _tag: \"Invalid\" } as never)\n    ).toThrow(TypeError);\n    expect(() =>\n      fromJSON({ _tag: \"Invalid\" } as never)\n    ).toThrow(\"Invalid Result JSON: expected _tag to be 'Ok' or 'Err'\");\n  });\n\n  it(\"fromJSON accepts legacy format (no _schemaVersion)\", () => {\n    const restored = fromJSON({ _tag: \"Ok\", value: 42 });\n    expect(isResult(restored)).toBe(true);\n    expect(restored.isOk()).toBe(true);\n    if (restored.isOk()) expect(restored.value).toBe(42);\n  });\n\n  it(\"fromJSON returns frozen Result\", () => {\n    const restored = fromJSON({ _tag: \"Ok\", value: 42 });\n    expect(Object.isFrozen(restored)).toBe(true);\n  });\n\n  it(\"round-trip: fromJSON(ok(v).toJSON()) produces branded Result\", () => {\n    const original = ok(42);\n    const restored = fromJSON(original.toJSON());\n    expect(isResult(restored)).toBe(true);\n    expect(restored.isOk()).toBe(true);\n    if (restored.isOk()) expect(restored.value).toBe(42);\n  });\n\n  it(\"round-trip: fromJSON(err(e).toJSON()) produces branded Result\", () => {\n    const original = err(\"fail\");\n    const restored = fromJSON(original.toJSON());\n    expect(isResult(restored)).toBe(true);\n    expect(restored.isErr()).toBe(true);\n    if (restored.isErr()) expect(restored.error).toBe(\"fail\");\n  });\n});\n\ndescribe(\"BEH-13-006: Option serialization interop\", () => {\n  it(\"toJSON/fromOptionJSON round-trip preserves Some\", () => {\n    const original = some(42);\n    const json = original.toJSON();\n    const restored = fromOptionJSON(json);\n    expect(isOption(restored)).toBe(true);\n    expect(restored.isSome()).toBe(true);\n    if (restored.isSome()) expect(restored.value).toBe(42);\n  });\n\n  it(\"toJSON/fromOptionJSON round-trip preserves None\", () => {\n    const original = none();\n    const json = original.toJSON();\n    const restored = fromOptionJSON(json);\n    expect(isOption(restored)).toBe(true);\n    expect(restored.isNone()).toBe(true);\n  });\n});\n"},"tests/transformations.test.ts":{"tests":[{"id":"623","name":"Transformations BEH-03-001: ok(2).map(x => x * 3) returns Ok(6)"},{"id":"624","name":"Transformations BEH-03-001: err('x').map(x => x * 3) returns Err('x') unchanged"},{"id":"625","name":"Transformations BEH-03-002: ok(2).mapErr(e => e.toUpperCase()) returns Ok(2) unchanged"},{"id":"626","name":"Transformations BEH-03-002: err('fail').mapErr(e => e.toUpperCase()) returns Err('FAIL')"},{"id":"627","name":"Transformations BEH-03-003: ok(2).mapBoth(v => v * 2, e => e) returns Ok(4)"},{"id":"628","name":"Transformations BEH-03-003: err('x').mapBoth(v => v * 2, e => e.toUpperCase()) returns Err('X')"},{"id":"629","name":"Transformations BEH-03-004: ok(ok(42)).flatten() returns Ok(42)"},{"id":"630","name":"Transformations BEH-03-004: ok(err('inner')).flatten() returns Err('inner')"},{"id":"631","name":"Transformations BEH-03-004: err('outer').flatten() returns Err('outer')"},{"id":"632","name":"Transformations BEH-03-005: ok(42).flip() returns Err(42)"},{"id":"633","name":"Transformations BEH-03-005: err('x').flip() returns Ok('x')"},{"id":"634","name":"Transformations BEH-03-001: map does not call the function on Err"},{"id":"635","name":"Transformations BEH-03-002: mapErr does not call the function on Ok"},{"id":"636","name":"Transformations BEH-03-013: ok(1).and(ok(2)) returns Ok(2)"},{"id":"637","name":"Transformations BEH-03-013: ok(1).and(err('b')) returns Err('b')"},{"id":"638","name":"Transformations BEH-03-013: err('a').and(ok(2)) returns Err('a')"},{"id":"639","name":"Transformations BEH-03-014: ok(1).or(ok(2)) returns Ok(1)"},{"id":"640","name":"Transformations BEH-03-014: err('a').or(ok(2)) returns Ok(2)"},{"id":"641","name":"Transformations BEH-03-014: err('a').or(err('b')) returns Err('b')"},{"id":"642","name":"Transformations BEH-03-015: ok(2).mapOr(0, x => x * 3) returns 6"},{"id":"643","name":"Transformations BEH-03-015: err('x').mapOr(0, x => x * 3) returns 0"},{"id":"644","name":"Transformations BEH-03-016: ok(2).mapOrElse(e => 0, x => x * 3) returns 6"},{"id":"645","name":"Transformations BEH-03-016: err('x').mapOrElse(e => e.length, x => x * 3) returns 1"},{"id":"646","name":"Transformations BEH-03-017: ok(42).contains(42) returns true"},{"id":"647","name":"Transformations BEH-03-017: ok(42).contains(99) returns false"},{"id":"648","name":"Transformations BEH-03-017: err('x').contains(42) returns false"},{"id":"649","name":"Transformations BEH-03-018: err('x').containsErr('x') returns true"},{"id":"650","name":"Transformations BEH-03-018: err('x').containsErr('y') returns false"},{"id":"651","name":"Transformations BEH-03-018: ok(42).containsErr('x') returns false"},{"id":"652","name":"Transformations BEH-03-019: ok(42).toOption() returns Some(42)"},{"id":"653","name":"Transformations BEH-03-019: err('x').toOption() returns None"},{"id":"654","name":"Transformations BEH-03-020: ok(42).toOptionErr() returns None"},{"id":"655","name":"Transformations BEH-03-020: err('x').toOptionErr() returns Some('x')"},{"id":"656","name":"Transformations BEH-03-021: ok(some(42)).transpose() returns Some(Ok(42))"},{"id":"657","name":"Transformations BEH-03-021: ok(none()).transpose() returns None"},{"id":"658","name":"Transformations BEH-03-021: err('x').transpose() returns Some(Err('x'))"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err, isResult, isOption } from \"../src/index.js\";\nimport { some, none } from \"../src/option/option.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Transformations\", () => {\n  // DoD 4 #1\n  it(\"BEH-03-001: ok(2).map(x => x * 3) returns Ok(6)\", () => {\n    const result = ok(2).map(x => x * 3);\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(6);\n  });\n\n  // DoD 4 #2\n  it(\"BEH-03-001: err('x').map(x => x * 3) returns Err('x') unchanged\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const mapped = result.map(x => x * 3);\n    expect(mapped._tag).toBe(\"Err\");\n    if (mapped.isErr()) {\n      expect(mapped.error).toBe(\"x\");\n    }\n  });\n\n  // DoD 4 #3\n  it(\"BEH-03-002: ok(2).mapErr(e => e.toUpperCase()) returns Ok(2) unchanged\", () => {\n    const result: Result<"+"number, string> = ok(2);\n    const mapped = result.mapErr(e => e.toUpperCase());\n    expect(mapped._tag).toBe(\"Ok\");\n    if (mapped.isOk()) {\n      expect(mapped.value).toBe(2);\n    }\n  });\n\n  // DoD 4 #4\n  it(\"BEH-03-002: err('fail').mapErr(e => e.toUpperCase()) returns Err('FAIL')\", () => {\n    const result = err(\"fail\").mapErr(e => e.toUpperCase());\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(\"FAIL\");\n  });\n\n  // DoD 4 #5\n  it(\"BEH-03-003: ok(2).mapBoth(v => v * 2, e => e) returns Ok(4)\", () => {\n    const result: Result<"+"number, string> = ok(2);\n    const mapped = result.mapBoth(\n      v => v * 2,\n      e => e\n    );\n    expect(mapped._tag).toBe(\"Ok\");\n    if (mapped.isOk()) {\n      expect(mapped.value).toBe(4);\n    }\n  });\n\n  // DoD 4 #6\n  it(\"BEH-03-003: err('x').mapBoth(v => v * 2, e => e.toUpperCase()) returns Err('X')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const mapped = result.mapBoth(\n      v => v * 2,\n      e => e.toUpperCase()\n    );\n    expect(mapped._tag).toBe(\"Err\");\n    if (mapped.isErr()) {\n      expect(mapped.error).toBe(\"X\");\n    }\n  });\n\n  // DoD 4 #7\n  it(\"BEH-03-004: ok(ok(42)).flatten() returns Ok(42)\", () => {\n    const nested = ok(ok(42));\n    const flat = nested.flatten();\n    expect(flat._tag).toBe(\"Ok\");\n    if (flat.isOk()) {\n      expect(flat.value).toBe(42);\n    }\n  });\n\n  // DoD 4 #8\n  it(\"BEH-03-004: ok(err('inner')).flatten() returns Err('inner')\", () => {\n    const nested = ok(err(\"inner\"));\n    const flat = nested.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) {\n      expect(flat.error).toBe(\"inner\");\n    }\n  });\n\n  // DoD 4 #9\n  it(\"BEH-03-004: err('outer').flatten() returns Err('outer')\", () => {\n    const outer: Result<"+"Result<"+"number, string>, string> = err(\"outer\");\n    const flat = outer.flatten();\n    expect(flat._tag).toBe(\"Err\");\n    if (flat.isErr()) {\n      expect(flat.error).toBe(\"outer\");\n    }\n  });\n\n  // DoD 4 #10\n  it(\"BEH-03-005: ok(42).flip() returns Err(42)\", () => {\n    const result = ok(42).flip();\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(42);\n  });\n\n  // DoD 4 #11\n  it(\"BEH-03-005: err('x').flip() returns Ok('x')\", () => {\n    const result = err(\"x\").flip();\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(\"x\");\n  });\n\n  // DoD 4 #12\n  it(\"BEH-03-001: map does not call the function on Err\", () => {\n    const fn = vi.fn((x: number) => x * 2);\n    const result: Result<"+"number, string> = err(\"x\");\n    result.map(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // DoD 4 #13\n  it(\"BEH-03-002: mapErr does not call the function on Ok\", () => {\n    const fn = vi.fn((e: string) => e.toUpperCase());\n    const result: Result<"+"number, string> = ok(2);\n    result.mapErr(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // BEH-03-013: and\n  it(\"BEH-03-013: ok(1).and(ok(2)) returns Ok(2)\", () => {\n    const result = ok(1).and(ok(2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(2);\n  });\n\n  it(\"BEH-03-013: ok(1).and(err('b')) returns Err('b')\", () => {\n    const result = ok(1).and(err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"b\");\n  });\n\n  it(\"BEH-03-013: err('a').and(ok(2)) returns Err('a')\", () => {\n    const result: Result<"+"number, string> = err(\"a\");\n    const r = result.and(ok(2));\n    expect(r._tag).toBe(\"Err\");\n    if (r.isErr()) expect(r.error).toBe(\"a\");\n  });\n\n  // BEH-03-014: or\n  it(\"BEH-03-014: ok(1).or(ok(2)) returns Ok(1)\", () => {\n    const result: Result<"+"number, string> = ok(1);\n    const r = result.or(ok(2));\n    expect(r._tag).toBe(\"Ok\");\n    if (r.isOk()) expect(r.value).toBe(1);\n  });\n\n  it(\"BEH-03-014: err('a').or(ok(2)) returns Ok(2)\", () => {\n    const result: Result<"+"number, string> = err(\"a\");\n    const r = result.or(ok(2));\n    expect(r._tag).toBe(\"Ok\");\n    if (r.isOk()) expect(r.value).toBe(2);\n  });\n\n  it(\"BEH-03-014: err('a').or(err('b')) returns Err('b')\", () => {\n    const result: Result<"+"number, string> = err(\"a\");\n    const r = result.or(err(\"b\"));\n    expect(r._tag).toBe(\"Err\");\n    if (r.isErr()) expect(r.error).toBe(\"b\");\n  });\n\n  // BEH-03-015: mapOr\n  it(\"BEH-03-015: ok(2).mapOr(0, x => x * 3) returns 6\", () => {\n    expect(ok(2).mapOr(0, x => x * 3)).toBe(6);\n  });\n\n  it(\"BEH-03-015: err('x').mapOr(0, x => x * 3) returns 0\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.mapOr(0, x => x * 3)).toBe(0);\n  });\n\n  // BEH-03-016: mapOrElse\n  it(\"BEH-03-016: ok(2).mapOrElse(e => 0, x => x * 3) returns 6\", () => {\n    const result: Result<"+"number, string> = ok(2);\n    expect(result.mapOrElse(() => 0, x => x * 3)).toBe(6);\n  });\n\n  it(\"BEH-03-016: err('x').mapOrElse(e => e.length, x => x * 3) returns 1\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.mapOrElse(e => e.length, x => x * 3)).toBe(1);\n  });\n\n  // BEH-03-017: contains\n  it(\"BEH-03-017: ok(42).contains(42) returns true\", () => {\n    expect(ok(42).contains(42)).toBe(true);\n  });\n\n  it(\"BEH-03-017: ok(42).contains(99) returns false\", () => {\n    expect(ok(42).contains(99)).toBe(false);\n  });\n\n  it(\"BEH-03-017: err('x').contains(42) returns false\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.contains(42)).toBe(false);\n  });\n\n  // BEH-03-018: containsErr\n  it(\"BEH-03-018: err('x').containsErr('x') returns true\", () => {\n    expect(err(\"x\").containsErr(\"x\")).toBe(true);\n  });\n\n  it(\"BEH-03-018: err('x').containsErr('y') returns false\", () => {\n    expect(err(\"x\").containsErr(\"y\")).toBe(false);\n  });\n\n  it(\"BEH-03-018: ok(42).containsErr('x') returns false\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    expect(result.containsErr(\"x\")).toBe(false);\n  });\n\n  // BEH-03-019: toOption\n  it(\"BEH-03-019: ok(42).toOption() returns Some(42)\", () => {\n    const opt = ok(42).toOption();\n    expect(opt._tag).toBe(\"Some\");\n    expect(isOption(opt)).toBe(true);\n    if (opt.isSome()) expect(opt.value).toBe(42);\n  });\n\n  it(\"BEH-03-019: err('x').toOption() returns None\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const opt = result.toOption();\n    expect(opt._tag).toBe(\"None\");\n    expect(opt.isNone()).toBe(true);\n  });\n\n  // BEH-03-020: toOptionErr\n  it(\"BEH-03-020: ok(42).toOptionErr() returns None\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    const opt = result.toOptionErr();\n    expect(opt._tag).toBe(\"None\");\n  });\n\n  it(\"BEH-03-020: err('x').toOptionErr() returns Some('x')\", () => {\n    const opt = err(\"x\").toOptionErr();\n    expect(opt._tag).toBe(\"Some\");\n    if (opt.isSome()) expect(opt.value).toBe(\"x\");\n  });\n\n  // BEH-03-021: transpose\n  it(\"BEH-03-021: ok(some(42)).transpose() returns Some(Ok(42))\", () => {\n    const result = ok(some(42)).transpose();\n    expect(result._tag).toBe(\"Some\");\n    if (result.isSome()) {\n      expect(isResult(result.value)).toBe(true);\n      expect(result.value._tag).toBe(\"Ok\");\n      if (result.value.isOk()) expect(result.value.value).toBe(42);\n    }\n  });\n\n  it(\"BEH-03-021: ok(none()).transpose() returns None\", () => {\n    const result = ok(none()).transpose();\n    expect(result._tag).toBe(\"None\");\n  });\n\n  it(\"BEH-03-021: err('x').transpose() returns Some(Err('x'))\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const transposed = result.transpose();\n    expect(transposed._tag).toBe(\"Some\");\n    if (transposed.isSome()) {\n      expect(transposed.value._tag).toBe(\"Err\");\n    }\n  });\n});\n"},"tests/from-json-compat.test.ts":{"tests":[{"id":"659","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Ok — with _schemaVersion field passes isResult() (brand present)"},{"id":"660","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Ok — with _schemaVersion field is frozen (immutability preserved)"},{"id":"661","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Ok — with _schemaVersion field has _tag \"Ok\""},{"id":"662","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Ok — with _schemaVersion field has correct payload"},{"id":"663","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Err — with _schemaVersion field passes isResult() (brand present)"},{"id":"664","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Err — with _schemaVersion field is frozen (immutability preserved)"},{"id":"665","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Err — with _schemaVersion field has _tag \"Err\""},{"id":"666","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Err — with _schemaVersion field has correct payload"},{"id":"667","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Ok — no _schemaVersion field passes isResult() (brand present)"},{"id":"668","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Ok — no _schemaVersion field is frozen (immutability preserved)"},{"id":"669","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Ok — no _schemaVersion field has _tag \"Ok\""},{"id":"670","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Ok — no _schemaVersion field has correct payload"},{"id":"671","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Err — no _schemaVersion field passes isResult() (brand present)"},{"id":"672","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Err — no _schemaVersion field is frozen (immutability preserved)"},{"id":"673","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Err — no _schemaVersion field has _tag \"Err\""},{"id":"674","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v0: Legacy Err — no _schemaVersion field has correct payload"},{"id":"675","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Some — Option serialization passes isOption() (brand present)"},{"id":"676","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Some — Option serialization is frozen (immutability preserved)"},{"id":"677","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Some — Option serialization has _tag \"Some\""},{"id":"678","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 Some — Option serialization has correct payload"},{"id":"679","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 None — Option serialization passes isOption() (brand present)"},{"id":"680","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 None — Option serialization is frozen (immutability preserved)"},{"id":"681","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 None — Option serialization has _tag \"None\""},{"id":"682","name":"DRR-2: fromJSON/fromOptionJSON backward compatibility schema v1: v1.0.0 None — Option serialization has correct payload"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { fromJSON, isResult, fromOptionJSON, isOption } from \"../src/index.js\";\nimport fixtures from \"../src/core/__fixtures__/schema-versions.json\";\n\n// DRR-2: Backward compatibility regression test for fromJSON/fromOptionJSON\n// Iterates over schema-versions.json fixture entries and verifies:\n// - Brand is present (isResult/isOption)\n// - Instance is frozen (Object.isFrozen)\n// - Restored value/error matches expectedPayload\n// - Restored _tag matches expectedTag\ndescribe(\"DRR-2: fromJSON/fromOptionJSON backward compatibility\", () => {\n  for (const entry of fixtures) {\n    describe(`schema v${entry.schemaVersion}: ${entry.description}`, () => {\n      if (entry.expectedTag === \"Ok\" || entry.expectedTag === \"Err\") {\n        const restored = fromJSON(entry.json as { _tag: \"Ok\"; value: unknown } | { _tag: \"Err\"; error: unknown });\n\n        it(\"passes isResult() (brand present)\", () => {\n          expect(isResult(restored)).toBe(true);\n        });\n\n        it(\"is frozen (immutability preserved)\", () => {\n          expect(Object.isFrozen(restored)).toBe(true);\n        });\n\n        it(`has _tag \"${entry.expectedTag}\"`, () => {\n          expect(restored._tag).toBe(entry.expectedTag);\n        });\n\n        it(\"has correct payload\", () => {\n          if (restored.isOk()) {\n            expect(restored.value).toEqual(entry.expectedPayload);\n          } else {\n            expect(restored.error).toEqual(entry.expectedPayload);\n          }\n        });\n      }\n\n      if (entry.expectedTag === \"Some\" || entry.expectedTag === \"None\") {\n        const restored = fromOptionJSON(entry.json as { _tag: \"Some\"; value: unknown } | { _tag: \"None\" });\n\n        it(\"passes isOption() (brand present)\", () => {\n          expect(isOption(restored)).toBe(true);\n        });\n\n        it(\"is frozen (immutability preserved)\", () => {\n          expect(Object.isFrozen(restored)).toBe(true);\n        });\n\n        it(`has _tag \"${entry.expectedTag}\"`, () => {\n          expect(restored._tag).toBe(entry.expectedTag);\n        });\n\n        it(\"has correct payload\", () => {\n          if (entry.expectedTag === \"Some\" && restored.isSome()) {\n            expect(restored.value).toEqual(entry.expectedPayload);\n          }\n          // None has no value — expectedPayload is null, which is correct\n        });\n      }\n    });\n  }\n});\n"}},"projectRoot":"/Users/u1070457/Projects/Perso/HexDi/Result/packages/result","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","packageManager":"pnpm","reporters":["html","clear-text","progress"],"plugins":["@stryker-mutator/vitest-runner"],"testRunner":"vitest","coverageAnalysis":"perTest","vitest":{"related":false},"mutate":["src/**/*.ts","!src/**/*.test.ts","!src/**/*.test-d.ts","!src/**/index.ts","!src/types/**"],"ignorePatterns":["dist","node_modules","docs"],"thresholds":{"high":80,"low":70,"break":70},"concurrency":4,"timeoutMS":10000,"disableTypeChecks":"**/*.ts","allowConsoleColo
