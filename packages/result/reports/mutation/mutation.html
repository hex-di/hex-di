 * ```ts\n * import { ok, err } from '@hex-di/result';\n * import { unwrap } from '@hex-di/result/unsafe';\n *\n * unwrap(ok(42));       // 42\n * unwrap(err(\"fail\"));  // throws UnwrapError\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/11-unsafe.md — BEH-11-002\n */\nexport function unwrap<"+"T, E>(result: Result<"+"T, E>): T {\n  if (result.isOk()) {\n    return result.value;\n  }\n  throw new UnwrapError(\"Called unwrap on Err\", {\n    _tag: \"Err\",\n    value: result.error,\n  });\n}\n\n/**\n * Extracts the `Err` error from a `Result`. Throws `UnwrapError` if the result is `Ok`.\n *\n * This is an unsafe operation -- prefer `match()` in production code.\n * Import from `@hex-di/result/unsafe` to make usage explicit and detectable by linters.\n *\n * @example\n * ```ts\n * import { ok, err } from '@hex-di/result';\n * import { unwrapErr } from '@hex-di/result/unsafe';\n *\n * unwrapErr(err(\"fail\")); // \"fail\"\n * unwrapErr(ok(42));       // throws UnwrapError\n * ```\n *\n * @since v1.0.0\n * @see spec/result/behaviors/11-unsafe.md — BEH-11-003\n */\nexport function unwrapErr<"+"T, E>(result: Result<"+"T, E>): E {\n  if (result.isErr()) {\n    return result.error;\n  }\n  throw new UnwrapError(\"Called unwrapErr on Ok\", {\n    _tag: \"Ok\",\n    value: result.value,\n  });\n}\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":70,"break":70},"testFiles":{"tests/chaining.test-d.ts":{"tests":[{"id":"0","name":"tests/chaining.test-d.ts Chaining - Type Level ok(1).andThen(v => ok('str')) infers Result<"+"string, never>"},{"id":"1","name":"tests/chaining.test-d.ts Chaining - Type Level andThen accumulates error types"},{"id":"2","name":"tests/chaining.test-d.ts Chaining - Type Level Three andThen calls accumulate three error types in union"},{"id":"3","name":"tests/chaining.test-d.ts Chaining - Type Level orElse replaces error type"},{"id":"4","name":"tests/chaining.test-d.ts Chaining - Type Level andThrough adds error type"},{"id":"5","name":"tests/chaining.test-d.ts Chaining - Type Level andTee does not change error type"},{"id":"6","name":"tests/chaining.test-d.ts Chaining - Type Level orTee does not change value type"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Chaining - Type Level\", () => {\n  // DoD 5 type #1\n  it(\"ok(1).andThen(v => ok('str')) infers Result<"+"string, never>\", () => {\n    const result = ok(1).andThen(() => ok(\"str\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 5 type #2\n  it(\"andThen accumulates error types\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = ok(1);\n    const result = r.andThen((): Result<"+"string, B> => ok(\"x\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, A | B>>();\n  });\n\n  // DoD 5 type #3\n  it(\"Three andThen calls accumulate three error types in union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    type E3 = { _tag: \"E3\" };\n    const r: Result<"+"number, E1> = ok(1);\n    const result = r\n      .andThen((): Result<"+"string, E2> => ok(\"x\"))\n      .andThen((): Result<"+"boolean, E3> => ok(true));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"boolean, E1 | E2 | E3>>();\n  });\n\n  // DoD 5 type #4\n  it(\"orElse replaces error type\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = err({ _tag: \"A\" });\n    const result = r.orElse((): Result<"+"number, B> => ok(99));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, B>>();\n  });\n\n  // DoD 5 type #5\n  it(\"andThrough adds error type\", () => {\n    type A = { _tag: \"A\" };\n    type B = { _tag: \"B\" };\n    const r: Result<"+"number, A> = ok(42);\n    const result = r.andThrough((): Result<"+"unknown, B> => ok(\"x\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A | B>>();\n  });\n\n  // DoD 5 type #6\n  it(\"andTee does not change error type\", () => {\n    type A = { _tag: \"A\" };\n    const r: Result<"+"number, A> = ok(42);\n    const result = r.andTee(() => {});\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A>>();\n  });\n\n  // DoD 5 type #7\n  it(\"orTee does not change value type\", () => {\n    type A = { _tag: \"A\" };\n    const r: Result<"+"number, A> = err({ _tag: \"A\" });\n    const result = r.orTee(() => {});\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, A>>();\n  });\n});\n"},"tests/combining.test-d.ts":{"tests":[{"id":"7","name":"tests/combining.test-d.ts Combining - Type Level all(ok(1), ok('str')) infers Result<"+"[number, string], never>"},{"id":"8","name":"tests/combining.test-d.ts Combining - Type Level all(ok(1), err('a')) error type is union of all error types"},{"id":"9","name":"tests/combining.test-d.ts Combining - Type Level allSettled(ok(1), ok('str')) Ok type is tuple [number, string]"},{"id":"10","name":"tests/combining.test-d.ts Combining - Type Level allSettled error type is array of error union"},{"id":"11","name":"tests/combining.test-d.ts Combining - Type Level any Ok type is union of all Ok types"},{"id":"12","name":"tests/combining.test-d.ts Combining - Type Level any error type is tuple of all error types"},{"id":"13","name":"tests/combining.test-d.ts Combining - Type Level collect({ a: ok(1), b: ok('str') }) infers correct record type"},{"id":"14","name":"tests/combining.test-d.ts Combining - Type Level collect error type is union of all record entry error types"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { all } from \"../src/combinators/all.js\";\nimport { allSettled } from \"../src/combinators/all-settled.js\";\nimport { any } from \"../src/combinators/any.js\";\nimport { collect } from \"../src/combinators/collect.js\";\n\ndescribe(\"Combining - Type Level\", () => {\n  // DoD 7 type #1\n  it(\"all(ok(1), ok('str')) infers Result<"+"[number, string], never>\", () => {\n    const result = all(ok(1), ok(\"str\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"[number, string], never>>();\n  });\n\n  // DoD 7 type #2\n  it(\"all(ok(1), err('a')) error type is union of all error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = ok(1);\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = all(r1, r2);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"[number, string], E1 | E2>>();\n  });\n\n  // DoD 7 type #3\n  it(\"allSettled(ok(1), ok('str')) Ok type is tuple [number, string]\", () => {\n    const result = allSettled(ok(1), ok(\"str\"));\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"[number, string]>();\n    }\n  });\n\n  // DoD 7 type #4\n  it(\"allSettled error type is array of error union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = ok(1);\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = allSettled(r1, r2);\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"(E1 | E2)[]>();\n    }\n  });\n\n  // DoD 7 type #5\n  it(\"any Ok type is union of all Ok types\", () => {\n    const result = any(ok(1), ok(\"str\"));\n    if (result.isOk()) {\n      expectTypeOf(result.value).toMatchTypeOf<"+"number | string>();\n    }\n  });\n\n  // DoD 7 type #6\n  it(\"any error type is tuple of all error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const r1: Result<"+"number, E1> = err({ _tag: \"E1\" });\n    const r2: Result<"+"string, E2> = err({ _tag: \"E2\" });\n    const result = any(r1, r2);\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"[E1, E2]>();\n    }\n  });\n\n  // DoD 7 type #7\n  it(\"collect({ a: ok(1), b: ok('str') }) infers correct record type\", () => {\n    const result = collect({ a: ok(1), b: ok(\"str\") });\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"{ a: number; b: string }>();\n    }\n  });\n\n  // DoD 7 type #8\n  it(\"collect error type is union of all record entry error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const result = collect({\n      a: ok(1) as Result<"+"number, E1>,\n      b: err({ _tag: \"E2\" }) as Result<"+"string, E2>,\n    });\n    if (result.isErr()) {\n      expectTypeOf(result.error).toMatchTypeOf<"+"E1 | E2>();\n    }\n  });\n});\n"},"tests/constructors.test-d.ts":{"tests":[{"id":"15","name":"tests/constructors.test-d.ts Constructors - Type Level ok(42) infers as Ok<"+"number, never>"},{"id":"16","name":"tests/constructors.test-d.ts Constructors - Type Level err('fail') infers as Err<"+"never, string>"},{"id":"17","name":"tests/constructors.test-d.ts Constructors - Type Level fromThrowable return type matches Result<"+"T, E>"},{"id":"18","name":"tests/constructors.test-d.ts Constructors - Type Level fromThrowable function-wrapping overload infers argument types"},{"id":"19","name":"tests/constructors.test-d.ts Constructors - Type Level fromNullable strips null/undefined from Ok type"},{"id":"20","name":"tests/constructors.test-d.ts Constructors - Type Level fromPredicate with type guard narrows Ok type to U extends T"},{"id":"21","name":"tests/constructors.test-d.ts Constructors - Type Level tryCatch infers Result<"+"T, E> from fn and mapErr"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport { fromThrowable } from \"../src/constructors/from-throwable.js\";\nimport { fromNullable } from \"../src/constructors/from-nullable.js\";\nimport { fromPredicate } from \"../src/constructors/from-predicate.js\";\nimport { tryCatch } from \"../src/constructors/try-catch.js\";\n\ndescribe(\"Constructors - Type Level\", () => {\n  // DoD 2 type #1\n  it(\"ok(42) infers as Ok<"+"number, never>\", () => {\n    expectTypeOf(ok(42)).toEqualTypeOf<"+"Ok<"+"number, never>>();\n  });\n\n  // DoD 2 type #2\n  it(\"err('fail') infers as Err<"+"never, string>\", () => {\n    expectTypeOf(err(\"fail\")).toEqualTypeOf<"+"Err<"+"never, string>>();\n  });\n\n  // DoD 2 type #3\n  it(\"fromThrowable return type matches Result<"+"T, E>\", () => {\n    const result = fromThrowable(\n      () => 42,\n      () => \"error\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 2 type #4\n  it(\"fromThrowable function-wrapping overload infers argument types\", () => {\n    const safeParse = fromThrowable(\n      (input: string) => JSON.parse(input),\n      () => \"error\"\n    );\n    expectTypeOf(safeParse).toBeFunction();\n    expectTypeOf(safeParse).parameter(0).toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 2 type #7\n  it(\"fromNullable strips null/undefined from Ok type\", () => {\n    const value: string | null | undefined = \"hello\";\n    const result = fromNullable(value, () => \"was null\");\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, string>>();\n  });\n\n  // DoD 2 type #8\n  it(\"fromPredicate with type guard narrows Ok type to U extends T\", () => {\n    interface Admin {\n      role: \"admin\";\n    }\n    interface User {\n      role: string;\n    }\n    const user: User = { role: \"admin\" };\n    const result = fromPredicate(\n      user,\n      (u): u is Admin => u.role === \"admin\",\n      () => \"not admin\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"Admin, string>>();\n  });\n\n  // DoD 2 type #9\n  it(\"tryCatch infers Result<"+"T, E> from fn and mapErr\", () => {\n    const result = tryCatch(\n      () => 42,\n      () => \"error\"\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n});\n"},"tests/core-types.test-d.ts":{"tests":[{"id":"22","name":"tests/core-types.test-d.ts Core Types - Type Level Ok<"+"number, never> is assignable to Result<"+"number, string>"},{"id":"23","name":"tests/core-types.test-d.ts Core Types - Type Level Err<"+"never, string> is assignable to Result<"+"number, string>"},{"id":"24","name":"tests/core-types.test-d.ts Core Types - Type Level InferOk<"+"Result<"+"number, string>> resolves to number"},{"id":"25","name":"tests/core-types.test-d.ts Core Types - Type Level InferErr<"+"Result<"+"number, string>> resolves to string"},{"id":"26","name":"tests/core-types.test-d.ts Core Types - Type Level IsResult<"+"Result<"+"number, string>> resolves to true"},{"id":"27","name":"tests/core-types.test-d.ts Core Types - Type Level IsResult<"+"string> resolves to false"},{"id":"28","name":"tests/core-types.test-d.ts Core Types - Type Level FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>> resolves correctly"},{"id":"29","name":"tests/core-types.test-d.ts Core Types - Type Level InferOkTuple extracts Ok types from a tuple of Results"},{"id":"30","name":"tests/core-types.test-d.ts Core Types - Type Level InferErrUnion extracts union of Err types"},{"id":"31","name":"tests/core-types.test-d.ts Core Types - Type Level InferOkRecord extracts Ok types from a record"},{"id":"32","name":"tests/core-types.test-d.ts Core Types - Type Level Ok phantom type E = never does not widen"},{"id":"33","name":"tests/core-types.test-d.ts Core Types - Type Level Err phantom type T = never does not widen"},{"id":"34","name":"tests/core-types.test-d.ts Core Types - Type Level ok(42) infers as Ok<"+"number, never>"},{"id":"35","name":"tests/core-types.test-d.ts Core Types - Type Level err('fail') infers as Err<"+"never, string>"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/core/types.js\";\nimport type {\n  InferOk,\n  InferErr,\n  IsResult,\n  FlattenResult,\n  InferOkTuple,\n  InferErrUnion,\n  InferOkRecord,\n} from \"../src/type-utils.js\";\n\ndescribe(\"Core Types - Type Level\", () => {\n  // DoD 1 type #1\n  it(\"Ok<"+"number, never> is assignable to Result<"+"number, string>\", () => {\n    const success = ok(42);\n    expectTypeOf(success).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #2\n  it(\"Err<"+"never, string> is assignable to Result<"+"number, string>\", () => {\n    const failure = err(\"fail\");\n    expectTypeOf(failure).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #3\n  it(\"InferOk<"+"Result<"+"number, string>> resolves to number\", () => {\n    expectTypeOf<"+"InferOk<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 1 type #4\n  it(\"InferErr<"+"Result<"+"number, string>> resolves to string\", () => {\n    expectTypeOf<"+"InferErr<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 1 type #7\n  it(\"IsResult<"+"Result<"+"number, string>> resolves to true\", () => {\n    expectTypeOf<"+"IsResult<"+"Result<"+"number, string>>>().toEqualTypeOf<"+"true>();\n  });\n\n  // DoD 1 type #8\n  it(\"IsResult<"+"string> resolves to false\", () => {\n    expectTypeOf<"+"IsResult<"+"string>>().toEqualTypeOf<"+"false>();\n  });\n\n  // DoD 1 type #10\n  it(\"FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>> resolves correctly\", () => {\n    expectTypeOf<"+"FlattenResult<"+"Result<"+"Result<"+"number, string>, boolean>>>().toEqualTypeOf<"+"\n      Result<"+"number, string | boolean>\n    >();\n  });\n\n  // DoD 1 type #11\n  it(\"InferOkTuple extracts Ok types from a tuple of Results\", () => {\n    expectTypeOf<"+"InferOkTuple<"+"[Result<"+"number, string>, Result<"+"boolean, Error>]>>().toEqualTypeOf<"+"\n      [number, boolean]\n    >();\n  });\n\n  // DoD 1 type #12\n  it(\"InferErrUnion extracts union of Err types\", () => {\n    expectTypeOf<"+"InferErrUnion<"+"[Result<"+"number, string>, Result<"+"boolean, Error>]>>().toEqualTypeOf<"+"\n      string | Error\n    >();\n  });\n\n  // DoD 1 type #13\n  it(\"InferOkRecord extracts Ok types from a record\", () => {\n    expectTypeOf<"+"\n      InferOkRecord<"+"{ a: Result<"+"number, string>; b: Result<"+"boolean, Error> }>\n    >().toEqualTypeOf<"+"{ a: number; b: boolean }>();\n  });\n\n  // DoD 1 type #14\n  it(\"Ok phantom type E = never does not widen\", () => {\n    const success = ok(42); // Ok<"+"number, never>\n    // Assigning to a Result with a specific error type should work\n    const _result: Result<"+"number, string> = success;\n    expectTypeOf(_result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 1 type #15\n  it(\"Err phantom type T = never does not widen\", () => {\n    const failure = err(\"fail\"); // Err<"+"never, string>\n    const _result: Result<"+"number, string> = failure;\n    expectTypeOf(_result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  // DoD 2 type #1\n  it(\"ok(42) infers as Ok<"+"number, never>\", () => {\n    const result = ok(42);\n    expectTypeOf(result).toEqualTypeOf<"+"Ok<"+"number, never>>();\n  });\n\n  // DoD 2 type #2\n  it(\"err('fail') infers as Err<"+"never, string>\", () => {\n    const result = err(\"fail\");\n    expectTypeOf(result).toEqualTypeOf<"+"Err<"+"never, string>>();\n  });\n});\n"},"tests/do-notation.test-d.ts":{"tests":[{"id":"36","name":"tests/do-notation.test-d.ts Do Notation - Type Level bind returns a function compatible with andThen"},{"id":"37","name":"tests/do-notation.test-d.ts Do Notation - Type Level bind extends context with the new key via Result.Do"},{"id":"38","name":"tests/do-notation.test-d.ts Do Notation - Type Level bind propagates Err type from the inner Result"},{"id":"39","name":"tests/do-notation.test-d.ts Do Notation - Type Level chained binds accumulate context keys"},{"id":"40","name":"tests/do-notation.test-d.ts Do Notation - Type Level let_ returns a function compatible with andThen"},{"id":"41","name":"tests/do-notation.test-d.ts Do Notation - Type Level let_ adds plain value to context (never errors)"},{"id":"42","name":"tests/do-notation.test-d.ts Do Notation - Type Level bind + let_ compose in a chain"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { bind, let_ } from \"../src/do/bind.js\";\n\n// BEH-12-002, BEH-12-003\ndescribe(\"Do Notation - Type Level\", () => {\n  it(\"bind returns a function compatible with andThen\", () => {\n    // bind needs context type inference from andThen — test via composition\n    const result = ok({}).andThen(bind(\"x\", () => ok(1)));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"{ readonly x: number }, never>>();\n  });\n\n  it(\"bind extends context with the new key via Result.Do\", () => {\n    // Result.Do is ok({}) — an empty object, not Record<"+"string, unknown>\n    const result = ok({}).andThen(bind(\"x\", () => ok(42)));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"{ readonly x: number }, never>>();\n  });\n\n  it(\"bind propagates Err type from the inner Result\", () => {\n    const result = ok({}).andThen(\n      bind(\"x\", () => ok(1) as Result<"+"number, \"fail\">),\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"{ readonly x: number }, \"fail\">>();\n  });\n\n  it(\"chained binds accumulate context keys\", () => {\n    const result = ok({})\n      .andThen(bind(\"x\", () => ok(1)))\n      .andThen(bind(\"y\", () => ok(\"hello\")));\n    expectTypeOf(result).toMatchTypeOf<"+"\n      Result<"+"{ readonly x: number; readonly y: string }, never>\n    >();\n  });\n\n  it(\"let_ returns a function compatible with andThen\", () => {\n    // let_ needs context type inference from andThen — test via composition\n    const result = ok({}).andThen(let_(\"label\", () => \"hello\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"{ readonly label: string }, never>>();\n  });\n\n  it(\"let_ adds plain value to context (never errors)\", () => {\n    const result = ok({}).andThen(let_(\"x\", () => 42));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"{ readonly x: number }, never>>();\n  });\n\n  it(\"bind + let_ compose in a chain\", () => {\n    const result = ok({})\n      .andThen(bind(\"a\", () => ok(10)))\n      .andThen(let_(\"b\", (ctx) => ctx.a * 2));\n    expectTypeOf(result).toMatchTypeOf<"+"\n      Result<"+"{ readonly a: number; readonly b: number }, never>\n    >();\n  });\n});\n"},"tests/error-patterns.test-d.ts":{"tests":[{"id":"43","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level createError('NotFound') return type has { readonly _tag: 'NotFound' }"},{"id":"44","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Factory with fields infers intersection of _tag and field types"},{"id":"45","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level assertNever parameter type is never (enforces exhaustive checks)"},{"id":"46","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Error type union narrows correctly in switch on _tag"},{"id":"47","name":"tests/error-patterns.test-d.ts Error Patterns - Type Level Error hierarchy type compositions resolve correctly"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { createError } from \"../src/errors/create-error.js\";\nimport { assertNever } from \"../src/errors/assert-never.js\";\n\ndescribe(\"Error Patterns - Type Level\", () => {\n  // DoD 10 type #1\n  it(\"createError('NotFound') return type has { readonly _tag: 'NotFound' }\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\" });\n    expectTypeOf(error).toHaveProperty(\"_tag\");\n    expectTypeOf(error._tag).toEqualTypeOf<"+"\"NotFound\">();\n  });\n\n  // DoD 10 type #2\n  it(\"Factory with fields infers intersection of _tag and field types\", () => {\n    const NotFound = createError(\"NotFound\");\n    const error = NotFound({ resource: \"User\", id: \"123\" });\n    expectTypeOf(error).toMatchTypeOf<"+"{\n      readonly _tag: \"NotFound\";\n      readonly resource: string;\n      readonly id: string;\n    }>();\n  });\n\n  // DoD 10 type #3\n  it(\"assertNever parameter type is never (enforces exhaustive checks)\", () => {\n    expectTypeOf(assertNever).parameter(0).toEqualTypeOf<"+"never>();\n  });\n\n  // DoD 10 type #4\n  it(\"Error type union narrows correctly in switch on _tag\", () => {\n    type AppError = { _tag: \"NotFound\"; id: string } | { _tag: \"Validation\"; field: string };\n\n    function handle(e: AppError): void {\n      switch (e._tag) {\n        case \"NotFound\":\n          expectTypeOf(e).toMatchTypeOf<"+"{ _tag: \"NotFound\"; id: string }>();\n          break;\n        case \"Validation\":\n          expectTypeOf(e).toMatchTypeOf<"+"{ _tag: \"Validation\"; field: string }>();\n          break;\n      }\n    }\n  });\n\n  // DoD 10 type #5\n  it(\"Error hierarchy type compositions resolve correctly\", () => {\n    type InfraError = { _tag: \"Timeout\"; ms: number } | { _tag: \"ConnectionFailed\"; host: string };\n\n    type DomainError =\n      | { _tag: \"NotFound\"; entity: string }\n      | { _tag: \"InfraFailure\"; cause: InfraError };\n\n    function infraStep(): Result<"+"number, InfraError> {\n      return ok(1);\n    }\n\n    function domainStep(n: number): Result<"+"string, DomainError> {\n      return ok(String(n));\n    }\n\n    const result = infraStep()\n      .mapErr((e): DomainError => ({ _tag: \"InfraFailure\", cause: e }))\n      .andThen(domainStep);\n\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, DomainError>>();\n  });\n});\n"},"tests/extraction.test-d.ts":{"tests":[{"id":"48","name":"tests/extraction.test-d.ts Extraction - Type Level match return type is union of both handler return types"},{"id":"49","name":"tests/extraction.test-d.ts Extraction - Type Level unwrapOr return type on Ok is T"},{"id":"50","name":"tests/extraction.test-d.ts Extraction - Type Level toNullable return type on Ok is T"},{"id":"51","name":"tests/extraction.test-d.ts Extraction - Type Level toUndefined return type on Ok is T"},{"id":"52","name":"tests/extraction.test-d.ts Extraction - Type Level intoTuple return type on Ok is [null, T]"},{"id":"53","name":"tests/extraction.test-d.ts Extraction - Type Level merge return type is T on Ok, E on Err"},{"id":"54","name":"tests/extraction.test-d.ts Extraction - Type Level toAsync return type is ResultAsync<"+"T, E>"},{"id":"55","name":"tests/extraction.test-d.ts Extraction - Type Level asyncMap return type is ResultAsync<"+"U, E>"},{"id":"56","name":"tests/extraction.test-d.ts Extraction - Type Level toJSON return type matches discriminated union shape"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport type { ResultAsync } from \"../src/core/types.js\";\n\ndescribe(\"Extraction - Type Level\", () => {\n  // DoD 6 type #1\n  it(\"match return type is union of both handler return types\", () => {\n    // On Ok<"+"number, string>, match returns A (string here)\n    const okResult = ok(42).match(\n      v => v.toString(),\n      (e: never) => 0\n    );\n    expectTypeOf(okResult).toEqualTypeOf<"+"string>();\n    // On Err<"+"number, string>, match returns B (number here)\n    const errResult = err(\"x\").match(\n      (v: never) => \"\",\n      e => e.length\n    );\n    expectTypeOf(errResult).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #2\n  it(\"unwrapOr return type on Ok is T\", () => {\n    const value = ok(42).unwrapOr(null);\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #3\n  it(\"toNullable return type on Ok is T\", () => {\n    const value = ok(42).toNullable();\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #4\n  it(\"toUndefined return type on Ok is T\", () => {\n    const value = ok(42).toUndefined();\n    expectTypeOf(value).toEqualTypeOf<"+"number>();\n  });\n\n  // DoD 6 type #5\n  it(\"intoTuple return type on Ok is [null, T]\", () => {\n    const tuple = ok(42).intoTuple();\n    expectTypeOf(tuple).toEqualTypeOf<"+"[null, number]>();\n  });\n\n  // DoD 6 type #6\n  it(\"merge return type is T on Ok, E on Err\", () => {\n    const okMerge = ok(42).merge();\n    expectTypeOf(okMerge).toEqualTypeOf<"+"number>();\n    const errMerge = err(\"x\").merge();\n    expectTypeOf(errMerge).toEqualTypeOf<"+"string>();\n  });\n\n  // DoD 6 type #7\n  it(\"toAsync return type is ResultAsync<"+"T, E>\", () => {\n    expectTypeOf(ok(42).toAsync).returns.toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 6 type #8\n  it(\"asyncMap return type is ResultAsync<"+"U, E>\", () => {\n    // Just check the signature exists and returns the right shape\n    const fn = async (v: number) => String(v);\n    expectTypeOf(ok(42).asyncMap(fn)).toMatchTypeOf<"+"ResultAsync<"+"string, never>>();\n  });\n\n  // DoD 6 type #9\n  it(\"toJSON return type matches discriminated union shape\", () => {\n    const okJson = ok(42).toJSON();\n    expectTypeOf(okJson).toEqualTypeOf<"+"{ _tag: \"Ok\"; _schemaVersion: 1; value: number }>();\n    const errJson = err(\"x\").toJSON();\n    expectTypeOf(errJson).toEqualTypeOf<"+"{ _tag: \"Err\"; _schemaVersion: 1; error: string }>();\n  });\n});\n"},"tests/generators.test-d.ts":{"tests":[{"id":"57","name":"tests/generators.test-d.ts Generators - Type Level safeTry sync return type is Result<"+"T, E>"},{"id":"58","name":"tests/generators.test-d.ts Generators - Type Level safeTry async return type is ResultAsync<"+"T, E>"},{"id":"59","name":"tests/generators.test-d.ts Generators - Type Level yield* on Ok<"+"number, never> produces number"},{"id":"60","name":"tests/generators.test-d.ts Generators - Type Level Error types from multiple yields accumulate in union"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport type { ResultAsync } from \"../src/core/types.js\";\nimport { safeTry } from \"../src/generators/safe-try.js\";\n\ndescribe(\"Generators - Type Level\", () => {\n  // DoD 9 type #1\n  it(\"safeTry sync return type is Result<"+"T, E>\", () => {\n    const result = safeTry(function* () {\n      const n = yield* ok(1);\n      return ok(n + 1);\n    });\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, never>>();\n  });\n\n  // DoD 9 type #2\n  it(\"safeTry async return type is ResultAsync<"+"T, E>\", () => {\n    const result = safeTry(async function* () {\n      const n = yield* ok(1);\n      return ok(n + 1);\n    });\n    expectTypeOf(result).toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 9 type #3\n  it(\"yield* on Ok<"+"number, never> produces number\", () => {\n    safeTry(function* () {\n      const n = yield* ok(42);\n      expectTypeOf(n).toEqualTypeOf<"+"number>();\n      return ok(n);\n    });\n  });\n\n  // DoD 9 type #4\n  it(\"Error types from multiple yields accumulate in union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(): Result<"+"string, E2> {\n      return err({ _tag: \"E2\" });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* step1();\n      const b = yield* step2();\n      return ok(`${a}-${b}`);\n    });\n\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, E1 | E2>>();\n  });\n});\n"},"tests/interop.test-d.ts":{"tests":[{"id":"61","name":"tests/interop.test-d.ts Interop - Type Level ResultJSON<"+"T, E> is a tagged union of Ok and Err shapes"},{"id":"62","name":"tests/interop.test-d.ts Interop - Type Level fromJSON returns Result<"+"T, E>"},{"id":"63","name":"tests/interop.test-d.ts Interop - Type Level toSchema returns StandardSchemaV1<"+"unknown, T>"},{"id":"64","name":"tests/interop.test-d.ts Interop - Type Level StandardSchemaV1 has ~standard property with version and vendor"},{"id":"65","name":"tests/interop.test-d.ts Interop - Type Level StandardSchemaV1.validate returns value or issues"},{"id":"66","name":"tests/interop.test-d.ts Interop - Type Level OptionJSON<"+"T> is a tagged union of Some and None shapes"},{"id":"67","name":"tests/interop.test-d.ts Interop - Type Level fromOptionJSON returns Option<"+"T>"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err, fromJSON, toSchema } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport type { ResultJSON } from \"../src/interop/from-json.js\";\nimport type { StandardSchemaV1 } from \"../src/interop/to-schema.js\";\nimport { fromOptionJSON } from \"../src/option/from-option-json.js\";\nimport type { OptionJSON } from \"../src/option/from-option-json.js\";\nimport type { Option } from \"../src/option/types.js\";\n\n// BEH-13-001, BEH-13-002\ndescribe(\"Interop - Type Level\", () => {\n  it(\"ResultJSON<"+"T, E> is a tagged union of Ok and Err shapes\", () => {\n    type J = ResultJSON<"+"number, string>;\n    expectTypeOf<"+"J>().toMatchTypeOf<"+"\n      | { _tag: \"Ok\"; value: number }\n      | { _tag: \"Err\"; error: string }\n    >();\n  });\n\n  it(\"fromJSON returns Result<"+"T, E>\", () => {\n    const json: ResultJSON<"+"number, string> = { _tag: \"Ok\", value: 42 };\n    const result = fromJSON(json);\n    // Verify it has Result shape — _tag and methods\n    expectTypeOf(result._tag).toEqualTypeOf<"+"\"Ok\" | \"Err\">();\n    expectTypeOf(result.isOk).toBeFunction();\n    expectTypeOf(result.map).toBeFunction();\n  });\n\n  it(\"toSchema returns StandardSchemaV1<"+"unknown, T>\", () => {\n    const schema = toSchema((input: unknown) => {\n      if (typeof input === \"number\") return ok(input);\n      return err(\"not a number\" as const);\n    });\n    expectTypeOf(schema).toMatchTypeOf<"+"StandardSchemaV1<"+"unknown, number>>();\n  });\n\n  it(\"StandardSchemaV1 has ~standard property with version and vendor\", () => {\n    const schema = toSchema((input: unknown) => ok(String(input)));\n    expectTypeOf(schema[\"~standard\"].version).toEqualTypeOf<"+"1>();\n    expectTypeOf(schema[\"~standard\"].vendor).toEqualTypeOf<"+"\"@hex-di/result\">();\n    expectTypeOf(schema[\"~standard\"].validate).toBeFunction();\n  });\n\n  it(\"StandardSchemaV1.validate returns value or issues\", () => {\n    const schema = toSchema((input: unknown) => ok(String(input)));\n    const result = schema[\"~standard\"].validate(\"test\");\n    expectTypeOf(result).toMatchTypeOf<"+"\n      | { readonly value: string }\n      | { readonly issues: ReadonlyArray<"+"{ readonly message: string }> }\n    >();\n  });\n\n  it(\"OptionJSON<"+"T> is a tagged union of Some and None shapes\", () => {\n    type J = OptionJSON<"+"number>;\n    expectTypeOf<"+"J>().toMatchTypeOf<"+"\n      | { _tag: \"Some\"; value: number }\n      | { _tag: \"None\" }\n    >();\n  });\n\n  it(\"fromOptionJSON returns Option<"+"T>\", () => {\n    const json: OptionJSON<"+"number> = { _tag: \"Some\", value: 42 };\n    const result = fromOptionJSON(json);\n    expectTypeOf(result).toMatchTypeOf<"+"Option<"+"number>>();\n  });\n});\n"},"tests/option.test-d.ts":{"tests":[{"id":"68","name":"tests/option.test-d.ts Option - Type Level some(42) is Some<"+"number>"},{"id":"69","name":"tests/option.test-d.ts Option - Type Level none() is None"},{"id":"70","name":"tests/option.test-d.ts Option - Type Level Option<"+"T> is the union of Some<"+"T> and None"},{"id":"71","name":"tests/option.test-d.ts Option - Type Level Some._tag is literal 'Some'"},{"id":"72","name":"tests/option.test-d.ts Option - Type Level None._tag is literal 'None'"},{"id":"73","name":"tests/option.test-d.ts Option - Type Level Some.map preserves Some wrapper"},{"id":"74","name":"tests/option.test-d.ts Option - Type Level None.map returns None"},{"id":"75","name":"tests/option.test-d.ts Option - Type Level Some.match returns onSome branch type"},{"id":"76","name":"tests/option.test-d.ts Option - Type Level Some.unwrapOr returns T (not default type)"},{"id":"77","name":"tests/option.test-d.ts Option - Type Level None.unwrapOr returns the default type"},{"id":"78","name":"tests/option.test-d.ts Option - Type Level Some.toResult returns Ok<"+"T, E>"},{"id":"79","name":"tests/option.test-d.ts Option - Type Level None.toResult returns Err<"+"never, E>"},{"id":"80","name":"tests/option.test-d.ts Option - Type Level Some.toNullable returns T"},{"id":"81","name":"tests/option.test-d.ts Option - Type Level None.toNullable returns null"},{"id":"82","name":"tests/option.test-d.ts Option - Type Level Some.toJSON returns tagged object with value"},{"id":"83","name":"tests/option.test-d.ts Option - Type Level None.toJSON returns tagged object without value"},{"id":"84","name":"tests/option.test-d.ts Option - Type Level isOption narrows unknown to Option<"+"unknown>"},{"id":"85","name":"tests/option.test-d.ts Option - Type Level fromOptionJSON returns Option<"+"T>"},{"id":"86","name":"tests/option.test-d.ts Option - Type Level Some.andThen returns Option<"+"U>"},{"id":"87","name":"tests/option.test-d.ts Option - Type Level Option narrowing via isSome gives access to value"},{"id":"88","name":"tests/option.test-d.ts Option - Type Level Option narrowing via isNone gives None tag"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { some, none, isOption, fromOptionJSON } from \"../src/index.js\";\nimport type { Option, Some, None } from \"../src/index.js\";\nimport type { Ok, Err, Result } from \"../src/index.js\";\n\n// BEH-09-002 through BEH-09-010\ndescribe(\"Option - Type Level\", () => {\n  it(\"some(42) is Some<"+"number>\", () => {\n    const s = some(42);\n    expectTypeOf(s).toMatchTypeOf<"+"Some<"+"number>>();\n  });\n\n  it(\"none() is None\", () => {\n    const n = none();\n    expectTypeOf(n).toMatchTypeOf<"+"None>();\n  });\n\n  it(\"Option<"+"T> is the union of Some<"+"T> and None\", () => {\n    expectTypeOf<"+"Some<"+"string>>().toMatchTypeOf<"+"Option<"+"string>>();\n    expectTypeOf<"+"None>().toMatchTypeOf<"+"Option<"+"string>>();\n  });\n\n  it(\"Some._tag is literal 'Some'\", () => {\n    const s = some(\"hello\");\n    expectTypeOf(s._tag).toEqualTypeOf<"+"\"Some\">();\n  });\n\n  it(\"None._tag is literal 'None'\", () => {\n    const n = none();\n    expectTypeOf(n._tag).toEqualTypeOf<"+"\"None\">();\n  });\n\n  it(\"Some.map preserves Some wrapper\", () => {\n    const mapped = some(1).map((x) => String(x));\n    expectTypeOf(mapped).toMatchTypeOf<"+"Some<"+"string>>();\n  });\n\n  it(\"None.map returns None\", () => {\n    const mapped = none().map((x) => String(x));\n    expectTypeOf(mapped).toMatchTypeOf<"+"None>();\n  });\n\n  it(\"Some.match returns onSome branch type\", () => {\n    const result = some(42).match(\n      (v) => `val: ${v}`,\n      () => \"none\",\n    );\n    expectTypeOf(result).toEqualTypeOf<"+"string>();\n  });\n\n  it(\"Some.unwrapOr returns T (not default type)\", () => {\n    const val = some(42).unwrapOr(0);\n    expectTypeOf(val).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"None.unwrapOr returns the default type\", () => {\n    const val = none().unwrapOr(0);\n    expectTypeOf(val).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"Some.toResult returns Ok<"+"T, E>\", () => {\n    const r = some(42).toResult(() => \"err\" as const);\n    expectTypeOf(r).toMatchTypeOf<"+"Ok<"+"number, \"err\">>();\n  });\n\n  it(\"None.toResult returns Err<"+"never, E>\", () => {\n    const r = none().toResult(() => \"missing\" as const);\n    expectTypeOf(r).toMatchTypeOf<"+"Err<"+"never, \"missing\">>();\n  });\n\n  it(\"Some.toNullable returns T\", () => {\n    expectTypeOf(some(42).toNullable()).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"None.toNullable returns null\", () => {\n    expectTypeOf(none().toNullable()).toEqualTypeOf<"+"null>();\n  });\n\n  it(\"Some.toJSON returns tagged object with value\", () => {\n    const json = some(42).toJSON();\n    expectTypeOf(json).toEqualTypeOf<"+"{ _tag: \"Some\"; _schemaVersion: 1; value: number }>();\n  });\n\n  it(\"None.toJSON returns tagged object without value\", () => {\n    const json = none().toJSON();\n    expectTypeOf(json).toEqualTypeOf<"+"{ _tag: \"None\"; _schemaVersion: 1 }>();\n  });\n\n  it(\"isOption narrows unknown to Option<"+"unknown>\", () => {\n    const val: unknown = some(1);\n    if (isOption(val)) {\n      expectTypeOf(val).toMatchTypeOf<"+"Option<"+"unknown>>();\n    }\n  });\n\n  it(\"fromOptionJSON returns Option<"+"T>\", () => {\n    const restored = fromOptionJSON({ _tag: \"Some\", value: 42 });\n    expectTypeOf(restored).toMatchTypeOf<"+"Option<"+"number>>();\n  });\n\n  it(\"Some.andThen returns Option<"+"U>\", () => {\n    const result = some(42).andThen((v) => (v > 0 ? some(String(v)) : none()));\n    expectTypeOf(result).toMatchTypeOf<"+"Option<"+"string>>();\n  });\n\n  it(\"Option narrowing via isSome gives access to value\", () => {\n    const opt: Option<"+"number> = some(1);\n    if (opt.isSome()) {\n      expectTypeOf(opt.value).toEqualTypeOf<"+"number>();\n      expectTypeOf(opt._tag).toEqualTypeOf<"+"\"Some\">();\n    }\n  });\n\n  it(\"Option narrowing via isNone gives None tag\", () => {\n    const opt: Option<"+"number> = none();\n    if (opt.isNone()) {\n      expectTypeOf(opt._tag).toEqualTypeOf<"+"\"None\">();\n    }\n  });\n});\n"},"tests/result-async.test-d.ts":{"tests":[{"id":"89","name":"tests/result-async.test-d.ts ResultAsync - Type Level ResultAsync.ok(42) infers ResultAsync<"+"number, never>"},{"id":"90","name":"tests/result-async.test-d.ts ResultAsync - Type Level ResultAsync.err('x') infers ResultAsync<"+"never, string>"},{"id":"91","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.map(v => 'str') infers ResultAsync<"+"string, E>"},{"id":"92","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.andThen(v => ok(1)) accepts sync Result and returns ResultAsync"},{"id":"93","name":"tests/result-async.test-d.ts ResultAsync - Type Level resultAsync.andThen(v => ResultAsync.ok(1)) accepts ResultAsync"},{"id":"94","name":"tests/result-async.test-d.ts ResultAsync - Type Level Async andThen accumulates error types"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err, ResultAsync } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"ResultAsync - Type Level\", () => {\n  // DoD 8 type #1\n  it(\"ResultAsync.ok(42) infers ResultAsync<"+"number, never>\", () => {\n    const ra = ResultAsync.ok(42);\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"number, never>>();\n  });\n\n  // DoD 8 type #2\n  it(\"ResultAsync.err('x') infers ResultAsync<"+"never, string>\", () => {\n    const ra = ResultAsync.err(\"x\");\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"never, string>>();\n  });\n\n  // DoD 8 type #3\n  it(\"resultAsync.map(v => 'str') infers ResultAsync<"+"string, E>\", () => {\n    const ra = ResultAsync.ok(42).map(() => \"str\");\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"string, never>>();\n  });\n\n  // DoD 8 type #4\n  it(\"resultAsync.andThen(v => ok(1)) accepts sync Result and returns ResultAsync\", () => {\n    const ra = ResultAsync.ok(42).andThen(() => ok(1));\n    // Verify the map method exists, confirming it's a ResultAsync\n    expectTypeOf(ra.map).toBeFunction();\n  });\n\n  // DoD 8 type #5\n  it(\"resultAsync.andThen(v => ResultAsync.ok(1)) accepts ResultAsync\", () => {\n    const ra = ResultAsync.ok(42).andThen(() => ResultAsync.ok(1));\n    expectTypeOf(ra.map).toBeFunction();\n  });\n\n  // DoD 8 type #6\n  it(\"Async andThen accumulates error types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const ra = ResultAsync.ok(42)\n      .andThen((): Result<"+"string, E1> => ok(\"x\"))\n      .andThen((): Result<"+"boolean, E2> => ok(true));\n    expectTypeOf(ra).toMatchTypeOf<"+"ResultAsync<"+"boolean, E1 | E2>>();\n  });\n\n  // DoD 8 type #7 - covered by collect tests\n\n  // DoD 8 type #8 - covered by collect tests\n});\n"},"tests/standalone-functions.test-d.ts":{"tests":[{"id":"95","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level map returns a curried function Result<"+"T,E> => Result<"+"U,E>"},{"id":"96","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level mapErr returns a curried function Result<"+"T,E> => Result<"+"T,F>"},{"id":"97","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level andThen returns a curried function Result<"+"T,E> => Result<"+"U,E|F>"},{"id":"98","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level match extracts the final value from both branches"},{"id":"99","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level unwrapOr returns T | U"},{"id":"100","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level flip swaps Ok/Err type parameters"},{"id":"101","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level flatten removes one layer of nesting"},{"id":"102","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level toNullable returns T | null"},{"id":"103","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level toUndefined returns T | undefined"},{"id":"104","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level intoTuple returns [null, T] | [E, null]"},{"id":"105","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level merge returns T | E"},{"id":"106","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level contains returns boolean"},{"id":"107","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level containsErr returns boolean"},{"id":"108","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level toOption returns Option<"+"T>"},{"id":"109","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level pipe composes functions with correct type inference"},{"id":"110","name":"tests/standalone-functions.test-d.ts Standalone Functions - Type Level pipe with single value returns the value unchanged"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport type { Option } from \"../src/option/types.js\";\nimport {\n  pipe,\n  map,\n  mapErr,\n  andThen,\n  match,\n  unwrapOr,\n  flatten,\n  flip,\n  contains,\n  containsErr,\n  toNullable,\n  toUndefined,\n  intoTuple,\n  merge,\n  toOption,\n} from \"../src/fn/index.js\";\n\n// BEH-10-001 through BEH-10-004\ndescribe(\"Standalone Functions - Type Level\", () => {\n  it(\"map returns a curried function Result<"+"T,E> => Result<"+"U,E>\", () => {\n    const fn = map((x: number) => String(x));\n    expectTypeOf(fn).toBeFunction();\n    const result = fn(ok(42));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  it(\"mapErr returns a curried function Result<"+"T,E> => Result<"+"T,F>\", () => {\n    const fn = mapErr((e: string) => new Error(e));\n    const result = fn(err(\"fail\"));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"never, Error>>();\n  });\n\n  it(\"andThen returns a curried function Result<"+"T,E> => Result<"+"U,E|F>\", () => {\n    const fn = andThen((x: number) => ok(String(x)));\n    const result = fn(ok(1));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  it(\"match extracts the final value from both branches\", () => {\n    const fn = match(\n      (v: number) => `ok: ${v}`,\n      (e: string) => `err: ${e}`,\n    );\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toEqualTypeOf<"+"string>();\n  });\n\n  it(\"unwrapOr returns T | U\", () => {\n    const fn = unwrapOr(0);\n    const result = fn(ok(42));\n    expectTypeOf(result).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"flip swaps Ok/Err type parameters\", () => {\n    const fn = flip<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, number>>();\n  });\n\n  it(\"flatten removes one layer of nesting\", () => {\n    const fn = flatten<"+"number, string, string>();\n    const nested: Result<"+"Result<"+"number, string>, string> = ok(ok(42) as Result<"+"number, string>);\n    const result = fn(nested);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, string>>();\n  });\n\n  it(\"toNullable returns T | null\", () => {\n    const fn = toNullable<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toEqualTypeOf<"+"number | null>();\n  });\n\n  it(\"toUndefined returns T | undefined\", () => {\n    const fn = toUndefined<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toEqualTypeOf<"+"number | undefined>();\n  });\n\n  it(\"intoTuple returns [null, T] | [E, null]\", () => {\n    const fn = intoTuple<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toMatchTypeOf<"+"[null, number] | [string, null]>();\n  });\n\n  it(\"merge returns T | E\", () => {\n    const fn = merge<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toEqualTypeOf<"+"number | string>();\n  });\n\n  it(\"contains returns boolean\", () => {\n    const fn = contains(42);\n    const result = fn(ok(42));\n    expectTypeOf(result).toEqualTypeOf<"+"boolean>();\n  });\n\n  it(\"containsErr returns boolean\", () => {\n    const fn = containsErr(\"fail\");\n    const result = fn(err(\"fail\"));\n    expectTypeOf(result).toEqualTypeOf<"+"boolean>();\n  });\n\n  it(\"toOption returns Option<"+"T>\", () => {\n    const fn = toOption<"+"number, string>();\n    const result = fn(ok(42) as Result<"+"number, string>);\n    expectTypeOf(result).toMatchTypeOf<"+"Option<"+"number>>();\n  });\n\n  it(\"pipe composes functions with correct type inference\", () => {\n    const result = pipe(\n      ok(42),\n      map((x: number) => x * 2),\n      map((x: number) => String(x)),\n    );\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  it(\"pipe with single value returns the value unchanged\", () => {\n    const result = pipe(42);\n    expectTypeOf(result).toEqualTypeOf<"+"number>();\n  });\n});\n"},"tests/transformations.test-d.ts":{"tests":[{"id":"111","name":"tests/transformations.test-d.ts Transformations - Type Level ok(1).map(v => String(v)) infers as Result<"+"string, never>"},{"id":"112","name":"tests/transformations.test-d.ts Transformations - Type Level err('x').mapErr(e => 42) infers as Result<"+"never, number>"},{"id":"113","name":"tests/transformations.test-d.ts Transformations - Type Level ok(ok(42)).flatten() infers as Result<"+"number, never>"},{"id":"114","name":"tests/transformations.test-d.ts Transformations - Type Level ok(42).flip() infers as Result<"+"never, number>"},{"id":"115","name":"tests/transformations.test-d.ts Transformations - Type Level err('x').flip() infers as Result<"+"string, never>"},{"id":"116","name":"tests/transformations.test-d.ts Transformations - Type Level mapBoth infers correct transformed types for both branches"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Transformations - Type Level\", () => {\n  // DoD 4 type #1\n  it(\"ok(1).map(v => String(v)) infers as Result<"+"string, never>\", () => {\n    const result = ok(1).map(v => String(v));\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 4 type #2\n  it(\"err('x').mapErr(e => 42) infers as Result<"+"never, number>\", () => {\n    const result = err(\"x\").mapErr(() => 42);\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"never, number>>();\n  });\n\n  // DoD 4 type #3\n  it(\"ok(ok(42)).flatten() infers as Result<"+"number, never>\", () => {\n    const result = ok(ok(42)).flatten();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"number, never>>();\n  });\n\n  // DoD 4 type #4\n  it(\"ok(42).flip() infers as Result<"+"never, number>\", () => {\n    const result = ok(42).flip();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"never, number>>();\n  });\n\n  // DoD 4 type #5\n  it(\"err('x').flip() infers as Result<"+"string, never>\", () => {\n    const result = err(\"x\").flip();\n    expectTypeOf(result).toMatchTypeOf<"+"Result<"+"string, never>>();\n  });\n\n  // DoD 4 type #6\n  it(\"mapBoth infers correct transformed types for both branches\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    const mapped = result.mapBoth(\n      v => String(v),\n      e => new Error(e)\n    );\n    expectTypeOf(mapped).toMatchTypeOf<"+"Result<"+"string, Error>>();\n  });\n});\n"},"tests/type-guards.test-d.ts":{"tests":[{"id":"117","name":"tests/type-guards.test-d.ts Type Guards - Type Level After isOk() guard, value is accessible"},{"id":"118","name":"tests/type-guards.test-d.ts Type Guards - Type Level After isErr() guard, error is accessible"},{"id":"119","name":"tests/type-guards.test-d.ts Type Guards - Type Level isResult is a type guard: value is Result<"+"unknown, unknown>"},{"id":"120","name":"tests/type-guards.test-d.ts Type Guards - Type Level After _tag === 'Ok' check, type is narrowed to Ok variant"},{"id":"121","name":"tests/type-guards.test-d.ts Type Guards - Type Level After _tag === 'Err' check, type is narrowed to Err variant"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result, Ok, Err } from \"../src/index.js\";\nimport { isResult } from \"../src/core/guards.js\";\n\ndescribe(\"Type Guards - Type Level\", () => {\n  // DoD 3 type #1\n  it(\"After isOk() guard, value is accessible\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result.isOk()) {\n      expectTypeOf(result.value).toEqualTypeOf<"+"number>();\n    }\n  });\n\n  // DoD 3 type #2\n  it(\"After isErr() guard, error is accessible\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result.isErr()) {\n      expectTypeOf(result.error).toEqualTypeOf<"+"string>();\n    }\n  });\n\n  // DoD 3 type #3\n  it(\"isResult is a type guard: value is Result<"+"unknown, unknown>\", () => {\n    const value: unknown = ok(42);\n    if (isResult(value)) {\n      expectTypeOf(value).toMatchTypeOf<"+"Result<"+"unknown, unknown>>();\n    }\n  });\n\n  // DoD 3 type #4\n  it(\"After _tag === 'Ok' check, type is narrowed to Ok variant\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result._tag === \"Ok\") {\n      expectTypeOf(result).toMatchTypeOf<"+"Ok<"+"number, string>>();\n      expectTypeOf(result.value).toEqualTypeOf<"+"number>();\n    }\n  });\n\n  // DoD 3 type #5\n  it(\"After _tag === 'Err' check, type is narrowed to Err variant\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result._tag === \"Err\") {\n      expectTypeOf(result).toMatchTypeOf<"+"Err<"+"number, string>>();\n      expectTypeOf(result.error).toEqualTypeOf<"+"string>();\n    }\n  });\n});\n"},"tests/unsafe.test-d.ts":{"tests":[{"id":"122","name":"tests/unsafe.test-d.ts Unsafe - Type Level unwrap(Ok<"+"number, never>) returns number"},{"id":"123","name":"tests/unsafe.test-d.ts Unsafe - Type Level unwrap(Result<"+"number, string>) returns number"},{"id":"124","name":"tests/unsafe.test-d.ts Unsafe - Type Level unwrapErr(Err<"+"never, string>) returns string"},{"id":"125","name":"tests/unsafe.test-d.ts Unsafe - Type Level unwrapErr(Result<"+"number, string>) returns string"},{"id":"126","name":"tests/unsafe.test-d.ts Unsafe - Type Level UnwrapError is an Error subclass"},{"id":"127","name":"tests/unsafe.test-d.ts Unsafe - Type Level UnwrapError.context has _tag and value properties"},{"id":"128","name":"tests/unsafe.test-d.ts Unsafe - Type Level UnwrapError.context._tag is 'Ok' | 'Err'"}],"source":"import { describe, it, expectTypeOf } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { unwrap, unwrapErr } from \"../src/unsafe/unwrap.js\";\nimport { UnwrapError } from \"../src/unsafe/unwrap-error.js\";\n\n// BEH-11-001 through BEH-11-005\ndescribe(\"Unsafe - Type Level\", () => {\n  it(\"unwrap(Ok<"+"number, never>) returns number\", () => {\n    const val = unwrap(ok(42));\n    expectTypeOf(val).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"unwrap(Result<"+"number, string>) returns number\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    const val = unwrap(result);\n    expectTypeOf(val).toEqualTypeOf<"+"number>();\n  });\n\n  it(\"unwrapErr(Err<"+"never, string>) returns string\", () => {\n    const val = unwrapErr(err(\"fail\"));\n    expectTypeOf(val).toEqualTypeOf<"+"string>();\n  });\n\n  it(\"unwrapErr(Result<"+"number, string>) returns string\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    const val = unwrapErr(result);\n    expectTypeOf(val).toEqualTypeOf<"+"string>();\n  });\n\n  it(\"UnwrapError is an Error subclass\", () => {\n    expectTypeOf<"+"UnwrapError>().toMatchTypeOf<"+"Error>();\n  });\n\n  it(\"UnwrapError.context has _tag and value properties\", () => {\n    const e = new UnwrapError(\"msg\", { _tag: \"Err\", value: \"x\" });\n    expectTypeOf(e.context).toMatchTypeOf<"+"{\n      readonly _tag: \"Ok\" | \"Err\";\n      readonly value: unknown;\n    }>();\n  });\n\n  it(\"UnwrapError.context._tag is 'Ok' | 'Err'\", () => {\n    const e = new UnwrapError(\"msg\", { _tag: \"Ok\", value: 42 });\n    expectTypeOf(e.context._tag).toEqualTypeOf<"+"\"Ok\" | \"Err\">();\n  });\n});\n"},"tests/option.test.ts":{"tests":[{"id":"129","name":"Option BEH-09-001: OPTION_BRAND unique symbol for Option identity OPTION_BRAND is a symbol"},{"id":"130","name":"Option BEH-09-001: OPTION_BRAND unique symbol for Option identity OPTION_BRAND description is 'Option'"},{"id":"131","name":"Option BEH-09-002: Some<"+"T> / BEH-09-003: None – isSome / isNone type guards some(42).isSome() returns true"},{"id":"132","name":"Option BEH-09-002: Some<"+"T> / BEH-09-003: None – isSome / isNone type guards some(42).isNone() returns false"},{"id":"133","name":"Option BEH-09-002: Some<"+"T> / BEH-09-003: None – isSome / isNone type guards none().isSome() returns false"},{"id":"134","name":"Option BEH-09-002: Some<"+"T> / BEH-09-003: None – isSome / isNone type guards none().isNone() returns true"},{"id":"135","name":"Option BEH-09-002: isSomeAnd – Some conditional guard / BEH-09-003: None returns false some(5).isSomeAnd(v => v > 3) returns true"},{"id":"136","name":"Option BEH-09-002: isSomeAnd – Some conditional guard / BEH-09-003: None returns false some(1).isSomeAnd(v => v > 3) returns false"},{"id":"137","name":"Option BEH-09-002: isSomeAnd – Some conditional guard / BEH-09-003: None returns false none().isSomeAnd() returns false"},{"id":"138","name":"Option INV-10: frozen instances – all Option instances are Object.freeze()d some(42) is frozen"},{"id":"139","name":"Option INV-10:
