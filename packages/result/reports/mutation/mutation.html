ok(2).andThrough(v => err('fail')) returns Err('fail') (propagates)\", () => {\n    const result = ok(2).andThrough(() => err(\"fail\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 5 #16\n  it(\"err('x').andThrough(v => ok('ignored')) returns Err('x')\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const through = result.andThrough(() => ok(\"ignored\"));\n    expect(through._tag).toBe(\"Err\");\n    if (through.isErr()) expect(through.error).toBe(\"x\");\n  });\n\n  // DoD 5 #17\n  it(\"inspect calls function on Ok, returns same Result\", () => {\n    const fn = vi.fn();\n    const original = ok(42);\n    const result = original.inspect(fn);\n    expect(fn).toHaveBeenCalledWith(42);\n    expect(result).toBe(original);\n  });\n\n  // DoD 5 #18\n  it(\"inspect does not call function on Err\", () => {\n    const fn = vi.fn();\n    const result: Result<"+"number, string> = err(\"x\");\n    result.inspect(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // DoD 5 #19\n  it(\"inspectErr calls function on Err, returns same Result\", () => {\n    const fn = vi.fn();\n    const original = err(\"x\");\n    const result = original.inspectErr(fn);\n    expect(fn).toHaveBeenCalledWith(\"x\");\n    expect(result).toBe(original);\n  });\n\n  // DoD 5 #20\n  it(\"inspectErr does not call function on Ok\", () => {\n    const fn = vi.fn();\n    const result: Result<"+"number, string> = ok(42);\n    result.inspectErr(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Mutation gap: inspect return value on Err ---\n  it(\"inspect on Err returns the same Err instance\", () => {\n    const fn = vi.fn();\n    const original: Result<"+"number, string> = err(\"x\");\n    const result = original.inspect(fn);\n    expect(result).toBe(original);\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // --- Mutation gap: inspectErr return value on Ok ---\n  it(\"inspectErr on Ok returns the same Ok instance\", () => {\n    const fn = vi.fn();\n    const original: Result<"+"number, string> = ok(42);\n    const result = original.inspectErr(fn);\n    expect(result).toBe(original);\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // --- Mutation gap: orTee error swallowing on Err ---\n  it(\"err('x').orTee(throwing fn) returns Err('x') (swallows error)\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    const teed = result.orTee(() => {\n      throw new Error(\"boom\");\n    });\n    expect(teed._tag).toBe(\"Err\");\n    if (teed.isErr()) expect(teed.error).toBe(\"x\");\n  });\n\n  // --- Mutation gap: andTee on Err does not call fn ---\n  it(\"err('x').andTee() does not call the function\", () => {\n    const fn = vi.fn();\n    const result: Result<"+"number, string> = err(\"x\");\n    result.andTee(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // --- Mutation gap: orTee on Ok does not call fn ---\n  it(\"ok(1).orTee() does not call the function\", () => {\n    const fn = vi.fn();\n    const result: Result<"+"number, string> = ok(1);\n    result.orTee(fn);\n    expect(fn).not.toHaveBeenCalled();\n  });\n\n  // DoD 5 #21\n  it(\"Chaining andThen accumulates error types via union\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n    const step1 = (): Result<"+"number, E1> => ok(1);\n    const step2 = (_n: number): Result<"+"string, E2> => ok(\"done\");\n\n    const result = step1().andThen(step2);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(\"done\");\n  });\n\n  // DoD 5 #22\n  it(\"Three-step andThen chain short-circuits on first Err\", () => {\n    const step1 = vi.fn((): Result<"+"number, string> => ok(1));\n    const step2 = vi.fn((_n: number): Result<"+"number, string> => err(\"fail\"));\n    const step3 = vi.fn((_n: number): Result<"+"number, string> => ok(3));\n\n    const result = step1().andThen(step2).andThen(step3);\n    expect(result._tag).toBe(\"Err\");\n    expect(step3).not.toHaveBeenCalled();\n  });\n});\n"},"tests/generators.test.ts":{"tests":[{"id":"202","name":"Generators safeTry sync: all Ok yields produce final Ok"},{"id":"203","name":"Generators safeTry sync: first Err yield short-circuits"},{"id":"204","name":"Generators safeTry sync: intermediate Ok values are extracted by yield*"},{"id":"205","name":"Generators safeTry sync: error type is union of all yielded Err types"},{"id":"206","name":"Generators safeTry async: all Ok yields produce final Ok"},{"id":"207","name":"Generators safeTry async: first Err yield short-circuits"},{"id":"208","name":"Generators safeTry async: can yield* both Result and ResultAsync (via await)"},{"id":"209","name":"Generators safeTry async: returns ResultAsync"},{"id":"210","name":"Generators safeTry async: generator cleanup runs on early return"},{"id":"211","name":"Generators Ok [Symbol.iterator] yields the Ok value"},{"id":"212","name":"Generators Err [Symbol.iterator] yields early return with Err"},{"id":"213","name":"Generators Ok iterator return() produces done result with given value"},{"id":"214","name":"Generators Ok iterator throw() re-throws the error"},{"id":"215","name":"Generators Ok iterator [Symbol.iterator]() returns self"},{"id":"216","name":"Generators Err iterator throws unreachable on second next()"},{"id":"217","name":"Generators Generator cleanup runs on early return"},{"id":"218","name":"Generators Nested safeTry calls compose correctly"}],"source":"import { describe, it, expect, vi } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { safeTry } from \"../src/generators/safe-try.js\";\nimport { ResultAsync } from \"../src/async/result-async.js\";\n\ndescribe(\"Generators\", () => {\n  // DoD 9 #1\n  it(\"safeTry sync: all Ok yields produce final Ok\", () => {\n    const result = safeTry(function* () {\n      const a = yield* ok(1);\n      const b = yield* ok(2);\n      const c = yield* ok(3);\n      return ok(a + b + c);\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(6);\n  });\n\n  // DoD 9 #2\n  it(\"safeTry sync: first Err yield short-circuits\", () => {\n    const result = safeTry(function* () {\n      const a = yield* ok(1);\n      const _b = yield* err(\"fail\");\n      // This line should never execute\n      return ok(a + 999);\n    });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 9 #3\n  it(\"safeTry sync: intermediate Ok values are extracted by yield*\", () => {\n    const result = safeTry(function* () {\n      const name = yield* ok(\"Alice\");\n      const age = yield* ok(30);\n      return ok({ name, age });\n    });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) {\n      expect(result.value).toEqual({ name: \"Alice\", age: 30 });\n    }\n  });\n\n  // DoD 9 #4\n  it(\"safeTry sync: error type is union of all yielded Err types\", () => {\n    type E1 = { _tag: \"E1\" };\n    type E2 = { _tag: \"E2\" };\n\n    function step1(): Result<"+"number, E1> {\n      return ok(1);\n    }\n    function step2(): Result<"+"string, E2> {\n      return err({ _tag: \"E2\" });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* step1();\n      const b = yield* step2();\n      return ok(`${a}-${b}`);\n    });\n\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) {\n      expect(result.error).toEqual({ _tag: \"E2\" });\n    }\n  });\n\n  // DoD 9 #5\n  it(\"safeTry async: all Ok yields produce final Ok\", async () => {\n    const result = safeTry(async function* () {\n      const a = yield* ok(1);\n      const b = yield* ok(2);\n      return ok(a + b);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(3);\n  });\n\n  // DoD 9 #6\n  it(\"safeTry async: first Err yield short-circuits\", async () => {\n    const result = safeTry(async function* () {\n      const _a = yield* ok(1);\n      const _b = yield* err(\"async-fail\");\n      return ok(999);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Err\");\n    if (resolved.isErr()) expect(resolved.error).toBe(\"async-fail\");\n  });\n\n  // DoD 9 #7\n  it(\"safeTry async: can yield* both Result and ResultAsync (via await)\", async () => {\n    const result = safeTry(async function* () {\n      const a = yield* ok(10); // sync Result\n      const b = yield* await ResultAsync.ok(20); // async ResultAsync → await → Result\n      return ok(a + b);\n    });\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(30);\n  });\n\n  // DoD 9 #8\n  it(\"safeTry async: returns ResultAsync\", async () => {\n    const result = safeTry(async function* () {\n      const v = yield* ok(42);\n      return ok(v);\n    });\n    // ResultAsync is PromiseLike — can be awaited\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Ok\");\n    if (resolved.isOk()) expect(resolved.value).toBe(42);\n  });\n\n  // --- Mutation gap: async generator cleanup ---\n  it(\"safeTry async: generator cleanup runs on early return\", async () => {\n    const cleanup = vi.fn();\n\n    const result = safeTry(async function* () {\n      try {\n        const _a = yield* ok(1);\n        const _b = yield* err(\"async-stop\");\n        return ok(999);\n      } finally {\n        cleanup();\n      }\n    });\n\n    const resolved = await result;\n    expect(resolved._tag).toBe(\"Err\");\n    if (resolved.isErr()) expect(resolved.error).toBe(\"async-stop\");\n    expect(cleanup).toHaveBeenCalledOnce();\n  });\n\n  // DoD 9 #9\n  it(\"Ok [Symbol.iterator] yields the Ok value\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    const result = iter.next();\n    expect(result.done).toBe(true);\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 9 #10\n  it(\"Err [Symbol.iterator] yields early return with Err\", () => {\n    const e = err(\"bad\");\n    const iter = e[Symbol.iterator]();\n    const result = iter.next();\n    expect(result.done).toBe(false);\n    expect(result.value).toBe(e);\n  });\n\n  // --- Mutation gap: Ok iterator return() method ---\n  it(\"Ok iterator return() produces done result with given value\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    const result = iter.return(99);\n    expect(result.done).toBe(true);\n    expect(result.value).toBe(99);\n  });\n\n  // --- Mutation gap: Ok iterator throw() method ---\n  it(\"Ok iterator throw() re-throws the error\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    expect(() => iter.throw(new Error(\"test\"))).toThrow(\"test\");\n  });\n\n  // --- Mutation gap: Ok iterator [Symbol.iterator] returns self ---\n  it(\"Ok iterator [Symbol.iterator]() returns self\", () => {\n    const iter = ok(42)[Symbol.iterator]();\n    expect(iter[Symbol.iterator]()).toBe(iter);\n  });\n\n  // --- Mutation gap: Err iterator continues with error after yield ---\n  it(\"Err iterator throws unreachable on second next()\", () => {\n    const e = err(\"bad\");\n    const iter = e[Symbol.iterator]();\n    iter.next(); // first yields the Err\n    expect(() => iter.next()).toThrow(\"unreachable\");\n  });\n\n  // DoD 9 #11\n  it(\"Generator cleanup runs on early return\", () => {\n    const cleanup = vi.fn();\n\n    const result = safeTry(function* () {\n      try {\n        const _a = yield* ok(1);\n        const _b = yield* err(\"stop\");\n        return ok(999);\n      } finally {\n        cleanup();\n      }\n    });\n\n    expect(result._tag).toBe(\"Err\");\n    expect(cleanup).toHaveBeenCalledOnce();\n  });\n\n  // DoD 9 #12\n  it(\"Nested safeTry calls compose correctly\", () => {\n    function inner(n: number): Result<"+"number, string> {\n      return safeTry(function* () {\n        const v = yield* ok(n * 2);\n        return ok(v);\n      });\n    }\n\n    const result = safeTry(function* () {\n      const a = yield* inner(5);\n      const b = yield* inner(10);\n      return ok(a + b);\n    });\n\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(30);\n  });\n});\n"},"tests/type-guards.test.ts":{"tests":[{"id":"219","name":"Type Guards ok(1).isOk() returns true"},{"id":"220","name":"Type Guards ok(1).isErr() returns false"},{"id":"221","name":"Type Guards err('x').isOk() returns false"},{"id":"222","name":"Type Guards err('x').isErr() returns true"},{"id":"223","name":"Type Guards isOk() narrows type to Ok in conditional"},{"id":"224","name":"Type Guards isErr() narrows type to Err in conditional"},{"id":"225","name":"Type Guards ok(5).isOkAnd(v => v > 3) returns true"},{"id":"226","name":"Type Guards ok(1).isOkAnd(v => v > 3) returns false"},{"id":"227","name":"Type Guards err('x').isOkAnd(v => v > 3) returns false"},{"id":"228","name":"Type Guards err('x').isErrAnd(e => e === 'x') returns true"},{"id":"229","name":"Type Guards ok(1).isErrAnd(e => e === 'x') returns false"},{"id":"230","name":"Type Guards isResult(ok(1)) returns true"},{"id":"231","name":"Type Guards isResult(err('x')) returns true"},{"id":"232","name":"Type Guards isResult('not a result') returns false"},{"id":"233","name":"Type Guards isResult(null) returns false"},{"id":"234","name":"Type Guards isResult(undefined) returns false"},{"id":"235","name":"Type Guards Narrowing with _tag discriminant works in switch statement"},{"id":"236","name":"Type Guards isResult({ _tag: 'Ok' }) without value property returns false"},{"id":"237","name":"Type Guards isResult({ _tag: 'Err' }) without error property returns false"},{"id":"238","name":"Type Guards isResult({ _tag: 'Other', value: 1 }) returns false"},{"id":"239","name":"Type Guards isResult(42) returns false"},{"id":"240","name":"Type Guards isResult(true) returns false"},{"id":"241","name":"Type Guards isResult({ _tag: 'Err', value: 1 }) returns false (has value, not error)"},{"id":"242","name":"Type Guards isResult({ _tag: 'Ok', error: 'x' }) returns false (has error, not value)"},{"id":"243","name":"Type Guards Array .filter(r => r.isOk()) produces only Ok values"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\nimport { isResult } from \"../src/core/guards.js\";\n\ndescribe(\"Type Guards\", () => {\n  // DoD 3 #1\n  it(\"ok(1).isOk() returns true\", () => {\n    expect(ok(1).isOk()).toBe(true);\n  });\n\n  // DoD 3 #2\n  it(\"ok(1).isErr() returns false\", () => {\n    expect(ok(1).isErr()).toBe(false);\n  });\n\n  // DoD 3 #3\n  it(\"err('x').isOk() returns false\", () => {\n    expect(err(\"x\").isOk()).toBe(false);\n  });\n\n  // DoD 3 #4\n  it(\"err('x').isErr() returns true\", () => {\n    expect(err(\"x\").isErr()).toBe(true);\n  });\n\n  // DoD 3 #5\n  it(\"isOk() narrows type to Ok in conditional\", () => {\n    const result: Result<"+"number, string> = ok(42);\n    if (result.isOk()) {\n      // If this compiles, narrowing works\n      expect(result.value).toBe(42);\n    } else {\n      throw new Error(\"Should not reach here\");\n    }\n  });\n\n  // DoD 3 #6\n  it(\"isErr() narrows type to Err in conditional\", () => {\n    const result: Result<"+"number, string> = err(\"fail\");\n    if (result.isErr()) {\n      expect(result.error).toBe(\"fail\");\n    } else {\n      throw new Error(\"Should not reach here\");\n    }\n  });\n\n  // DoD 3 #7\n  it(\"ok(5).isOkAnd(v => v > 3) returns true\", () => {\n    expect(ok(5).isOkAnd(v => v > 3)).toBe(true);\n  });\n\n  // DoD 3 #8\n  it(\"ok(1).isOkAnd(v => v > 3) returns false\", () => {\n    expect(ok(1).isOkAnd(v => v > 3)).toBe(false);\n  });\n\n  // DoD 3 #9\n  it(\"err('x').isOkAnd(v => v > 3) returns false\", () => {\n    const result: Result<"+"number, string> = err(\"x\");\n    expect(result.isOkAnd(v => v > 3)).toBe(false);\n  });\n\n  // DoD 3 #10\n  it(\"err('x').isErrAnd(e => e === 'x') returns true\", () => {\n    expect(err(\"x\").isErrAnd(e => e === \"x\")).toBe(true);\n  });\n\n  // DoD 3 #11\n  it(\"ok(1).isErrAnd(e => e === 'x') returns false\", () => {\n    const result: Result<"+"number, string> = ok(1);\n    expect(result.isErrAnd(e => e === \"x\")).toBe(false);\n  });\n\n  // DoD 3 #12\n  it(\"isResult(ok(1)) returns true\", () => {\n    expect(isResult(ok(1))).toBe(true);\n  });\n\n  // DoD 3 #13\n  it(\"isResult(err('x')) returns true\", () => {\n    expect(isResult(err(\"x\"))).toBe(true);\n  });\n\n  // DoD 3 #14\n  it(\"isResult('not a result') returns false\", () => {\n    expect(isResult(\"not a result\")).toBe(false);\n  });\n\n  // DoD 3 #15\n  it(\"isResult(null) returns false\", () => {\n    expect(isResult(null)).toBe(false);\n  });\n\n  // DoD 3 #16\n  it(\"isResult(undefined) returns false\", () => {\n    expect(isResult(undefined)).toBe(false);\n  });\n\n  // DoD 3 #17\n  it(\"Narrowing with _tag discriminant works in switch statement\", () => {\n    function extract(result: Result<"+"number, string>): number | string {\n      switch (result._tag) {\n        case \"Ok\":\n          return result.value;\n        case \"Err\":\n          return result.error;\n      }\n    }\n    expect(extract(ok(42))).toBe(42);\n    expect(extract(err(\"fail\"))).toBe(\"fail\");\n  });\n\n  // --- Mutation gap: isResult with object having _tag: \"Ok\" but no value ---\n  it(\"isResult({ _tag: 'Ok' }) without value property returns false\", () => {\n    expect(isResult({ _tag: \"Ok\" })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object having _tag: \"Err\" but no error ---\n  it(\"isResult({ _tag: 'Err' }) without error property returns false\", () => {\n    expect(isResult({ _tag: \"Err\" })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with non-Result object having _tag ---\n  it(\"isResult({ _tag: 'Other', value: 1 }) returns false\", () => {\n    expect(isResult({ _tag: \"Other\", value: 1 })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with number ---\n  it(\"isResult(42) returns false\", () => {\n    expect(isResult(42)).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with boolean ---\n  it(\"isResult(true) returns false\", () => {\n    expect(isResult(true)).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object matching Ok shape but wrong tag ---\n  it(\"isResult({ _tag: 'Err', value: 1 }) returns false (has value, not error)\", () => {\n    expect(isResult({ _tag: \"Err\", value: 1 })).toBe(false);\n  });\n\n  // --- Mutation gap: isResult with object matching Err shape but wrong tag ---\n  it(\"isResult({ _tag: 'Ok', error: 'x' }) returns false (has error, not value)\", () => {\n    expect(isResult({ _tag: \"Ok\", error: \"x\" })).toBe(false);\n  });\n\n  // DoD 3 #18\n  it(\"Array .filter(r => r.isOk()) produces only Ok values\", () => {\n    const results: Result<"+"number, string>[] = [ok(1), err(\"bad\"), ok(3)];\n    const successes = results.filter((r): r is typeof r & { _tag: \"Ok\" } => r.isOk());\n    expect(successes).toHaveLength(2);\n    expect(successes[0].value).toBe(1);\n    expect(successes[1].value).toBe(3);\n  });\n});\n"},"tests/combining.test.ts":{"tests":[{"id":"244","name":"Combining all(ok(1), ok(2), ok(3)) returns Ok([1, 2, 3])"},{"id":"245","name":"Combining all(ok(1), err('a'), ok(3)) returns Err('a') (first error)"},{"id":"246","name":"Combining all(ok(1), err('a'), err('b')) returns Err('a') (short-circuits)"},{"id":"247","name":"Combining all() with empty args returns Ok([])"},{"id":"248","name":"Combining allSettled(ok(1), ok(2)) returns Ok([1, 2])"},{"id":"249","name":"Combining allSettled(ok(1), err('a'), err('b')) returns Err(['a', 'b'])"},{"id":"250","name":"Combining allSettled(ok(1), err('a'), ok(3)) returns Err(['a'])"},{"id":"251","name":"Combining any(ok(1), err('a')) returns Ok(1) (first success)"},{"id":"252","name":"Combining any(err('a'), ok(2)) returns Ok(2)"},{"id":"253","name":"Combining any(err('a'), err('b')) returns Err(['a', 'b'])"},{"id":"254","name":"Combining collect({ a: ok(1), b: ok('str') }) returns Ok({ a: 1, b: 'str' })"},{"id":"255","name":"Combining collect({ a: ok(1), b: err('x') }) returns Err('x')"},{"id":"256","name":"Combining all preserves tuple types (not widened to array)"},{"id":"257","name":"Combining all with array input (non-tuple) works correctly"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport { all } from \"../src/combinators/all.js\";\nimport { allSettled } from \"../src/combinators/all-settled.js\";\nimport { any } from \"../src/combinators/any.js\";\nimport { collect } from \"../src/combinators/collect.js\";\n\ndescribe(\"Combining\", () => {\n  // DoD 7 #1\n  it(\"all(ok(1), ok(2), ok(3)) returns Ok([1, 2, 3])\", () => {\n    const result = all(ok(1), ok(2), ok(3));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2, 3]);\n  });\n\n  // DoD 7 #2\n  it(\"all(ok(1), err('a'), ok(3)) returns Err('a') (first error)\", () => {\n    const result = all(ok(1), err(\"a\"), ok(3));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"a\");\n  });\n\n  // DoD 7 #3\n  it(\"all(ok(1), err('a'), err('b')) returns Err('a') (short-circuits)\", () => {\n    const result = all(ok(1), err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"a\");\n  });\n\n  // DoD 7 #4\n  it(\"all() with empty args returns Ok([])\", () => {\n    const result = all();\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([]);\n  });\n\n  // DoD 7 #5\n  it(\"allSettled(ok(1), ok(2)) returns Ok([1, 2])\", () => {\n    const result = allSettled(ok(1), ok(2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2]);\n  });\n\n  // DoD 7 #6\n  it(\"allSettled(ok(1), err('a'), err('b')) returns Err(['a', 'b'])\", () => {\n    const result = allSettled(ok(1), err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\", \"b\"]);\n  });\n\n  // DoD 7 #7\n  it(\"allSettled(ok(1), err('a'), ok(3)) returns Err(['a'])\", () => {\n    const result = allSettled(ok(1), err(\"a\"), ok(3));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\"]);\n  });\n\n  // DoD 7 #8\n  it(\"any(ok(1), err('a')) returns Ok(1) (first success)\", () => {\n    const result = any(ok(1), err(\"a\"));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(1);\n  });\n\n  // DoD 7 #9\n  it(\"any(err('a'), ok(2)) returns Ok(2)\", () => {\n    const result = any(err(\"a\"), ok(2));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toBe(2);\n  });\n\n  // DoD 7 #10\n  it(\"any(err('a'), err('b')) returns Err(['a', 'b'])\", () => {\n    const result = any(err(\"a\"), err(\"b\"));\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toEqual([\"a\", \"b\"]);\n  });\n\n  // DoD 7 #11\n  it(\"collect({ a: ok(1), b: ok('str') }) returns Ok({ a: 1, b: 'str' })\", () => {\n    const result = collect({ a: ok(1), b: ok(\"str\") });\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual({ a: 1, b: \"str\" });\n  });\n\n  // DoD 7 #12\n  it(\"collect({ a: ok(1), b: err('x') }) returns Err('x')\", () => {\n    const result = collect({ a: ok(1), b: err(\"x\") });\n    expect(result._tag).toBe(\"Err\");\n    if (result.isErr()) expect(result.error).toBe(\"x\");\n  });\n\n  // DoD 7 #13\n  it(\"all preserves tuple types (not widened to array)\", () => {\n    const result = all(ok(1), ok(\"two\"), ok(true));\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) {\n      expect(result.value[0]).toBe(1);\n      expect(result.value[1]).toBe(\"two\");\n      expect(result.value[2]).toBe(true);\n    }\n  });\n\n  // DoD 7 #14\n  it(\"all with array input (non-tuple) works correctly\", () => {\n    const results = [ok(1), ok(2), ok(3)];\n    const result = all(...results);\n    expect(result._tag).toBe(\"Ok\");\n    if (result.isOk()) expect(result.value).toEqual([1, 2, 3]);\n  });\n});\n"},"tests/constructors.test.ts":{"tests":[{"id":"258","name":"Constructors fromThrowable returns Ok when fn succeeds (zero-arg overload)"},{"id":"259","name":"Constructors fromThrowable returns Err when fn throws (zero-arg overload)"},{"id":"260","name":"Constructors fromThrowable passes thrown value to mapErr"},{"id":"261","name":"Constructors fromThrowable overload wraps function: returns (...args) => Result"},{"id":"262","name":"Constructors fromThrowable wrapped function returns Ok on success"},{"id":"263","name":"Constructors fromThrowable wrapped function returns Err on throw"},{"id":"264","name":"Constructors fromNullable returns Ok for non-null value"},{"id":"265","name":"Constructors fromNullable returns Err with onNull() result for null"},{"id":"266","name":"Constructors fromNullable returns Err with onNull() result for undefined"},{"id":"267","name":"Constructors fromPredicate returns Ok when predicate is true"},{"id":"268","name":"Constructors fromPredicate returns Err when predicate is false"},{"id":"269","name":"Constructors fromPredicate with type guard narrows the Ok type"},{"id":"270","name":"Constructors tryCatch returns Ok when fn succeeds (executes immediately)"},{"id":"271","name":"Constructors tryCatch returns Err when fn throws"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { fromThrowable } from \"../src/constructors/from-throwable.js\";\nimport { fromNullable } from \"../src/constructors/from-nullable.js\";\nimport { fromPredicate } from \"../src/constructors/from-predicate.js\";\nimport { tryCatch } from \"../src/constructors/try-catch.js\";\n\ndescribe(\"Constructors\", () => {\n  describe(\"fromThrowable\", () => {\n    // DoD 2 #5\n    it(\"returns Ok when fn succeeds (zero-arg overload)\", () => {\n      const result = fromThrowable(\n        () => JSON.parse('{\"a\":1}'),\n        () => \"parse error\"\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual({ a: 1 });\n    });\n\n    // DoD 2 #6\n    it(\"returns Err when fn throws (zero-arg overload)\", () => {\n      const result = fromThrowable(\n        () => JSON.parse(\"not json\"),\n        () => \"parse error\"\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"parse error\");\n    });\n\n    // DoD 2 #7\n    it(\"passes thrown value to mapErr\", () => {\n      const result = fromThrowable(\n        () => {\n          throw new Error(\"boom\");\n        },\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"boom\");\n    });\n\n    // DoD 2 #8\n    it(\"overload wraps function: returns (...args) => Result\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      expect(typeof safeParse).toBe(\"function\");\n    });\n\n    // DoD 2 #9\n    it(\"wrapped function returns Ok on success\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      const result = safeParse('{\"a\":1}');\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toEqual({ a: 1 });\n    });\n\n    // DoD 2 #10\n    it(\"wrapped function returns Err on throw\", () => {\n      const safeParse = fromThrowable(\n        (input: string) => JSON.parse(input),\n        () => \"parse error\"\n      );\n      const result = safeParse(\"not json\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"parse error\");\n    });\n  });\n\n  describe(\"fromNullable\", () => {\n    // DoD 2 #16\n    it(\"returns Ok for non-null value\", () => {\n      const result = fromNullable(42, () => \"was null\");\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    // DoD 2 #17\n    it(\"returns Err with onNull() result for null\", () => {\n      const result = fromNullable(null, () => \"was null\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"was null\");\n    });\n\n    // DoD 2 #18\n    it(\"returns Err with onNull() result for undefined\", () => {\n      const result = fromNullable(undefined, () => \"was null\");\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"was null\");\n    });\n  });\n\n  describe(\"fromPredicate\", () => {\n    // DoD 2 #19\n    it(\"returns Ok when predicate is true\", () => {\n      const result = fromPredicate(\n        5,\n        n => n > 3,\n        n => `${n} too small`\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(5);\n    });\n\n    // DoD 2 #20\n    it(\"returns Err when predicate is false\", () => {\n      const result = fromPredicate(\n        1,\n        n => n > 3,\n        n => `${n} too small`\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"1 too small\");\n    });\n\n    // DoD 2 #21\n    it(\"with type guard narrows the Ok type\", () => {\n      interface Admin {\n        role: \"admin\";\n        permissions: string[];\n      }\n      interface User {\n        role: string;\n      }\n      const user: User = { role: \"admin\" };\n      const result = fromPredicate(\n        user,\n        (u): u is Admin => u.role === \"admin\",\n        u => `${u.role} is not admin`\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) {\n        expect(result.value.role).toBe(\"admin\");\n      }\n    });\n  });\n\n  describe(\"tryCatch\", () => {\n    // DoD 2 #22\n    it(\"returns Ok when fn succeeds (executes immediately)\", () => {\n      const result = tryCatch(\n        () => 42,\n        () => \"error\"\n      );\n      expect(result._tag).toBe(\"Ok\");\n      if (result.isOk()) expect(result.value).toBe(42);\n    });\n\n    // DoD 2 #23\n    it(\"returns Err when fn throws\", () => {\n      const result = tryCatch(\n        () => {\n          throw new Error(\"boom\");\n        },\n        e => (e instanceof Error ? e.message : \"unknown\")\n      );\n      expect(result._tag).toBe(\"Err\");\n      if (result.isErr()) expect(result.error).toBe(\"boom\");\n    });\n  });\n});\n"},"tests/core-types.test.ts":{"tests":[{"id":"272","name":"Core Types Ok variant has _tag: 'Ok'"},{"id":"273","name":"Core Types Err variant has _tag: 'Err'"},{"id":"274","name":"Core Types Ok variant holds the value in .value"},{"id":"275","name":"Core Types Err variant holds the error in .error"},{"id":"276","name":"Core Types Ok and Err are structurally distinct (discriminated union)"},{"id":"277","name":"Core Types Result is a union of Ok and Err"},{"id":"278","name":"Core Types ok(42) creates Ok with value 42"},{"id":"279","name":"Core Types err('fail') creates Err with error 'fail'"},{"id":"280","name":"Core Types ok(42) has _tag: 'Ok'"},{"id":"281","name":"Core Types err('fail') has _tag: 'Err'"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\nimport type { Result } from \"../src/index.js\";\n\ndescribe(\"Core Types\", () => {\n  // DoD 1 #1\n  it(\"Ok variant has _tag: 'Ok'\", () => {\n    const result = ok(42);\n    expect(result._tag).toBe(\"Ok\");\n  });\n\n  // DoD 1 #2\n  it(\"Err variant has _tag: 'Err'\", () => {\n    const result = err(\"fail\");\n    expect(result._tag).toBe(\"Err\");\n  });\n\n  // DoD 1 #3\n  it(\"Ok variant holds the value in .value\", () => {\n    const result = ok(42);\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 1 #4\n  it(\"Err variant holds the error in .error\", () => {\n    const result = err(\"fail\");\n    expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 1 #5\n  it(\"Ok and Err are structurally distinct (discriminated union)\", () => {\n    const success: Result<"+"number, string> = ok(1);\n    const failure: Result<"+"number, string> = err(\"x\");\n    expect(success._tag).not.toBe(failure._tag);\n  });\n\n  // DoD 1 #6\n  it(\"Result is a union of Ok and Err\", () => {\n    const success: Result<"+"number, string> = ok(1);\n    const failure: Result<"+"number, string> = err(\"x\");\n    // Both should be valid Results — tags are one of the two valid discriminants\n    expect([\"Ok\", \"Err\"]).toContain(success._tag);\n    expect([\"Ok\", \"Err\"]).toContain(failure._tag);\n  });\n\n  // DoD 2 #1\n  it(\"ok(42) creates Ok with value 42\", () => {\n    const result = ok(42);\n    expect(result._tag).toBe(\"Ok\");\n    expect(result.value).toBe(42);\n  });\n\n  // DoD 2 #2\n  it(\"err('fail') creates Err with error 'fail'\", () => {\n    const result = err(\"fail\");\n    expect(result._tag).toBe(\"Err\");\n    expect(result.error).toBe(\"fail\");\n  });\n\n  // DoD 2 #3\n  it(\"ok(42) has _tag: 'Ok'\", () => {\n    expect(ok(42)._tag).toBe(\"Ok\");\n  });\n\n  // DoD 2 #4\n  it(\"err('fail') has _tag: 'Err'\", () => {\n    expect(err(\"fail\")._tag).toBe(\"Err\");\n  });\n});\n"},"tests/serialization.test.ts":{"tests":[{"id":"282","name":"Serialization ok(42).toJSON() returns { _tag: 'Ok', value: 42 }"},{"id":"283","name":"Serialization err('fail').toJSON() returns { _tag: 'Err', error: 'fail' }"},{"id":"284","name":"Serialization JSON.stringify integration with Ok"},{"id":"285","name":"Serialization JSON.stringify integration with Err"},{"id":"286","name":"Serialization toJSON round-trip preserves Ok structure"},{"id":"287","name":"Serialization toJSON round-trip preserves Err structure"}],"source":"import { describe, it, expect } from \"vitest\";\nimport { ok, err } from \"../src/index.js\";\n\ndescribe(\"Serialization\", () => {\n  // DoD 13 #1\n  it(\"ok(42).toJSON() returns { _tag: 'Ok', value: 42 }\", () => {\n    expect(ok(42).toJSON()).toEqual({ _tag: \"Ok\", value: 42 });\n  });\n\n  // DoD 13 #2\n  it(\"err('fail').toJSON() returns { _tag: 'Err', error: 'fail' }\", () => {\n    expect(err(\"fail\").toJSON()).toEqual({ _tag: \"Err\", error: \"fail\" });\n  });\n\n  // DoD 13 #3\n  it(\"JSON.stringify integration with Ok\", () => {\n    const result = ok({ name: \"Alice\", age: 30 });\n    const json = JSON.stringify(result);\n    const parsed = JSON.parse(json);\n    expect(parsed._tag).toBe(\"Ok\");\n    expect(parsed.value).toEqual({ name: \"Alice\", age: 30 });\n  });\n\n  // DoD 13 #4\n  it(\"JSON.stringify integration with Err\", () => {\n    const result = err({ _tag: \"NotFound\", id: \"123\" });\n    const json = JSON.stringify(result);\n    const parsed = JSON.parse(json);\n    expect(parsed._tag).toBe(\"Err\");\n    expect(parsed.error).toEqual({ _tag: \"NotFound\", id: \"123\" });\n  });\n\n  // DoD 13 #5\n  it(\"toJSON round-trip preserves Ok structure\", () => {\n    const original = ok([1, 2, 3]);\n    const serialized = original.toJSON();\n    expect(serialized._tag).toBe(\"Ok\");\n    expect(serialized.value).toEqual([1, 2, 3]);\n  });\n\n  // DoD 13 #6\n  it(\"toJSON round-trip preserves Err structure\", () => {\n    const original = err({ code: 404, message: \"not found\" });\n    const serialized = original.toJSON();\n    expect(serialized._tag).toBe(\"Err\");\n    expect(serialized.error).toEqual({ code: 404, message: \"not found\" });\n  });\n});\n"}},"projectRoot":"/Users/u1070457/Projects/Perso/hex-di/packages/res
