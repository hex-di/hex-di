<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Spans → Scope" - Compact trace bars + arrow + rifle scope -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#D97706"/>
  <!-- Compact trace bars (left) -->
  <rect x="32" y="72" width="30" height="10" rx="3" fill="white" opacity="0.9"/>
  <rect x="40" y="88" width="35" height="10" rx="3" fill="white" opacity="0.7"/>
  <rect x="40" y="104" width="25" height="10" rx="3" fill="white" opacity="0.55"/>
  <!-- Arrow bridge -->
  <line x1="78" y1="92" x2="100" y2="92" stroke="white" stroke-width="2.5"/>
  <polyline points="96,87 102,92 96,97" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rifle scope (right side) -->
  <!-- Outer ring -->
  <circle cx="138" cy="88" r="28" fill="none" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="138" cy="88" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="138" cy="88" r="4" fill="white" opacity="0.9"/>
  <!-- Crosshair lines -->
  <line x1="138" y1="56" x2="138" y2="70" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="138" y1="106" x2="138" y2="120" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="106" y1="88" x2="120" y2="88" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="156" y1="88" x2="170" y2="88" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Tick marks at cardinal positions -->
  <line x1="136" y1="60" x2="140" y2="60" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="136" y1="116" x2="140" y2="116" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="110" y1="86" x2="110" y2="90" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="166" y1="86" x2="166" y2="90" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
