<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "States → React Orbits" - State node with arrow + dashed bridge + React orbits -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#4338CA"/>
  <!-- Single recognizable state node (left) -->
  <circle cx="58" cy="80" r="12" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="58" cy="80" r="5" fill="white"/>
  <!-- Curved arrow from state -->
  <path d="M 68,72 Q 88,58 90,72" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <rect x="78" y="72" width="22" height="14" rx="4" fill="white" opacity="0.7"/>
  <!-- Dashed bridge arrow -->
  <line x1="90" y1="92" x2="90" y2="110" stroke="white" stroke-width="2" stroke-dasharray="4,3"/>
  <polyline points="86,106 90,112 94,106" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- React orbital ellipses -->
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(60, 100, 142)"/>
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(120, 100, 142)"/>
  <circle cx="100" cy="142" r="6" fill="white"/>
  <!-- React badge (mini orbital symbol) -->
  <circle cx="158" cy="50" r="12" fill="white" opacity="0.15"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(60, 158, 50)"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(120, 158, 50)"/>
  <circle cx="158" cy="50" r="2" fill="white"/>
</svg>
