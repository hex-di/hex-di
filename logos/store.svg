<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "The Reactive Nucleus" - Central atom + orbital paths + satellite circles -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#059669"/>
  <!-- Orbital paths with pulse notches -->
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" transform="rotate(60, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" transform="rotate(120, 100, 100)"/>
  <!-- Radiating lines to satellite circles (derived state/subscribers) -->
  <line x1="112" y1="90" x2="140" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="112" y1="110" x2="148" y2="130" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="88" y1="110" x2="52" y2="130" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="88" y1="90" x2="60" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Satellite circles (subscribers) -->
  <circle cx="140" cy="60" r="6" fill="white" opacity="0.7"/>
  <circle cx="148" cy="130" r="6" fill="white" opacity="0.7"/>
  <circle cx="52" cy="130" r="6" fill="white" opacity="0.7"/>
  <circle cx="60" cy="60" r="6" fill="white" opacity="0.7"/>
  <!-- Central state atom -->
  <circle cx="100" cy="100" r="14" fill="white"/>
</svg>
