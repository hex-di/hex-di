<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Cache → React Orbits" - Compact data source + cache + bridge + React orbits -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#0891B2"/>
  <!-- Compact database icon (top) -->
  <ellipse cx="90" cy="48" rx="20" ry="8" fill="white" opacity="0.8"/>
  <rect x="70" y="48" width="40" height="16" fill="white" opacity="0.6"/>
  <ellipse cx="90" cy="64" rx="20" ry="8" fill="white" opacity="0.6"/>
  <!-- Compact cache lightning bolt -->
  <path d="M 120,48 L 116,56 L 121,56 L 118,66 L 126,54 L 121,54 L 124,48 Z" fill="white" opacity="0.7"/>
  <!-- Dashed bridge arrow downward -->
  <line x1="100" y1="76" x2="100" y2="104" stroke="white" stroke-width="2" stroke-dasharray="4,3"/>
  <polyline points="96,100 100,106 104,100" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- React orbital ellipses (bottom) -->
  <ellipse cx="100" cy="140" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="140" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(60, 100, 140)"/>
  <ellipse cx="100" cy="140" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(120, 100, 140)"/>
  <circle cx="100" cy="140" r="6" fill="white"/>
  <!-- React badge (mini orbital symbol) -->
  <circle cx="158" cy="50" r="12" fill="white" opacity="0.15"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(60, 158, 50)"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(120, 158, 50)"/>
  <circle cx="158" cy="50" r="2" fill="white"/>
</svg>
