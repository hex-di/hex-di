<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "The State Triangle" - Hex background + 3 UML state nodes -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#4338CA"/>
  <!-- Initial state (filled dot inside circle, top) -->
  <circle cx="100" cy="52" r="14" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="100" cy="52" r="6" fill="white"/>
  <!-- Active state (rounded rect, middle-right) -->
  <rect x="120" y="100" width="40" height="24" rx="6" fill="white" opacity="0.9"/>
  <!-- Final state (double concentric circle, bottom-left) -->
  <circle cx="60" cy="140" r="14" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="60" cy="140" r="8" fill="none" stroke="white" stroke-width="2"/>
  <!-- Curved arrow: initial → active -->
  <path d="M 112,60 Q 145,70 140,98" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="136,92 140,98 144,92" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Curved arrow: active → final -->
  <path d="M 120,118 Q 95,140 76,140" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="82,136 76,140 82,144" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Curved arrow: initial → final (skip path) -->
  <path d="M 88,60 Q 50,80 56,126" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polyline points="52,120 56,126 60,120" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
