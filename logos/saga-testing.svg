<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Steps in Test Boundary" - Simplified saga steps + dashed rect + rewind icon + checkmarks -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#BE123C"/>
  <!-- Dashed test boundary rectangle -->
  <rect x="38" y="45" width="124" height="80" rx="6" fill="white" opacity="0.1" stroke="white" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Simplified saga steps inside boundary (bullseye, no text) -->
  <circle cx="62" cy="78" r="12" fill="white" opacity="0.9"/>
  <circle cx="62" cy="78" r="5" fill="#BE123C"/>
  <line x1="74" y1="78" x2="90" y2="78" stroke="white" stroke-width="2"/>
  <polyline points="87,73 93,78 87,83" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="106" cy="78" r="12" fill="white" opacity="0.9"/>
  <circle cx="106" cy="78" r="5" fill="#BE123C"/>
  <!-- Small rewind icon (circular arrow - compensation replay) -->
  <path d="M 145,66 A 10,10 0 1,1 145,86" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <polyline points="142,62 145,66 149,63" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Green checkmarks -->
  <polyline points="62,142 70,152 84,136" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="102,142 110,152 124,136" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
