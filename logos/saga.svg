<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Forward Steps, Backward Sweep" - 3 step circles + forward arrows + compensation sweep -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#BE123C"/>
  <!-- Step 1 (small) -->
  <circle cx="52" cy="75" r="14" fill="white" opacity="0.9"/>
  <circle cx="52" cy="75" r="6" fill="#BE123C"/>
  <!-- Arrow 1→2 -->
  <line x1="68" y1="75" x2="84" y2="75" stroke="white" stroke-width="3"/>
  <polyline points="80,70 87,75 80,80" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Step 2 (medium) -->
  <circle cx="102" cy="75" r="14" fill="white" opacity="0.9"/>
  <circle cx="102" cy="75" r="6" fill="#BE123C"/>
  <!-- Arrow 2→3 -->
  <line x1="118" y1="75" x2="134" y2="75" stroke="white" stroke-width="3"/>
  <polyline points="130,70 137,75 130,80" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Step 3 (large, active) -->
  <circle cx="152" cy="75" r="14" fill="white" opacity="0.9"/>
  <circle cx="152" cy="75" r="6" fill="#BE123C"/>
  <!-- Compensation sweep curve (right to left, underneath) -->
  <path d="M 155,92 C 150,130 100,140 50,120" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Undo/rewind arrow at sweep end -->
  <polyline points="56,114 48,120 56,126" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
