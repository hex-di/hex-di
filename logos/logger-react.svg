<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Logs → React Orbits" - 2 compact log lines + dashed bridge + React orbits -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#475569"/>
  <!-- 2 compact colored log lines (top) -->
  <rect x="50" y="48" width="24" height="8" rx="2" fill="#60A5FA"/>
  <rect x="78" y="48" width="42" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="50" y="62" width="26" height="8" rx="2" fill="#FBBF24"/>
  <rect x="80" y="62" width="38" height="8" rx="2" fill="white" opacity="0.4"/>
  <!-- Dashed bridge arrow downward -->
  <line x1="100" y1="76" x2="100" y2="96" stroke="white" stroke-width="2" stroke-dasharray="4,3"/>
  <polyline points="96,92 100,98 104,92" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- React orbital ellipses -->
  <ellipse cx="100" cy="132" rx="48" ry="17" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="132" rx="48" ry="17" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(60, 100, 132)"/>
  <ellipse cx="100" cy="132" rx="48" ry="17" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(120, 100, 132)"/>
  <circle cx="100" cy="132" r="6" fill="white"/>
  <!-- React badge (mini orbital symbol, no text) -->
  <circle cx="158" cy="50" r="12" fill="white" opacity="0.15"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(60, 158, 50)"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(120, 158, 50)"/>
  <circle cx="158" cy="50" r="2" fill="white"/>
</svg>
