<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "The Hexagonal Circuit" - 6 line segments with gaps at vertices + 6 port node circles -->
  <!-- Hex vertices: T(100,28) TR(170,68) BR(170,132) B(100,172) BL(30,132) TL(30,68) -->
  <!-- Line segments (shortened to leave gaps at vertices) -->
  <line x1="88" y1="32" x2="44" y2="64" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <line x1="32" y1="76" x2="32" y2="124" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <line x1="44" y1="136" x2="88" y2="168" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <line x1="112" y1="168" x2="156" y2="136" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <line x1="168" y1="124" x2="168" y2="76" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <line x1="156" y1="64" x2="112" y2="32" stroke="#1D4ED8" stroke-width="6" stroke-linecap="round"/>
  <!-- Port node circles at vertices -->
  <circle cx="100" cy="25" r="9" fill="#1D4ED8"/>
  <circle cx="170" cy="68" r="9" fill="#1D4ED8"/>
  <circle cx="170" cy="132" r="9" fill="#1D4ED8"/>
  <circle cx="100" cy="175" r="9" fill="#1D4ED8"/>
  <circle cx="30" cy="132" r="9" fill="#1D4ED8"/>
  <circle cx="30" cy="68" r="9" fill="#1D4ED8"/>
</svg>
