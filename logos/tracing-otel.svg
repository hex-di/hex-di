<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Spans → Telescope" - Compact trace bars + arrow + telescope -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#D97706"/>
  <!-- Compact trace bars (left) -->
  <rect x="32" y="72" width="30" height="10" rx="3" fill="white" opacity="0.9"/>
  <rect x="40" y="88" width="35" height="10" rx="3" fill="white" opacity="0.7"/>
  <rect x="40" y="104" width="25" height="10" rx="3" fill="white" opacity="0.55"/>
  <!-- Arrow bridge -->
  <line x1="78" y1="92" x2="100" y2="92" stroke="white" stroke-width="2.5"/>
  <polyline points="96,87 102,92 96,97" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Telescope (right side) - angled tube with lens -->
  <!-- Tube body (angled ~30deg) -->
  <rect x="116" y="60" width="14" height="50" rx="4" fill="white" opacity="0.8" transform="rotate(-20, 123, 85)"/>
  <!-- Wider lens at top -->
  <rect x="112" y="48" width="22" height="10" rx="4" fill="white" opacity="0.9" transform="rotate(-20, 123, 53)"/>
  <!-- Tripod legs -->
  <line x1="128" y1="108" x2="118" y2="132" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="132" y1="108" x2="148" y2="132" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Signal arcs (observation/telemetry) -->
  <path d="M 142,48 A 14,14 0 0,1 148,64" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M 148,42 A 22,22 0 0,1 156,66" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
