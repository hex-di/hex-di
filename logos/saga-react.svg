<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Steps → React Orbits" - Compact 3-step dots + sweep + bridge + React orbits -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#BE123C"/>
  <!-- Compact 3-step bullseye dots (top, no text) -->
  <circle cx="60" cy="58" r="10" fill="white" opacity="0.9"/>
  <circle cx="60" cy="58" r="4" fill="#BE123C"/>
  <line x1="70" y1="58" x2="80" y2="58" stroke="white" stroke-width="2"/>
  <polyline points="78,54 83,58 78,62" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="94" cy="58" r="10" fill="white" opacity="0.9"/>
  <circle cx="94" cy="58" r="4" fill="#BE123C"/>
  <line x1="104" y1="58" x2="114" y2="58" stroke="white" stroke-width="2"/>
  <polyline points="112,54 117,58 112,62" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="128" cy="58" r="10" fill="white" opacity="0.9"/>
  <circle cx="128" cy="58" r="4" fill="#BE123C"/>
  <!-- Compensation sweep hint -->
  <path d="M 130,72 C 125,85 90,88 58,80" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Dashed bridge arrow downward -->
  <line x1="94" y1="90" x2="94" y2="108" stroke="white" stroke-width="2" stroke-dasharray="4,3"/>
  <polyline points="90,104 94,110 98,104" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- React orbital ellipses -->
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(60, 100, 142)"/>
  <ellipse cx="100" cy="142" rx="42" ry="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" transform="rotate(120, 100, 142)"/>
  <circle cx="100" cy="142" r="6" fill="white"/>
  <!-- React badge (mini orbital symbol) -->
  <circle cx="158" cy="50" r="12" fill="white" opacity="0.15"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(60, 158, 50)"/>
  <ellipse cx="158" cy="50" rx="10" ry="4" fill="none" stroke="white" stroke-width="1" opacity="0.6" transform="rotate(120, 158, 50)"/>
  <circle cx="158" cy="50" r="2" fill="white"/>
</svg>
