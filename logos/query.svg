<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Fetch → Cache" - Database cylinder + arrow + cache box + lightning badge -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#0891B2"/>
  <!-- Database cylinder (top) -->
  <ellipse cx="100" cy="52" rx="32" ry="12" fill="white" opacity="0.9"/>
  <rect x="68" y="52" width="64" height="24" fill="white" opacity="0.7"/>
  <ellipse cx="100" cy="76" rx="32" ry="12" fill="white" opacity="0.7"/>
  <!-- Bold downward arrow -->
  <line x1="100" y1="90" x2="100" y2="118" stroke="white" stroke-width="4"/>
  <polyline points="90,110 100,122 110,110" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cache box -->
  <rect x="60" y="128" width="80" height="36" rx="6" fill="white" opacity="0.25"/>
  <!-- Cache content lines -->
  <rect x="70" y="136" width="40" height="5" rx="2" fill="white" opacity="0.7"/>
  <rect x="70" y="147" width="55" height="5" rx="2" fill="white" opacity="0.7"/>
  <!-- Lightning bolt badge (instant from cache) -->
  <path d="M 148,128 L 142,140 L 148,140 L 144,154 L 156,138 L 150,138 L 154,128 Z" fill="white" opacity="0.85"/>
</svg>
