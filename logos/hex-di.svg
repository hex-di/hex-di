<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "The Hex Port" - Hexagon outline with gap + injected dependency dot -->
  <!-- Upper portion: from BL up around to BR, leaving gap at bottom-right -->
  <polyline points="30,132 30,68 100,28 170,68 170,115"
    fill="none" stroke="#6D28D9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lower portion: from gap end to BL -->
  <polyline points="145,150 100,172 30,132"
    fill="none" stroke="#6D28D9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Injected dependency circle entering through the gap -->
  <circle cx="160" cy="132" r="12" fill="#6D28D9"/>
</svg>
