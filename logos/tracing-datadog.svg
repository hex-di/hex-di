<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Spans → Paw" - Compact trace bars + arrow + symmetrized paw print -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#D97706"/>
  <!-- Compact trace bars (left) -->
  <rect x="32" y="72" width="30" height="10" rx="3" fill="white" opacity="0.9"/>
  <rect x="40" y="88" width="35" height="10" rx="3" fill="white" opacity="0.7"/>
  <rect x="40" y="104" width="25" height="10" rx="3" fill="white" opacity="0.55"/>
  <!-- Arrow bridge -->
  <line x1="78" y1="92" x2="100" y2="92" stroke="white" stroke-width="2.5"/>
  <polyline points="96,87 102,92 96,97" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Symmetrized paw print (right side, centered at ~140,88) -->
  <!-- Main pad (larger, lower) -->
  <ellipse cx="140" cy="100" rx="16" ry="12" fill="white" opacity="0.85"/>
  <!-- 4 toe circles (symmetric arc above pad) -->
  <circle cx="124" cy="80" r="7" fill="white" opacity="0.85"/>
  <circle cx="136" cy="72" r="7" fill="white" opacity="0.85"/>
  <circle cx="148" cy="72" r="7" fill="white" opacity="0.85"/>
  <circle cx="158" cy="80" r="7" fill="white" opacity="0.85"/>
</svg>
