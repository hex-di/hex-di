<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Atom in Test Boundary" - Simplified atom + dashed rect + recording circle + checkmarks -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#059669"/>
  <!-- Dashed test boundary rectangle -->
  <rect x="38" y="45" width="124" height="80" rx="6" fill="white" opacity="0.1" stroke="white" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Simplified atom inside boundary -->
  <ellipse cx="90" cy="82" rx="30" ry="11" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="90" cy="82" rx="30" ry="11" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" transform="rotate(60, 90, 82)"/>
  <ellipse cx="90" cy="82" rx="30" ry="11" fill="none" stroke="white" stroke-width="1.5" opacity="0.5" transform="rotate(120, 90, 82)"/>
  <circle cx="90" cy="82" r="8" fill="white"/>
  <!-- Small filled recording circle (ActionRecorder reference) -->
  <circle cx="144" cy="60" r="7" fill="#EF4444" opacity="0.8"/>
  <!-- Green checkmarks -->
  <polyline points="62,142 70,152 84,136" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="102,142 110,152 124,136" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
