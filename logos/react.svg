<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- "Hex Atom" - React orbital ellipses with hexagon nucleus -->
  <!-- Background hexagon -->
  <polygon points="100,18 176,61 176,139 100,182 24,139 24,61" fill="#0EA5E9"/>
  <!-- React-style orbits -->
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="2" opacity="0.7" transform="rotate(60, 100, 100)"/>
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="2" opacity="0.7" transform="rotate(120, 100, 100)"/>
  <!-- Center: small hexagon (hex-di nucleus) -->
  <polygon points="100,85 113,92 113,108 100,115 87,108 87,92" fill="white" opacity="0.9"/>
  <!-- Electron dots on orbits (r=5 for small-size visibility) -->
  <circle cx="155" cy="100" r="5" fill="white"/>
  <circle cx="72" cy="68" r="5" fill="white"/>
  <circle cx="72" cy="132" r="5" fill="white"/>
</svg>
